// ── GAME LOOP ──────────────────────────────────────────
function cw_loop(){
  var _cwFrameStart=Date.now();
  var s=CWS,c=s.canvas,ctx=s.ctx;
  if(!c||!s.active){s.rafId=null;return;}
  // Recover from lost canvas context (mobile Safari under memory pressure)
  if(!ctx||typeof ctx.clearRect!=='function'){
    try{s.ctx=c.getContext('2d');ctx=s.ctx;}catch(e){}
    if(!ctx){s.rafId=requestAnimationFrame(cw_loop);return;}
  }
  var vw=c.width,vh=c.height,ts=s.TILE;
  // Guard against zero-size canvas (tab hidden, resize race)
  if(!vw||!vh){s.rafId=requestAnimationFrame(cw_loop);return;}

  try{ // ── Wrap entire frame in try-catch so loop never dies ──

  // Build tile cache (only rebuilds when tile size or upgrades change)
  cw_buildTileCache(ts);

  // Frame budget: track if previous frame was slow so we can skip expensive fx
  var _cwSlowFrame=(s._lastFrameTime&&s._lastFrameTime>25);
  // On mobile, be more aggressive about detecting slow frames
  if(CW_IS_MOBILE&&s._lastFrameTime&&s._lastFrameTime>18) _cwSlowFrame=true;

  // NPC AI wander — skip every other frame if slow
  if(!_cwSlowFrame||!(s._frameCount&1)) cw_updateNPCs();
  s._frameCount=(s._frameCount||0)+1;

  // Player movement (disabled while sitting or in activity)
  if(!s.activity && !s.dialog && !s.sitting){
    // Gather input vector from keyboard, d-pad, OR joystick
    var ix=0,iy=0;
    if(s.keys['ArrowUp']  ||s.keys['w']||s.keys['W']||s.keys['dpad_up'])    iy=-1;
    if(s.keys['ArrowDown']||s.keys['s']||s.keys['S']||s.keys['dpad_down'])  iy= 1;
    if(s.keys['ArrowLeft'] ||s.keys['a']||s.keys['dpad_left'])  ix=-1;
    if(s.keys['ArrowRight']||s.keys['d']||s.keys['dpad_right']) ix= 1;
    // Joystick overrides d-pad if active
    if(Math.abs(s.joyX)>0.15||Math.abs(s.joyY)>0.15){ix=s.joyX;iy=s.joyY;}
    // Normalize diagonal so you don't go faster
    var imag=Math.sqrt(ix*ix+iy*iy);
    if(imag>1){ix/=imag;iy/=imag;}
    if(imag>0.15){
      // Determine facing direction
      if(Math.abs(ix)>Math.abs(iy)) s.pDir=ix>0?'right':'left';
      else s.pDir=iy>0?'down':'up';
      // Smooth sub-pixel movement (speed = 0.12 tiles/frame ≈ 7.2 tiles/sec at 60fps)
      var spd=0.12;
      var nx=s.fpx+ix*spd, ny=s.fpy+iy*spd;
      // Collision: AABB check against tiles the player body actually overlaps
      var margin=0.25;
      var canX=true,canY=true;
      // Player body Y range (current)
      var bodyY0=Math.floor(s.fpy+margin),bodyY1=Math.floor(s.fpy+1-margin-0.001);
      // Check horizontal leading edge
      if(ix>0){var tx=Math.floor(nx+1-margin);for(var tty=bodyY0;tty<=bodyY1;tty++){if(!cw_walkable(tx,tty)){canX=false;break;}}}
      if(ix<0){var tx=Math.floor(nx+margin);for(var tty=bodyY0;tty<=bodyY1;tty++){if(!cw_walkable(tx,tty)){canX=false;break;}}}
      // Player body X range (current)
      var bodyX0=Math.floor(s.fpx+margin),bodyX1=Math.floor(s.fpx+1-margin-0.001);
      // Check vertical leading edge
      if(iy>0){var ty=Math.floor(ny+1-margin);for(var ttx=bodyX0;ttx<=bodyX1;ttx++){if(!cw_walkable(ttx,ty)){canY=false;break;}}}
      if(iy<0){var ty=Math.floor(ny+margin);for(var ttx=bodyX0;ttx<=bodyX1;ttx++){if(!cw_walkable(ttx,ty)){canY=false;break;}}}
      // Bounds
      if(nx<0||nx>=CW_W-1) canX=false;
      if(ny<0||ny>=CW_H-1) canY=false;
      if(canX) s.fpx=nx;
      if(canY) s.fpy=ny;
      // Snap integer tile position for zone/NPC detection
      s.px=Math.round(s.fpx);
      s.py=Math.round(s.fpy);
      // Walk animation
      s.animTimer=(s.animTimer||0)+spd*imag*6;
      if(s.animTimer>=1){s.animTimer-=1;s.pAnim=(s.pAnim+1)%4;}
    }
  }

  // Camera (smooth eased lerp) — tracks sub-pixel position
  var tcx=s.fpx*ts+ts/2-vw/2,tcy=s.fpy*ts+ts/2-vh/2;
  var cdx=tcx-s.camX,cdy=tcy-s.camY;
  var cdist=Math.sqrt(cdx*cdx+cdy*cdy);
  var lerpF=cdist>100?0.18:cdist>30?0.10:0.06;
  s.camX+=cdx*lerpF;s.camY+=cdy*lerpF;
  s.camX=Math.max(0,Math.min(s.camX,CW_W*ts-vw));
  s.camY=Math.max(0,Math.min(s.camY,CW_H*ts-vh));
  // Screen shake offset
  cwShakeUpdate();
  var shOx=CW_SHAKE.offX,shOy=CW_SHAKE.offY;

  // Zone / NPC detection
  s.nearZone=null;
  for(var i=0;i<CW_ZONES.length;i++){var z=CW_ZONES[i];if(s.px>=z.x&&s.px<z.x+z.w&&s.py>=z.y&&s.py<z.y+z.h){s.nearZone=z.id;break;}}
  s.nearNpc=null;
  for(var j=0;j<CW_NPCS.length;j++){var n=CW_NPCS[j];if(Math.abs(s.px-n.x)<=1&&Math.abs(s.py-n.y)<=1){s.nearNpc=n.id;break;}}
  // Peer proximity detection for live PvP
  s.nearPeer=null;
  if(MP.isConnected()){for(var pi=0;pi<CWM.peers.length;pi++){var pr=CWM.peers[pi];if(Math.abs(s.px-pr.x)<=1&&Math.abs(s.py-pr.y)<=1){s.nearPeer=pr.uid;break;}}}

  // Render tiles
  ctx.clearRect(0,0,vw,vh);
  // Solid background (replaces expensive per-frame gradient)
  ctx.fillStyle='#B8DDE8';
  ctx.fillRect(0,0,vw,vh);

  var sx=Math.max(0,Math.floor(s.camX/ts)),sy=Math.max(0,Math.floor(s.camY/ts));
  var ex=Math.min(CW_W,sx+Math.ceil(vw/ts)+2),ey=Math.min(CW_H,sy+Math.ceil(vh/ts)+2);
  var camOx=Math.floor(s.camX)+shOx,camOy=Math.floor(s.camY)+shOy;
  for(var ty=sy;ty<ey;ty++)for(var tx2=sx;tx2<ex;tx2++){
    var tt=(CW_MAP[ty]||[])[tx2]||0;
    var _tpx=tx2*ts-camOx,_tpy=ty*ts-camOy;
    // Use cached tile if available (huge perf win on mobile)
    var _cacheKey;
    if(tt===1) _cacheKey='t1_r'+(ty%2);
    else if(tt===9) _cacheKey='t9_v'+(tx2%3);
    else if(tt===11) _cacheKey='t11_v'+((tx2+ty)%2);
    else if(tt===8||tt===12||tt===15||tt===17) _cacheKey=null; // animated/positional tiles — always redraw
    else _cacheKey='t'+tt;
    var _cached=_cacheKey?CW_TILE_CACHE[_cacheKey]:null;
    if(_cached){
      ctx.drawImage(_cached,_tpx,_tpy);
    } else {
      cw_drawTile(ctx,tt,_tpx,_tpy,ts);
    }
  }

  // Roblox-style global ambient light overlay (warm top-down glow) — skip on mobile
  if(!CW_IS_MOBILE){
    ctx.fillStyle='rgba(255,248,220,0.04)';
    ctx.fillRect(0,0,vw,vh);
  }

  // Church upgrade visual overlays drawn on top of tiles — skip on slow mobile frames
  var _upsList=G.pd.churchUpgrades||[];
  if(!(CW_IS_MOBILE&&_cwSlowFrame)&&_upsList.includes('sound')){
    // Speakers on stage walls
    var _spkLx=2*ts-camOx,_spkRx=27*ts-camOx,_spkY=3*ts-camOy;
    ctx.fillStyle='#222';ctx.fillRect(_spkLx+2,_spkY,ts*0.6,ts*0.8);ctx.fillRect(_spkRx+ts*0.3,_spkY,ts*0.6,ts*0.8);
    ctx.fillStyle='#444';ctx.beginPath();ctx.arc(_spkLx+ts*0.32,_spkY+ts*0.3,ts*0.18,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(_spkRx+ts*0.6,_spkY+ts*0.3,ts*0.18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(_spkLx+ts*0.32,_spkY+ts*0.6,ts*0.1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(_spkRx+ts*0.6,_spkY+ts*0.6,ts*0.1,0,Math.PI*2);ctx.fill();
    // Sound waves
    var _swAlpha=0.04+0.03*Math.sin(Date.now()/300);
    ctx.strokeStyle='rgba(200,200,255,'+_swAlpha+')';ctx.lineWidth=1;
    for(var _swi=1;_swi<=3;_swi++){
      ctx.beginPath();ctx.arc(_spkLx+ts*0.5,_spkY+ts*0.4,ts*0.3*_swi,Math.PI*1.3,Math.PI*1.7);ctx.stroke();
      ctx.beginPath();ctx.arc(_spkRx+ts*0.45,_spkY+ts*0.4,ts*0.3*_swi,Math.PI*0.3,Math.PI*0.7);ctx.stroke();
    }
  }
  if(!(CW_IS_MOBILE&&_cwSlowFrame)&&_upsList.includes('belltower')){
    // Bell above the entrance door
    var _bellX=14.5*ts-camOx,_bellY=0.5*ts-camOy;
    ctx.save();ctx.fillStyle='#C4A35A';
    ctx.beginPath();ctx.moveTo(_bellX-ts*0.25,_bellY+ts*0.4);ctx.quadraticCurveTo(_bellX,_bellY-ts*0.1,_bellX+ts*0.25,_bellY+ts*0.4);ctx.closePath();ctx.fill();
    ctx.fillStyle='#8B6914';ctx.beginPath();ctx.arc(_bellX,_bellY+ts*0.42,ts*0.06,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#5C4C3C';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(_bellX,_bellY-ts*0.1);ctx.lineTo(_bellX,_bellY-ts*0.3);ctx.stroke();
    // Pulsing glow
    var _bellP=0.05+0.03*Math.sin(Date.now()/600);
    ctx.fillStyle='rgba(196,163,90,'+_bellP+')';ctx.beginPath();ctx.arc(_bellX,_bellY+ts*0.2,ts*0.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  if(!(CW_IS_MOBILE&&_cwSlowFrame)&&_upsList.includes('garden')){
    // Greenery around altar area (rows 5-6, scattered plants)
    var _gardenTs=[[3,5],[5,6],[7,5],[22,6],[24,5],[26,6]];
    for(var _gi=0;_gi<_gardenTs.length;_gi++){
      var _gx=_gardenTs[_gi][0]*ts-camOx,_gy=_gardenTs[_gi][1]*ts-camOy;
      var _sway=Math.sin(Date.now()/800+_gi*1.5)*2;
      ctx.save();ctx.fillStyle='#2D8A3E';
      ctx.beginPath();ctx.ellipse(_gx+ts*0.5,_gy+ts*0.25+_sway,ts*0.2,ts*0.35,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1E6B2E';
      ctx.beginPath();ctx.ellipse(_gx+ts*0.35,_gy+ts*0.3+_sway*0.8,ts*0.14,ts*0.25,0.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5C3317';ctx.fillRect(_gx+ts*0.45,_gy+ts*0.55,ts*0.1,ts*0.2);
      // Flowers
      if(_gi%2===0){ctx.fillStyle='#FF6B8A';ctx.beginPath();ctx.arc(_gx+ts*0.4,_gy+ts*0.15+_sway,ts*0.06,0,Math.PI*2);ctx.fill();}
      else{ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(_gx+ts*0.55,_gy+ts*0.12+_sway,ts*0.05,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    }
  }

  // Zone highlights (Roblox-style glowing interactive areas)
  for(var zi=0;zi<CW_ZONES.length;zi++){
    var z=CW_ZONES[zi];
    var zx=z.x*ts-camOx,zy=z.y*ts-camOy;
    var pulse=0.1+0.06*Math.sin(Date.now()/350);
    ctx.fillStyle='rgba(80,200,255,'+pulse+')';
    ctx.fillRect(zx,zy,z.w*ts,z.h*ts);
    if(s.nearZone===z.id){
      ctx.strokeStyle='rgba(80,220,255,0.65)';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.roundRect(zx+1,zy+1,z.w*ts-2,z.h*ts-2,6);ctx.stroke();
      // Bright glow
      ctx.fillStyle='rgba(80,220,255,0.08)';ctx.fillRect(zx-4,zy-4,z.w*ts+8,z.h*ts+8);
    }
  }
  // NPCs
  for(var ni=0;ni<CW_NPCS.length;ni++) cw_drawNPC(ctx,CW_NPCS[ni],ts,camOx,camOy,vw,vh);
  // Player
  cw_drawChar(ctx,s.fpx*ts-camOx,s.fpy*ts-camOy,ts,G.cos.sk,G.cos.ot,s.pDir,s.pAnim,'@'+(G.username||'you'),true);
  cwm_drawPeers(ctx,ts,camOx,camOy,vw,vh);
  cwm_syncPos();

  // Ambient floating particles (dust motes / light) — skip on slow frames
  if(!_cwSlowFrame){
    cwAmbientUpdate(vw,vh);
    cwAmbientDraw(ctx,vw,vh);
  }
  // Game particles (hits, XP, etc)
  cwParticlesUpdate();
  if(!_cwSlowFrame) cwParticlesDraw(ctx,camOx,camOy);

  // HUD and dialog
  cw_drawHUD(ctx,vw,vh);
  cw_drawDialog(ctx,vw,vh);
  // Update peer count badge
  var _pcEl=document.getElementById('cwPeerCount');
  if(_pcEl){var _pc=cwm_peerCount();_pcEl.textContent=_pc>0?' · '+_pc+' online':'';}
  var _cpEl=document.getElementById('cwChatPeers');
  if(_cpEl&&MP.isConnected()){var _pc2=cwm_peerCount();_cpEl.textContent=_pc2>0?_pc2+' congregation member'+(  _pc2>1?'s':'')+' nearby':'Just you — be the first in church today';}
  else if(_cpEl){_cpEl.textContent=MP.isConnected()?'Connected':'Offline mode';}

  // Update HTML activity overlay every 500ms (for timers) or on state change
  // Skip re-render for static activities (café menu, baptism select, upgrades) to preserve scroll position
  var _skipRerender=s.activity&&((s.activity.type==='cafe'&&s.activity.phase==='menu')||(s.activity.type==='baptism'&&s.activity.phase==='select')||s.activity.type==='upgrades'||(s.activity.type==='parkinglot'&&(s.activity.phase==='playing'||s.activity.phase==='arrived')));
  if(!_skipRerender&&(!s._lastActivityRender||(s.activity&&Date.now()-s._lastActivityRender>500))){
    s._lastActivityRender=Date.now();
    cw_renderActivity();
  }

  s._lastFrameTime=Date.now()-_cwFrameStart;

  }catch(_cwErr){
    // Catch rendering errors so the loop never dies (prevents black/blue screen freeze)
    console.warn('[CW] Frame error:',_cwErr);
    // Reset canvas state in case save/restore got unbalanced
    try{ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.setTransform(1,0,0,1,0,0);}catch(e2){}
    // On persistent errors, try to re-acquire context
    if(!s._errCount)s._errCount=0;
    s._errCount++;
    if(s._errCount>10){
      s._errCount=0;
      try{s.ctx=c.getContext('2d');ctx=s.ctx;}catch(e3){}
    }
  }

  s.rafId=requestAnimationFrame(cw_loop);
}

// ── INTERACT ───────────────────────────────────────────
function cw_interact(){SFX&&SFX.resume&&SFX.resume();SFX&&SFX.talk&&SFX.talk();
  var s=CWS;
  if(s.dialog){
    if(s.dialog.xp){G.pd.xp=(G.pd.xp||0)+s.dialog.xp;persistPlayer();}
    s.dialog=null;return;
  }
  if(s.activity){
    var a=s.activity;
    if(a.type==='evangelism'){
      return;// button-driven, not A-key driven
    }
    if(a.type==='baptism'||a.type==='upgrades'){
      return;// button-driven
    }
    if(a.type==='parkinglot'){
      return;// button-driven
    }
    if(a.type==='devotional'){
      var delapsed=Date.now()-a.t0;
      if(delapsed>=12000){cw_finishDevotional();return;}
      a.t0=0;cw_renderActivity();return;
    }
    if(a.type==='cafe'){
      if(a.phase==='ordered'){cw_completeActivity();return;}
      return;
    }
    if(a.type==='worship'){
      if(a.phase==='intro'){a.phase='play';cw_renderActivity();return;}
      if(a.phase==='result'){cw_completeActivity();return;}
      return;
    }
    if(a.type==='versequiz'){
      if(a.answered){s.done['vq_'+a.vq.ref]=true;cw_completeActivity();}
      return;
    }
    var elapsed=Date.now()-a.t0;
    if(elapsed>=a.dur||a.skip){cw_completeActivity();}
    else{a.skip=true;cw_renderActivity();}
    return;
  }
  // Challenge a nearby player — show mode choice
  if(s.nearPeer&&MP.isConnected()){
    var peer=CWM.peers.find(function(p){return p.uid===s.nearPeer;});
    if(peer){pvp_showModeChoice(peer);return;}
  }
  if(s.nearNpc){
    var npc=CW_NPCS.find(function(x){return x.id===s.nearNpc;});
    if(npc&&npc.npcType==='nonbeliever'){
      // Start evangelism conversation
      if(s.evangelized[npc.id]){
        var _bap=(G.pd.baptized||[]).includes(npc.id);
        s.dialog={speaker:npc.name,emoji:_bap?'🕊️':'😊',text:_bap?'"I\'ve been baptized! My old life is washed away. Thank you for leading me to Jesus!"':'"Thank you for sharing the gospel with me! I gave my life to Jesus today! Take me to the baptism pool!"',xp:_bap?5:0};
      } else {
        s.activity={type:'evangelism',npcId:npc.id,npc:npc,step:0,score:0,responses:[],phase:'intro',zoneId:'ev_'+npc.id};
        cw_renderActivity();
      }
      return;
    }
    if(npc&&npc.talk){
      // Track NPC relationship
      if(!G.pd.npcRelations)G.pd.npcRelations={};
      G.pd.npcRelations[npc.id]=(G.pd.npcRelations[npc.id]||0)+1;
      var _tier=cw_getNpcTier(npc.id);
      var talkArr=npc.talk;
      if(_tier>0&&CW_NPC_TIERS[npc.id]&&CW_NPC_TIERS[npc.id][_tier]){talkArr=CW_NPC_TIERS[npc.id][_tier];}
      var idx=(s.talkIdx[npc.id]||0)%talkArr.length;
      var t=talkArr[idx];s.talkIdx[npc.id]=(idx+1);
      var bonusXp=CW_TIER_XP_BONUS[_tier]||0;
      // Check for tier-up notification
      var talks=G.pd.npcRelations[npc.id];
      var tierMsg='';
      if(talks===3)tierMsg=' · Now Acquaintance!';
      if(talks===8)tierMsg=' · Now Friend!';
      if(talks===15)tierMsg=' · Now Disciple!';
      s.dialog={speaker:npc.name,emoji:npc.emoji,text:t.text+(tierMsg?' <span style=color:'+CW_TIER_COLORS[_tier]+'>'+tierMsg+'</span>':''),xp:(t.xp||0)+bonusXp};
      persistPlayer();
    }
    return;
  }
  if(s.nearZone){
    var zone=CW_ZONES.find(function(x){return x.id===s.nearZone;});
    if(!zone) return;
    if(zone.type==='exit'){if(s.onExit)s.onExit();return;}
    if(s.done[zone.id]&&zone.type!=='worship'&&zone.type!=='parkinglot'){
      s.dialog={speaker:"",emoji:"💭",text:"You've already done this today. Come back next Sunday!",xp:0};return;
    }
    if(zone.type==='pew'){
      s.sitting=true;
      s.activity={type:'pew',verse:CW_VERSES[Math.floor(Math.random()*CW_VERSES.length)],t0:Date.now(),dur:10000,xp:25,skip:false,zoneId:zone.id};
    } else if(zone.type==='prayer'){
      s.activity={type:'prayer',prompt:CW_PRAYERS[Math.floor(Math.random()*CW_PRAYERS.length)],t0:Date.now(),dur:15000,xp:40,skip:false,zoneId:zone.id};
    } else if(zone.type==='worship'){
      var song=CW_WORSHIP_SONGS[Math.floor(Math.random()*CW_WORSHIP_SONGS.length)];
      s.activity={type:'worship',phase:'intro',song:song,score:0,combo:0,maxCombo:0,hits:0,misses:0,total:song.notes.length,xp:50,zoneId:zone.id};
    } else if(zone.type==='offering'){
      s.activity={type:'offering',t0:Date.now(),dur:0,xp:30,skip:true,zoneId:zone.id};
    } else if(zone.type==='versequiz'){
      var pool=CW_VERSE_QUIZ.filter(function(v){return!s.done['vq_'+v.ref];});
      if(!pool.length){pool=CW_VERSE_QUIZ;}
      var vq=pool[Math.floor(Math.random()*pool.length)];
      var ch=vq.choices.slice().sort(function(){return Math.random()-.5;});
      s.activity={type:'versequiz',vq:vq,choices:ch,selected:null,answered:false,correct:false,xp:vq.xp,zoneId:zone.id};
    } else if(zone.type==='cafe'){
      s.activity={type:'cafe',phase:'menu',selected:null,ordered:false,xp:0,zoneId:zone.id};
    } else if(zone.type==='baptism'){
      var ready=(G.pd.evangelized||[]).filter(function(id){return!(G.pd.baptized||[]).includes(id);});
      if(!ready.length){
        s.dialog={speaker:"",emoji:"🌊",text:"No one is ready for baptism yet. Lead someone to Christ through evangelism first!",xp:0};return;
      }
      s.activity={type:'baptism',phase:'select',ready:ready,selected:null,xp:0,zoneId:zone.id};
    } else if(zone.type==='devotional'){
      var today=new Date().toDateString();
      if(G.pd.devotional&&G.pd.devotional.lastDate===today){
        s.dialog={speaker:"",emoji:"📖",text:"You've already done today's devotional. Come back tomorrow for a new one!",xp:0};return;
      }
      var dayIdx=new Date().getDate()-1;
      var dev=CW_DEVOTIONALS[dayIdx%CW_DEVOTIONALS.length];
      s.activity={type:'devotional',phase:'read',dev:dev,t0:Date.now(),xp:35,zoneId:zone.id};
    } else if(zone.type==='parkinglot'){
      s.activity={type:'parkinglot',phase:'confirm',xp:40,zoneId:zone.id};
    }
    cw_renderActivity();
  }
}

function cw_handleKey(key){
  var a=CWS.activity;if(!a||a.type!=='worship'||a.phase!=='play')return;
  var lane={'d':0,'D':0,'f':1,'F':1,'j':2,'J':2,'k':3,'K':3,'1':0,'2':1,'3':2,'4':3}[key];
  if(lane!==undefined)cw_worshipTap(lane);
}

function cw_worshipStart(){
  var a=CWS.activity;if(!a||a.type!=='worship')return;
  a.phase='play';
  /* Build note objects with timing */
  var interval=60000/a.song.bpm; /* ms between notes */
  var notes=[];
  var now=Date.now();
  for(var i=0;i<a.song.notes.length;i++){
    notes.push({lane:a.song.notes[i],time:now+1200+i*interval,y:-10,hit:false,miss:false,hitTime:0});
  }
  a._notes=notes;a._noteIdx=0;a._startTime=now;a._lastFrame=now;
  a._rafId=requestAnimationFrame(cw_worshipLoop);
  cw_renderActivity();
}

function cw_worshipLoop(){
  var a=CWS.activity;if(!a||a.type!=='worship'||a.phase!=='play'){return;}
  var now=Date.now();
  var travelMs=2000; /* how long a note takes to fall from top to hit line */
  var hitY=82; /* percent from top where the hit zone is */
  var allDone=true;
  for(var i=0;i<a._notes.length;i++){
    var n=a._notes[i];
    if(n.hit||n.miss)continue;
    var elapsed=now-n.time+travelMs;
    var pct=(elapsed/travelMs)*hitY;
    n.y=pct;
    if(pct>hitY+18){/* missed — fell past hit zone */
      n.miss=true;a.misses++;a.combo=0;
      if(SFX&&SFX.worshipMiss)SFX.worshipMiss();
    } else {allDone=false;}
  }
  /* Check if all notes processed */
  if(a._noteIdx>=a.total||(allDone&&a.hits+a.misses>=a.total)){
    var pct2=a.hits/a.total;
    a.xp=Math.floor(50*(0.5+pct2*.5));
    if(pct2>=.75&&G.pd.powerups.length<6)G.pd.powerups.push({id:'worship',name:'Worship Boost',emoji:'🎵',effect:'heal'});
    a.phase='result';
    cw_renderActivity();
    return;
  }
  cw_renderActivity();
  a._rafId=requestAnimationFrame(cw_worshipLoop);
}

function cw_worshipTap(lane){
  var a=CWS.activity;if(!a||a.type!=='worship'||a.phase!=='play')return;
  var hitY=82;var hitWindow=16; /* +/- percent tolerance */
  var bestNote=null,bestDist=Infinity;
  for(var i=0;i<a._notes.length;i++){
    var n=a._notes[i];
    if(n.lane!==lane||n.hit||n.miss)continue;
    var dist=Math.abs(n.y-hitY);
    if(dist<hitWindow&&dist<bestDist){bestNote=n;bestDist=dist;}
  }
  if(bestNote){
    bestNote.hit=true;bestNote.hitTime=Date.now();
    a.hits++;a.combo++;a.maxCombo=Math.max(a.maxCombo,a.combo);
    /* Score: closer to center = more points */
    var accuracy=1-bestDist/hitWindow;
    var points=Math.floor(100*accuracy*(1+Math.min(a.combo,10)*0.1));
    a.score+=points;
    if(SFX&&SFX.worshipHit)SFX.worshipHit();
    a._noteIdx=(a._noteIdx||0)+1;
  } else {
    a.combo=0;
    if(SFX&&SFX.worshipMiss)SFX.worshipMiss();
  }
}

function cw_selectAnswer(idx){SFX&&SFX.resume&&SFX.resume();
  var a=CWS.activity;if(!a||a.type!=='versequiz'||a.answered) return;
  a.selected=idx;a.correct=(a.choices[idx]===a.vq.blank);a.answered=true;
  if(a.correct){G.pd.xp=(G.pd.xp||0)+a.xp;}else{G.pd.xp=(G.pd.xp||0)+Math.floor(a.xp/4);}
  persistPlayer();
  if(SFX){if(a.correct)SFX.correct();else SFX.wrong();}
  cw_renderActivity();
}

function cw_completeActivity(){var _ca=CWS.activity;
  if(_ca&&_ca._rafId)cancelAnimationFrame(_ca._rafId);
  if(_ca&&SFX){if(_ca.type==='offering')SFX.offer();if(_ca.type==='prayer')SFX.pray();if(_ca.type==='pew')SFX.correct();if(_ca.type==='cafe')SFX.correct();}
  if(_ca){
    // Apply church upgrade XP bonuses
    var _ups=G.pd.churchUpgrades||[];
    if(_ca.xp&&_ca.type!=='versequiz'){
      var _xpMul=1;
      if(_ca.type==='pew'&&_ups.includes('cushions'))_xpMul=1.5;
      if(_ca.type==='prayer'&&_ups.includes('garden'))_xpMul=1.5;
      if(_ca.type==='worship'&&_ups.includes('sound'))_xpMul=1.5;
      if(_ca.type==='cafe'&&_ups.includes('cafeupgrade'))_xpMul=1.5;
      _ca.xp=Math.floor(_ca.xp*_xpMul);
    }
    CWS.done[_ca.zoneId]=true;
    if(_ca.xp&&_ca.type!=='versequiz'){G.pd.xp=(G.pd.xp||0)+_ca.xp;if(_ca.type==='prayer')G.pd._prayerBuff=3;persistPlayer();}
    // Award coins from activities
    var _coinAward=0;
    if(_ca.type==='pew')_coinAward=3;if(_ca.type==='prayer')_coinAward=5;
    if(_ca.type==='worship')_coinAward=8;if(_ca.type==='offering')_coinAward=4;
    if(_ca.type==='versequiz')_coinAward=5;if(_ca.type==='cafe')_coinAward=2;
    if(_coinAward){G.pd.coins=(G.pd.coins||0)+_coinAward;persistPlayer();}
  }
  if(_ca&&_ca.type==='pew')CWS.sitting=false;
  CWS.activity=null;cw_hideActivityOverlay();CWS._lastActivityRender=0;
}

// ── INIT / DESTROY ─────────────────────────────────────
function cw_init(canvas,onExit){
  CWS.canvas=canvas;CWS.ctx=canvas.getContext('2d');CWS.onExit=onExit;CWS.active=true;
  CWS.px=14;CWS.py=20;CWS.pDir='down';CWS.pAnim=0;
  CWS.fpx=14;CWS.fpy=20; // sub-pixel float position for smooth movement
  CWS.joyX=0;CWS.joyY=0; // joystick input (-1..1)
  CWS.animTimer=0;
  CWS.dialog=null;CWS.activity=null;CWS.keys={};CWS.moveTimer=0;CWS.sitting=false;
  CWS.nearZone=null;CWS.nearNpc=null;CWS.nearPeer=null;CWS.npcTimers={};CWS._lastActivityRender=0;
  CWS.evangelized={};if(G.pd.evangelized){for(var ei=0;ei<G.pd.evangelized.length;ei++)CWS.evangelized[G.pd.evangelized[ei]]=true;}
  CWS._kd=function(e){
    var tag=document.activeElement&&document.activeElement.tagName;
    var isInput=(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||(document.activeElement&&document.activeElement.isContentEditable));
    if(isInput)return;
    CWS.keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
    if(e.key==='a'||e.key==='A'||e.key==='Enter'||e.key===' ')cw_interact();
    if(e.key==='Escape'){if(onExit)onExit();}
    cw_handleKey(e.key);
  };
  CWS._ku=function(e){delete CWS.keys[e.key];};
  document.addEventListener('keydown',CWS._kd);
  document.addEventListener('keyup',CWS._ku);
  if(CWS.rafId)cancelAnimationFrame(CWS.rafId);
  CWS.rafId=requestAnimationFrame(cw_loop);
}

function cw_destroy(){
  CWS.active=false;
  if(CWS.rafId){cancelAnimationFrame(CWS.rafId);CWS.rafId=null;}
  if(CWS._kd)document.removeEventListener('keydown',CWS._kd);
  if(CWS._ku)document.removeEventListener('keyup',CWS._ku);
  // Remove joystick touch listeners to prevent leaking on re-entry
  if(CWS._joyTouchMove)document.removeEventListener('touchmove',CWS._joyTouchMove);
  if(CWS._joyTouchEnd)document.removeEventListener('touchend',CWS._joyTouchEnd);
  if(CWS._joyTouchCancel)document.removeEventListener('touchcancel',CWS._joyTouchCancel);
  CWS._joyTouchMove=null;CWS._joyTouchEnd=null;CWS._joyTouchCancel=null;
  CWS.joyX=0;CWS.joyY=0;
  // Clear particles to free memory
  CW_PARTICLES.length=0;
  CW_AMBIENT_PARTICLES.length=0;
  cw_hideActivityOverlay();
  CWS.canvas=null;CWS.ctx=null;
}

  window.addEventListener('resize',resize);
  cw_init(canvas,leaveChurch);

  document.addEventListener('visibilitychange',function cw_visHandler(){
    if(!CWS.active){document.removeEventListener('visibilitychange',cw_visHandler);return;}
    if(!document.hidden){
      // Re-acquire context in case it was lost
      if(canvas){try{CWS.ctx=canvas.getContext('2d');}catch(e){}}
      // Resize in case orientation changed while hidden
      resize();
      // Restart RAF if it's not already running
      if(!CWS.rafId){CWS.rafId=requestAnimationFrame(cw_loop);}
      // Reset joystick to avoid stuck movement from stale touch state
      CWS.joyX=0;CWS.joyY=0;
    }
  });
}

// ── Virtual Joystick Logic ─────────────────────────────
function cw_initJoystick(){
  var area=document.getElementById('cwJoystickArea');
  var knob=document.getElementById('cwJoyKnob');
  if(!area||!knob) return;
  var active=false,touchId=null;
  var cx=0,cy=0,maxR=38; // center and max radius

  function getCenter(){
    var r=area.getBoundingClientRect();
    cx=r.left+r.width/2;cy=r.top+r.height/2;
  }

  function updateKnob(px,py){
    var dx=px-cx,dy=py-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;dist=maxR;}
    knob.style.transform='translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';
    knob.style.boxShadow='0 2px 12px rgba(196,163,90,0.4)';
    // Normalize to -1..1
    var nx=dx/maxR,ny=dy/maxR;
    CWS.joyX=Math.abs(nx)>0.12?nx:0;
    CWS.joyY=Math.abs(ny)>0.12?ny:0;
  }

  function resetKnob(){
    knob.style.transform='translate(-50%,-50%)';
    knob.style.boxShadow='0 2px 8px rgba(0,0,0,0.4)';
    CWS.joyX=0;CWS.joyY=0;
    active=false;touchId=null;
  }

  area.addEventListener('touchstart',function(e){
    e.preventDefault();
    if(active) return;
    var t=e.changedTouches[0];touchId=t.identifier;active=true;
    getCenter();updateKnob(t.clientX,t.clientY);
  },{passive:false});

  // Listen on document so dragging outside the joystick area still tracks/releases
  // Store references so cw_destroy can remove them
  CWS._joyTouchMove=function(e){
    if(!active) return;
    for(var i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===touchId){
        e.preventDefault();
        updateKnob(e.changedTouches[i].clientX,e.changedTouches[i].clientY);
        break;
      }
    }
  };
  CWS._joyTouchEnd=function(e){
    if(!active) return;
    for(var i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===touchId){resetKnob();break;}
    }
  };
  CWS._joyTouchCancel=function(e){
    if(!active) return;
    for(var i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier===touchId){resetKnob();break;}
    }
  };
  document.addEventListener('touchmove',CWS._joyTouchMove,{passive:false});
  document.addEventListener('touchend',CWS._joyTouchEnd);
  document.addEventListener('touchcancel',CWS._joyTouchCancel);

  // Mouse fallback (desktop testing)
  area.addEventListener('pointerdown',function(e){
    if(e.pointerType==='touch') return; // handled by touch events
    active=true;getCenter();updateKnob(e.clientX,e.clientY);
    area.setPointerCapture(e.pointerId);
  });
  area.addEventListener('pointermove',function(e){
    if(!active||e.pointerType==='touch') return;
    updateKnob(e.clientX,e.clientY);
  });
  area.addEventListener('pointerup',function(e){
    if(e.pointerType==='touch') return;
    resetKnob();
  });
}

// ── roundRect polyfill for older browsers ──
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,radii){
    var r=typeof radii==='number'?radii:(radii&&radii[0])||0;
    if(r>w/2)r=w/2; if(r>h/2)r=h/2;
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);
  };
}

// Offscreen sprite cache: draw each unit type once, blit every frame
var _brawlSpriteCache={};
function brawl_getSpriteKey(unit,facing8){return(unit.name||unit.id||'u')+'_'+facing8+'_'+(unit.isBoss?'B':'');}
function brawl_facing8(angle){return Math.round(((angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2)/(Math.PI/4))%8;}

// Darken/lighten color helpers
function brawl_shade(hex,amt){
  var n=parseInt(hex.replace('#',''),16);
  var r=Math.max(0,Math.min(255,((n>>16)&255)+amt));
  var g=Math.max(0,Math.min(255,((n>>8)&255)+amt));
  var b=Math.max(0,Math.min(255,(n&255)+amt));
  return'#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// ── Draw enemy unit ───────────────────────────────────
function brawl_drawUnit(ctx,x,y,r,unit,facingAngle,animFrame){
  var af=animFrame||0;
  var fa=facingAngle;
  var cx=Math.cos(fa),cy=Math.sin(fa);
  ctx.save();
  ctx.translate(x,y);

  // Shadow (elongated toward light)
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(0,r*0.75,r*0.9,r*0.22,0,0,Math.PI*2);ctx.fill();

  // Legs (animated walk cycle — two-tone boots)
  var legA=Math.sin(af*0.25)*r*0.3;
  var legB=-legA;
  var bootCol=brawl_shade(unit.color,-40);
  ctx.fillStyle=bootCol;
  // Left leg
  var lx=-r*0.22,ly1=r*0.2+legA;
  ctx.beginPath();ctx.roundRect(lx,ly1,r*0.22,r*0.5,2);ctx.fill();
  // Right leg
  var rx=r*0.02,ly2=r*0.2+legB;
  ctx.beginPath();ctx.roundRect(rx,ly2,r*0.22,r*0.5,2);ctx.fill();

  // Body / torso — shaped by type
  var armorC=unit.armor||unit.color;
  var armorLight=brawl_shade(armorC,30);
  var armorDark=brawl_shade(armorC,-30);
  if(unit.type==='boss'||unit.weapon==='shield'){
    // Wide stocky torso
    ctx.fillStyle=armorC;
    ctx.beginPath();ctx.ellipse(0,-r*0.05,r*0.7,r*0.65,0,0,Math.PI*2);ctx.fill();
    // Armor plate highlight
    ctx.fillStyle=armorLight+'44';
    ctx.beginPath();ctx.ellipse(-r*0.15,-r*0.15,r*0.3,r*0.35,0,Math.PI*1.3,Math.PI*1.8);ctx.fill();
  } else if(unit.weapon==='bow'||unit.weapon==='sling'||unit.weapon==='javelin'||unit.weapon==='staff'||unit.weapon==='scepter'){
    // Slimmer torso for ranged/magic
    ctx.fillStyle=armorC;
    ctx.beginPath();ctx.ellipse(0,-r*0.05,r*0.5,r*0.6,0,0,Math.PI*2);ctx.fill();
  } else {
    // Standard torso
    ctx.fillStyle=armorC;
    ctx.beginPath();ctx.ellipse(0,-r*0.05,r*0.6,r*0.65,0,0,Math.PI*2);ctx.fill();
  }
  // Torso outline
  ctx.strokeStyle=armorDark+'88';ctx.lineWidth=1;ctx.stroke();

  // Belt
  ctx.fillStyle=brawl_shade(armorC,-50);
  ctx.fillRect(-r*0.55,r*0.15,r*1.1,r*0.12);
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.arc(0,r*0.21,r*0.06,0,Math.PI*2);ctx.fill();

  // Arms
  var armLen=r*0.55;
  var armCol=unit.color;
  // Left arm (back)
  var laAngle=fa+Math.PI*0.6+Math.sin(af*0.2)*0.15;
  ctx.strokeStyle=armCol;ctx.lineWidth=r*0.16;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-r*0.45,-r*0.15);
  ctx.lineTo(-r*0.45+Math.cos(laAngle)*armLen,-r*0.15+Math.sin(laAngle)*armLen);ctx.stroke();
  // Hand
  ctx.fillStyle='#DEB887';
  ctx.beginPath();ctx.arc(-r*0.45+Math.cos(laAngle)*armLen,-r*0.15+Math.sin(laAngle)*armLen,r*0.08,0,Math.PI*2);ctx.fill();

  // Right arm + weapon
  var weapAngle=fa-Math.PI*0.1+Math.sin(af*0.3)*0.1;
  var handX=r*0.45+Math.cos(weapAngle)*armLen;
  var handY=-r*0.15+Math.sin(weapAngle)*armLen;
  ctx.strokeStyle=armCol;ctx.lineWidth=r*0.16;
  ctx.beginPath();ctx.moveTo(r*0.45,-r*0.15);ctx.lineTo(handX,handY);ctx.stroke();
  ctx.fillStyle='#DEB887';
  ctx.beginPath();ctx.arc(handX,handY,r*0.08,0,Math.PI*2);ctx.fill();
  ctx.lineCap='butt';

  // Weapon (drawn from hand)
  brawl_drawWeapon(ctx,handX,handY,r,unit,weapAngle,af);

  // Head
  var headY=-r*0.55;
  // Neck
  ctx.fillStyle='#DEB887';ctx.fillRect(-r*0.08,-r*0.35,r*0.16,r*0.15);
  // Face
  ctx.fillStyle=unit.color;
  ctx.beginPath();ctx.arc(0,headY,r*0.38,0,Math.PI*2);ctx.fill();
  // Face highlight
  ctx.fillStyle=brawl_shade(unit.color,25)+'66';
  ctx.beginPath();ctx.arc(-r*0.08,headY-r*0.05,r*0.2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(0,headY,r*0.38,0,Math.PI*2);ctx.stroke();

  // Helmet / headgear
  if(unit.helmet){
    ctx.fillStyle=unit.helmet;
    ctx.beginPath();ctx.arc(0,headY-r*0.1,r*0.43,Math.PI*1.05,Math.PI*1.95);ctx.fill();
    // Helmet rim
    ctx.fillStyle=brawl_shade(unit.helmet,-25);
    ctx.fillRect(-r*0.44,headY-r*0.04,r*0.88,r*0.08);
    if(unit.isBoss){
      // Plume
      ctx.fillStyle='#ef4444';
      for(var pi=0;pi<5;pi++){
        ctx.beginPath();ctx.ellipse(Math.sin(pi*0.7)*r*0.08,headY-r*0.5-pi*r*0.06,r*0.06,r*0.08,0,0,Math.PI*2);ctx.fill();}
      // Crown points
      ctx.fillStyle='#FFD700';
      for(var ci=0;ci<3;ci++){
        var cpx=(ci-1)*r*0.2;
        ctx.beginPath();ctx.moveTo(cpx-r*0.06,headY-r*0.15);ctx.lineTo(cpx,headY-r*0.35);ctx.lineTo(cpx+r*0.06,headY-r*0.15);ctx.fill();
      }
    }
  }

  // Eyes (track player direction)
  var eex=cx*r*0.1,eey=cy*r*0.06;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-r*0.14+eex,headY+r*0.02+eey,r*0.1,r*0.08,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(r*0.14+eex,headY+r*0.02+eey,r*0.1,r*0.08,0,0,Math.PI*2);ctx.fill();
  // Pupils
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(-r*0.11+eex*1.4,headY+r*0.03+eey*1.2,r*0.045,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.17+eex*1.4,headY+r*0.03+eey*1.2,r*0.045,0,Math.PI*2);ctx.fill();
  // Eyebrow for bosses (angry)
  if(unit.isBoss){
    ctx.strokeStyle='#333';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-r*0.24+eex,headY-r*0.08);ctx.lineTo(-r*0.04+eex,headY-r*0.12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*0.24+eex,headY-r*0.08);ctx.lineTo(r*0.04+eex,headY-r*0.12);ctx.stroke();
  }
  // Mouth (small line)
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(-r*0.06,headY+r*0.18);ctx.lineTo(r*0.06,headY+r*0.18);ctx.stroke();

  ctx.restore();
}

// Weapon sub-drawing
function brawl_drawWeapon(ctx,hx,hy,r,unit,angle,af){
  var tipX=hx+Math.cos(angle)*r*0.7,tipY=hy+Math.sin(angle)*r*0.7;
  if(unit.weapon==='spear'||unit.weapon==='lance'){
    // Wooden shaft
    ctx.strokeStyle='#8B6914';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(tipX,tipY);ctx.stroke();
    // Metal tip
    ctx.fillStyle='#ccc';
    ctx.beginPath();
    var tAng=angle,tLen=r*0.2;
    ctx.moveTo(tipX+Math.cos(tAng)*tLen,tipY+Math.sin(tAng)*tLen);
    ctx.lineTo(tipX+Math.cos(tAng+2.5)*tLen*0.35,tipY+Math.sin(tAng+2.5)*tLen*0.35);
    ctx.lineTo(tipX+Math.cos(tAng-2.5)*tLen*0.35,tipY+Math.sin(tAng-2.5)*tLen*0.35);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#aaa';ctx.lineWidth=0.8;ctx.stroke();
  } else if(unit.weapon==='sword'||unit.weapon==='gladius'||unit.weapon==='khopesh'||unit.weapon==='axe'){
    // Blade
    var bladeLen=r*0.6;
    var bEndX=hx+Math.cos(angle)*bladeLen,bEndY=hy+Math.sin(angle)*bladeLen;
    var bw2=unit.weapon==='axe'?3.5:2;
    ctx.strokeStyle='#d4d4d4';ctx.lineWidth=bw2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(bEndX,bEndY);ctx.stroke();
    // Blade highlight
    ctx.strokeStyle='#fff';ctx.lineWidth=0.8;ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.moveTo(hx+Math.cos(angle+0.2)*2,hy+Math.sin(angle+0.2)*2);
    ctx.lineTo(bEndX+Math.cos(angle+0.2)*2,bEndY+Math.sin(angle+0.2)*2);ctx.stroke();
    ctx.globalAlpha=1;
    // Crossguard
    ctx.fillStyle='#FFD700';
    var gx=hx+Math.cos(angle)*r*0.12,gy=hy+Math.sin(angle)*r*0.12;
    ctx.beginPath();ctx.ellipse(gx,gy,2,5,angle,0,Math.PI*2);ctx.fill();
    // Axe head
    if(unit.weapon==='axe'){
      ctx.fillStyle='#999';
      ctx.beginPath();
      ctx.arc(bEndX,bEndY,r*0.18,angle-1,angle+1);ctx.lineTo(bEndX,bEndY);ctx.fill();
    }
  } else if(unit.weapon==='bow'||unit.weapon==='sling'||unit.weapon==='javelin'){
    if(unit.weapon==='bow'){
      // Bow body (curved)
      ctx.strokeStyle='#8B6914';ctx.lineWidth=2;ctx.lineCap='round';
      var bCx=hx+Math.cos(angle)*r*0.15,bCy=hy+Math.sin(angle)*r*0.15;
      ctx.beginPath();
      ctx.arc(bCx,bCy,r*0.35,angle+Math.PI*0.55,angle-Math.PI*0.55,true);ctx.stroke();
      // String
      ctx.strokeStyle='#ccc';ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.moveTo(bCx+Math.cos(angle+Math.PI*0.55)*r*0.35,bCy+Math.sin(angle+Math.PI*0.55)*r*0.35);
      ctx.lineTo(bCx+Math.cos(angle-Math.PI*0.55)*r*0.35,bCy+Math.sin(angle-Math.PI*0.55)*r*0.35);ctx.stroke();
      // Arrow nocked
      ctx.strokeStyle='#8B6914';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bCx,bCy);ctx.lineTo(tipX*0.7+hx*0.3,tipY*0.7+hy*0.3);ctx.stroke();
    } else if(unit.weapon==='sling'){
      // Sling rope
      ctx.strokeStyle='#8B6914';ctx.lineWidth=1.5;
      var sAng=angle+Math.sin(af*0.4)*0.5;
      ctx.beginPath();ctx.moveTo(hx,hy);
      ctx.quadraticCurveTo(hx+Math.cos(sAng+0.5)*r*0.3,hy+Math.sin(sAng+0.5)*r*0.3,
        hx+Math.cos(sAng)*r*0.5,hy+Math.sin(sAng)*r*0.5);ctx.stroke();
      // Stone
      ctx.fillStyle='#888';
      ctx.beginPath();ctx.arc(hx+Math.cos(sAng)*r*0.5,hy+Math.sin(sAng)*r*0.5,3,0,Math.PI*2);ctx.fill();
    } else {
      // Javelin
      ctx.strokeStyle='#8B6914';ctx.lineWidth=2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(hx-Math.cos(angle)*r*0.2,hy-Math.sin(angle)*r*0.2);
      ctx.lineTo(tipX,tipY);ctx.stroke();
      ctx.fillStyle='#bbb';
      ctx.beginPath();
      ctx.moveTo(tipX+Math.cos(angle)*r*0.12,tipY+Math.sin(angle)*r*0.12);
      ctx.lineTo(tipX+Math.cos(angle+2.4)*r*0.08,tipY+Math.sin(angle+2.4)*r*0.08);
      ctx.lineTo(tipX+Math.cos(angle-2.4)*r*0.08,tipY+Math.sin(angle-2.4)*r*0.08);
      ctx.closePath();ctx.fill();
    }
  } else if(unit.weapon==='staff'||unit.weapon==='scepter'){
    // Magical staff
    ctx.strokeStyle='#6a3a8a';ctx.lineWidth=2.5;ctx.lineCap='round';
    var sEndX=hx+Math.cos(angle-Math.PI*0.1)*r*0.9,sEndY=hy+Math.sin(angle-Math.PI*0.1)*r*0.9;
    ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(sEndX,sEndY);ctx.stroke();
    // Orb at top
    var orbPulse=0.7+0.3*Math.sin(af*0.15);
    ctx.fillStyle='#CC00FF';ctx.shadowColor='#CC00FF';ctx.shadowBlur=8*orbPulse;
    ctx.beginPath();ctx.arc(sEndX,sEndY,r*0.12*orbPulse+r*0.04,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Inner orb shine
    ctx.fillStyle='#FF88FF';ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.arc(sEndX-1,sEndY-1,r*0.05,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  } else if(unit.weapon==='shield'){
    // Large shield
    var shX=hx+Math.cos(angle)*r*0.1,shY=hy+Math.sin(angle)*r*0.1;
    ctx.fillStyle=unit.armor||'#5577AA';
    ctx.beginPath();ctx.ellipse(shX,shY,r*0.4,r*0.5,angle,0,Math.PI*2);ctx.fill();
    // Shield rim
    ctx.strokeStyle=brawl_shade(unit.armor||'#5577AA',-30);ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(shX,shY,r*0.4,r*0.5,angle,0,Math.PI*2);ctx.stroke();
    // Shield boss (center)
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.arc(shX,shY,r*0.12,0,Math.PI*2);ctx.fill();
    // Shield cross pattern
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(shX-r*0.25,shY);ctx.lineTo(shX+r*0.25,shY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(shX,shY-r*0.3);ctx.lineTo(shX,shY+r*0.3);ctx.stroke();
  }
  ctx.lineCap='butt';
}

// ── Draw player hero ──────────────────────────────────
function brawl_drawHero(ctx,x,y,r,ch,facingAngle,animFrame,invuln){
  var af=animFrame||0;
  var fa=facingAngle;
  var cx2=Math.cos(fa),cy2=Math.sin(fa);
  ctx.save();
  ctx.translate(x,y);
  if(invuln>0&&Math.floor(invuln)%4<2) ctx.globalAlpha=0.4;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();ctx.ellipse(0,r*0.75,r*0.95,r*0.25,0,0,Math.PI*2);ctx.fill();

  // Glow ring / power aura
  var pw=brawl_getPower(ch.id);
  var glowSize=r+3+Math.sin(af*0.06)*2;
  ctx.strokeStyle=ch.color;ctx.lineWidth=pw>=10?3:2;
  ctx.shadowColor=ch.color;ctx.shadowBlur=pw>=10?18:10;
  ctx.beginPath();ctx.arc(0,0,glowSize,0,Math.PI*2);ctx.stroke();
  // Second ring for Star Power
  if(pw>=10){
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1;ctx.shadowColor='#FFD700';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(0,0,glowSize+4,0,Math.PI*2);ctx.stroke();
  }
  ctx.shadowBlur=0;

  // Legs
  var legA2=Math.sin(af*0.3)*r*0.25;
  var sandal=brawl_shade(ch.color,-50);
  ctx.fillStyle=sandal;
  ctx.beginPath();ctx.roundRect(-r*0.24,r*0.25+legA2,r*0.22,r*0.45,2);ctx.fill();
  ctx.beginPath();ctx.roundRect(r*0.04,r*0.25-legA2,r*0.22,r*0.45,2);ctx.fill();

  // Robe / body
  var robeCol=ch.color;
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.ellipse(0,-r*0.05,r*0.7,r*0.7,0,0,Math.PI*2);ctx.fill();
  // Robe overlay
  ctx.fillStyle=robeCol+'99';
  ctx.beginPath();ctx.ellipse(0,r*0.05,r*0.65,r*0.55,0,0,Math.PI);ctx.fill();
  // Robe top
  ctx.fillStyle=robeCol+'66';
  ctx.beginPath();ctx.ellipse(0,-r*0.15,r*0.55,r*0.45,0,Math.PI,0);ctx.fill();
  // Trim / sash
  ctx.fillStyle=ch.color;
  ctx.fillRect(-r*0.04,-r*0.5,r*0.08,r*0.7);

  // Arms
  var armLen2=r*0.5;
  // Left arm
  var lAng=fa+Math.PI*0.55+Math.sin(af*0.18)*0.12;
  ctx.strokeStyle='#DEB887';ctx.lineWidth=r*0.14;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-r*0.5,-r*0.15);
  ctx.lineTo(-r*0.5+Math.cos(lAng)*armLen2,-r*0.15+Math.sin(lAng)*armLen2);ctx.stroke();
  ctx.fillStyle='#DEB887';
  ctx.beginPath();ctx.arc(-r*0.5+Math.cos(lAng)*armLen2,-r*0.15+Math.sin(lAng)*armLen2,r*0.07,0,Math.PI*2);ctx.fill();

  // Right arm + weapon
  var wAng=fa-Math.PI*0.08+Math.sin(af*0.25)*0.08;
  var whx=r*0.5+Math.cos(wAng)*armLen2;
  var why=-r*0.15+Math.sin(wAng)*armLen2;
  ctx.strokeStyle='#DEB887';ctx.lineWidth=r*0.14;
  ctx.beginPath();ctx.moveTo(r*0.5,-r*0.15);ctx.lineTo(whx,why);ctx.stroke();
  ctx.fillStyle='#DEB887';
  ctx.beginPath();ctx.arc(whx,why,r*0.07,0,Math.PI*2);ctx.fill();
  ctx.lineCap='butt';

  // Hero weapon (glowing energy)
  ctx.strokeStyle=ch.color;ctx.lineWidth=2.5;ctx.shadowColor=ch.color;ctx.shadowBlur=8;ctx.lineCap='round';
  var wtip=r*0.6;
  ctx.beginPath();ctx.moveTo(whx,why);
  ctx.lineTo(whx+Math.cos(wAng)*wtip,why+Math.sin(wAng)*wtip);ctx.stroke();
  ctx.shadowBlur=0;ctx.lineCap='butt';
  // Weapon tip glow
  ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=6;
  ctx.beginPath();ctx.arc(whx+Math.cos(wAng)*wtip,why+Math.sin(wAng)*wtip,3.5+Math.sin(af*0.2),0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Head
  var hy=-r*0.55;
  // Neck
  ctx.fillStyle='#DEB887';ctx.fillRect(-r*0.08,-r*0.4,r*0.16,r*0.12);
  // Face
  ctx.fillStyle='#DEB887';
  ctx.beginPath();ctx.arc(0,hy,r*0.38,0,Math.PI*2);ctx.fill();
  // Face shading
  ctx.fillStyle='#D2A87B44';
  ctx.beginPath();ctx.arc(r*0.08,hy+r*0.05,r*0.25,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(0,hy,r*0.38,0,Math.PI*2);ctx.stroke();

  // Hair (character-specific)
  var hairCol=ch.id==='jesus'||ch.id==='moses'||ch.id==='abraham'?'#5C3317':
    ch.id==='deborah'||ch.id==='ruth'||ch.id==='esther'?'#1a0a00':'#3a2a1a';
  var isLongHair=ch.id==='jesus'||ch.id==='moses'||ch.id==='deborah'||ch.id==='esther'||ch.id==='ruth'||ch.id==='abraham';
  ctx.fillStyle=hairCol;
  ctx.beginPath();ctx.arc(0,hy-r*0.08,r*0.4,Math.PI*1.05,Math.PI*1.95);ctx.fill();
  if(isLongHair){
    // Flowing hair sides
    ctx.beginPath();ctx.ellipse(-r*0.32,hy+r*0.1,r*0.12,r*0.3,0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(r*0.32,hy+r*0.1,r*0.12,r*0.3,-0.2,0,Math.PI*2);ctx.fill();
  }
  // Beard for some characters
  if(ch.id==='moses'||ch.id==='abraham'||ch.id==='jesus'||ch.id==='noah'||ch.id==='peter'||ch.id==='paul'){
    ctx.fillStyle=hairCol;
    ctx.beginPath();ctx.ellipse(0,hy+r*0.3,r*0.2,r*0.18,0,0,Math.PI);ctx.fill();
  }

  // Crown/halo
  if(ch.rarity==='divine'){
    ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.shadowColor='#FFD700';ctx.shadowBlur=12;
    ctx.beginPath();ctx.ellipse(0,hy-r*0.25,r*0.5,r*0.12,0,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
    // Rays
    ctx.strokeStyle='#FFD70066';ctx.lineWidth=0.8;
    for(var ri=0;ri<8;ri++){
      var ra=ri*Math.PI*2/8;
      ctx.beginPath();ctx.moveTo(Math.cos(ra)*r*0.5,hy-r*0.25+Math.sin(ra)*r*0.12);
      ctx.lineTo(Math.cos(ra)*r*0.7,hy-r*0.25+Math.sin(ra)*r*0.2);ctx.stroke();}
  } else if(ch.rarity==='legendary'){
    ctx.fillStyle=ch.color+'33';ctx.shadowColor=ch.color;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(0,hy,r*0.55,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  } else if(ch.rarity==='epic'){
    ctx.fillStyle=ch.color+'22';
    ctx.beginPath();ctx.arc(0,hy,r*0.5,0,Math.PI*2);ctx.fill();
  }

  // Eyes
  var eex2=cx2*r*0.1,eey2=cy2*r*0.06;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-r*0.13+eex2,hy+r*0.01+eey2,r*0.1,r*0.08,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(r*0.13+eex2,hy+r*0.01+eey2,r*0.1,r*0.08,0,0,Math.PI*2);ctx.fill();
  // Iris (character color)
  ctx.fillStyle=ch.color;
  ctx.beginPath();ctx.arc(-r*0.1+eex2*1.3,hy+r*0.02+eey2*1.2,r*0.05,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.16+eex2*1.3,hy+r*0.02+eey2*1.2,r*0.05,0,Math.PI*2);ctx.fill();
  // Pupil
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(-r*0.1+eex2*1.3,hy+r*0.02+eey2*1.2,r*0.025,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.16+eex2*1.3,hy+r*0.02+eey2*1.2,r*0.025,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='#fff';ctx.globalAlpha=0.6;
  ctx.beginPath();ctx.arc(-r*0.12+eex2*1.1,hy-r*0.01+eey2,r*0.02,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.14+eex2*1.1,hy-r*0.01+eey2,r*0.02,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // Mouth
  ctx.strokeStyle='rgba(80,40,20,0.4)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(0,hy+r*0.15,r*0.08,0.2,Math.PI-0.2);ctx.stroke();

  // Name label
  ctx.fillStyle='#fff';ctx.font='bold 9px Georgia';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=3;
  ctx.fillText(ch.name,0,-r-10);
  // Power level badge
  if(pw>1){
    ctx.fillStyle=pw>=10?'#FFD700':'#FF6B35';ctx.font='bold 8px sans-serif';
    ctx.fillText('\u2B06'+pw,0,-r-1);
  }
  ctx.shadowBlur=0;

  ctx.restore();
}

// ── Floating damage numbers ───────────────────────────
var _brawlDmgNums=[];
function brawl_dmgNum(x,y,val,color,isCrit){
  _brawlDmgNums.push({x:x+Math.random()*10-5,y:y-5,val:val,color:color||'#fff',
    life:35,maxLife:35,scale:isCrit?1.4:1.0,vy:-1.5-(isCrit?0.5:0)});
}
function brawl_renderDmgNums(ctx){
  for(var i=_brawlDmgNums.length-1;i>=0;i--){
    var d=_brawlDmgNums[i];
    d.y+=d.vy;d.vy+=0.02;d.life--;
    if(d.life<=0){_brawlDmgNums.splice(i,1);continue;}
    ctx.globalAlpha=Math.min(1,d.life/15);
    ctx.fillStyle=d.color;
    ctx.font='bold '+Math.round(11*d.scale)+'px Georgia';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=2;
    ctx.fillText(d.val,d.x,d.y);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
}

// ── Brawler character stats ───────────────────────────
// ── Brawl Stars-style Power Levels ───────────────────
// Power 1-9: stat boosts via Power Points + Coins
// Power 10-11: Star Powers (unique passive abilities)
var BRAWL_POWER={
  maxLevel:11,
  // Power Points needed to unlock each level (cumulative cost at each tier)
  pointCost:[0,0,20,30,50,80,130,210,340,550,0,0],
  // Coin cost to confirm upgrade at each level
  coinCost: [0,0,20,35,75,140,290,480,800,1250,2000,2000],
  // Stat multiplier per power level (1.0 at level 1)
  statMult: [1.0,1.0,1.05,1.10,1.16,1.22,1.29,1.36,1.44,1.53,1.53,1.53],
  // Star Powers unlock at levels 10 and 11
  starPowers:{
    // Per-character star powers keyed by char id
    shepherd:  [{name:'Healing Light',   desc:'+20% HP regen between waves',   effect:'healBoost'},
                {name:'Swift Feet',      desc:'+15% move speed',               effect:'speedBoost'}],
    ruth:      [{name:'Loyalty Aura',    desc:'Kill heals drop 50% more often', effect:'healDrop'},
                {name:'Gleaner\'s Gift', desc:'+25% coin rewards',              effect:'coinBoost'}],
    david:     [{name:'Giant Slayer',    desc:'+40% damage to bosses',          effect:'bossHunter'},
                {name:'Stone Barrage',   desc:'Shoots 3 bullets in a spread',   effect:'spreadShot'}],
    moses:     [{name:'Parting Seas',    desc:'Ability pushes enemies back',    effect:'knockback'},
                {name:'Manna Rain',      desc:'Ability heals 15% HP',           effect:'abilHeal'}],
    jesus:     [{name:'Resurrection',    desc:'Revive once per battle with 30% HP', effect:'revive'},
                {name:'Miracle Touch',   desc:'Ability also heals to full',         effect:'fullHeal'}],
    _default:  [{name:'Iron Will',       desc:'+10% all damage',                effect:'dmgBoost'},
                {name:'Blessed Armor',   desc:'+15% max HP',                    effect:'hpBoost'}]
  }
};

function brawl_getPower(charId){
  return (G.pd.brawlPower&&G.pd.brawlPower[charId])||1;
}
function brawl_getPoints(charId){
  return (G.pd.brawlPoints&&G.pd.brawlPoints[charId])||0;
}
function brawl_getStarPowers(charId){
  return BRAWL_POWER.starPowers[charId]||BRAWL_POWER.starPowers._default;
}
function brawl_getActiveStar(charId){
  var pw=brawl_getPower(charId);
  if(pw>=11) return brawl_getStarPowers(charId)[1];
  if(pw>=10) return brawl_getStarPowers(charId)[0];
  return null;
}
function brawl_canUpgrade(charId){
  var pw=brawl_getPower(charId);
  if(pw>=BRAWL_POWER.maxLevel) return{can:false,reason:'MAX'};
  var pts=brawl_getPoints(charId);
  var needPts=BRAWL_POWER.pointCost[pw+1]||0;
  var needCoins=BRAWL_POWER.coinCost[pw+1]||0;
  if(pts<needPts) return{can:false,reason:'pts',have:pts,need:needPts};
  if((G.pd.coins||0)<needCoins) return{can:false,reason:'coins',have:G.pd.coins||0,need:needCoins};
  return{can:true,needPts:needPts,needCoins:needCoins};
}
function brawl_doUpgrade(charId){
  var check=brawl_canUpgrade(charId);
  if(!check.can) return false;
  var pw=brawl_getPower(charId);
  G.pd.brawlPoints[charId]=(G.pd.brawlPoints[charId]||0)-check.needPts;
  G.pd.coins-=check.needCoins;
  G.pd.brawlPower[charId]=pw+1;
  persistPlayer();
  SFX&&SFX.unlock&&SFX.unlock();
  return true;
}
// Points are earned from brawl battles
function brawl_awardPoints(charId,amount){
  if(!G.pd.brawlPoints) G.pd.brawlPoints={};
  G.pd.brawlPoints[charId]=(G.pd.brawlPoints[charId]||0)+amount;
}

function brawl_getCharStats(){
  var c=gch(),lv=glv();
  var pw=brawl_getPower(c.id);
  var mult=BRAWL_POWER.statMult[pw]||1.0;
  var star=brawl_getActiveStar(c.id);
  var baseHp=Math.round(((c.hp||100)+c.str*3+lv*12)*mult);
  var baseDmg=Math.round((c.str*3+lv*2+8)*mult);
  var abilDmg=Math.round((c.abilityDmg[0]+c.abilityDmg[1]+lv*2)*mult);
  var speed=3.2+c.faith*0.04;
  var shootCd=Math.max(12,30-c.str);
  // Star Power bonuses
  if(star){
    if(star.effect==='dmgBoost'){baseDmg=Math.round(baseDmg*1.1);abilDmg=Math.round(abilDmg*1.1);}
    if(star.effect==='hpBoost') baseHp=Math.round(baseHp*1.15);
    if(star.effect==='speedBoost') speed*=1.15;
    if(star.effect==='bossHunter') {} // applied in combat
    if(star.effect==='spreadShot') {} // applied in shoot
  }
  return{hp:baseHp,dmg:baseDmg,abilDmg:abilDmg,speed:speed,shootCd:shootCd,
    abilityName:c.abilityName,charId:c.id,color:c.color,name:c.name,
    powerLevel:pw,starPower:star};
}

// ── Co-op Brawl — start a shared arena with a peer ───
function brawl_startCoop(role,roomId,peerData){
  var db=MP.getDb();var uid=MP.getUid();
  if(!db||!uid) return;
  // Pick a random campaign for co-op (harder: +30% enemy HP)
  var campIdx=Math.floor(Math.random()*BRAWL_CAMPAIGNS.length);
  var camp=BRAWL_CAMPAIGNS[campIdx];
  var B=BRAWL;
  B.campaign=camp;B.wave=0;B.state='playing';B.score=0;B.xpEarned=0;B.coinsEarned=0;
  B.enemies=[];B.bullets=[];B.particles=[];B.pickups=[];B.obstacles=[];
  B.enemiesKilled=0;B.waveTimer=0;B.camShake=0;B._frameCount=0;B._lastTime=0;
  B.arenaW=900;B.arenaH=700;
  // Player 1 bottom-left, Player 2 bottom-right
  B.px=(role==='host')?B.arenaW*0.35:B.arenaW*0.65;
  B.py=B.arenaH-80;
  var stats=brawl_getCharStats();
  B.pHp=stats.hp;B.pMaxHp=stats.hp;B.pSpeed=stats.speed;
  B.pInvuln=0;B.pDir=-Math.PI/2;
  B.moveJoyX=0;B.moveJoyY=0;B.aimJoyX=0;B.aimJoyY=0;B.aimActive=false;
  B._shootCdTimer=0;B.pAbilityCd=0;B.pSuperCharge=0;
  B._keys={};B._joyCleanup=[];B._endClickBound=false;B._reviveUsed=false;
  _brawlDmgNums=[];
  // Co-op state
  B.coopMode=true;
  B.coopRoomId=roomId;
  B.coopRole=role;
  B.coopPeerData=peerData;
  B.coopAlly={x:(role==='host')?B.arenaW*0.65:B.arenaW*0.35,y:B.arenaH-80,hp:100,maxHp:100,dir:0,charId:peerData.charId,username:peerData.username,alive:true,animFrame:0};
  // Set ally stats from their character
  var allyChar=ALL_CHARS.find(function(c){return c.id===peerData.charId;})||ALL_CHARS[0];
  var allyLv=peerData.lv||1;
  B.coopAlly.maxHp=(allyChar.hp||100)+allyChar.str*2+allyLv*8;
  B.coopAlly.hp=B.coopAlly.maxHp;
  B.coopAlly.color=allyChar.color;
  B.coopAlly.char=allyChar;
  B._coopSyncTimer=0;
  B._coopListeners=[];
  B.active=true;
  // Use seeded obstacles (host sends seed, guest uses same)
  if(role==='host'){
    B._coopSeed=Math.floor(Math.random()*999999);
    brawl_spawnObstaclesSeeded(B._coopSeed);
  }
  G.screen='brawl';
  document.getElementById('app').innerHTML=rBrawlScreen();
  brawl_initCanvas();
  pvp_hideOverlay();
  // Set up Firebase sync
  var roomRef=db.ref('kc/brawl_coop/'+roomId);
  B._coopRoomRef=roomRef;
  roomRef.onDisconnect().update({disconnected:uid,t:Date.now()});
  if(role==='host'){
    // Host writes initial state
    roomRef.child('config').set({campId:camp.id,seed:B._coopSeed,t:Date.now()});
    roomRef.child('host').set({x:B.px,y:B.py,hp:B.pHp,dir:B.pDir,alive:true});
    // Host spawns waves and syncs enemy state
    brawl_spawnWave();
    brawl_coopSyncEnemies();
    brawl_coopSyncWave();
    // Listen for guest bullet hits
    var guestHitRef=roomRef.child('guest_hits');
    var guestHitListener=guestHitRef.on('child_added',function(snap){
      var hit=snap.val();
      if(hit&&B.enemies[hit.idx]&&B.enemies[hit.idx].hp>0){
        B.enemies[hit.idx].hp-=hit.dmg;
        B.enemies[hit.idx].flash=8;
        brawl_particles(B.enemies[hit.idx].x,B.enemies[hit.idx].y,3,B.enemies[hit.idx].color);
        if(B.enemies[hit.idx].hp<=0){brawl_onKill(B.enemies[hit.idx]);brawl_particles(B.enemies[hit.idx].x,B.enemies[hit.idx].y,15,B.enemies[hit.idx].color);}
      }
      snap.ref.remove();
    },function(err){console.error('[COOP] Guest hits listener ERROR',err.message);});
    B._coopListeners.push(function(){guestHitRef.off('child_added',guestHitListener);});
  } else {
    // Guest reads config from host
    roomRef.child('config').once('value',function(snap){
      var cfg=snap.val();
      if(cfg){
        var trueCamp=BRAWL_CAMPAIGNS.find(function(c){return c.id===cfg.campId;});
        if(trueCamp) B.campaign=trueCamp;
        brawl_spawnObstaclesSeeded(cfg.seed||0);
      }
    });
    roomRef.child('guest').set({x:B.px,y:B.py,hp:B.pHp,dir:B.pDir,alive:true});
    B.wave=-1; // so wave listener triggers on wave 0
  }
  // Connection verification — test write+read to confirm Firebase rules allow this path
  var testRef=roomRef.child('_test_'+uid);
  testRef.set({t:Date.now()}).then(function(){
    console.log('[COOP] Firebase write OK for room',roomId);
    testRef.remove();
    B._coopConnected=true;
  }).catch(function(err){
    console.error('[COOP] Firebase WRITE DENIED for brawl_coop path!',err.message);
    toast('\u26A0 Co-op sync error — Firebase rules may block kc/brawl_coop. Check DB rules.','err');
  });
  // Listen for ally position updates
  var allyKey=role==='host'?'guest':'host';
  var allyRef=roomRef.child(allyKey);
  B._coopAllyShootState=0;
  var allyListener=allyRef.on('value',function(snap){
    var d=snap.val();
    if(!d) return;
    if(!B._coopConnected){B._coopConnected=true;console.log('[COOP] Receiving ally data OK');}
    B.coopAlly.x=d.x;B.coopAlly.y=d.y;B.coopAlly.hp=d.hp;B.coopAlly.dir=d.dir;
    B.coopAlly.alive=d.alive!==false;
    // Ally shooting — spawn cosmetic bullet when ally fires
    if(d.shoot&&!B._coopAllyShootState){
      var aDx=Math.cos(d.dir),aDy=Math.sin(d.dir);
      B.bullets.push({x:d.x+aDx*B.pRadius,y:d.y+aDy*B.pRadius,vx:aDx*7.5,vy:aDy*7.5,
        dmg:0,radius:4,color:B.coopAlly.color||'#4ade80',owner:'ally',life:50});
    }
    B._coopAllyShootState=d.shoot||0;
  },function(err){
    console.error('[COOP] Ally listener ERROR — Firebase read denied?',err.message);
    toast('\u26A0 Co-op read error — check Firebase rules for kc/brawl_coop','err');
  });
  B._coopListeners.push(function(){allyRef.off('value',allyListener);});
  // Listen for enemy sync (guest only — host is authoritative)
  if(role==='guest'){
    var enemyRef=roomRef.child('enemies');
    var enemyListener=enemyRef.on('value',function(snap){
      var d=snap.val();
      if(!d) return;
      // Merge enemy positions from host
      if(Array.isArray(d)){
        // If enemy count mismatch, re-spawn wave to create matching enemy objects
        if(d.length>0&&B.enemies.length!==d.length){
          brawl_spawnWave();
        }
        for(var i=0;i<d.length&&i<B.enemies.length;i++){
          if(d[i]){
            B.enemies[i].x=d[i].x;B.enemies[i].y=d[i].y;
            B.enemies[i].hp=d[i].hp;
            if(d[i].dead) B.enemies[i].hp=0;
          }
        }
      }
    },function(err){console.error('[COOP] Enemy listener ERROR',err.message);});
    B._coopListeners.push(function(){enemyRef.off('value',enemyListener);});
    // Listen for wave spawns
    var waveRef=roomRef.child('wave');
    var waveListener=waveRef.on('value',function(snap){
      var w=snap.val();
      if(w!==null&&w!==undefined&&w!==B.wave){
        // Heal between waves (same as host wave_clear)
        if(B.wave>=0){
          var healPct=0.2;
          var _hst=brawl_getCharStats();
          if(_hst.starPower&&_hst.starPower.effect==='healBoost') healPct=0.4;
          B.pHp=Math.min(B.pMaxHp,B.pHp+Math.round(B.pMaxHp*healPct));
          // Award score/XP for wave clear
          B.score+=100*(w);B.xpEarned+=30+w*15;B.coinsEarned+=5+w*3;
        }
        B.wave=w;
        brawl_spawnWave();
      }
    },function(err){console.error('[COOP] Wave listener ERROR',err.message);});
    B._coopListeners.push(function(){waveRef.off('value',waveListener);});
    // Listen for host bullet hits so guest sees damage applied
    var hostHitRef=roomRef.child('host_hits');
    var hostHitListener=hostHitRef.on('child_added',function(snap){
      var hit=snap.val();
      if(hit&&B.enemies[hit.idx]&&B.enemies[hit.idx].hp>0){
        B.enemies[hit.idx].flash=8;
        brawl_particles(B.enemies[hit.idx].x,B.enemies[hit.idx].y,3,B.enemies[hit.idx].color);
      }
      snap.ref.remove();
    },function(err){console.error('[COOP] Host hits listener ERROR',err.message);});
    B._coopListeners.push(function(){hostHitRef.off('child_added',hostHitListener);});
  }
  // Listen for disconnect
  var dcRef=roomRef.child('disconnected');
  var dcListener=dcRef.on('value',function(snap){
    var val=snap.val();
    if(val&&val!==uid&&B.active&&B.coopMode){
      toast('\u26A1 Ally disconnected!','err');
      B.coopAlly.alive=false;
    }
  },function(err){console.error('[COOP] Disconnect listener ERROR',err.message);});
  B._coopListeners.push(function(){dcRef.off('value',dcListener);});
  // Go fullscreen
  setTimeout(brawl_requestFullscreen,100);
}

// Seeded obstacle spawner (deterministic for both players)
function brawl_spawnObstaclesSeeded(seed){
  var B=BRAWL;B.obstacles=[];
  function lcg(s){return(s*1664525+1013904223)&0x7fffffff;}
  var s=seed;
  for(var i=0;i<6;i++){
    s=lcg(s);var ox=80+(s%((B.arenaW-160)*100))/100;
    s=lcg(s);var oy=80+(s%((B.arenaH-200)*100))/100;
    if(Math.abs(ox-B.arenaW/2)<80&&oy>B.arenaH-150) continue;
    s=lcg(s);var rad=18+(s%1300)/100;
    B.obstacles.push({x:ox,y:oy,radius:rad,type:'rock'});
  }
  for(var j=0;j<4;j++){
    s=lcg(s);var bx=60+(s%((B.arenaW-120)*100))/100;
    s=lcg(s);var by=60+(s%((B.arenaH-180)*100))/100;
    if(Math.abs(bx-B.arenaW/2)<80&&by>B.arenaH-150) continue;
    s=lcg(s);var brad=20+(s%1100)/100;
    B.obstacles.push({x:bx,y:by,radius:brad,type:'bush'});
  }
}

// Co-op sync: host sends enemy state to Firebase periodically
function brawl_coopSyncEnemies(){
  var B=BRAWL;
  if(!B.coopMode||!B._coopRoomRef||B.coopRole!=='host') return;
  var enemyData=[];
  for(var i=0;i<B.enemies.length;i++){
    var e=B.enemies[i];
    enemyData.push({x:Math.round(e.x),y:Math.round(e.y),hp:Math.round(e.hp),dead:e.hp<=0});
  }
  B._coopRoomRef.child('enemies').set(enemyData);
}

// Co-op sync: send my position to Firebase (called from game loop)
function brawl_coopSyncSelf(){
  var B=BRAWL;
  if(!B.coopMode||!B._coopRoomRef) return;
  var myKey=B.coopRole==='host'?'host':'guest';
  var shooting=B.aimActive||B._keys['j']||B._keys['J']||B._keys['l']||B._keys['L']||B._keys['i']||B._keys['I']||B._keys['k']||B._keys['K'];
  B._coopRoomRef.child(myKey).set({
    x:Math.round(B.px),y:Math.round(B.py),hp:Math.round(B.pHp),
    dir:Math.round((B.aimActive?Math.atan2(B.aimJoyY,B.aimJoyX):B.pDir)*100)/100,
    alive:B.pHp>0,shoot:shooting?1:0
  }).catch(function(err){
    if(!B._coopWriteErrShown){B._coopWriteErrShown=true;console.error('[COOP] Write DENIED:',err.message);toast('\u26A0 Co-op sync failed — check Firebase rules','err');}
  });
}

// Co-op: sync wave number from host
function brawl_coopSyncWave(){
  var B=BRAWL;
  if(!B.coopMode||!B._coopRoomRef||B.coopRole!=='host') return;
  B._coopRoomRef.child('wave').set(B.wave);
}

// Co-op cleanup
function brawl_coopCleanup(){
  var B=BRAWL;
  if(B._coopListeners){B._coopListeners.forEach(function(fn){try{fn();}catch(e){}});B._coopListeners=[];}
  if(B._coopRoomRef){try{B._coopRoomRef.child('disconnected').set(MP.getUid());}catch(e){}B._coopRoomRef=null;}
  B.coopMode=false;B.coopPeers=[];B.coopRoomId=null;B.coopRole=null;B.coopAlly=null;B.coopPeerData=null;

    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if(el.msRequestFullscreen) el.msRequestFullscreen();
  }catch(e){}
  // Also try to lock orientation to landscape for more play area
  try{if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(function(){});}
  catch(e){}
}
function brawl_exitFullscreen(){

    if(document.fullscreenElement||document.webkitFullscreenElement){
      if(document.exitFullscreen) document.exitFullscreen().catch(function(){});
      else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  }catch(e){}
  try{if(screen.orientation&&screen.orientation.unlock) screen.orientation.unlock();}catch(e){}
}
