<script>
// ═══════════════════════════════════════════════
// KINGDOM CHRONICLES — ChristLife Church
// ═══════════════════════════════════════════════

// ── localStorage keys ────────────────────────
const LS_SETTINGS = "kc_settings_v1";
const LS_PLAYER   = "kc_player_v1";
const LS_USERNAMES= "kc_usernames_v1"; // shared registry of taken usernames
const ADMIN_PASS  = "christlife2024";

// ── Load / save helpers ───────────────────────
function lsGet(k,def=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
// Auto-clear stale settings if ?reset=1 in URL
if(location.search.includes('reset=1')){localStorage.removeItem(LS_SETTINGS);history.replaceState(null,'',location.pathname);}

// ── Church config — admin editable ───────────
var _KC_DEFAULT_FIREBASE={
  apiKey:"AIzaSyCHfjnme0OeU2lBpXU_SrG8akin8spj9u8",
  authDomain:"christlife-kc.firebaseapp.com",
  databaseURL:"https://christlife-kc-default-rtdb.firebaseio.com",
  projectId:"christlife-kc",
  storageBucket:"christlife-kc.firebasestorage.app",
  messagingSenderId:"668999351976",
  appId:"1:668999351976:web:519938aceb84df61cacc9d"
};
let CFG = Object.assign({
  churchName:"ChristLife Church",
  churchAddress:"14071 Springdale St, Westminster, CA",
  lat:33.7542, lng:-117.9943,
  radiusMeters:200,
  locationRequired:true,  // false = open check-in for anyone
  firebaseCfg:_KC_DEFAULT_FIREBASE
}, lsGet(LS_SETTINGS,{}));
// Always ensure Firebase config is present (localStorage null won't override)
if(!CFG.firebaseCfg||!CFG.firebaseCfg.apiKey) CFG.firebaseCfg=_KC_DEFAULT_FIREBASE;

function saveCFG(){lsSet(LS_SETTINGS,CFG);}

function getDistM(lat1,lng1,lat2,lng2){
  const R=6371000,p1=lat1*Math.PI/180,p2=lat2*Math.PI/180,
    dp=(lat2-lat1)*Math.PI/180,dl=(lng2-lng1)*Math.PI/180,
    a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Username registry (stored locally, shared key) ──
function getUsernames(){return lsGet(LS_USERNAMES,{});}
function isUsernameTaken(u){return !!getUsernames()[u.toLowerCase()];}
function registerUsername(u,playerId){
  const reg=getUsernames();reg[u.toLowerCase()]=playerId;lsSet(LS_USERNAMES,reg);
}

// ═══════════════════════════════════════════════════════
// FIREBASE AUTH + CLOUD SAVE SYSTEM
// ═══════════════════════════════════════════════════════
var KC_AUTH = (function(){
  var _app = null;
  var _auth = null;
  var _db = null;
  var _user = null; // current Firebase user
  var _ready = false;
  var _onReady = []; // callbacks waiting for SDK load

  // Load Firebase SDKs (app + auth + database)
  var _loadFailed = false;
  function _loadSDK(cb){
    if(window.firebase && window.firebase.auth && window.firebase.database){cb();return;}
    if(_loadFailed){cb();return;}
    function loadScript(url, next){
      var s=document.createElement('script');
      s.src=url; s.onload=next;
      s.onerror=function(){console.warn('[KC_AUTH] Failed to load: '+url); _loadFailed=true; cb();};
      document.head.appendChild(s);
    }
    var base='https://www.gstatic.com/firebasejs/9.22.2/';
    // Chain: app → auth → database
    loadScript(base+'firebase-app-compat.js', function(){
      loadScript(base+'firebase-auth-compat.js', function(){
        loadScript(base+'firebase-database-compat.js', function(){
          cb();
        });
      });
    });
  }

  function _initApp(){
    if(_app) return;
    var cfg = CFG.firebaseCfg || _KC_DEFAULT_FIREBASE;
    if(!cfg || !cfg.apiKey) return;
    try{_app = firebase.app('kc-auth');}
    catch(e){_app = firebase.initializeApp(cfg, 'kc-auth');}
    _auth = firebase.auth(_app);
    _db = firebase.database(_app);
  }

  // Ensure everything is loaded and initialized, then call cb
  function ensureReady(cb){
    if(_ready){cb();return;}
    _onReady.push(cb);
    if(_onReady.length > 1) return; // already loading
    _loadSDK(function(){
      _initApp();
      _ready = true;
      var cbs = _onReady.slice();
      _onReady = [];
      cbs.forEach(function(fn){try{fn();}catch(e){console.warn('[KC_AUTH]',e);}});
    });
  }

  // ── Sign Up (email + password) ──────────────
  function signUp(email, password, username, displayN, cb){
    ensureReady(function(){
      if(!_auth){cb('Firebase not configured');return;}
      _auth.createUserWithEmailAndPassword(email, password)
        .then(function(cred){
          _user = cred.user;
          // Set display name and username on Firebase profile (photoURL stores username for recovery)
          return _user.updateProfile({displayName: displayN || username, photoURL: 'kc:' + username});
        })
        .then(function(){
          cb(null, _user);
        })
        .catch(function(err){
          var msg = err.code === 'auth/email-already-in-use' ? 'An account with this email already exists. Try logging in.' :
                    err.code === 'auth/weak-password' ? 'Password must be at least 6 characters.' :
                    err.code === 'auth/invalid-email' ? 'Please enter a valid email address.' :
                    err.code === 'auth/configuration-not-found' ? 'Email/Password auth not enabled. Ask your admin to enable it in Firebase Console → Authentication → Sign-in method.' :
                    err.message || 'Sign-up failed';
          cb(msg);
        });
    });
  }

  // ── Log In (email + password) ──────────────
  function logIn(email, password, cb){
    ensureReady(function(){
      if(!_auth){cb('Firebase not configured');return;}
      _auth.signInWithEmailAndPassword(email, password)
        .then(function(cred){
          _user = cred.user;
          cb(null, _user);
        })
        .catch(function(err){
          var msg = err.code === 'auth/user-not-found' ? 'No account found with this email.' :
                    err.code === 'auth/wrong-password' ? 'Incorrect password.' :
                    err.code === 'auth/invalid-credential' ? 'Invalid email or password.' :
                    err.code === 'auth/invalid-email' ? 'Please enter a valid email address.' :
                    err.code === 'auth/too-many-requests' ? 'Too many attempts. Please wait and try again.' :
                    err.code === 'auth/configuration-not-found' ? 'Email/Password auth not enabled. Ask your admin to enable it in Firebase Console.' :
                    err.message || 'Login failed';
          cb(msg);
        });
    });
  }

  // ── Sign Out ────────────────────────────────
  function signOut(cb){
    if(_auth) _auth.signOut().then(function(){_user=null;if(cb)cb();}).catch(function(){if(cb)cb();});
    else if(cb) cb();
  }

  // ── Password Reset ─────────────────────────
  function resetPassword(email, cb){
    ensureReady(function(){
      if(!_auth){cb('Firebase not configured');return;}
      _auth.sendPasswordResetEmail(email)
        .then(function(){cb(null);})
        .catch(function(err){
          var msg = err.code === 'auth/user-not-found' ? 'No account found with this email.' :
                    err.code === 'auth/invalid-email' ? 'Please enter a valid email.' :
                    err.message || 'Reset failed';
          cb(msg);
        });
    });
  }

  // ── Check if already logged in (persistent session) ──
  function checkSession(cb){
    var done = false;
    // Timeout: if Firebase takes too long, proceed without auth
    var timer = setTimeout(function(){
      if(!done){done=true; cb(null);}
    }, 5000);
    ensureReady(function(){
      if(done) return;
      if(!_auth){done=true; clearTimeout(timer); cb(null); return;}
      var unsub = _auth.onAuthStateChanged(function(user){
        if(done) return;
        done=true; clearTimeout(timer);
        unsub();
        _user = user;
        cb(user);
      });
    });
  }

  // ── Cloud Save: write player data ──────────
  function cloudSave(cb){
    if(!_user || !_db) {if(cb)cb('Not signed in');return;}
    var data = {
      username: G.username,
      charId: G.charId,
      cos: G.cos,
      pd: G.pd,
      unlocked: G.unlocked,
      completedMissions: G.completedMissions,
      savedAt: Date.now()
    };
    _db.ref('kc/users/' + _user.uid + '/save').set(data)
      .then(function(){if(cb)cb(null);})
      .catch(function(err){if(cb)cb(err.message);});
  }

  // ── Cloud Save: read player data ───────────
  function cloudLoad(cb){
    if(!_user || !_db) {cb('Not signed in');return;}
    _db.ref('kc/users/' + _user.uid + '/save').once('value')
      .then(function(snap){
        var data = snap.val();
        cb(null, data);
      })
      .catch(function(err){cb(err.message);});
  }

  // ── Claim username in Firebase (prevents duplicates across devices) ──
  function claimUsername(username, cb){
    if(!_user || !_db){cb('Not signed in');return;}
    var usernameRef = _db.ref('kc/usernames/' + username.toLowerCase());
    usernameRef.once('value').then(function(snap){
      var val = snap.val();
      if(val && val !== _user.uid){cb('taken');return;}
      usernameRef.set(_user.uid).then(function(){cb(null);}).catch(function(err){cb(err.message);});
    }).catch(function(err){cb(err.message);});
  }

  function checkUsernameTaken(username, cb){
    ensureReady(function(){
      if(!_db){cb(false);return;} // offline fallback
      _db.ref('kc/usernames/' + username.toLowerCase()).once('value')
        .then(function(snap){
          var val = snap.val();
          // Not taken, or taken by current user
          cb(val && (!_user || val !== _user.uid));
        })
        .catch(function(){cb(false);});
    });
  }

  return {
    signUp: signUp,
    logIn: logIn,
    signOut: signOut,
    resetPassword: resetPassword,
    checkSession: checkSession,
    cloudSave: cloudSave,
    cloudLoad: cloudLoad,
    claimUsername: claimUsername,
    checkUsernameTaken: checkUsernameTaken,
    ensureReady: ensureReady,
    getUser: function(){return _user;},
    isSignedIn: function(){return !!_user;}
  };
})();

// ── Enhanced persistPlayer: save to localStorage AND cloud ──
var _cloudSaveTimer = null;

// ── Sprite engine ────────────────────────────
const SZ=32;
const SKINS=["#FDDBB4","#E8B88A","#C68642","#8D5524","#4A2912"];
const HAIRS=["#1a1a1a","#5C3317","#FFD700","#8B0000","#DDDDDD","#4B0082","#FF4500","#228B22"];
const OUTFITS=[{name:"Royal Blue",p:"#1E3A8A",s:"#1e40af",acc:"#60a5fa"},{name:"Crimson",p:"#7f1d1d",s:"#991b1b",acc:"#f87171"},{name:"Forest",p:"#14532d",s:"#166534",acc:"#4ade80"},{name:"Royal Purple",p:"#4c1d95",s:"#5b21b6",acc:"#a78bfa"},{name:"Golden",p:"#78350f",s:"#92400e",acc:"#fbbf24"},{name:"Teal",p:"#134e4a",s:"#115e59",acc:"#2dd4bf"}];

function shade(col,amt){try{const n=parseInt(col.replace("#",""),16);const r=Math.max(0,Math.min(255,(n>>16)+amt));const g=Math.max(0,Math.min(255,((n>>8)&0xff)+amt));const b=Math.max(0,Math.min(255,(n&0xff)+amt));return"#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");}catch{return col;}}
function rect(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(x,y,w,h);}
function circle(c,cx,cy,r,col){c.fillStyle=col;c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fill();}

function drawShepherd(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const hair=HAIRS[hr]||HAIRS[1];const sd=shade(skin,-30);rect(c,12,3,8,8,skin);rect(c,12,3,8,3,hair);rect(c,11,4,2,4,hair);rect(c,19,4,2,4,hair);rect(c,14,7,2,2,"#1a0a00");rect(c,18,7,2,2,"#1a0a00");rect(c,15,10,4,1,sd);rect(c,14,11,4,2,skin);rect(c,10,13,12,10,"#8B6914");rect(c,10,21,12,2,"#5C3317");rect(c,15,21,2,2,"#CC8800");rect(c,9,23,14,5,"#8B6914");rect(c,22,8,2,18,"#8B6914");rect(c,20,8,4,2,"#8B6914");rect(c,20,8,2,4,"#8B6914");rect(c,8,13,3,8,skin);rect(c,21,13,3,8,skin);rect(c,8,21,3,2,skin);rect(c,21,21,3,2,skin);rect(c,11,28,4,3,"#5C3317");rect(c,17,28,4,3,"#5C3317");}

function makeSprite(id,sc,sk=0,hr=1,ot=0,flip=false,glow=null,anim=null){
  const c=document.createElement("canvas");
  c.width=SZ*sc;c.height=SZ*sc;c.style.imageRendering="pixelated";c.style.display="block";
  if(glow)c.style.filter=`drop-shadow(0 0 6px ${glow}) drop-shadow(0 0 16px ${glow}88)`;
  if(anim)c.style.animation=anim;
  const fn=DRAW_FN[id];
  if(fn){const ctx=c.getContext("2d");ctx.save();ctx.scale(sc,sc);if(flip){ctx.translate(SZ,0);ctx.scale(-1,1);}fn(ctx,sk,hr,ot);ctx.restore();}
  else{const ctx=c.getContext("2d");ctx.fillStyle="#333";ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle="#fff";ctx.font=`bold ${14*sc}px monospace`;ctx.textAlign="center";ctx.fillText((id[0]||"?").toUpperCase(),c.width/2,c.height*.65);}
  return c;
}
function attachSprites(){
  document.querySelectorAll("[data-sp]").forEach(el=>{
    const d=el.dataset;el.innerHTML="";
    el.appendChild(makeSprite(d.sp,+d.sc||2,+d.sk||0,+d.hr||1,+d.ot||0,d.fl==="1",d.gw||null,d.an||null));
  });
}

    hot_tub:{text:"You build a hot tub. It's really nice for about 3 days. Then it starts raining. And raining. And RAINING. The hot tub overflows immediately.",emoji:"🛁",bg:"rain",choices:[

  // Mission 4: STORY — Garden of Eden
  {id:"eden_s",type:"story",title:"The Garden Fiasco",heroEmoji:"🍎",accent:"#44FF66",bgCol:"#001a05",desc:"Adam and Eve in the Garden. A serpent with terrible life advice. What could go wrong?",unlocked:false,unlockReq:"Complete 'David vs Goliath' first",xpReward:400,badge:"🌿",badgeName:"Garden Keeper",reward:{name:"Fruit of Wisdom",emoji:"🍎",effect:"heal"},unlockCharId:null,scenes:{
    start:{text:"It's a beautiful day in Eden. Perfect weather (it's always perfect). You're naming animals. A platypus waddles up. What do you call it?",emoji:"🦆",bg:"garden",choices:[

    naming:{text:"Nice work! You've named 847 animals today. A snake slithers up looking suspiciously friendly. 'Hey bestie! Have you tried that fruit from the tree in the middle?'",emoji:"🐍",bg:"garden",choices:[
      {text:"'God said don't touch that tree'",next:"obey_god",xp:50,correct:true},
      {text:"'Which tree? The pretty one?'",next:"curious",xp:10},
      {text:"'Snakes can TALK?!'",next:"snake_talk",xp:15}]},
    nap:{text:"You nap under a tree. You dream about geometry and wake up knowing what a dodecahedron is. The snake is waiting when you wake up. 'Hey sleepyhead, want some fruit?'",emoji:"😴",bg:"garden",choices:[

      {text:"'Sure, I'm hungry from all that napping'",next:"tempted",xp:5}]},
    obey_god:{text:"The snake rolls its eyes (impressive without eyelids). 'Come ON, one little bite won't hurt.' It does a little sales pitch with a PowerPoint presentation on a leaf.",emoji:"🐍",bg:"garden",choices:[
      {text:"Stand firm — God's word is final",next:"stand_firm",xp:60,correct:true},
      {text:"That's actually a really good PowerPoint...",next:"tempted",xp:10}]},
    curious:{text:"'It's the BEST tree,' the snake says, adjusting invisible sunglasses. 'Five-star reviews. The fruit gives you knowledge of, like, EVERYTHING. You'll know why kids love cinnamon toast.'",emoji:"🌳",bg:"garden",choices:[
      {text:"'Nope, God said no means no'",next:"stand_firm",xp:40,correct:true},
      {text:"'I DO want to know that...'",next:"tempted",xp:5}]},
    snake_talk:{text:"'Yeah bro, ALL the animals can talk,' the snake says. You look at a sheep. The sheep blinks. 'OK fine, just me,' the snake admits. 'Anyway, about that fruit...'",emoji:"🐑",bg:"garden",choices:[
      {text:"'God said that tree is off-limits'",next:"obey_god",xp:40,correct:true},
      {text:"'Tell me more about this fruit'",next:"tempted",xp:5}]},
    stand_firm:{text:"'I trust God, not a talking snake with a PowerPoint.' The snake slithers away muttering about its 'wasted marketing budget.' Eve high-fives you. The Garden stays paradise!",emoji:"🌈",bg:"garden_glow",choices:[
      {text:"Enjoy paradise with gratitude",next:"good_end",xp:60,correct:true}]},
    tempted:{text:"You take a bite. It tastes like... knowledge. And regret. Suddenly you realize you're not wearing pants. The snake is DYING laughing. 'Works every time!'",emoji:"🍎",bg:"dark_garden",choices:[
      {text:"Immediately repent and seek God",next:"repent_end",xp:25,correct:true},
      {text:"Blame Eve",next:"blame_eve",xp:5},
      {text:"Blame the snake",next:"blame_snake",xp:5}]},
    blame_eve:{text:"'SHE gave it to me!' Eve: 'YOU took it willingly!' God: 'I literally gave ONE rule.' The sheep finally speaks: 'Awkward.' Everyone stares at the sheep.",emoji:"🐑",bg:"dark_garden",choices:[
      {text:"OK, take responsibility",next:"repent_end",xp:20,correct:true}]},
    blame_snake:{text:"The snake: 'Don't look at me, I'm just a snake! I can't even hold a fruit!' ...Fair point, actually. How DID it hold the PowerPoint clicker?",emoji:"🐍",bg:"dark_garden",choices:[
      {text:"Take responsibility before God",next:"repent_end",xp:20,correct:true}]},
    good_end:{text:"The Garden thrives! You and Eve enjoy eternal paradise, naming more animals. The platypus wins 'Best Name' at the annual Garden Awards. God is pleased. The snake starts a podcast nobody listens to.",emoji:"✨",bg:"rainbow",ending:true,xpBonus:80,grade:"S",msg:"Obedience > Forbidden fruit!"},
    repent_end:{text:"God provides coverings and a promise of redemption. It's not the same as paradise, but there's hope. The snake loses its legs — now it's just a very angry noodle with opinions.",emoji:"🙏",bg:"sky",ending:true,xpBonus:30,grade:"B",msg:"Sin has consequences, but God shows mercy."}}},

// ── Persist / restore player data ────────────
function persistPlayer(){
  lsSet(LS_PLAYER,{username:G.username,charId:G.charId,cos:G.cos,pd:G.pd,unlocked:G.unlocked,completedMissions:G.completedMissions});
  // Debounced cloud save — waits 3 seconds of inactivity then syncs
  if(KC_AUTH.isSignedIn()){
    if(_cloudSaveTimer) clearTimeout(_cloudSaveTimer);
    _cloudSaveTimer = setTimeout(function(){
      _cloudSaveTimer = null;
      KC_AUTH.cloudSave(function(err){if(err)console.warn('[KC] Cloud save error:',err);});
    }, 3000);
  }
}
function restorePlayer(d){
  G.username=d.username||null;
  G.charId=d.charId||"shepherd";
  G.cos=d.cos||{sk:0,hr:1,ot:0};
  G.pd=d.pd||{xp:0,wins:0,losses:0,pvpWins:0,pvpLosses:0,checkIns:0,powerups:[]};
  G.pd.coins=G.pd.coins||0;
  G.pd.devotional=G.pd.devotional||{lastDate:null,streak:0};
  G.pd.churchUpgrades=G.pd.churchUpgrades||[];
  G.pd.npcRelations=G.pd.npcRelations||{};
  G.pd.baptized=G.pd.baptized||[];
  G.pd.brawlPower=G.pd.brawlPower||{};
  G.pd.brawlPoints=G.pd.brawlPoints||{};
  if(!G.pd.displayName && G.pd.displayName !== null) G.pd.displayName = null;
  if(!G.pd.playerId) G.pd.playerId = "player_" + Date.now();
  G.unlocked=d.unlocked||["shepherd"];
  G.completedMissions=d.completedMissions||[];
}

// ── Render helpers ────────────────────────────
function go(s){
  SFX&&SFX.resume&&SFX.resume();
  if(SFX){
    if(s==='title'||s==='select'||s==='signup'||s==='login'||s==='skip_signup') SFX.playTitle();
    else if(s==='battle'){ if(G.battleType==='pvp')SFX.playPvp(); else if(G.battleType==='mission')SFX.playMission(); else SFX.playBattle(); }
    else if(s==='story') SFX.playMission();
    else if(s==='church') SFX.playChurch();
    else if(s==='pvp_lobby') SFX.playPvp();
    else if(s==='game'||s==='wardrobe'||s==='brawl_lobby') SFX.playTitle();
    else if(s==='mission_complete'||s==='pvp_result') SFX.stopMusic();
  }
  if(s==="church"){G.screen="church";initChurchWorld();return;}
  if(G.screen==="church") cw_destroy();
  if(G.screen==="brawl"&&BRAWL.active){brawl_cleanup();brawl_exitFullscreen();}
  G.screen=s;render();
}
function setTab(t){G.tab=t;render();}
function render(){
  const s=G.screen;
  document.getElementById("app").innerHTML=
    s==="boot"?rBoot():
    s==="signup"?rSignup():
    s==="login"?rLogin():
    s==="skip_signup"?rSkipSignup():
    s==="title"?rTitle():
    s==="game"?rGame():
    s==="battle"?rBattle():
    s==="wardrobe"?rWardrobe():
    s==="pvp_lobby"?rPvpLobby():
    s==="pvp_result"?rPvpResult():
    s==="mission_complete"?rMissionComplete():
    s==="story"?rStory():
    s==="admin_login"?rAdminLogin():
    s==="admin"?rAdmin():
    s==="brawl_lobby"?rBrawlLobby():"";
  setTimeout(attachSprites,8);
  if(s==='story')setTimeout(story_startAnim,20);
}

  d.textContent=msg;nl.appendChild(d);setTimeout(()=>d.remove(),3200);
}

// ── BOOT — check localStorage, then Firebase session ──
function rBoot(){
  const saved=lsGet(LS_PLAYER,null);
  if(saved&&saved.username){
    restorePlayer(saved);
    if(!G.pd.playerId)G.pd.playerId=Math.random().toString(36).slice(2,10);
    // Try to restore Firebase session (non-blocking — game starts immediately)
    KC_AUTH.checkSession(function(user){
      if(user){
        // Signed in — sync cloud save in background
        KC_AUTH.cloudSave();
      }
    });
    setTimeout(()=>go("game"),0);
  } else {
    // No local data — check if they have a Firebase session (cleared cache but still logged in)
    KC_AUTH.checkSession(function(user){
      if(user){
        // They're logged in — try to load cloud save
        KC_AUTH.cloudLoad(function(err, data){
          if(!err && data && data.username){
            restorePlayer(data);
            persistPlayer(); // re-save to localStorage
            go("game");
          } else {
            go("signup");
          }
        });
      } else {
        go("signup");
      }
    });
  }
  return`<div style="min-height:100vh;background:#050505;display:flex;align-items:center;justify-content:center"><div style="font-size:48px;filter:drop-shadow(0 0 20px gold);animation:spBob .8s ease-in-out infinite">✝️</div><div style="position:absolute;bottom:30%;color:#333;font-size:14px">Loading...</div></div>`;
}

// ── Login handler ─────────────────────────────
function submitLogin(){
  const emEl=document.getElementById("loginEmail");
  const pwEl=document.getElementById("loginPw");
  const errEl=document.getElementById("loginErr");
  const btn=document.getElementById("loginBtn");
  const rememberEl=document.getElementById("rememberMe");
  const email=(emEl?emEl.value.trim():"");
  const password=(pwEl?pwEl.value:"");
  // Save or clear remembered email
  if(rememberEl&&rememberEl.checked){localStorage.setItem('kc_remember_email',email);}
  else{localStorage.removeItem('kc_remember_email');}
  if(!email){errEl.textContent="Please enter your email";return;}
  if(!password){errEl.textContent="Please enter your password";return;}
  errEl.textContent="";
  btn.disabled=true;btn.textContent="Logging in...";
  KC_AUTH.logIn(email, password, function(err, user){
    if(err){
      errEl.textContent=err;
      btn.disabled=false;btn.textContent="LOG IN →";
      return;
    }
    // Logged in — load cloud save
    KC_AUTH.cloudLoad(function(loadErr, data){
      if(!loadErr && data && data.username){
        restorePlayer(data);
        persistPlayer(); // cache to localStorage
        toast("☁️ Progress restored! Welcome back, "+displayName(data.username)+"!");
        go("game");
      } else {
        // No cloud save — check localStorage as fallback
        var local = lsGet(LS_PLAYER, null);
        if(local && local.username){
          restorePlayer(local);
          KC_AUTH.cloudSave(); // sync local data to cloud
          toast("☁️ Welcome back, "+displayName(local.username)+"!");
          go("game");
        } else {
          // No data anywhere — create a fresh profile using the Firebase display name
          var fbUser = user;
          // Recover username from photoURL if stored during signup (format: 'kc:username')
          var storedUsername = fbUser.photoURL && fbUser.photoURL.startsWith('kc:') ? fbUser.photoURL.slice(3) : null;
          var uname = storedUsername || (fbUser.displayName || fbUser.email.split('@')[0] || 'player').replace(/[^a-zA-Z0-9_]/g,'').slice(0,20);
          if(!uname || uname.length < 3) uname = 'player_' + Date.now().toString(36).slice(-5);
          var playerId = "player_" + Date.now();
          G.username = uname;
          G.pd = {xp:0,wins:0,losses:0,pvpWins:0,pvpLosses:0,checkIns:0,powerups:[],displayName:fbUser.displayName||null,playerId:playerId,coins:0,devotional:{lastDate:null,streak:0},churchUpgrades:[],npcRelations:{},baptized:[]};
          G.unlocked = ["shepherd"]; G.completedMissions = []; G.charId = "shepherd"; G.cos = {sk:0,hr:1,ot:0};
          persistPlayer();
          KC_AUTH.cloudSave();
          toast("☁️ Welcome back, "+displayName(uname)+"! Your profile has been restored.");
          go("game");
        }
      }
    });
  });
}

function detectLocation(){
  const msg=document.getElementById("detectMsg");
  if(!navigator.geolocation){msg.textContent="GPS not available";msg.style.color="#ef4444";return;}
  msg.textContent="Detecting...";msg.style.color="#FFD700";
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6);
    const lng=pos.coords.longitude.toFixed(6);
    document.getElementById("cfgLat").value=lat;
    document.getElementById("cfgLng").value=lng;
    msg.textContent=`✓ Detected: ${lat}, ${lng}`;msg.style.color="#4ade80";
  },err=>{msg.textContent="Could not detect location";msg.style.color="#ef4444";},{enableHighAccuracy:true,timeout:10000});
}

function saveAdminSettings(){
  CFG.churchName  = document.getElementById("cfgName").value.trim()  || CFG.churchName;
  CFG.churchAddress=document.getElementById("cfgAddr").value.trim()  || CFG.churchAddress;
  CFG.lat         = parseFloat(document.getElementById("cfgLat").value)  || CFG.lat;
  CFG.lng         = parseFloat(document.getElementById("cfgLng").value)  || CFG.lng;
  CFG.radiusMeters= parseInt(document.getElementById("cfgRadius").value) || CFG.radiusMeters;
  var fbRaw=(document.getElementById("cfgFirebase")||{}).value||"";
  if(fbRaw.trim()){
    try{CFG.firebaseCfg=JSON.parse(fbRaw.trim());} 
    catch(e){toast("⚠️ Firebase config JSON is invalid — check formatting","ok");}

function testFirebase(){
  var raw=(document.getElementById("cfgFirebase")||{}).value||"";
  var msg=document.getElementById("fbTestMsg");
  try{
    var cfg=JSON.parse(raw.trim());
    if(!cfg.databaseURL||!cfg.apiKey){msg.style.color="#ef4444";msg.textContent="❌ Missing databaseURL or apiKey";return;}
    msg.style.color="#FFD700";msg.textContent="Connecting…";
    CFG.firebaseCfg=cfg;lsSet(LS_SETTINGS,CFG);
    MP.connect(cfg,G.pd.playerId||"test",G.username||"admin",G.charId,G.cos,
      function(peers){msg.style.color="#4ade80";msg.textContent="✅ Connected! "+peers.length+" peer(s) online";},
      function(){}
    );
    setTimeout(function(){if(msg.textContent==="Connecting…"){msg.style.color="#ef4444";msg.textContent="❌ Timeout — check databaseURL and rules";}},8000);
  }catch(e){msg.style.color="#ef4444";msg.textContent="❌ Invalid JSON: "+e.message;}
}

function clearFirebase(){

function _processCheckInPosition(pos){
    const dist=Math.round(getDistM(pos.coords.latitude,pos.coords.longitude,CFG.lat,CFG.lng));
    const accuracy=Math.round(pos.coords.accuracy||0);
    G.distAway=dist;
    G.gpsAccuracy=accuracy;
    G.gpsCoords={lat:pos.coords.latitude.toFixed(6),lng:pos.coords.longitude.toFixed(6)};
    // Accept check-in if within radius OR if GPS accuracy margin overlaps the radius
    const effectiveDist=Math.max(0,dist-accuracy);
    if(effectiveDist<=CFG.radiusMeters){
      const xp=rand(40,80);G.pd.xp+=xp;G.pd.checkIns=(G.pd.checkIns||0)+1;
      G.pd.coins=(G.pd.coins||0)+15;
      const pu=Math.random()>.5?PUPS[rand(0,PUPS.length-1)]:null;
      if(pu&&G.pd.powerups.length<6)G.pd.powerups.push(pu);
      if(G.pd.checkIns>=5&&!G.unlocked.includes("esther")){G.unlocked.push("esther");toast("🎉 UNLOCKED: Esther (Uncommon)!");}
      else toast(`⛪ Checked in! +${xp} XP +15 🪙${pu?" + "+pu.emoji:""}  `);
      checkUnlocks();persistPlayer();G.checkInState="ok";
    } else G.checkInState="far";
    render();setTimeout(()=>{G.checkInState="idle";render();},6000);
}

function doCheckIn(){SFX&&SFX.resume&&SFX.resume();SFX&&SFX.checkIn&&SFX.checkIn();
  if(!CFG.locationRequired){
    // Open mode — anyone checks in
    const xp=rand(40,80);G.pd.xp+=xp;G.pd.checkIns=(G.pd.checkIns||0)+1;
    G.pd.coins=(G.pd.coins||0)+15;
    const pu=Math.random()>.5?PUPS[rand(0,PUPS.length-1)]:null;
    if(pu&&G.pd.powerups.length<6)G.pd.powerups.push(pu);
    if(G.pd.checkIns>=5&&!G.unlocked.includes("esther")){G.unlocked.push("esther");toast("🎉 UNLOCKED: Esther (Uncommon)!");}
    else toast(`⛪ Checked in! +${xp} XP +15 🪙${pu?" + "+pu.emoji:""}  `);
    checkUnlocks();persistPlayer();G.checkInState="ok";render();
    setTimeout(()=>{G.checkInState="idle";render();},4000);
    return;
  }
  if(!navigator.geolocation){G.checkInState="error";render();return;}
  G.checkInState="finding";render();
  navigator.geolocation.getCurrentPosition(
    pos=>_processCheckInPosition(pos),
    err=>{
      // If high-accuracy failed, retry with low accuracy (uses WiFi/cell towers — better indoors)
      if(err.code===3||err.code===2){
        navigator.geolocation.getCurrentPosition(
          pos=>_processCheckInPosition(pos),
          err2=>{G.checkInState=err2.code===1?"denied":"error";render();setTimeout(()=>{G.checkInState="idle";render();},6000);},
          {enableHighAccuracy:false,timeout:15000,maximumAge:30000}
        );
      } else {
        G.checkInState=err.code===1?"denied":"error";render();setTimeout(()=>{G.checkInState="idle";render();},6000);
      }
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

// ── BATTLE LOGIC ──────────────────────────────
function beginMission(id){const m=MISSIONS.find(x=>x.id===id);if(!m)return;if(m.type==='story')beginStoryMission(m);else beginMissionTD(m,0);}
function startMissionStage(m,idx,carryHp=null){const st=m.stages[idx];G.bs={e:{...st.enemy,hp:st.enemy.hp},pHp:carryHp||gmhp(),turn:"player",active:true,burn:false,defUp:false,sword:false,special:st.special||null,survLeft:st.survRounds||0,plagueCounter:0,angelCounter:0,isBoss:st.isBoss||false,abilityUsesLeft:getAbilityMax()};G.survRound=0;G.log=[`📖 ${st.title}`,st.story];G.battleType="mission";go("battle");}
function startArena(){const e=ARENA_ENEMIES[rand(0,ARENA_ENEMIES.length-1)];G.battleType="arena";G.activeMission=null;G.bs={e:{...e,hp:e.hp},pHp:gmhp(),turn:"player",active:true,burn:false,defUp:false,sword:false,special:null,abilityUsesLeft:getAbilityMax()};G.log=[`⚔️ ${gch().name} faces ${e.name}!`];go("battle");}
function battleFX(type,color,targetId){const arena=document.getElementById("battleArena");if(!arena)return;const fx=document.getElementById("fxLayer");if(!fx)return;
const ar=arena.getBoundingClientRect();
function fxEl(css){const d=document.createElement("div");d.style.cssText=css;fx.appendChild(d);return d;}
if(type==="slash"){
const sX=ar.right-30,sY=ar.top+ar.height*.45,eX=ar.left+20,eY=sY;
const proj=fxEl(`position:fixed;top:${sY}px;left:${sX}px;width:20px;height:10px;border-radius:50% 20% 20% 50%;background:linear-gradient(90deg,transparent,#fff,${color||'#FFD700'},#fff);box-shadow:0 0 14px ${color||'#fff'},0 0 30px ${color||'#FFD700'}66;z-index:58`);
const dist=sX-eX,dur=380;
let start=null;
function animProj(ts){if(!start)start=ts;const p=Math.min((ts-start)/dur,1);const cX=sX-dist*p;proj.style.left=cX+'px';
/* trail */
const t=fxEl(`position:fixed;top:${sY+(Math.random()-.5)*8}px;left:${cX}px;width:6px;height:6px;border-radius:50%;background:${color||'#FFD700'};opacity:.7;z-index:57;transition:all .3s ease`);setTimeout(()=>{t.style.opacity='0';t.style.transform='scale(0)';},10);setTimeout(()=>t.remove(),320);
if(p<1)requestAnimationFrame(animProj);else{
proj.remove();
/* Impact */
const imp=fxEl(`position:fixed;top:${eY-18}px;left:${eX-18}px;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,#fff,${color||'#FFD700'}88,transparent);z-index:58;transition:all .35s ease`);setTimeout(()=>{imp.style.transform='scale(2.5)';imp.style.opacity='0';},10);setTimeout(()=>imp.remove(),380);
for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;const ex=Math.cos(a)*28,ey=Math.sin(a)*28;const sp=fxEl(`position:fixed;top:${eY}px;left:${eX}px;width:5px;height:5px;border-radius:50%;background:${color||'#fff'};box-shadow:0 0 6px ${color||'#fff'};z-index:59;transition:all .3s ease`);setTimeout(()=>{sp.style.transform=`translate(${ex}px,${ey}px) scale(0)`;sp.style.opacity='0';},10);setTimeout(()=>sp.remove(),350);}
}}
requestAnimationFrame(animProj);
}
if(type==="ability"){
const sX=ar.right-30,sY=ar.top+ar.height*.4,eX=ar.left+25,eY=ar.top+ar.height*.45;
const orb=fxEl(`position:fixed;top:${sY-16}px;left:${sX}px;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle,#fff,${color},${color}88);box-shadow:0 0 24px ${color},0 0 48px ${color}88,0 0 70px ${color}44,inset 0 0 10px #fff;z-index:58`);
const inner=document.createElement("div");inner.style.cssText=`position:absolute;inset:4px;border-radius:50%;border:2px solid #ffffff99;border-top-color:transparent;animation:spin .3s linear infinite`;orb.appendChild(inner);
const dist=sX-eX,dur=550;
let start=null;
function animOrb(ts){if(!start)start=ts;const p=Math.min((ts-start)/dur,1);const cX=sX-dist*p;const cY=sY-16-Math.sin(p*Math.PI)*25;
orb.style.left=cX+'px';orb.style.top=cY+'px';
orb.style.transform=`scale(${1+Math.sin(p*Math.PI)*.4})`;
const t=fxEl(`position:fixed;top:${cY+16+(Math.random()-.5)*16}px;left:${cX+16+(Math.random()-.5)*16}px;width:8px;height:8px;border-radius:50%;background:${color};opacity:.8;box-shadow:0 0 10px ${color};z-index:57;transition:all .4s ease`);setTimeout(()=>{t.style.opacity='0';t.style.transform='scale(0)';},10);setTimeout(()=>t.remove(),420);
if(p<1)requestAnimationFrame(animOrb);else{
orb.remove();
const ex2=eX,ey2=ar.top+ar.height*.45;
const exp=fxEl(`position:fixed;top:${ey2-30}px;left:${ex2-30}px;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#fff,${color}cc,${color}44,transparent);box-shadow:0 0 40px ${color};z-index:58;transition:all .45s ease`);setTimeout(()=>{exp.style.transform='scale(2.5)';exp.style.opacity='0';},10);setTimeout(()=>exp.remove(),500);
const ring=fxEl(`position:fixed;top:${ey2-32}px;left:${ex2-32}px;width:64px;height:64px;border-radius:50%;border:3px solid ${color};z-index:57;transition:all .5s ease`);setTimeout(()=>{ring.style.transform='scale(2.8)';ring.style.opacity='0';ring.style.borderWidth='1px';},10);setTimeout(()=>ring.remove(),550);
for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2;const r=35+Math.random()*20;const dx=Math.cos(a)*r,dy=Math.sin(a)*r;const sp=fxEl(`position:fixed;top:${ey2}px;left:${ex2}px;width:6px;height:6px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color};z-index:59;transition:all .45s ease`);setTimeout(()=>{sp.style.transform=`translate(${dx}px,${dy}px) scale(0)`;sp.style.opacity='0';},10);setTimeout(()=>sp.remove(),500);}
}}
requestAnimationFrame(animOrb);
}
if(type==="impact"){
const sX=ar.left+20,sY=ar.top+ar.height*.45,eX=ar.right-30,eY=sY;
const proj=fxEl(`position:fixed;top:${sY}px;left:${sX}px;width:16px;height:8px;border-radius:20% 50% 50% 20%;background:linear-gradient(90deg,${color||'#FF4444'},#fff,transparent);box-shadow:0 0 12px ${color||'#FF4444'},0 0 24px ${color||'#FF4444'}66;z-index:58`);
const dist=eX-sX,dur=340;

var _cwNextReplacementId=0;

function cw_spawnReplacement(baptizedNpcId){
  if(!CW_NPC_REPLACEMENTS.length)return;
  var tmpl=CW_NPC_REPLACEMENTS[_cwNextReplacementId%CW_NPC_REPLACEMENTS.length];
  _cwNextReplacementId++;
  var old=CW_NPCS.find(function(x){return x.id===baptizedNpcId;});
  if(!old)return;
  // Build new NPC in a nearby wander zone
  var newId='nb_r'+_cwNextReplacementId+'_'+Date.now();
  var newNpc={
    id:newId, x:old.wx1+Math.floor(Math.random()*(old.wx2-old.wx1)),
    y:old.wy1+Math.floor(Math.random()*(old.wy2-old.wy1)),
    wx1:old.wx1, wy1:old.wy1, wx2:old.wx2, wy2:old.wy2,
    name:tmpl.name, emoji:tmpl.emoji, color:tmpl.color, speed:tmpl.speed,
    npcType:'nonbeliever', talk:tmpl.talk, bio:tmpl.bio, portrait:tmpl.portrait,
    _dir:0, _moveT:0, _tx:0, _ty:0
  };
  CW_NPCS.push(newNpc);
  // Initialize wander state
  newNpc._tx=newNpc.x;newNpc._ty=newNpc.y;
}

var CW_TILE_CACHE={};

function cw_buildTileCache(ts){
  var ups=(G.pd.churchUpgrades||[]).slice().sort().join(',');
  var key=ts+'_'+ups;
  if(CW_TILE_CACHE_KEY===key) return; // already cached
  CW_TILE_CACHE_KEY=key;
  CW_TILE_CACHE={};
  // Cache static tiles (types that don't animate or vary by position)
  var staticTypes=[0,2,3,4,5,6,7,10,13,14,16];
  for(var si=0;si<staticTypes.length;si++){
    var tt=staticTypes[si];
    var oc=document.createElement('canvas');oc.width=ts;oc.height=ts;
    var octx=oc.getContext('2d');
    cw_drawTile(octx,tt,0,0,ts);
    CW_TILE_CACHE['t'+tt]=oc;
  }
  // Cache wall tile variants (even/odd row)
  for(var row=0;row<2;row++){
    var oc=document.createElement('canvas');oc.width=ts;oc.height=ts;
    var octx=oc.getContext('2d');
    octx.save();octx.translate(0,-row*ts);
    cw_drawTile(octx,1,0,row*ts,ts);
    octx.restore();
    CW_TILE_CACHE['t1_r'+row]=oc;
  }
  // Cache foyer tile variants (even/odd checkerboard)
  for(var fv=0;fv<2;fv++){
    var oc=document.createElement('canvas');oc.width=ts;oc.height=ts;
    var octx=oc.getContext('2d');
    octx.save();octx.translate(-fv*ts,0);
    cw_drawTile(octx,11,fv*ts,0,ts);
    octx.restore();
    CW_TILE_CACHE['t11_v'+fv]=oc;
  }
  // Cache window tile variants (3 color variants)
  for(var wv=0;wv<3;wv++){
    var oc=document.createElement('canvas');oc.width=ts;oc.height=ts;
    var octx=oc.getContext('2d');
    octx.save();octx.translate(-wv*ts,0);
    cw_drawTile(octx,9,wv*ts,0,ts);
    octx.restore();
    CW_TILE_CACHE['t9_v'+wv]=oc;
  }
}

// ── EASING UTILITIES ──────────────────────────────────
function easeOutQuint(t){return 1-Math.pow(1-t,5);}
function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function easeOutElastic(t){if(t===0||t===1)return t;return Math.pow(2,-10*t)*Math.sin((t-0.075)*2*Math.PI/0.3)+1;}
function easeOutBack(t){var c=1.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);}

// ── PARTICLE SYSTEM ───────────────────────────────────
var CW_PARTICLES=[];
var CW_AMBIENT_PARTICLES=[];
function cwParticleSpawn(x,y,count,opts){
  opts=opts||{};
  // Cap particles on mobile to prevent performance issues
  var isMobile='ontouchstart' in window;
  if(isMobile){count=Math.min(count,12);if(CW_PARTICLES.length>60)return;}
  else if(CW_PARTICLES.length>150)return;
  for(var i=0;i<count;i++){
    var angle=opts.angle!=null?opts.angle+(Math.random()-.5)*(opts.spread||1):Math.random()*Math.PI*2;
    var speed=opts.speed||2;
    var spd=speed*(0.4+Math.random()*0.6);
    CW_PARTICLES.push({
      x:x,y:y,
      vx:Math.cos(angle)*spd,
      vy:Math.sin(angle)*spd,
      life:1,decay:opts.decay||(0.015+Math.random()*0.02),
      size:opts.size||(2+Math.random()*3),
      color:opts.colors?opts.colors[Math.floor(Math.random()*opts.colors.length)]:(opts.color||'#FFD700'),
      gravity:opts.gravity||0,
      shape:opts.shape||'circle',
      glow:opts.glow||false
    });
  }
}
function cwParticlesUpdate(){
  for(var i=CW_PARTICLES.length-1;i>=0;i--){
    var p=CW_PARTICLES[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=p.gravity;
    p.vx*=0.97;p.vy*=0.97;
    p.life-=p.decay;
    if(p.life<=0)CW_PARTICLES.splice(i,1);
  }
}
function cwParticlesDraw(ctx,ox,oy){
  var isMobile='ontouchstart' in window;
  for(var i=0;i<CW_PARTICLES.length;i++){
    var p=CW_PARTICLES[i];
    var a=Math.max(0,p.life);
    var sz=p.size*a;
    ctx.globalAlpha=a;
    if(p.glow&&!isMobile){ctx.shadowColor=p.color;ctx.shadowBlur=sz*2;}
    ctx.fillStyle=p.color;
    if(p.shape==='star'){
      cwDrawStar(ctx,p.x-ox,p.y-oy,sz);
    }else if(p.shape==='square'){
      ctx.fillRect(p.x-ox-sz/2,p.y-oy-sz/2,sz,sz);
    }else{
      ctx.beginPath();ctx.arc(p.x-ox,p.y-oy,sz,0,Math.PI*2);ctx.fill();
    }
    if(p.glow&&!isMobile){ctx.shadowBlur=0;}
  }
  ctx.globalAlpha=1;
}
function cwDrawStar(ctx,cx,cy,r){
  ctx.beginPath();
  for(var i=0;i<5;i++){
    var a=Math.PI*2*i/5-Math.PI/2;
    var x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    var a2=a+Math.PI*2/10;
    ctx.lineTo(cx+Math.cos(a2)*r*0.4,cy+Math.sin(a2)*r*0.4);
  }
  ctx.closePath();ctx.fill();
}

function cwAmbientInit(){

    CW_AMBIENT_PARTICLES.push({
      x:Math.random()*800,y:Math.random()*600,
      vx:(Math.random()-.5)*0.3,vy:-0.1-Math.random()*0.2,
      size:1+Math.random()*2.5,
      alpha:0.1+Math.random()*0.3,
      phase:Math.random()*Math.PI*2,
      speed:0.003+Math.random()*0.005
    });
  }
}
function cwAmbientUpdate(w,h){
  for(var i=0;i<CW_AMBIENT_PARTICLES.length;i++){
    var p=CW_AMBIENT_PARTICLES[i];
    p.x+=p.vx+Math.sin(p.phase)*0.15;
    p.y+=p.vy;
    p.phase+=p.speed;
    if(p.y<-10){p.y=h+10;p.x=Math.random()*w;}
    if(p.x<-10)p.x=w+10;
    if(p.x>w+10)p.x=-10;
  }
}
function cwAmbientDraw(ctx,w,h){
  for(var i=0;i<CW_AMBIENT_PARTICLES.length;i++){
    var p=CW_AMBIENT_PARTICLES[i];
    var flicker=0.5+0.5*Math.sin(p.phase*3);
    ctx.globalAlpha=p.alpha*flicker;
    ctx.fillStyle='#FFFBE6';
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

}

    ctx.fillStyle=wg;ctx.fillRect(px+(_ornate?5:4),py+(_ornate?5:4),ts-(_ornate?10:8),ts-(_ornate?10:8));
    // Water shimmer
    ctx.fillStyle='rgba(255,255,255,'+(0.08+0.06*Math.sin(wt+px/40))+')';
    ctx.fillRect(px+6,py+6+Math.sin(wt+py/30)*2,ts*0.4,ts*0.15);
    ctx.fillRect(px+ts*0.5,py+ts*0.5+Math.sin(wt+px/20)*2,ts*0.3,ts*0.12);
    // Ripple circles
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;
    var ripR=(Date.now()/1500+px/100)%1;
    ctx.beginPath();ctx.arc(px+ts/2,py+ts/2,ripR*ts*0.3,0,Math.PI*2);ctx.stroke();
    // Inner glow
    ctx.fillStyle=_ornate?'rgba(80,200,255,0.18)':'rgba(80,200,255,0.1)';
    ctx.beginPath();ctx.arc(px+ts/2,py+ts/2,ts*0.25,0,Math.PI*2);ctx.fill();
  }
  else if(t===16){ // PARKING LOT — asphalt
    ctx.fillStyle='#3A3A40';ctx.fillRect(px,py,ts,ts);
    // Asphalt texture speckle
    ctx.fillStyle='rgba(255,255,255,0.03)';
    for(var si=0;si<3;si++){
      var sx2=px+(si*11+3)%ts,sy2=py+(si*7+5)%ts;
      ctx.fillRect(sx2,sy2,2,2);
    }
    // Parking line (vertical dashes at intervals)
    if(Math.floor(px/ts)%6===0){
      ctx.fillStyle='rgba(255,255,0,0.35)';ctx.fillRect(px+ts-2,py,2,ts);
    }
  }
  else if(t===17){ // PARKED CAR — 3D vehicle on asphalt
    // Asphalt base
    ctx.fillStyle='#3A3A40';ctx.fillRect(px,py,ts,ts);
    // Car body — pick color based on position
    var carCols=['#CC3333','#3366CC','#33AA55','#888888','#CC8822','#FFFFFF'][Math.floor((px/ts+py/ts))%6];
    var carD='#00000033';
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(px+ts/2,py+ts*0.75,ts*0.4,ts*0.1,0,0,Math.PI*2);ctx.fill();
    // Car body (top-down view)
    ctx.fillStyle=carCols;
    ctx.beginPath();ctx.roundRect(px+ts*0.12,py+ts*0.1,ts*0.76,ts*0.75,4);ctx.fill();
    // Roof section (darker center)
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath();ctx.roundRect(px+ts*0.22,py+ts*0.28,ts*0.56,ts*0.38,3);ctx.fill();
    // Windshield
    ctx.fillStyle='rgba(150,200,255,0.4)';
    ctx.beginPath();ctx.roundRect(px+ts*0.22,py+ts*0.15,ts*0.56,ts*0.18,2);ctx.fill();
    // Rear window
    ctx.fillStyle='rgba(150,200,255,0.3)';
    ctx.beginPath();ctx.roundRect(px+ts*0.25,py+ts*0.62,ts*0.5,ts*0.12,2);ctx.fill();
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(px+ts*0.15,py+ts*0.12,ts*0.3,ts*0.08);
  }
}

// ── ROBLOX-STYLE 3D CHARACTER RENDERER ────────────────
function cw_drawChar(ctx,wx,wy,ts,skinIdx,outIdx,dir,animF,tag,isPlayer){
  var skin=['#FDDBB4','#E8B88A','#C68642','#8D5524','#4A2912'][skinIdx]||'#FDDBB4';
  var skinD=['#DDAA88','#C89060','#A06020','#6D3A0A','#2A0D04'][skinIdx]||'#DDAA88';
  var outC=['#3366CC','#CC3333','#33AA55','#8844CC','#CC8822','#22AABB'][outIdx]||'#3366CC';
  var outD=['#2244AA','#992222','#228833','#6622AA','#AA6611','#118899'][outIdx]||'#2244AA';
  var cx=wx+ts/2,cy=wy+ts/2;
  var walk=[0,2,-2,0][animF%4];
  var d=Math.floor(ts*0.12); // 3D depth

  // Drop shadow (simplified on mobile — flat ellipse instead of radial gradient)
  ctx.save();
  if(CW_IS_MOBILE){
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath();ctx.ellipse(cx,cy+ts*.44,ts*.28,ts*.09,0,0,Math.PI*2);ctx.fill();
  } else {
    var shGrad=ctx.createRadialGradient(cx,cy+ts*.44,0,cx,cy+ts*.44,ts*.3);
    shGrad.addColorStop(0,'rgba(0,0,0,0.35)');shGrad.addColorStop(0.6,'rgba(0,0,0,0.15)');shGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=shGrad;
    ctx.beginPath();ctx.ellipse(cx,cy+ts*.44,ts*.3,ts*.1,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // === LEGS (blocky 3D rectangles with side faces) ===
  var lw=ts*.14,lh=ts*.24;
  var lx1=cx-ts*.17,lx2=cx+ts*.03;
  var ly=cy+ts*.1;
  // Left leg
  ctx.fillStyle=outD;ctx.fillRect(lx1,ly+walk,lw,lh-walk);
  ctx.fillStyle=outC;ctx.fillRect(lx1,ly+walk,lw-d/2,lh-walk-d/2);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(lx1+1,ly+walk+1,lw*0.5,2);
  // Right leg
  ctx.fillStyle=outD;ctx.fillRect(lx2,ly-walk,lw,lh+walk);
  ctx.fillStyle=outC;ctx.fillRect(lx2,ly-walk,lw-d/2,lh+walk-d/2);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(lx2+1,ly-walk+1,lw*0.5,2);
  // Shoes (blocky)
  ctx.fillStyle='#3A2A1A';
  ctx.fillRect(lx1-1,ly+lh-walk-2,lw+2,ts*.06);
  ctx.fillRect(lx2-1,ly+lh+walk-2,lw+2,ts*.06);

  // === BODY (3D block with side faces) ===
  var bw=ts*.42,bh=ts*.28;
  var bx=cx-bw/2,by=cy-ts*.1;
  // Right side face
  ctx.fillStyle=outD;ctx.fillRect(bx+bw-d,by,d,bh);
  // Bottom side face
  ctx.fillStyle=outD;ctx.fillRect(bx,by+bh-d,bw,d);
  // Front face
  if(CW_IS_MOBILE){ctx.fillStyle=outC;}
  else{var bg2=ctx.createLinearGradient(bx,by,bx+bw*0.7,by+bh*0.7);bg2.addColorStop(0,outC);bg2.addColorStop(1,outD);ctx.fillStyle=bg2;}
  ctx.fillRect(bx,by,bw-d,bh-d);
  // Chest highlight (Roblox shiny)
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(bx+2,by+2,bw*0.5,bh*0.3);
  // Shirt collar detail
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(cx-ts*.06,by,ts*.12,ts*.04);
  // Subtle body outline (anti-alias effect)
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=0.5;
  ctx.strokeRect(bx+0.5,by+0.5,bw-d-1,bh-d-1);

  // === ARMS (3D blocks extending from body) ===
  var aw=ts*.12,ah=ts*.22;
  ctx.fillStyle=outD;
  if(dir==='left'){
    ctx.fillRect(bx-aw-1,by+ts*.02,aw,ah);
    ctx.fillStyle=outC;ctx.fillRect(bx-aw-1,by+ts*.02,aw-d/2,ah-d/2);
    ctx.fillStyle=skin;ctx.fillRect(bx-aw+1,by+ah-ts*.06,aw-3,ts*.06); // hand
  } else if(dir==='right'){
    ctx.fillRect(bx+bw+1,by+ts*.02,aw,ah);
    ctx.fillStyle=outC;ctx.fillRect(bx+bw+1,by+ts*.02,aw-d/2,ah-d/2);
    ctx.fillStyle=skin;ctx.fillRect(bx+bw+2,by+ah-ts*.06,aw-3,ts*.06);
  } else {
    // Both arms
    ctx.fillRect(bx-aw-1,by+ts*.02,aw,ah);ctx.fillRect(bx+bw+1,by+ts*.02,aw,ah);
    ctx.fillStyle=outC;
    ctx.fillRect(bx-aw-1,by+ts*.02,aw-d/2,ah-d/2);
    ctx.fillRect(bx+bw+1,by+ts*.02,aw-d/2,ah-d/2);
    ctx.fillStyle=skin;
    ctx.fillRect(bx-aw+1,by+ah-ts*.06,aw-3,ts*.06);
    ctx.fillRect(bx+bw+2,by+ah-ts*.06,aw-3,ts*.06);
  }

  // === HEAD (3D rounded box) ===
  var hw=ts*.32,hh=ts*.32;
  var hx=cx-hw/2,hy=cy-ts*.38;
  // Head right side face
  ctx.fillStyle=skinD;ctx.fillRect(hx+hw-d,hy+d/2,d,hh-d);
  // Head bottom side face
  ctx.fillStyle=skinD;ctx.fillRect(hx,hy+hh-d,hw,d);
  // Head front face (rounded)
  if(CW_IS_MOBILE){ctx.fillStyle=skin;}
  else{var hg=ctx.createRadialGradient(hx+hw*0.35,hy+hh*0.3,0,hx+hw/2,hy+hh/2,hw*0.7);hg.addColorStop(0,skin);hg.addColorStop(1,skinD);ctx.fillStyle=hg;}
  ctx.beginPath();ctx.roundRect(hx,hy,hw-d,hh-d,4);ctx.fill();
  // Head highlight
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(hx+2,hy+2,hw*0.4,hh*0.25);
  // Hair (dark block on top)
  ctx.fillStyle='#2A1A08';
  ctx.beginPath();ctx.roundRect(hx-1,hy-2,hw,hh*0.3,3);ctx.fill();
  // Subtle head outline
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.roundRect(hx+0.5,hy+0.5,hw-d-1,hh-d-1,3.5);ctx.stroke();

  // Eyes (big blocky Roblox eyes)
  if(dir==='down'){
    ctx.fillStyle='#fff';
    ctx.fillRect(hx+hw*0.15,hy+hh*0.32,hw*0.2,hw*0.22);
    ctx.fillRect(hx+hw*0.5,hy+hh*0.32,hw*0.2,hw*0.22);
    ctx.fillStyle='#1a0a00';
    ctx.fillRect(hx+hw*0.2,hy+hh*0.38,hw*0.12,hw*0.14);
    ctx.fillRect(hx+hw*0.55,hy+hh*0.38,hw*0.12,hw*0.14);
    // Mouth — smile
    ctx.fillStyle=skinD;
    ctx.fillRect(hx+hw*0.3,hy+hh*0.65,hw*0.25,2);
  } else if(dir==='up'){
    ctx.fillStyle='#2A1A08';ctx.fillRect(hx+1,hy+hh*0.2,hw-d-2,hh*0.15);
  } else {
    var ex=dir==='right'?hx+hw*0.45:hx+hw*0.1;
    ctx.fillStyle='#fff';ctx.fillRect(ex,hy+hh*0.32,hw*0.22,hw*0.22);
    ctx.fillStyle='#1a0a00';ctx.fillRect(ex+hw*0.05,hy+hh*0.38,hw*0.12,hw*0.14);
  }

  // Player glow ring (Roblox selection glow)
  if(isPlayer){
    ctx.save();
    if(!CW_IS_MOBILE){ctx.shadowColor='#FFD700';ctx.shadowBlur=16;}
    ctx.strokeStyle='rgba(255,215,0,0.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(cx,cy+ts*.44,ts*.28,ts*.1,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  // Name tag (floating above head, Roblox-style)
  if(tag){
    ctx.save();ctx.font='bold 13px "Segoe UI",sans-serif';
    var tw=ctx.measureText(tag).width+12;
    // Tag background (rounded pill)
    ctx.fillStyle=isPlayer?'rgba(0,0,0,0.85)':'rgba(0,0,0,0.75)';
    ctx.beginPath();ctx.roundRect(cx-tw/2,hy-18,tw,16,8);ctx.fill();
    // Tag border
    ctx.strokeStyle=isPlayer?'rgba(255,215,0,0.5)':'rgba(255,255,255,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(cx-tw/2,hy-18,tw,16,8);ctx.stroke();
    ctx.fillStyle=isPlayer?'#FFD700':'#fff';ctx.textAlign='center';
    ctx.fillText(tag,cx,hy-6);ctx.restore();
  }
}

// ── ROBLOX-STYLE NPC RENDERER ─────────────────────────
function cw_drawNPC(ctx,npc,ts,camX,camY,vw,vh){
  var wx=npc.x*ts-camX,wy=npc.y*ts-camY;
  if(wx<-ts||wy<-ts||wx>vw+ts||wy>vh+ts) return;
  var cx=wx+ts/2,cy=wy+ts/2;
  var d=Math.floor(ts*0.12);
  var col=npc.color||'#888';
  var colD=col.length>=7?col.slice(0,1)+Math.max(0,parseInt(col.slice(1,3),16)-40).toString(16).padStart(2,'0')+Math.max(0,parseInt(col.slice(3,5),16)-40).toString(16).padStart(2,'0')+Math.max(0,parseInt(col.slice(5,7),16)-40).toString(16).padStart(2,'0'):'#555';

  // Shadow (simplified on mobile)
  if(CW_IS_MOBILE){
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();ctx.ellipse(cx,cy+ts*.44,ts*.26,ts*.08,0,0,Math.PI*2);ctx.fill();
  } else {
    var nshG=ctx.createRadialGradient(cx,cy+ts*.44,0,cx,cy+ts*.44,ts*.28);
    nshG.addColorStop(0,'rgba(0,0,0,0.3)');nshG.addColorStop(0.6,'rgba(0,0,0,0.12)');nshG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=nshG;
    ctx.beginPath();ctx.ellipse(cx,cy+ts*.44,ts*.28,ts*.09,0,0,Math.PI*2);ctx.fill();
  }

  // Legs (blocky)
  ctx.fillStyle=colD;
  ctx.fillRect(cx-ts*.15,cy+ts*.12,ts*.12,ts*.24);ctx.fillRect(cx+ts*.03,cy+ts*.12,ts*.12,ts*.24);
  ctx.fillStyle=col;
  ctx.fillRect(cx-ts*.15,cy+ts*.12,ts*.1,ts*.2);ctx.fillRect(cx+ts*.03,cy+ts*.12,ts*.1,ts*.2);
  // Shoes
  ctx.fillStyle='#3A2A1A';
  ctx.fillRect(cx-ts*.16,cy+ts*.34,ts*.14,ts*.05);ctx.fillRect(cx+ts*.02,cy+ts*.34,ts*.14,ts*.05);

  // Body (3D block)
  var bw=ts*.38,bh=ts*.26;
  var bx=cx-bw/2,by=cy-ts*.08;
  ctx.fillStyle=colD;ctx.fillRect(bx+bw-d,by,d,bh);ctx.fillRect(bx,by+bh-d,bw,d);
  if(CW_IS_MOBILE){ctx.fillStyle=col;}
  else{var ng=ctx.createLinearGradient(bx,by,bx+bw*0.7,by+bh*0.7);ng.addColorStop(0,col);ng.addColorStop(1,colD);ctx.fillStyle=ng;}
  ctx.fillRect(bx,by,bw-d,bh-d);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(bx+2,by+2,bw*0.4,bh*0.25);

  // Arms
  ctx.fillStyle=colD;
  ctx.fillRect(bx-ts*.1-1,by+ts*.02,ts*.1,ts*.18);ctx.fillRect(bx+bw+1,by+ts*.02,ts*.1,ts*.18);
  ctx.fillStyle=col;
  ctx.fillRect(bx-ts*.1-1,by+ts*.02,ts*.08,ts*.15);ctx.fillRect(bx+bw+1,by+ts*.02,ts*.08,ts*.15);
  // Hands
  ctx.fillStyle='#FDDBB4';
  ctx.fillRect(bx-ts*.08,by+ts*.16,ts*.07,ts*.05);ctx.fillRect(bx+bw+2,by+ts*.16,ts*.07,ts*.05);

  // Head (3D rounded box)
  var hw=ts*.3,hh=ts*.3;
  var hx=cx-hw/2,hy=cy-ts*.36;
  ctx.fillStyle='#C89060';ctx.fillRect(hx+hw-d,hy+d/2,d,hh-d);ctx.fillRect(hx,hy+hh-d,hw,d);
  if(CW_IS_MOBILE){ctx.fillStyle='#FDDBB4';}
  else{var hg=ctx.createRadialGradient(hx+hw*0.35,hy+hh*0.3,0,hx+hw/2,hy+hh/2,hw*0.7);hg.addColorStop(0,'#FDDBB4');hg.addColorStop(1,'#C89060');ctx.fillStyle=hg;}
  ctx.beginPath();ctx.roundRect(hx,hy,hw-d,hh-d,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(hx+2,hy+2,hw*0.35,hh*0.2);
  // Hair
  ctx.fillStyle='#2A1A08';ctx.beginPath();ctx.roundRect(hx-1,hy-2,hw,hh*0.28,3);ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';
  ctx.fillRect(hx+hw*0.15,hy+hh*0.35,hw*0.18,hw*0.18);ctx.fillRect(hx+hw*0.5,hy+hh*0.35,hw*0.18,hw*0.18);
  ctx.fillStyle='#1a0a00';
  ctx.fillRect(hx+hw*0.2,hy+hh*0.4,hw*0.1,hw*0.12);ctx.fillRect(hx+hw*0.55,hy+hh*0.4,hw*0.1,hw*0.12);
  // Smile
  ctx.fillStyle='#C89060';ctx.fillRect(hx+hw*0.3,hy+hh*0.62,hw*0.22,2);

  // Emoji above head (floating)
  ctx.save();ctx.font=(ts*.55)+'px serif';ctx.textAlign='center';
  if(!CW_IS_MOBILE){ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=4;}
  ctx.fillText(npc.emoji||'👤',cx,hy-8);ctx.restore();

  // Name tag (Roblox floating pill)
  ctx.save();ctx.font='bold 12px "Segoe UI",sans-serif';
  var tw=ctx.measureText(npc.name).width+12;
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.beginPath();ctx.roundRect(cx-tw/2,hy-24,tw,14,7);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.roundRect(cx-tw/2,hy-24,tw,14,7);ctx.stroke();
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(npc.name,cx,hy-13);ctx.restore();

  // Relationship tier indicator (believer NPCs only)
  if(!npc.npcType){
    var _tier=cw_getNpcTier(npc.id);
    if(_tier>0){
      ctx.save();ctx.font='bold 10px monospace';ctx.textAlign='center';
      var _tc=CW_TIER_COLORS[_tier];
      var _tn=CW_TIER_NAMES[_tier];
      var _tw2=ctx.measureText(_tn).width+10;
      ctx.fillStyle=_tc+'33';ctx.beginPath();ctx.roundRect(cx-_tw2/2,hy-38,_tw2,13,4);ctx.fill();
      ctx.strokeStyle=_tc+'88';ctx.lineWidth=0.5;ctx.beginPath();ctx.roundRect(cx-_tw2/2,hy-38,_tw2,13,4);ctx.stroke();
      ctx.fillStyle=_tc;ctx.fillText(_tn,cx,hy-28);ctx.restore();
    }
  }

  // Non-believer indicator (floating ? bubble or ✝ if evangelized)
  if(npc.npcType==='nonbeliever'){
    ctx.save();
    var ib=hy-38,pulse=Math.sin(Date.now()/400)*3;
    if(CWS.evangelized&&CWS.evangelized[npc.id]){
      ctx.font='bold '+(ts*.45)+'px serif';ctx.textAlign='center';
      var _isBaptized=(G.pd.baptized||[]).includes(npc.id);
      ctx.shadowColor=_isBaptized?'#7EB8F7':'#4ade80';if(!CW_IS_MOBILE)ctx.shadowBlur=6;
      ctx.fillStyle=_isBaptized?'#7EB8F7':'#4ade80';ctx.fillText(_isBaptized?'🕊️':'✝',cx,ib+pulse);
    }else{
      ctx.fillStyle='rgba(239,68,68,0.18)';
      ctx.beginPath();ctx.arc(cx,cy,ts*0.5,0,Math.PI*2);ctx.fill();
      ctx.font='bold '+(ts*.5)+'px serif';ctx.textAlign='center';
      ctx.shadowColor='#ef4444';if(!CW_IS_MOBILE)ctx.shadowBlur=8;
      ctx.fillStyle='#fbbf24';ctx.fillText('❓',cx,ib+pulse);
    }
    ctx.restore();
  }

  // Talk bubble indicator
  if(CWS.nearNpc===npc.id){
    ctx.save();
    var bx2=cx+ts*.25,by2=hy-28;
    ctx.fillStyle='rgba(255,215,0,0.15)';
    ctx.beginPath();ctx.arc(cx,cy,ts*0.55,0,Math.PI*2);ctx.fill();
    ctx.font='bold 18px serif';ctx.textAlign='center';
    ctx.shadowColor='#FFD700';if(!CW_IS_MOBILE)ctx.shadowBlur=6;
    ctx.fillStyle='#fff';ctx.fillText('💬',bx2,by2);
    ctx.restore();
  }
}

// ── NPC WANDER AI ──────────────────────────────────────
function cw_updateNPCs(){
  var now=Date.now();
  for(var i=0;i<CW_NPCS.length;i++){
    var n=CW_NPCS[i];
    if(!n.wx1) continue; // static NPC
    if(!CWS.npcTimers[n.id]) CWS.npcTimers[n.id]={next:now+cw_rand(1000,3000),dx:0,dy:0,steps:0};
    var t=CWS.npcTimers[n.id];
    if(now>=t.next){
      if(t.steps>0){
        // Continue current direction
        var nx=n.x+t.dx,ny=n.y+t.dy;
        if(cw_walkable(nx,ny)&&nx>=n.wx1&&nx<=n.wx2&&ny>=n.wy1&&ny<=n.wy2){
          // Don't walk into player
          if(Math.abs(nx-CWS.px)>1||Math.abs(ny-CWS.py)>1){n.x=nx;n.y=ny;}
        }
        t.steps--;
        t.next=now+(n.speed||80);
      } else {
        // Pick new direction
        var dirs=[[0,-1],[0,1],[-1,0],[1,0],[0,0],[0,0]]; // bias toward staying
        var d=dirs[Math.floor(Math.random()*dirs.length)];
        t.dx=d[0];t.dy=d[1];
        t.steps=cw_rand(2,6);
        t.next=now+cw_rand(500,2000);
      }
    }
  }
}

function cw_rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

// ── HUD ────────────────────────────────────────────────
function cw_drawHUD(ctx,vw,vh){
  // XP counter top-right
  ctx.save();ctx.font='bold 13px monospace';ctx.textAlign='right';
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(vw-80,4,76,18);
  ctx.fillStyle='#FFD700';ctx.fillText('✨ '+G.pd.xp+' XP',vw-6,17);ctx.restore();
  // Coins counter
  ctx.save();ctx.font='bold 13px monospace';ctx.textAlign='right';
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(vw-80,24,76,18);
  ctx.fillStyle='#F0C040';ctx.fillText('🪙 '+(G.pd.coins||0),vw-6,37);ctx.restore();
  // Devotional streak indicator
  var _streak=(G.pd.devotional&&G.pd.devotional.streak)||0;
  if(_streak>0){
    ctx.save();ctx.font='bold 12px monospace';ctx.textAlign='right';
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(vw-76,44,72,16);
    ctx.fillStyle='#FF8C00';ctx.fillText('🔥 '+_streak+' days',vw-6,56);ctx.restore();
  }
  if(CWS.dialog||CWS.activity) return;
  var hint=null,hcol='#FFD700',hbg='rgba(0,0,0,0.88)';
  if(CWS.nearPeer&&MP.isConnected()){
    var pr=CWM.peers.find(function(p){return p.uid===CWS.nearPeer;});
    if(pr){hint='⚔️ Challenge @'+pr.username+' — tap A';hcol='#7EB8F7';}
  } else if(CWS.nearNpc){
    var n=CW_NPCS.find(function(x){return x.id===CWS.nearNpc;});
    if(n){
      var _nt=cw_getNpcTier(n.id);
      var _tierLabel=_nt>0?' ['+CW_TIER_NAMES[_nt]+']':'';
      hint='💬 Talk to '+n.name+_tierLabel+' — tap A';
      hcol=_nt>0?CW_TIER_COLORS[_nt]:'#7EB8F7';
    }
  } else if(CWS.nearZone){
    var z=CW_ZONES.find(function(x){return x.id===CWS.nearZone;});
    if(z){hint=z.icon+' '+z.label+' — tap A';hcol='#4ade80';}
  }
  if(hint){
    ctx.save();ctx.font='bold 15px Georgia';
    var tw=ctx.measureText(hint).width+24,bw=Math.min(tw,vw-20),bh=34;
    var bx=(vw-bw)/2,by=vh-72;
    ctx.fillStyle=hbg;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
    ctx.strokeStyle=hcol+'66';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=hcol;ctx.textAlign='center';ctx.fillText(hint,vw/2,by+22);
    ctx.restore();
  }
}

// ── DIALOG BOX (canvas) ────────────────────────────────
function cw_drawDialog(ctx,vw,vh){
  var d=CWS.dialog;if(!d) return;
  var bw=vw-24,bh=185,bx=12,by=vh-bh-12;
  // Backdrop blur effect
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,vw,vh);
  // Box gradient
  var dg=ctx.createLinearGradient(bx,by,bx,by+bh);
  dg.addColorStop(0,'#111008');dg.addColorStop(1,'#0a0806');
  ctx.fillStyle=dg;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,14);ctx.fill();
  ctx.strokeStyle='#C4A35A88';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,14);ctx.stroke();
  // Gold accent top
  var ag=ctx.createLinearGradient(bx,by,bx+bw,by);
  ag.addColorStop(0,'rgba(196,163,90,0)');ag.addColorStop(0.2,'#C4A35A');ag.addColorStop(0.8,'#C4A35A');ag.addColorStop(1,'rgba(196,163,90,0)');
  ctx.fillStyle=ag;ctx.fillRect(bx+14,by,bw-28,2);
  // Speaker
  ctx.fillStyle='#C4A35A';ctx.font='bold 16px Georgia';ctx.textAlign='left';
  ctx.fillText((d.emoji||'')+' '+(d.speaker||''),bx+16,by+24);
  // Text wrap
  ctx.fillStyle='#E8E0D0';ctx.font='16px Georgia';
  var words=d.text.split(' '),line='',ty=by+46;
  for(var i=0;i<words.length;i++){
    var test=line+words[i]+' ';
    if(ctx.measureText(test).width>bw-36&&line){ctx.fillText(line,bx+16,ty);ty+=19;line=words[i]+' ';}
    else line=test;
  }
  ctx.fillText(line,bx+16,ty);
  if(d.xp){ctx.fillStyle='#FFD700';ctx.font='bold 14px monospace';ctx.fillText('+'+d.xp+' XP',bx+16,by+bh-32);}
  ctx.fillStyle='#C4A35A66';ctx.font='13px monospace';ctx.textAlign='right';
  ctx.fillText('Tap A →',bx+bw-12,by+bh-14);
}

// ── ACTIVITY OVERLAY — rendered as HTML for mobile ────
// All activities use a full-screen HTML div injected into the DOM
// This ensures native touch events work properly on all mobile devices

function cw_showActivityOverlay(html){
  var el=document.getElementById('cwActivity');
  if(el){el.innerHTML=html;el.style.display='flex';}
}
function cw_hideActivityOverlay(){
  var el=document.getElementById('cwActivity');
  if(el){el.style.display='none';el.innerHTML='';}
}

function cw_renderActivity(){
  var a=CWS.activity;
  if(!a){cw_hideActivityOverlay();return;}
  var html='';
  if(a.type==='pew')      html=cw_htmlPew(a);
  if(a.type==='prayer')   html=cw_htmlPrayer(a);
  if(a.type==='worship')  html=cw_htmlWorship(a);
  if(a.type==='offering') html=cw_htmlOffering(a);
  if(a.type==='versequiz')html=cw_htmlVerseQuiz(a);
  if(a.type==='cafe')     html=cw_htmlCafe(a);
  if(a.type==='evangelism')html=cw_htmlEvangelize(a);
  if(a.type==='baptism')  html=cw_htmlBaptism(a);
  if(a.type==='devotional')html=cw_htmlDevotional(a);
  if(a.type==='upgrades') html=cw_htmlUpgrades(a);
  if(a.type==='parkinglot')html=cw_htmlDriveHome(a);
  if(html) cw_showActivityOverlay(html);
  if(a.type==='parkinglot'&&a.phase==='arrived'){
    setTimeout(function(){cw_drawNapScene(G.cos?G.cos.sk:0,G.cos?G.cos.ot:0);},30);
  }
}

// ── WORSHIP ACTIVITY HTML ─────────────────────────────
function cw_htmlWorship(a){

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;max-width:220px;margin-left:auto;margin-right:auto">
      <div style="background:#FF444433;border-radius:8px;padding:10px;font-size:22px">🎵</div>

    <button onclick="cw_worshipStart()" style="width:100%;background:linear-gradient(135deg,#CC44FF,#8800AA);border:none;color:#fff;padding:14px;border-radius:10px;font-size:18px;font-weight:bold">🎵 Start Worship!</button>
  </div>`;

  if(a.phase==='play'){
    var laneColors=['#FF4444','#44AAFF','#44FF44','#FFAA44'];

          }
          if(n.lane===i&&n.hit){
            noteEls+=`<div style="position:absolute;left:50%;top:82%;transform:translate(-50%,-50%);font-size:14px;color:#4ade80;font-weight:bold;opacity:${Math.max(0,1-(Date.now()-n.hitTime)/400)};pointer-events:none">✔</div>`;
          }
        }
      }
      lanes+=`<div onpointerdown="cw_worshipTap(${i})" style="position:relative;flex:1;background:linear-gradient(180deg,${laneColors[i]}08,${laneColors[i]}15,${laneColors[i]}25);border-left:1px solid ${laneColors[i]}22;border-right:1px solid ${laneColors[i]}22;overflow:hidden;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none">

      </div>`;
    }
    var comboText=a.combo>=3?`<span style="color:#FFD700;font-size:15px">🔥 x${a.combo} Combo!</span>`:'';
    var progPct=a._noteIdx?Math.floor(a._noteIdx/a.total*100):0;

function cw_evStart(methodId){
  var a=CWS.activity;if(!a||a.type!=='evangelism')return;
  a.method=methodId||'romans';
  a.phase='step';a.step=0;a.score=0;a.responses=[];
  cw_renderActivity();
}
function cw_evCancel(){
  CWS.activity=null;cw_hideActivityOverlay();CWS._lastActivityRender=0;
}
function cw_evChoose(idx){
  var a=CWS.activity;if(!a||a.type!=='evangelism'||a.phase!=='step')return;
  SFX&&SFX.click&&SFX.click();
  var method=a.method?CW_EV_METHODS.find(function(m){return m.id===a.method;}):null;
  var rr=method?method.data:CW_ROMANS_ROAD;
  var rd=rr[a.step];
  var choice=rd.choices[idx];
  a.lastChoice=idx;
  a.responses.push(idx);
  if(choice.correct){a.score++;doFlash('#4ade8033',300);}
  else{doFlash('#FF6B6B22',300);}
  a.phase='response';
  cw_renderActivity();
}
function cw_evNext(){
  var a=CWS.activity;if(!a||a.type!=='evangelism')return;
  SFX&&SFX.click&&SFX.click();
  var method=a.method?CW_EV_METHODS.find(function(m){return m.id===a.method;}):null;
  var rr=method?method.data:CW_ROMANS_ROAD;
  if(a.step<rr.length-1){
    a.step++;a.phase='step';
  } else {
    a.phase='result';
  }
  cw_renderActivity();
}
function cw_evFinish(saved,xp){
  var a=CWS.activity;if(!a||a.type!=='evangelism')return;
  SFX&&SFX.click&&SFX.click();
  if(xp>0){G.pd.xp=(G.pd.xp||0)+xp;persistPlayer();}
  if(saved){
    CWS.evangelized[a.npcId]=true;
    if(!G.pd.evangelized)G.pd.evangelized=[];
    if(!G.pd.evangelized.includes(a.npcId)){G.pd.evangelized.push(a.npcId);persistPlayer();}
    toast('🙏 '+a.npc.name+' gave their life to Jesus! +'+xp+' XP');
    doFlash('#FFFFFF44',600);
    doBanner(a.npc.name+' IS SAVED!','#4ade80');
  }
  CWS.activity=null;cw_hideActivityOverlay();CWS._lastActivityRender=0;
}

function cw_driveStart(){

function cw_driveTouchStart(e){e.preventDefault();if(e.touches.length>0)CW_DRIVE.touchStartX=e.touches[0].clientX;}

function cw_driveTouchEnd(e){e.preventDefault();CW_DRIVE.touchStartX=null;}
function cw_driveLoop(){
  if(!CW_DRIVE.active)return;
  var d=CW_DRIVE,ctx=d.ctx,c=d.canvas;
  if(!ctx||!c){CW_DRIVE.active=false;return;}
  var W=c.width,H=c.height;
  // Update
  d.speed=Math.min(6,3+d.dist/800);
  d.dist+=d.speed;
  d.score=Math.floor(d.dist/10);
  // Keyboard steering
  if(d.keys['ArrowLeft']||d.keys['a']||d.keys['A'])d.x-=3.5;
  if(d.keys['ArrowRight']||d.keys['d']||d.keys['D'])d.x+=3.5;
  // Clamp player to road
  var roadL=80,roadR=280;
  d.x=Math.max(roadL+15,Math.min(roadR-15,d.x));
  // Spawn obstacles (oncoming cars)
  d.lastSpawn+=d.speed;
  if(d.lastSpawn>120+Math.random()*80){
    d.lastSpawn=0;
    var olane=roadL+20+Math.random()*(roadR-roadL-40);
    var oColors=['#CC3333','#3366CC','#33AA55','#CCCC22','#CC6622','#FFFFFF'];
    d.obstacles.push({x:olane,y:-60,w:28,h:50,color:oColors[Math.floor(Math.random()*oColors.length)]});
  }
  // Move obstacles
  for(var i=d.obstacles.length-1;i>=0;i--){
    d.obstacles[i].y+=d.speed+1.5;
    if(d.obstacles[i].y>H+60)d.obstacles.splice(i,1);
  }
  // Move trees
  for(var i=0;i<d.trees.length;i++){
    d.trees[i].y+=d.speed;
    if(d.trees[i].y>H+40)d.trees[i].y=-40-Math.random()*60;
  }
  // Collision check (player car ~28x50 centered at d.x, d.y)
  var px1=d.x-14,px2=d.x+14,py1=d.y-25,py2=d.y+25;
  for(var i=0;i<d.obstacles.length;i++){
    var o=d.obstacles[i];
    var ox1=o.x-o.w/2,ox2=o.x+o.w/2,oy1=o.y-o.h/2,oy2=o.y+o.h/2;
    if(px1<ox2&&px2>ox1&&py1<oy2&&py2>oy1){
      d.crashed=true;d.active=false;
      if(SFX&&SFX.worshipMiss)SFX.worshipMiss();
      var a=CWS.activity;if(a)a.phase='crashed';
      cw_driveCleanup();
      cw_renderActivity();
      return;
    }
  }
  // Check if arrived
  if(d.dist>=d.maxDist){
    d.active=false;
    if(SFX&&SFX.correct)SFX.correct();
    var a=CWS.activity;if(a)a.phase='arrived';
    cw_driveCleanup();
    cw_renderActivity();
    return;
  }

  // ── RENDER ──
  // Sky
  ctx.fillStyle='#87CEEB';ctx.fillRect(0,0,W,H);
  // Grass
  ctx.fillStyle='#3A8C3F';ctx.fillRect(0,0,roadL,H);ctx.fillRect(roadR,0,W-roadR,H);
  // Road
  ctx.fillStyle='#3A3A40';ctx.fillRect(roadL,0,roadR-roadL,H);
  // Road edges (white lines)
  ctx.fillStyle='#fff';ctx.fillRect(roadL,0,3,H);ctx.fillRect(roadR-3,0,3,H);
  // Center dashes (animated)
  ctx.fillStyle='rgba(255,255,255,0.5)';
  var mid=(roadL+roadR)/2;
  var dashOff=(d.dist*2)%40;
  for(var dy=-40+dashOff;dy<H;dy+=40){ctx.fillRect(mid-1.5,dy,3,20);}
  // Trees
  for(var i=0;i<d.trees.length;i++){
    var t=d.trees[i];
    ctx.fillStyle='#5C3317';ctx.fillRect(t.x-3,t.y,6,14);
    ctx.fillStyle='#2D8A3E';ctx.beginPath();ctx.arc(t.x,t.y-4,10,0,Math.PI*2);ctx.fill();

  }

    var o=d.obstacles[i];
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(o.x,o.y+o.h/2+4,o.w/2+2,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=o.color;ctx.beginPath();ctx.roundRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h,5);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.roundRect(o.x-o.w/2+4,o.y-o.h/2+8,o.w-8,o.h*0.35,3);ctx.fill();
    ctx.fillStyle='rgba(150,200,255,0.35)';ctx.beginPath();ctx.roundRect(o.x-o.w/2+4,o.y+o.h/2-16,o.w-8,10,2);ctx.fill();
    // Headlights
    ctx.fillStyle='rgba(255,255,100,0.6)';ctx.beginPath();ctx.arc(o.x-o.w/3,o.y+o.h/2-2,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(o.x+o.w/3,o.y+o.h/2-2,3,0,Math.PI*2);ctx.fill();
  }
  // Player car
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(d.x,d.y+30,18,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2288DD';ctx.beginPath();ctx.roundRect(d.x-14,d.y-25,28,50,5);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.beginPath();ctx.roundRect(d.x-10,d.y-15,20,18,3);ctx.fill();
  ctx.fillStyle='rgba(150,200,255,0.4)';ctx.beginPath();ctx.roundRect(d.x-10,d.y-22,20,10,2);ctx.fill();
  ctx.fillStyle='rgba(150,200,255,0.3)';ctx.beginPath();ctx.roundRect(d.x-9,d.y+12,18,8,2);ctx.fill();
  // Taillights
  ctx.fillStyle='rgba(255,50,50,0.7)';ctx.beginPath();ctx.arc(d.x-10,d.y+23,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(d.x+10,d.y+23,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(d.x-12,d.y-24,8,4);
  ctx.restore();
  // Home indicator when close
  if(d.dist>d.maxDist*0.75){

    ctx.save();ctx.globalAlpha=homeAlpha;ctx.font='bold 32px serif';ctx.textAlign='center';

  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(10,H-16,W-20,8);
  ctx.fillStyle='#4ade80';ctx.fillRect(10,H-16,(W-20)*pct,8);
  ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.textAlign='center';
  ctx.fillText(Math.floor(pct*100)+'%',W/2,H-8);
  // Update activity overlay progress bar
  var progEl=document.querySelector('#cwActivity [style*="transition:width 0.3s"]');
  if(progEl)progEl.style.width=Math.floor(pct*100)+'%';
  var scoreEl=document.querySelector('#cwActivity [style*="color:#FFD700"]');

  d.rafId=requestAnimationFrame(cw_driveLoop);
}
