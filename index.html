<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kingdom Chronicles — ChristLife Church</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

@keyframes spBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

@keyframes lungR{0%{transform:translateX(0)}40%{transform:translateX(26px)}100%{transform:translateX(0)}}

@keyframes victBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-9px) scale(1.18)}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.18}}
@keyframes cardReveal{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes stageIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 10px #4ade8033}50%{box-shadow:0 0 24px #4ade8077}}
@keyframes errShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.inp{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;font-family:Georgia,serif;outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:#C4A35A;box-shadow:0 0 0 3px #C4A35A22}
.inp::placeholder{color:#3a3a3a}

.btn-gold{background:linear-gradient(135deg,#C4A35A,#8B6914);border:none;color:#000;padding:13px;border-radius:10px;font-size:13px;font-weight:bold;width:100%;letter-spacing:.5px}
.btn-ghost{background:transparent;border:1px solid #2a2a2a;color:#666;padding:11px;border-radius:10px;font-size:12px;width:100%}
.toggle{position:relative;display:inline-block;width:50px;height:28px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:#2a2a2a;border-radius:28px;cursor:pointer;transition:.3s}
.tog-sl:before{content:"";position:absolute;width:22px;height:22px;left:3px;bottom:3px;background:#888;border-radius:50%;transition:.3s}
.toggle input:checked+.tog-sl{background:#166534}
.toggle input:checked+.tog-sl:before{transform:translateX(22px);background:#4ade80}
.section-card{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:12px;padding:16px;margin-bottom:12px}

<script>
// ═══════════════════════════════════════════════
// KINGDOM CHRONICLES — ChristLife Church
// ═══════════════════════════════════════════════

// ── localStorage keys ────────────────────────
const LS_SETTINGS = "kc_settings_v1";
const LS_PLAYER   = "kc_player_v1";
const LS_USERNAMES= "kc_usernames_v1"; // shared registry of taken usernames
const ADMIN_PASS  = "christlife2024";

// ── Load / save helpers ───────────────────────
function lsGet(k,def=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── Church config — admin editable ───────────
let CFG = Object.assign({
  churchName:"ChristLife Church",
  churchAddress:"14071 Springdale St, Westminster, CA",
  lat:33.7542, lng:-117.9943,
  radiusMeters:200,
  locationRequired:true,  // false = open check-in for anyone
  firebaseCfg:null        // set in Admin Panel for multiplayer
}, lsGet(LS_SETTINGS,{}));

function saveCFG(){lsSet(LS_SETTINGS,CFG);}

function getDistM(lat1,lng1,lat2,lng2){
  const R=6371000,p1=lat1*Math.PI/180,p2=lat2*Math.PI/180,
    dp=(lat2-lat1)*Math.PI/180,dl=(lng2-lng1)*Math.PI/180,
    a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Username registry (stored locally, shared key) ──
function getUsernames(){return lsGet(LS_USERNAMES,{});}
function isUsernameTaken(u){return !!getUsernames()[u.toLowerCase()];}
function registerUsername(u,playerId){
  const reg=getUsernames();reg[u.toLowerCase()]=playerId;lsSet(LS_USERNAMES,reg);
}

// ── Sprite engine ────────────────────────────
const SZ=32;
const SKINS=["#FDDBB4","#E8B88A","#C68642","#8D5524","#4A2912"];
const HAIRS=["#1a1a1a","#5C3317","#FFD700","#8B0000","#DDDDDD","#4B0082","#FF4500","#228B22"];
const OUTFITS=[{name:"Royal Blue",p:"#1E3A8A",s:"#1e40af",acc:"#60a5fa"},{name:"Crimson",p:"#7f1d1d",s:"#991b1b",acc:"#f87171"},{name:"Forest",p:"#14532d",s:"#166534",acc:"#4ade80"},{name:"Royal Purple",p:"#4c1d95",s:"#5b21b6",acc:"#a78bfa"},{name:"Golden",p:"#78350f",s:"#92400e",acc:"#fbbf24"},{name:"Teal",p:"#134e4a",s:"#115e59",acc:"#2dd4bf"}];

function shade(col,amt){try{const n=parseInt(col.replace("#",""),16);const r=Math.max(0,Math.min(255,(n>>16)+amt));const g=Math.max(0,Math.min(255,((n>>8)&0xff)+amt));const b=Math.max(0,Math.min(255,(n&0xff)+amt));return"#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");}catch{return col;}}
function rect(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(x,y,w,h);}
function circle(c,cx,cy,r,col){c.fillStyle=col;c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fill();}

// ── Character draw functions ─────────────────
function drawShepherd(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const hair=HAIRS[hr]||HAIRS[1];const sd=shade(skin,-30);rect(c,12,3,8,8,skin);rect(c,12,3,8,3,hair);rect(c,11,4,2,4,hair);rect(c,19,4,2,4,hair);rect(c,14,7,2,2,"#1a0a00");rect(c,18,7,2,2,"#1a0a00");rect(c,15,10,4,1,sd);rect(c,14,11,4,2,skin);rect(c,10,13,12,10,"#8B6914");rect(c,10,21,12,2,"#5C3317");rect(c,15,21,2,2,"#CC8800");rect(c,9,23,14,5,"#8B6914");rect(c,22,8,2,18,"#8B6914");rect(c,20,8,4,2,"#8B6914");rect(c,20,8,2,4,"#8B6914");rect(c,8,13,3,8,skin);rect(c,21,13,3,8,skin);rect(c,8,21,3,2,skin);rect(c,21,21,3,2,skin);rect(c,11,28,4,3,"#5C3317");rect(c,17,28,4,3,"#5C3317");}
function drawDavid(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const hair=HAIRS[hr]||HAIRS[1];const o=OUTFITS[ot]||OUTFITS[0];const sd=shade(skin,-30);rect(c,11,1,10,3,"#FFD700");rect(c,11,1,2,4,"#FFD700");rect(c,15,0,2,4,"#FFD700");rect(c,19,1,2,4,"#FFD700");rect(c,11,4,10,8,skin);rect(c,9,5,3,6,hair);rect(c,20,5,3,6,hair);rect(c,13,7,2,2,"#2244AA");rect(c,17,7,2,2,"#2244AA");rect(c,13,7,1,1,"#fff");rect(c,17,7,1,1,"#fff");rect(c,13,6,3,1,hair);rect(c,17,6,3,1,hair);rect(c,15,9,2,1,sd);rect(c,14,11,4,1,sd);rect(c,14,12,4,2,skin);rect(c,9,14,14,9,o.p);rect(c,12,15,8,5,o.s);rect(c,9,22,14,2,"#5C3317");rect(c,10,24,5,5,o.p);rect(c,17,24,5,5,o.p);rect(c,6,14,4,7,skin);rect(c,22,14,4,7,skin);rect(c,5,21,4,2,skin);rect(c,23,21,4,2,skin);circle(c,7,22,1.5,"#888");rect(c,9,29,6,3,"#5C3317");rect(c,16,29,6,3,"#5C3317");}
function drawEsther(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const hair=HAIRS[hr]||HAIRS[1];const o=OUTFITS[ot]||OUTFITS[0];const sd=shade(skin,-30);for(let i=0;i<5;i++){rect(c,11+i*2,1,1,3-(i%2)*1,"#FFD700");}rect(c,11,3,10,1,"#FFD700");rect(c,9,5,3,14,hair);rect(c,20,5,3,14,hair);rect(c,11,4,10,9,skin);rect(c,13,8,3,2,"#6B2FA0");rect(c,18,8,3,2,"#6B2FA0");rect(c,13,8,1,1,"#fff");rect(c,18,8,1,1,"#fff");rect(c,12,10,2,1,"#FFB6C1");rect(c,18,10,2,1,"#FFB6C1");rect(c,14,12,4,1,"#CC3366");rect(c,14,13,4,3,skin);rect(c,13,14,6,1,"#FFD700");rect(c,8,16,16,12,o.p);rect(c,10,17,12,8,o.s);rect(c,5,16,4,8,o.p);rect(c,23,16,4,8,o.p);rect(c,5,20,3,4,o.acc);rect(c,24,20,3,4,o.acc);rect(c,6,28,20,4,o.p);rect(c,4,24,4,3,skin);rect(c,24,24,4,3,skin);}
function drawSamson(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const hair=HAIRS[hr]||HAIRS[1];const o=OUTFITS[ot]||OUTFITS[0];const sd=shade(skin,-40);rect(c,7,2,18,22,hair);rect(c,7,2,3,26,shade(hair,-30));rect(c,22,2,3,26,shade(hair,-30));rect(c,9,3,14,10,skin);rect(c,9,7,6,2,sd);rect(c,17,7,6,2,sd);rect(c,10,8,3,2,"#1a0800");rect(c,19,8,3,2,"#1a0800");rect(c,10,8,1,1,"#FF4400");rect(c,19,8,1,1,"#FF4400");rect(c,10,11,12,4,shade(hair,10));rect(c,9,12,14,3,hair);rect(c,5,13,22,10,skin);rect(c,6,15,20,8,o.p);rect(c,9,15,14,6,o.s);rect(c,1,13,6,9,skin);rect(c,25,13,6,9,skin);rect(c,27,18,4,2,"#DEB887");rect(c,26,20,3,6,"#DEB887");rect(c,5,23,22,3,"#5C3317");rect(c,14,22,4,4,"#CC8800");rect(c,7,26,7,6,skin);rect(c,18,26,7,6,skin);rect(c,6,30,8,2,"#5C3317");rect(c,18,30,8,2,"#5C3317");}
function drawDeborah(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const hair=HAIRS[hr]||HAIRS[1];const o=OUTFITS[ot]||OUTFITS[0];const sd=shade(skin,-30);rect(c,9,2,14,5,"#FFD700");rect(c,8,5,2,8,shade("#FFD700",-20));rect(c,10,5,12,9,skin);rect(c,12,9,3,2,"#4488CC");rect(c,17,9,3,2,"#4488CC");rect(c,12,9,1,1,"#fff");rect(c,17,9,1,1,"#fff");rect(c,14,12,4,1,sd);rect(c,14,14,4,3,skin);rect(c,7,17,18,13,o.p);rect(c,10,18,12,9,o.s);rect(c,3,17,6,10,o.p);rect(c,23,17,6,10,o.p);rect(c,3,22,5,4,o.acc);rect(c,24,22,5,4,o.acc);rect(c,24,8,2,20,"#8B6914");rect(c,20,6,4,3,"#228B22");rect(c,22,5,6,3,"#228B22");rect(c,4,22,4,3,skin);rect(c,24,22,4,3,skin);rect(c,5,30,22,2,o.s);}
function drawElijah(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const hair=HAIRS[hr]||HAIRS[1];const o=OUTFITS[ot]||OUTFITS[0];rect(c,10,0,12,3,"#FF4500");rect(c,12,0,8,5,"#FF6B35");rect(c,9,1,3,4,"#FFD700");rect(c,20,1,3,4,"#FFD700");rect(c,8,4,16,3,hair);rect(c,7,5,3,10,shade(hair,20));rect(c,22,5,3,10,shade(hair,20));rect(c,9,5,14,9,skin);rect(c,11,9,3,2,"#FF4500");rect(c,18,9,3,2,"#FF4500");rect(c,11,9,2,1,"#FFD700");rect(c,18,9,2,1,"#FFD700");rect(c,9,12,14,6,shade(hair,20));rect(c,10,13,12,6,hair);rect(c,6,18,20,12,"#8B4513");rect(c,9,19,14,9,"#A0522D");rect(c,10,19,12,8,o.p);rect(c,3,18,5,10,"#8B4513");rect(c,24,18,5,10,"#8B4513");rect(c,3,23,4,3,skin);rect(c,25,23,4,3,skin);rect(c,25,20,4,5,"#FF4500");rect(c,26,18,3,5,"#FF6B35");rect(c,27,17,2,4,"#FFD700");rect(c,3,12,2,18,"#5C3317");rect(c,6,28,20,2,"#5C3317");}

function drawJoshua(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const o=OUTFITS[ot]||OUTFITS[0];const sd=shade(skin,-35);rect(c,9,2,14,7,"#CD7F32");rect(c,10,2,12,5,shade("#CD7F32",30));rect(c,9,5,3,4,"#CD7F32");rect(c,20,5,3,4,"#CD7F32");rect(c,12,0,8,2,"#CC2200");rect(c,10,6,12,7,skin);rect(c,12,9,2,2,"#1a0800");rect(c,18,9,2,2,"#1a0800");rect(c,12,9,1,1,"#fff");rect(c,18,9,1,1,"#fff");rect(c,14,12,4,1,sd);rect(c,13,13,6,2,skin);rect(c,12,15,8,1,"#CD7F32");rect(c,7,16,18,10,"#CD7F32");rect(c,9,17,14,7,shade("#CD7F32",25));for(let i=0;i<5;i++){rect(c,8+i*4,26,3,5,o.p);}rect(c,3,16,5,9,skin);rect(c,24,16,5,9,skin);rect(c,3,20,5,3,"#CD7F32");rect(c,24,20,5,3,"#CD7F32");rect(c,26,14,2,14,"#C0C0C0");rect(c,25,14,4,2,"#8B6914");rect(c,1,15,5,10,"#CD7F32");rect(c,2,16,3,8,shade("#CD7F32",30));rect(c,3,17,1,6,"#CC2200");}
function drawDaniel(c,sk,hr,ot){const skin=SKINS[sk]||SKINS[0];const hair=HAIRS[hr]||HAIRS[1];const sd=shade(skin,-30);rect(c,11,3,10,9,skin);rect(c,11,3,10,3,hair);rect(c,10,4,2,5,hair);rect(c,20,4,2,5,hair);rect(c,13,8,2,2,"#1a3a6a");rect(c,17,8,2,2,"#1a3a6a");rect(c,13,8,1,1,"#fff");rect(c,17,8,1,1,"#fff");rect(c,12,10,8,4,shade(hair,20));rect(c,11,11,10,3,hair);rect(c,14,12,4,3,skin);rect(c,7,15,18,13,"#1a1a6a");rect(c,10,16,12,9,"#2a2a8a");for(let i=0;i<4;i++){rect(c,8+i*5,15,3,1,"#FFD700");}rect(c,7,21,18,1,"#FFD700");rect(c,3,15,6,10,"#1a1a6a");rect(c,23,15,6,10,"#1a1a6a");rect(c,24,18,4,6,"#DEB887");rect(c,4,22,4,3,skin);rect(c,24,22,4,3,skin);}

function drawJesus(c,sk,hr,ot){
  // Jesus — white robe, light skin, brown hair, nail-scarred hands, warm golden glow
  const skin="#F5DEB3";const hair="#8B4513";const sd=shade(skin,-25);
  // Divine glow / halo
  for(var g=0;g<3;g++){
    c.fillStyle="rgba(255,215,0,"+(0.04-g*0.01)+")";
    c.beginPath();c.arc(16,10,(14+g*3),0,Math.PI*2);c.fill();
  }
  // Halo ring
  c.strokeStyle="#FFD700";c.lineWidth=1.5;
  c.beginPath();c.arc(16,8,9,0,Math.PI*2);c.stroke();
  c.strokeStyle="rgba(255,215,0,0.4)";c.lineWidth=0.5;
  c.beginPath();c.arc(16,8,11,0,Math.PI*2);c.stroke();
  // Hair — long flowing
  rect(c,10,4,12,4,hair);
  rect(c,9,6,3,12,shade(hair,-15));rect(c,20,6,3,12,shade(hair,-15));
  rect(c,10,8,2,10,hair);rect(c,20,8,2,10,hair);
  // Head
  rect(c,11,5,10,9,skin);
  // Eyes — warm compassionate
  rect(c,13,9,2,2,"#5C3317");rect(c,17,9,2,2,"#5C3317");
  rect(c,13,9,1,1,"#fff");rect(c,17,9,1,1,"#fff");
  rect(c,13,8,3,1,shade(hair,-10));rect(c,17,8,3,1,shade(hair,-10));
  // Nose subtle
  rect(c,15,11,2,1,sd);
  // Warm smile
  rect(c,14,12,4,1,sd);rect(c,13,11,1,1,sd);rect(c,18,11,1,1,sd);
  // Beard — full and neat
  rect(c,11,12,10,5,shade(hair,15));rect(c,12,13,8,5,hair);
  rect(c,13,15,6,4,shade(hair,-5));
  // Neck
  rect(c,14,14,4,3,skin);
  // White/cream robe — full length
  rect(c,6,17,20,15,"#FFFFF0");rect(c,8,18,16,12,"#FFFFFF");
  // Robe sash / belt
  rect(c,6,24,20,2,"#C4A35A");
  // Gold trim
  rect(c,6,17,20,1,"#FFD700");rect(c,6,31,20,1,"#FFD700");
  rect(c,6,17,1,15,"#FFD700");rect(c,25,17,1,15,"#FFD700");
  // Wide sleeves
  rect(c,2,17,6,10,"#FFFFF0");rect(c,24,17,6,10,"#FFFFF0");
  // Hands with nail marks
  rect(c,2,26,5,3,skin);rect(c,25,26,5,3,skin);
  // Nail marks (small cross mark on palms)
  rect(c,4,27,1,1,"#8B0000");rect(c,27,27,1,1,"#8B0000");
  // Arms of blessing — extended slightly
  rect(c,3,22,4,4,skin);rect(c,25,22,4,4,skin);
  // Divine light rays emanating
  c.strokeStyle="rgba(255,215,0,0.2)";c.lineWidth=1;
  for(var i=0;i<8;i++){
    var a=i*Math.PI/4;
    c.beginPath();c.moveTo(16+Math.cos(a)*12,8+Math.sin(a)*12);
    c.lineTo(16+Math.cos(a)*18,8+Math.sin(a)*18);c.stroke();
  }
  // Sandals
  rect(c,10,32,5,2,"#8B6914");rect(c,17,32,5,2,"#8B6914");
}

function makeSprite(id,sc,sk=0,hr=1,ot=0,flip=false,glow=null,anim=null){
  const c=document.createElement("canvas");
  c.width=SZ*sc;c.height=SZ*sc;c.style.imageRendering="pixelated";c.style.display="block";
  if(glow)c.style.filter=`drop-shadow(0 0 6px ${glow}) drop-shadow(0 0 16px ${glow}88)`;
  if(anim)c.style.animation=anim;
  const fn=DRAW_FN[id];
  if(fn){const ctx=c.getContext("2d");ctx.save();ctx.scale(sc,sc);if(flip){ctx.translate(SZ,0);ctx.scale(-1,1);}fn(ctx,sk,hr,ot);ctx.restore();}
  else{const ctx=c.getContext("2d");ctx.fillStyle="#333";ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle="#fff";ctx.font=`bold ${14*sc}px monospace`;ctx.textAlign="center";ctx.fillText((id[0]||"?").toUpperCase(),c.width/2,c.height*.65);}
  return c;
}
function attachSprites(){
  document.querySelectorAll("[data-sp]").forEach(el=>{
    const d=el.dataset;el.innerHTML="";
    el.appendChild(makeSprite(d.sp,+d.sc||2,+d.sk||0,+d.hr||1,+d.ot||0,d.fl==="1",d.gw||null,d.an||null));
  });
}

// ── Render helpers ────────────────────────────
function go(s){
  SFX&&SFX.resume&&SFX.resume();
  if(SFX){
    if(s==='title'||s==='select'||s==='signup') SFX.playTitle();
    else if(s==='battle'){ if(G.battleType==='pvp')SFX.playPvp(); else if(G.battleType==='mission')SFX.playMission(); else SFX.playBattle(); }
    else if(s==='church') SFX.playChurch();
    else if(s==='pvp_lobby') SFX.playPvp();
    else if(s==='game'||s==='wardrobe') SFX.playTitle();
    else if(s==='mission_complete'||s==='pvp_result') SFX.stopMusic();
  }
  if(s==="church"){G.screen="church";initChurchWorld();return;}
  if(G.screen==="church") cw_destroy();
  G.screen=s;render();
}
function setTab(t){G.tab=t;render();}
function render(){
  const s=G.screen;
  document.getElementById("app").innerHTML=
    s==="boot"?rBoot():
    s==="signup"?rSignup():
    s==="title"?rTitle():
    s==="game"?rGame():
    s==="battle"?rBattle():
    s==="wardrobe"?rWardrobe():
    s==="pvp_lobby"?rPvpLobby():
    s==="pvp_result"?rPvpResult():
    s==="mission_complete"?rMissionComplete():
    s==="admin_login"?rAdminLogin():

}

  }

function detectLocation(){
  const msg=document.getElementById("detectMsg");
  if(!navigator.geolocation){msg.textContent="GPS not available";msg.style.color="#ef4444";return;}
  msg.textContent="Detecting...";msg.style.color="#FFD700";
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6);
    const lng=pos.coords.longitude.toFixed(6);
    document.getElementById("cfgLat").value=lat;
    document.getElementById("cfgLng").value=lng;
    msg.textContent=`✓ Detected: ${lat}, ${lng}`;msg.style.color="#4ade80";
  },err=>{msg.textContent="Could not detect location";msg.style.color="#ef4444";},{enableHighAccuracy:true,timeout:10000});

function testFirebase(){
  var raw=(document.getElementById("cfgFirebase")||{}).value||"";
  var msg=document.getElementById("fbTestMsg");
  try{
    var cfg=JSON.parse(raw.trim());
    if(!cfg.databaseURL||!cfg.apiKey){msg.style.color="#ef4444";msg.textContent="❌ Missing databaseURL or apiKey";return;}
    msg.style.color="#FFD700";msg.textContent="Connecting…";
    CFG.firebaseCfg=cfg;lsSet(LS_SETTINGS,CFG);
    MP.connect(cfg,G.pd.playerId||"test",G.username||"admin",G.charId,G.cos,
      function(peers){msg.style.color="#4ade80";msg.textContent="✅ Connected! "+peers.length+" peer(s) online";},
      function(){}
    );
    setTimeout(function(){if(msg.textContent==="Connecting…"){msg.style.color="#ef4444";msg.textContent="❌ Timeout — check databaseURL and rules";}},8000);
  }catch(e){msg.style.color="#ef4444";msg.textContent="❌ Invalid JSON: "+e.message;}
}

function clearFirebase(){
  CFG.firebaseCfg=null;lsSet(LS_SETTINGS,CFG);

  if(msg){msg.style.color="#888";msg.textContent="Multiplayer disabled";}

  if(ta) ta.value="";
  toast("Multiplayer disabled","ok");
}

function rCheckInCard(){
  const cs=G.checkInState;

  return`<div class="section-card" style="border-color:${cs==="ok"?"#4ade8044":cs==="far"||cs==="denied"||cs==="error"?"#ef444433":"#1a1a1a"};margin-bottom:10px;animation:slideUp .3s ease">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <div style="font-size:22px">${cs==="ok"?"✅":cs==="finding"?"🛰️":cs==="far"?"📡":cs==="denied"?"🚫":cs==="error"?"⚠️":"📍"}</div>
      <div>
        <div style="font-weight:bold;color:${cs==="ok"?"#4ade80":cs==="finding"?"#FFD700":"#C4A35A"};font-size:12px">${cs==="ok"?"Welcome to Church!":cs==="finding"?"Locating You...":cs==="far"?"Too Far Away":cs==="denied"?"Location Denied":cs==="error"?"GPS Error":"Church Check-In"}</div>
        <div style="font-size:9px;color:#555">${CFG.locationRequired?`${CFG.churchName} · ${CFG.churchAddress}`:"Open check-in mode — active anywhere"}</div>
      </div>
    </div>
    ${cs==="idle"?`<p style="color:#666;font-size:10px;margin-bottom:8px">${CFG.locationRequired?"Tap when you're at "+CFG.churchName+"!":"Check-in is open — tap to earn XP!"}</p><button style="${btnStyle}" onclick="doCheckIn()">📍 CHECK IN${CFG.locationRequired?" AT CHURCH":""}</button>`:""}
    ${cs==="finding"?`<div style="display:flex;align-items:center;gap:8px;padding:8px 0"><div style="width:14px;height:14px;border:2px solid #C4A35A;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite"></div><span style="color:#C4A35A;font-size:11px">Acquiring GPS signal...</span></div>`:""}
    ${cs==="ok"?`<div style="background:#14532d;border:1px solid #4ade80;border-radius:8px;padding:9px;text-align:center;animation:pulseGlow 2s ease infinite"><div style="color:#4ade80;font-weight:bold;font-family:monospace;font-size:11px">🎉 CHECK-IN COMPLETE!</div></div>`:""}
    ${cs==="far"?`<p style="color:#666;font-size:10px;margin-bottom:8px">You're ${G.distAway}m away. Need to be within ${CFG.radiusMeters}m of ${CFG.churchName}.</p><button style="${retryStyle}" onclick="doCheckIn()">TRY AGAIN</button>`:""}
    ${cs==="denied"?`<p style="color:#666;font-size:10px;margin-bottom:8px">Allow location access in your browser settings, then try again.</p><button style="${retryStyle}" onclick="doCheckIn()">TRY AGAIN</button>`:""}
    ${cs==="error"?`<p style="color:#666;font-size:10px;margin-bottom:8px">Enable location services and try again.</p><button style="${retryStyle}" onclick="doCheckIn()">TRY AGAIN</button>`:""}
  </div>`;}

function doCheckIn(){SFX&&SFX.resume&&SFX.resume();SFX&&SFX.checkIn&&SFX.checkIn();
  if(!CFG.locationRequired){
    // Open mode — anyone checks in
    const xp=rand(40,80);G.pd.xp+=xp;G.pd.checkIns=(G.pd.checkIns||0)+1;
    const pu=Math.random()>.5?PUPS[rand(0,PUPS.length-1)]:null;
    if(pu&&G.pd.powerups.length<6)G.pd.powerups.push(pu);
    if(G.pd.checkIns>=5&&!G.unlocked.includes("esther")){G.unlocked.push("esther");toast("🎉 UNLOCKED: Esther (Uncommon)!");}
    else toast(`⛪ Checked in! +${xp} XP${pu?" + "+pu.emoji:""}  `);
    checkUnlocks();persistPlayer();G.checkInState="ok";render();
    setTimeout(()=>{G.checkInState="idle";render();},4000);
    return;
  }
  if(!navigator.geolocation){G.checkInState="error";render();return;}
  G.checkInState="finding";render();
  navigator.geolocation.getCurrentPosition(pos=>{
    const dist=Math.round(getDistM(pos.coords.latitude,pos.coords.longitude,CFG.lat,CFG.lng));
    G.distAway=dist;
    if(dist<=CFG.radiusMeters){
      const xp=rand(40,80);G.pd.xp+=xp;G.pd.checkIns=(G.pd.checkIns||0)+1;
      const pu=Math.random()>.5?PUPS[rand(0,PUPS.length-1)]:null;
      if(pu&&G.pd.powerups.length<6)G.pd.powerups.push(pu);
      if(G.pd.checkIns>=5&&!G.unlocked.includes("esther")){G.unlocked.push("esther");toast("🎉 UNLOCKED: Esther (Uncommon)!");}
      else toast(`⛪ Checked in! +${xp} XP${pu?" + "+pu.emoji:""}  `);
      checkUnlocks();persistPlayer();G.checkInState="ok";
    } else G.checkInState="far";
    render();setTimeout(()=>{G.checkInState="idle";render();},4000);
  },err=>{G.checkInState=err.code===1?"denied":"error";render();setTimeout(()=>{G.checkInState="idle";render();},4000);},{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

function startMissionStage(m,idx,carryHp=null){const st=m.stages[idx];G.bs={e:{...st.enemy,hp:st.enemy.hp},pHp:carryHp||gmhp(),turn:"player",active:true,burn:false,defUp:false,sword:false,special:st.special||null,survLeft:st.survRounds||0,plagueCounter:0,angelCounter:0,isBoss:st.isBoss||false};G.survRound=0;G.log=[`📖 ${st.title}`,st.story];G.battleType="mission";go("battle");}
function startArena(){const e=ARENA_ENEMIES[rand(0,ARENA_ENEMIES.length-1)];G.battleType="arena";G.activeMission=null;G.bs={e:{...e,hp:e.hp},pHp:gmhp(),turn:"player",active:true,burn:false,defUp:false,sword:false,special:null};G.log=[`⚔️ ${gch().name} faces ${e.name}!`];go("battle");}
function pAtk(type){SFX&&SFX.resume&&SFX.resume();if(type==="ability"&&SFX)SFX.ability();const bs=G.bs;if(!bs||bs.turn!=="player")return;let b={...bs,e:{...bs.e}};const mc=gch();const crit=Math.random()<.15;let dmg=0,msg="";if(type==="basic"){let d=mc.str*2+rand(3,10)+glv()*2;if(b.sword){d*=2;b.sword=false;msg="⚔️ HOLY SWORD! ";}if(crit)d=Math.floor(d*1.8);dmg=Math.max(1,d-Math.floor(b.e.def*.4));msg+=crit?`💥 CRIT! ${dmg} dmg!`:`${mc.name} hits for ${dmg}!`;}else{doBanner(mc.abilityName,mc.color);doFlash(mc.color+"55",500);let d=rand(...mc.abilityDmg)+glv()*3;if(crit)d=Math.floor(d*1.8);dmg=Math.max(1,d-Math.floor(b.e.def*.2));msg=crit?`💥 CRIT ${mc.abilityName}! ${dmg}!`:`✨ ${mc.abilityName}! ${dmg}!`;}if(b.special==="plague"){b.plagueCounter=(b.plagueCounter||0)+1;if(b.plagueCounter%2===0){dmg+=8;msg+=" ⚠️+8!";doFlash("#88008855",250);}}b.e.hp=Math.max(0,b.e.hp-dmg);animHit("eHit",dmg,crit,b.e.color||"#FF4444");animEl("eSpr","spShake .35s ease");animEl("pSpr",type==="basic"?"lungL .4s ease":"none");addLog(msg);if(b.burn){b.e.hp=Math.max(0,b.e.hp-5);addLog("🔥 Burn ticks 5!");}if(b.special==="survival"){G.survRound++;b.survLeft=b.survLeft-1;addLog(`🌊 Red Sea: ${b.survLeft} rounds...`);if(b.survLeft<=0){addLog("🌊 THE SEA PARTS!");b.e.hp=0;doFlash("#4488CC88",600);}}if(b.e.hp<=0){handleVic(b);return;}b.turn="enemy";G.bs=b;go("battle");setTimeout(eAtk,950);}
function usePu(i){const bs=G.bs;if(!bs)return;const pu=G.pd.powerups[i];if(!pu)return;let b={...bs};G.pd.powerups.splice(i,1);if(pu.effect==="heal"){b.pHp=Math.min(gmhp(),b.pHp+30);addLog("✨ +30 HP!");doFlash("#4ade8044",250);}if(pu.effect==="defense"){b.defUp=true;addLog("🛡️ Armor of God!");}if(pu.effect==="sword"){b.sword=true;addLog("⚔️ Sword ready!");}if(pu.effect==="burn"){b.burn=true;addLog("🔥 Holy Fire!");}G.bs=b;go("battle");}
function eAtk(){const bs=G.bs;if(!bs)return;let nb={...bs,e:{...bs.e}};const crit=Math.random()<.1;let dmg=Math.max(1,Math.floor((nb.e.atk+rand(0,8))*(nb.defUp?.5:1)));if(nb.special==="giant"){nb.plagueCounter=(nb.plagueCounter||0)+1;if(nb.plagueCounter%3===0){dmg*=2;addLog("👹 GOLIATH RAGES! 2x dmg!");doFlash("#FF000055",400);}}if(nb.special==="angel"){nb.angelCounter=(nb.angelCounter||0)+1;if(nb.angelCounter%3===0){addLog("😇 Angel blocks the attack!");doFlash("#FFD70033",300);nb.turn="player";nb.defUp=false;G.bs=nb;go("battle");return;}}if(crit)dmg=Math.floor(dmg*1.6);nb.pHp=Math.max(0,nb.pHp-dmg);addLog(crit?`💥 ${nb.e.name} CRIT! ${dmg}!`:`${nb.e.name} hits for ${dmg}!`);animHit("pHit",dmg,crit,"#FF6B6B");animEl("pSpr","spShake .35s ease");animEl("eSpr","lungR .4s ease");doFlash("#FF000033",220);if(nb.pHp<=0){addLog(`💀 ${gch().name} has fallen...`);G.pd.losses++;if(G.battleType==="pvp"){G.pd.pvpLosses++;G.pvpWon=false;nb.active=false;G.bs=nb;persistPlayer();go("battle");setTimeout(()=>go("pvp_result"),2000);}else{nb.active=false;G.bs=nb;persistPlayer();go("battle");setTimeout(()=>go("game"),2200);}return;}nb.turn="player";nb.defUp=false;G.bs=nb;go("battle");}
function handleVic(b){SFX&&SFX.victory&&SFX.victory();const xp=G.battleType==="pvp"?rand(80,150):G.battleType==="mission"?(G.activeMission?.stages[G.missionStage]?.xp||100):rand(60,120);addLog(G.battleType==="mission"?`✅ Stage clear! +${xp} XP`:`🏆 Defeated! +${xp} XP`);G.pd.xp+=xp;G.pd.wins++;if(G.battleType==="pvp"){G.pd.pvpWins++;G.pvpWon=true;}b.active=false;G.bs=b;doFlash("#FFD70066",500);checkUnlocks();persistPlayer();if(G.battleType==="pvp"){go("battle");setTimeout(()=>go("pvp_result"),2000);}else if(G.battleType==="mission"){go("battle");setTimeout(()=>{const m=G.activeMission;const ni=G.missionStage+1;if(ni>=m.stages.length){G.completedMissions.push(m.id);G.pd.xp+=m.xpReward;G.pd.powerups.push({...m.reward});if(m.unlockCharId&&!G.unlocked.includes(m.unlockCharId))G.unlocked.push(m.unlockCharId);checkUnlocks();persistPlayer();go("mission_complete");}else{G.missionStage=ni;startMissionStage(m,ni,Math.min(b.pHp+20,gmhp()));}},2000);}else{go("battle");setTimeout(()=>go("game"),2000);}}
function flee(){SFX&&SFX.defeat&&SFX.defeat();G.pd.losses++;persistPlayer();if(G.battleType==="pvp"){G.pd.pvpLosses++;G.pvpWon=false;setTimeout(()=>go("pvp_result"),200);}else setTimeout(()=>go("game"),200);}
function animHit(elId,val,crit,col){if(SFX){if(elId==="eHit"&&crit)SFX.crit();else if(elId==="eHit")SFX.hit();else if(elId==="pHit")SFX.hit();}const el=document.getElementById(elId);if(!el)return;el.textContent=(crit?"💥":"")+val;el.style.color=crit?"#FFD700":col;el.style.display="block";el.style.animation="hitFloat .9s ease-out forwards";setTimeout(()=>{if(el){el.style.display="none";el.style.animation="";}},900);}
function animEl(elId,anim){const el=document.getElementById(elId);if(!el)return;el.style.animation="none";void el.offsetWidth;el.style.animation=anim;}
function checkUnlocks(){var _ulBefore=G.unlocked.length;const w=G.pd.wins;const pW=G.pd.pvpWins;const lv=glv();if(w>=1&&!G.unlocked.includes("ruth")){G.unlocked.push("ruth");toast("🎉 UNLOCKED: Ruth (Uncommon)!");}if(w>=10&&!G.unlocked.includes("deborah")){G.unlocked.push("deborah");toast("🎉 UNLOCKED: Deborah (Rare)!");}if(w>=15&&!G.unlocked.includes("joshua")){G.unlocked.push("joshua");toast("🎉 UNLOCKED: Joshua (Rare)!");}if(pW>=5&&!G.unlocked.includes("elijah")){G.unlocked.push("elijah");toast("🔥 UNLOCKED: Elijah (Epic)!");}if(G.completedMissions.length>=3&&!G.unlocked.includes("samson")){G.unlocked.push("samson");toast("💪 UNLOCKED: Samson (Epic)!");}if(G.completedMissions.includes("moses_m")&&!G.unlocked.includes("daniel")){G.unlocked.push("daniel");toast("🦁 UNLOCKED: Daniel (Epic)!");}if(G.completedMissions.includes("david_m")&&!G.unlocked.includes("david")){G.unlocked.push("david");toast("👑 UNLOCKED: David (Rare)!");}if(lv>=10&&!G.unlocked.includes("solomon")){G.unlocked.push("solomon");toast("👑 UNLOCKED: Solomon (Legendary)!");}if(G.completedMissions.length>=5&&!G.unlocked.includes("moses")){G.unlocked.push("moses");toast("⚡ UNLOCKED: Moses (Legendary)!");}if(G.completedMissions.length>=5&&lv>=15&&!G.unlocked.includes("jesus")){G.unlocked.push("jesus");toast("✨ DIVINE UNLOCK: Jesus! ★★★★★★ Divine tier!");doFlash("#FFFFFF99",1200);}if(G.unlocked.length>_ulBefore&&SFX)SFX.unlock();}

function cw_drawTile(ctx,t,px,py,ts){
  // Base fill
  var bg={
    0:'#C8B89A',1:'#5C4033',2:'#7B4F2E',3:'#D4AF7A',4:'#8B6914',
    5:'#9B0000',6:'#8B5E3C',7:'#AA8833',8:'#FFD700',9:'#88CCFF',
    10:'#B8A888',11:'#D4C4A4',12:'#FFD700',13:'#9B0000'
  }[t]||'#C8B89A';
  ctx.fillStyle=bg;ctx.fillRect(px,py,ts,ts);

  if(t===1){ // WALL — stone blocks with mortar lines
    var g=ctx.createLinearGradient(px,py,px+ts,py+ts);
    g.addColorStop(0,'#6B4A38');g.addColorStop(1,'#4A3028');
    ctx.fillStyle=g;ctx.fillRect(px,py,ts,ts);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(px,py+ts-3,ts,3);ctx.fillRect(px+ts-3,py,3,ts);
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(px+1,py+1,ts-4,ts-4);
    // Stone block grid
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=0.8;
    if(Math.floor(py/ts)%2===0){ctx.strokeRect(px,py,ts/2,ts/2);ctx.strokeRect(px+ts/2,py+ts/2,ts/2,ts/2);}
    else{ctx.strokeRect(px+ts/4,py,ts/2,ts/2);ctx.strokeRect(px,py+ts/2,ts/2,ts/2);}
  }
  if(t===2){ // PEW — polished wood
    var g=ctx.createLinearGradient(px,py,px,py+ts);
    g.addColorStop(0,'#9B6535');g.addColorStop(0.3,'#7B4F2E');g.addColorStop(1,'#5C3317');
    ctx.fillStyle=g;ctx.fillRect(px,py,ts,ts);
    // Wood grain
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(var i=0;i<ts;i+=4)ctx.fillRect(px+i,py,1,ts);
    // Top rail
    var rg=ctx.createLinearGradient(px,py,px,py+4);
    rg.addColorStop(0,'#CC8855');rg.addColorStop(1,'#8B5520');
    ctx.fillStyle=rg;ctx.fillRect(px,py,ts,5);
    // Bottom rail
    ctx.fillStyle='#4A2810';ctx.fillRect(px,py+ts-4,ts,4);
    // Highlight edge
    ctx.fillStyle='rgba(255,200,150,0.2)';ctx.fillRect(px,py,2,ts);
  }
  if(t===3){ // ALTAR — golden marble
    var g=ctx.createLinearGradient(px,py,px+ts,py+ts);
    g.addColorStop(0,'#E8C87A');g.addColorStop(0.5,'#D4AF7A');g.addColorStop(1,'#B8935A');
    ctx.fillStyle=g;ctx.fillRect(px,py,ts,ts);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(px+2,py+2,ts-4,ts*0.4);
    ctx.fillStyle='rgba(255,215,0,0.2)';ctx.fillRect(px,py,ts,ts);
    ctx.strokeStyle='rgba(200,160,80,0.5)';ctx.lineWidth=0.5;
    for(var i=0;i<ts;i+=6)ctx.strokeRect(px+i%ts,py,1,ts);
  }
  if(t===4){ // STAGE — hardwood floor
    var g=ctx.createLinearGradient(px,py,px,py+ts);
    g.addColorStop(0,'#A07830');g.addColorStop(1,'#7A5810');
    ctx.fillStyle=g;ctx.fillRect(px,py,ts,ts);
    ctx.fillStyle='rgba(0,0,0,0.1)';
    for(var i=0;i<ts;i+=5)ctx.fillRect(px+i,py,1,ts);
    ctx.fillStyle='rgba(255,220,120,0.08)';ctx.fillRect(px,py,ts,ts/3);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(px,py+ts-2,ts,2);
  }
  if(t===5||t===13){ // CARPET / AISLE — rich red with pattern
    var g=ctx.createLinearGradient(px,py,px+ts,py+ts);
    g.addColorStop(0,'#AA1111');g.addColorStop(1,'#7A0000');
    ctx.fillStyle=g;ctx.fillRect(px,py,ts,ts);
    // Diamond pattern
    ctx.strokeStyle='rgba(180,60,60,0.4)';ctx.lineWidth=0.5;
    for(var i=0;i<ts;i+=6){ctx.beginPath();ctx.moveTo(px+i,py);ctx.lineTo(px,py+i);ctx.stroke();}
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(px,py,ts,2);
  }
  if(t===6){ // DOOR — wooden with frame
    var g=ctx.createLinearGradient(px,py,px+ts,py);
    g.addColorStop(0,'#3A1A08');g.addColorStop(0.1,'#8B5E3C');g.addColorStop(0.9,'#7A4A28');g.addColorStop(1,'#3A1A08');
    ctx.fillStyle=g;ctx.fillRect(px,py,ts,ts);
    // Door panels
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
    ctx.strokeRect(px+3,py+3,ts-6,ts*0.45);
    ctx.strokeRect(px+3,py+ts*0.5,ts-6,ts*0.45);
    // Handle
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(px+ts*0.65,py+ts*0.5,2,0,Math.PI*2);ctx.fill();
    // Glow hint at top
    ctx.fillStyle='rgba(255,220,150,0.15)';ctx.fillRect(px,py,ts,4);
  }
  if(t===7){ // TABLE — fellowship table
    ctx.fillStyle='#5C3A0A';ctx.fillRect(px,py,ts,ts);
    var tg=ctx.createLinearGradient(px,py+3,px,py+ts-3);
    tg.addColorStop(0,'#CC9933');tg.addColorStop(0.5,'#AA7722');tg.addColorStop(1,'#885500');
    ctx.fillStyle=tg;ctx.fillRect(px+2,py+3,ts-4,ts-6);
    // Items on table (coffee cups etc)
    ctx.fillStyle='rgba(255,255,255,0.1)';
    for(var i=0;i<3;i++){ctx.beginPath();ctx.arc(px+4+i*(ts/3),py+ts/2,2,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(px,py+ts-3,ts,3);
  }
  if(t===8){ // CROSS — glowing gold
    ctx.fillStyle='#5C3A10';ctx.fillRect(px,py,ts,ts);
    ctx.fillStyle='rgba(255,215,0,0.15)';ctx.fillRect(px,py,ts,ts);
    // Cross beam
    var cg=ctx.createLinearGradient(px,py,px+ts,py+ts);
    cg.addColorStop(0,'#FFE566');cg.addColorStop(0.5,'#FFD700');cg.addColorStop(1,'#CC9900');
    ctx.fillStyle=cg;
    ctx.fillRect(px+ts/2-3,py+2,6,ts-4);
    ctx.fillRect(px+4,py+ts*0.28,ts-8,6);
    // Glow
    ctx.shadowColor='#FFD700';ctx.shadowBlur=8;
    ctx.fillStyle='rgba(255,215,0,0.6)';ctx.fillRect(px+ts/2-2,py+3,4,ts-6);
    ctx.shadowBlur=0;
  }
  if(t===9){ // WINDOW — stained glass
    ctx.fillStyle='#2A1A0A';ctx.fillRect(px,py,ts,ts);
    // Pane colors
    var panes=[['#4488FF','#6699FF'],['#FF8833','#FFAA55'],['#44BB44','#66DD66']];
    var p=panes[Math.floor((px/ts)%3)];
    var wg=ctx.createLinearGradient(px+2,py+2,px+ts-2,py+ts-2);
    wg.addColorStop(0,p[0]);wg.addColorStop(1,p[1]);
    ctx.fillStyle=wg;ctx.fillRect(px+2,py+2,ts-4,ts-4);
    // Lead lines
    ctx.strokeStyle='rgba(30,20,10,0.8)';ctx.lineWidth=1.5;
    ctx.strokeRect(px+2,py+2,ts-4,ts-4);
    ctx.beginPath();ctx.moveTo(px+ts/2,py+2);ctx.lineTo(px+ts/2,py+ts-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px+2,py+ts/2);ctx.lineTo(px+ts-2,py+ts/2);ctx.stroke();
    // Glow
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(px+3,py+3,ts-6,ts*0.35);
  }
  if(t===10){ // STEPS — marble
    for(var s=0;s<3;s++){
      var sg=ctx.createLinearGradient(px,py+s*ts/3,px+ts,py+(s+1)*ts/3);
      sg.addColorStop(0,'#D0C0A0');sg.addColorStop(1,'#A89870');
      ctx.fillStyle=sg;ctx.fillRect(px,py+Math.floor(s*ts/3),ts,Math.ceil(ts/3));
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(px,py+Math.floor(s*ts/3),ts,2);
      ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(px,py+Math.floor(s*ts/3)+Math.ceil(ts/3)-2,ts,2);
    }
  }
  if(t===11){ // FOYER — checkered tile
    var even=(Math.floor(px/ts)+Math.floor(py/ts))%2===0;
    var fg=ctx.createLinearGradient(px,py,px+ts,py+ts);
    if(even){fg.addColorStop(0,'#E8DCC8');fg.addColorStop(1,'#C8B898');}
    else{fg.addColorStop(0,'#D0C0A4');fg.addColorStop(1,'#B0A080');}
    ctx.fillStyle=fg;ctx.fillRect(px,py,ts,ts);
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(px,py+ts-1,ts,1);ctx.fillRect(px+ts-1,py,1,ts);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(px+1,py+1,ts*0.4,ts*0.4);
  }
  if(t===12){ // OFFERING plate
    ctx.fillStyle='#5C3A10';ctx.fillRect(px,py,ts,ts);
    // Plate
    ctx.fillStyle='#AA8833';
    ctx.beginPath();ctx.ellipse(px+ts/2,py+ts/2,ts/2.5,ts/3.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.ellipse(px+ts/2,py+ts/2,ts/3.5,ts/5,0,0,Math.PI*2);ctx.fill();
    // Glow
    ctx.fillStyle='rgba(255,215,0,0.2)';
    ctx.beginPath();ctx.ellipse(px+ts/2,py+ts/2,ts/2.2,ts/3,0,0,Math.PI*2);ctx.fill();
  }
}

// ── 32-BIT CHARACTER RENDERER ─────────────────────────
function cw_drawChar(ctx,wx,wy,ts,skinIdx,outIdx,dir,animF,tag,isPlayer){
  var skin=['#FDDBB4','#E8B88A','#C68642','#8D5524','#4A2912'][skinIdx]||'#FDDBB4';
  var skinD=['#DDAA88','#C89060','#A06020','#6D3A0A','#2A0D04'][skinIdx]||'#DDAA88';
  var outC=['#1E3A8A','#7f1d1d','#14532d','#4c1d95','#78350f','#134e4a'][outIdx]||'#1E3A8A';
  var outL=['#2E4A9A','#8f2d2d','#24693d','#5c2da5','#88450f','#245e6a'][outIdx]||'#2E4A9A';
  var cx=wx+ts/2,cy=wy+ts/2;
  var walk=[0,3,-3,0][animF%4];
  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(cx,cy+ts*.42,ts*.22,ts*.07,0,0,Math.PI*2);ctx.fill();
  // Legs with walk animation
  var lg=ctx.createLinearGradient(cx-ts*.2,cy+ts*.1,cx+ts*.2,cy+ts*.45);
  lg.addColorStop(0,outL);lg.addColorStop(1,outC);
  ctx.fillStyle=lg;
  ctx.fillRect(cx-ts*.18,cy+ts*.12,ts*.14,ts*.26+walk);
  ctx.fillRect(cx+ts*.04,cy+ts*.12,ts*.14,ts*.26-walk);
  // Shoe detail
  ctx.fillStyle=skinD;
  ctx.fillRect(cx-ts*.2,cy+ts*.35+walk,ts*.17,ts*.06);
  ctx.fillRect(cx+ts*.03,cy+ts*.35-walk,ts*.17,ts*.06);
  // Body with gradient
  var bg2=ctx.createLinearGradient(cx-ts*.2,cy-ts*.08,cx+ts*.2,cy+ts*.18);
  bg2.addColorStop(0,outL);bg2.addColorStop(0.4,outC);bg2.addColorStop(1,outC);
  ctx.fillStyle=bg2;
  ctx.fillRect(cx-ts*.2,cy-ts*.08,ts*.4,ts*.26);
  // Chest highlight
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(cx-ts*.14,cy-ts*.06,ts*.28,ts*.1);
  // Arms
  ctx.fillStyle=skin;
  if(dir==='left'){ctx.fillRect(cx-ts*.3,cy-ts*.02,ts*.12,ts*.16);}
  else if(dir==='right'){ctx.fillRect(cx+ts*.18,cy-ts*.02,ts*.12,ts*.16);}
  else{ctx.fillRect(cx-ts*.28,cy-ts*.02,ts*.1,ts*.14);ctx.fillRect(cx+ts*.18,cy-ts*.02,ts*.1,ts*.14);}
  // Head with gradient
  var hg=ctx.createRadialGradient(cx-ts*.04,cy-ts*.22,0,cx,cy-ts*.14,ts*.2);
  hg.addColorStop(0,skin);hg.addColorStop(1,skinD);
  ctx.fillStyle=hg;
  ctx.beginPath();ctx.ellipse(cx,cy-ts*.14,ts*.15,ts*.17,0,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle='#2A1A08';
  ctx.beginPath();ctx.ellipse(cx,cy-ts*.26,ts*.15,ts*.08,0,0,Math.PI);ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';
  if(dir==='down'){
    ctx.fillRect(cx-ts*.07,cy-ts*.18,ts*.05,ts*.05);ctx.fillRect(cx+ts*.02,cy-ts*.18,ts*.05,ts*.05);
    ctx.fillStyle='#1a0a00';ctx.fillRect(cx-ts*.06,cy-ts*.17,ts*.03,ts*.03);ctx.fillRect(cx+ts*.03,cy-ts*.17,ts*.03,ts*.03);
  } else if(dir==='up'){
    ctx.fillStyle='#2A1A08';ctx.fillRect(cx-ts*.06,cy-ts*.22,ts*.12,ts*.04);
  } else {
    var ex=dir==='right'?cx+ts*.02:cx-ts*.08;
    ctx.fillRect(ex,cy-ts*.18,ts*.05,ts*.05);ctx.fillStyle='#1a0a00';ctx.fillRect(ex+ts*.01,cy-ts*.17,ts*.03,ts*.03);
  }
  // Mouth
  if(dir==='down'){ctx.fillStyle=skinD;ctx.fillRect(cx-ts*.04,cy-ts*.1,ts*.08,ts*.02);}
  // Player glow ring
  if(isPlayer){
    ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=10;
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(cx,cy-ts*.14,ts*.18,ts*.2,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  // Name tag
  if(tag){
    ctx.save();ctx.font='bold 9px monospace';
    var tw=ctx.measureText(tag).width+8;
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.beginPath();ctx.roundRect(cx-tw/2,cy-ts*.52,tw,12,4);ctx.fill();
    ctx.fillStyle=isPlayer?'#FFD700':'#fff';ctx.textAlign='center';
    ctx.fillText(tag,cx,cy-ts*.43);ctx.restore();
  }
}

// ── NPC RENDERER ──────────────────────────────────────
function cw_drawNPC(ctx,npc,ts,camX,camY,vw,vh){
  var wx=npc.x*ts-camX,wy=npc.y*ts-camY;
  if(wx<-ts||wy<-ts||wx>vw+ts||wy>vh+ts) return;
  var cx=wx+ts/2,cy=wy+ts/2;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(cx,cy+ts*.42,ts*.2,ts*.07,0,0,Math.PI*2);ctx.fill();
  // Body
  var ng=ctx.createLinearGradient(cx-ts*.18,cy-ts*.08,cx+ts*.18,cy+ts*.22);
  ng.addColorStop(0,npc.color||'#888');ng.addColorStop(1,npc.color?npc.color+'88':'#444');
  ctx.fillStyle=ng;ctx.fillRect(cx-ts*.18,cy-ts*.08,ts*.36,ts*.3);
  // Legs
  ctx.fillStyle=npc.color?npc.color+'CC':'#666';
  ctx.fillRect(cx-ts*.16,cy+ts*.18,ts*.12,ts*.2);ctx.fillRect(cx+ts*.04,cy+ts*.18,ts*.12,ts*.2);
  // Head
  var hg=ctx.createRadialGradient(cx-ts*.04,cy-ts*.2,0,cx,cy-ts*.14,ts*.18);
  hg.addColorStop(0,'#FDDBB4');hg.addColorStop(1,'#C68642');
  ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(cx,cy-ts*.14,ts*.14,ts*.16,0,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle='#2A1A08';ctx.beginPath();ctx.ellipse(cx,cy-ts*.26,ts*.14,ts*.07,0,0,Math.PI);ctx.fill();
  // Emoji above head
  ctx.save();ctx.font=(ts*.5)+'px serif';ctx.textAlign='center';
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=3;
  ctx.fillText(npc.emoji||'👤',cx,cy-ts*.6);ctx.restore();
  // Name tag
  ctx.save();ctx.font='bold 8px monospace';
  var tw=ctx.measureText(npc.name).width+8;
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.beginPath();ctx.roundRect(cx-tw/2,cy-ts*.88,tw,11,3);ctx.fill();
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(npc.name,cx,cy-ts*.8);ctx.restore();
  // Talk indicator
  if(CWS.nearNpc===npc.id){
    ctx.save();ctx.font='12px serif';ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.roundRect(cx+ts*.2,cy-ts*.72,18,16,4);ctx.fill();
    ctx.fillText('💬',cx+ts*.29,cy-ts*.6);ctx.restore();
  }
}

// ── NPC WANDER AI ──────────────────────────────────────
function cw_updateNPCs(){
  var now=Date.now();
  for(var i=0;i<CW_NPCS.length;i++){
    var n=CW_NPCS[i];
    if(!n.wx1) continue; // static NPC
    if(!CWS.npcTimers[n.id]) CWS.npcTimers[n.id]={next:now+cw_rand(1000,3000),dx:0,dy:0,steps:0};
    var t=CWS.npcTimers[n.id];
    if(now>=t.next){
      if(t.steps>0){
        // Continue current direction
        var nx=n.x+t.dx,ny=n.y+t.dy;
        if(cw_walkable(nx,ny)&&nx>=n.wx1&&nx<=n.wx2&&ny>=n.wy1&&ny<=n.wy2){
          // Don't walk into player
          if(Math.abs(nx-CWS.px)>1||Math.abs(ny-CWS.py)>1){n.x=nx;n.y=ny;}
        }
        t.steps--;
        t.next=now+(n.speed||80);
      } else {
        // Pick new direction
        var dirs=[[0,-1],[0,1],[-1,0],[1,0],[0,0],[0,0]]; // bias toward staying
        var d=dirs[Math.floor(Math.random()*dirs.length)];
        t.dx=d[0];t.dy=d[1];
        t.steps=cw_rand(2,6);
        t.next=now+cw_rand(500,2000);
      }
    }
  }
}

function cw_rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

// ── HUD ────────────────────────────────────────────────
function cw_drawHUD(ctx,vw,vh){
  // XP counter top-right
  ctx.save();ctx.font='bold 10px monospace';ctx.textAlign='right';
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(vw-80,4,76,18);
  ctx.fillStyle='#FFD700';ctx.fillText('✨ '+G.pd.xp+' XP',vw-6,17);ctx.restore();
  if(CWS.dialog||CWS.activity) return;
  var hint=null,hcol='#FFD700',hbg='rgba(0,0,0,0.88)';
  if(CWS.nearNpc){
    var n=CW_NPCS.find(function(x){return x.id===CWS.nearNpc;});
    if(n){hint='💬 Talk to '+n.name+' — tap A';hcol='#7EB8F7';}
  } else if(CWS.nearZone){
    var z=CW_ZONES.find(function(x){return x.id===CWS.nearZone;});
    if(z){hint=z.icon+' '+z.label+' — tap A';hcol='#4ade80';}
  }
  if(hint){
    ctx.save();ctx.font='bold 12px Georgia';
    var tw=ctx.measureText(hint).width+24,bw=Math.min(tw,vw-20),bh=34;
    var bx=(vw-bw)/2,by=vh-72;
    ctx.fillStyle=hbg;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
    ctx.strokeStyle=hcol+'66';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=hcol;ctx.textAlign='center';ctx.fillText(hint,vw/2,by+22);
    ctx.restore();
  }
}

// ── DIALOG BOX (canvas) ────────────────────────────────
function cw_drawDialog(ctx,vw,vh){
  var d=CWS.dialog;if(!d) return;
  var bw=vw-24,bh=185,bx=12,by=vh-bh-12;
  // Backdrop blur effect
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,vw,vh);
  // Box gradient
  var dg=ctx.createLinearGradient(bx,by,bx,by+bh);
  dg.addColorStop(0,'#111008');dg.addColorStop(1,'#0a0806');
  ctx.fillStyle=dg;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,14);ctx.fill();
  ctx.strokeStyle='#C4A35A88';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,14);ctx.stroke();
  // Gold accent top
  var ag=ctx.createLinearGradient(bx,by,bx+bw,by);
  ag.addColorStop(0,'rgba(196,163,90,0)');ag.addColorStop(0.2,'#C4A35A');ag.addColorStop(0.8,'#C4A35A');ag.addColorStop(1,'rgba(196,163,90,0)');
  ctx.fillStyle=ag;ctx.fillRect(bx+14,by,bw-28,2);
  // Speaker
  ctx.fillStyle='#C4A35A';ctx.font='bold 13px Georgia';ctx.textAlign='left';
  ctx.fillText((d.emoji||'')+' '+(d.speaker||''),bx+16,by+24);
  // Text wrap
  ctx.fillStyle='#E8E0D0';ctx.font='13px Georgia';
  var words=d.text.split(' '),line='',ty=by+46;
  for(var i=0;i<words.length;i++){
    var test=line+words[i]+' ';
    if(ctx.measureText(test).width>bw-36&&line){ctx.fillText(line,bx+16,ty);ty+=19;line=words[i]+' ';}
    else line=test;
  }
  ctx.fillText(line,bx+16,ty);
  if(d.xp){ctx.fillStyle='#FFD700';ctx.font='bold 11px monospace';ctx.fillText('+'+d.xp+' XP',bx+16,by+bh-32);}
  ctx.fillStyle='#C4A35A66';ctx.font='10px monospace';ctx.textAlign='right';
  ctx.fillText('Tap A →',bx+bw-12,by+bh-14);
}

// ── ACTIVITY OVERLAY — rendered as HTML for mobile ────
// All activities use a full-screen HTML div injected into the DOM
// This ensures native touch events work properly on all mobile devices

function cw_showActivityOverlay(html){
  var el=document.getElementById('cwActivity');
  if(el){el.innerHTML=html;el.style.display='flex';}
}
function cw_hideActivityOverlay(){
  var el=document.getElementById('cwActivity');
  if(el){el.style.display='none';el.innerHTML='';}
}

function cw_renderActivity(){
  var a=CWS.activity;
  if(!a){cw_hideActivityOverlay();return;}
  var html='';
  if(a.type==='pew')      html=cw_htmlPew(a);
  if(a.type==='prayer')   html=cw_htmlPrayer(a);
  if(a.type==='worship')  html=cw_htmlWorship(a);

// ── GAME LOOP ──────────────────────────────────────────
function cw_loop(){
  var s=CWS,c=s.canvas,ctx=s.ctx;
  if(!c||!ctx||!s.active){s.rafId=null;return;}
  var vw=c.width,vh=c.height,ts=s.TILE;

  // NPC AI wander
  cw_updateNPCs();

  // Player movement
  if(!s.dialog&&!s.activity){
    s.moveTimer=(s.moveTimer||0)+1;
    if(s.moveTimer>=5){
      s.moveTimer=0;
      var dx=0,dy=0;
      if(s.keys['ArrowUp']  ||s.keys['w']||s.keys['dpad_up'])   {dy=-1;s.pDir='up';}
      if(s.keys['ArrowDown']||s.keys['s']||s.keys['dpad_down']) {dy= 1;s.pDir='down';}
      if(dy===0){
        if(s.keys['ArrowLeft'] ||s.keys['a']||s.keys['dpad_left']) {dx=-1;s.pDir='left';}
        if(s.keys['ArrowRight']||s.keys['d']||s.keys['dpad_right']){dx= 1;s.pDir='right';}
      }
      if(dx||dy){
        var nx=s.px+dx,ny=s.py+dy;
        if(cw_walkable(nx,ny)){s.px=nx;s.py=ny;s.pAnim=(s.pAnim+1)%4;}
      }
    }
  }

  // Camera
  var tcx=s.px*ts+ts/2-vw/2,tcy=s.py*ts+ts/2-vh/2;
  s.camX+=(tcx-s.camX)*.12;s.camY+=(tcy-s.camY)*.12;
  s.camX=Math.max(0,Math.min(s.camX,CW_W*ts-vw));
  s.camY=Math.max(0,Math.min(s.camY,CW_H*ts-vh));

  // Zone / NPC detection
  s.nearZone=null;
  for(var i=0;i<CW_ZONES.length;i++){var z=CW_ZONES[i];if(s.px>=z.x&&s.px<z.x+z.w&&s.py>=z.y&&s.py<z.y+z.h){s.nearZone=z.id;break;}}
  s.nearNpc=null;
  for(var j=0;j<CW_NPCS.length;j++){var n=CW_NPCS[j];if(Math.abs(s.px-n.x)<=1&&Math.abs(s.py-n.y)<=1){s.nearNpc=n.id;break;}}

  // Render tiles
  ctx.clearRect(0,0,vw,vh);
  var sx=Math.max(0,Math.floor(s.camX/ts)),sy=Math.max(0,Math.floor(s.camY/ts));
  var ex=Math.min(CW_W,sx+Math.ceil(vw/ts)+2),ey=Math.min(CW_H,sy+Math.ceil(vh/ts)+2);
  for(var ty=sy;ty<ey;ty++)for(var tx2=sx;tx2<ex;tx2++){
    var tt=(CW_MAP[ty]||[])[tx2]||0;
    cw_drawTile(ctx,tt,tx2*ts-Math.floor(s.camX),ty*ts-Math.floor(s.camY),ts);
  }
  // Zone highlights
  for(var zi=0;zi<CW_ZONES.length;zi++){
    var z=CW_ZONES[zi];
    var zx=z.x*ts-Math.floor(s.camX),zy=z.y*ts-Math.floor(s.camY);
    var pulse=0.08+0.05*Math.sin(Date.now()/400);
    ctx.fillStyle='rgba(100,200,255,'+pulse+')';
    ctx.fillRect(zx,zy,z.w*ts,z.h*ts);
    if(s.nearZone===z.id){
      ctx.strokeStyle='rgba(100,220,255,0.5)';ctx.lineWidth=1.5;
      ctx.strokeRect(zx,zy,z.w*ts,z.h*ts);
    }
  }
  // NPCs
  for(var ni=0;ni<CW_NPCS.length;ni++) cw_drawNPC(ctx,CW_NPCS[ni],ts,Math.floor(s.camX),Math.floor(s.camY),vw,vh);
  // Player
  cw_drawChar(ctx,s.px*ts-Math.floor(s.camX),s.py*ts-Math.floor(s.camY),ts,G.cos.sk,G.cos.ot,s.pDir,s.pAnim,'@'+(G.username||'you'),true);
  cwm_drawPeers(ctx,ts,Math.floor(s.camX),Math.floor(s.camY),vw,vh);
  cwm_syncPos();

  // HUD and dialog
  cw_drawHUD(ctx,vw,vh);
  cw_drawDialog(ctx,vw,vh);
  // Update peer count badge
  var _pcEl=document.getElementById('cwPeerCount');
  if(_pcEl){var _pc=cwm_peerCount();_pcEl.textContent=_pc>0?' · '+_pc+' online':'';}
  var _cpEl=document.getElementById('cwChatPeers');
  if(_cpEl&&MP.isConnected()){var _pc2=cwm_peerCount();_cpEl.textContent=_pc2>0?_pc2+' congregation member'+(  _pc2>1?'s':'')+' nearby':'Just you — be the first in church today';}
  else if(_cpEl){_cpEl.textContent=MP.isConnected()?'Connected':'Offline mode';}

  // Update HTML activity overlay every 500ms (for timers) or on state change
  if(!s._lastActivityRender||(s.activity&&Date.now()-s._lastActivityRender>500)){
    s._lastActivityRender=Date.now();
    cw_renderActivity();
  }

  s.rafId=requestAnimationFrame(cw_loop);
}

// ── INTERACT ───────────────────────────────────────────
function cw_interact(){SFX&&SFX.resume&&SFX.resume();SFX&&SFX.talk&&SFX.talk();
  var s=CWS;
  if(s.dialog){
    if(s.dialog.xp){G.pd.xp=(G.pd.xp||0)+s.dialog.xp;persistPlayer();}
    s.dialog=null;return;
  }
  if(s.activity){
    var a=s.activity;
    if(a.type==='worship'){
      if(a.phase==='intro'){a.phase='play';cw_renderActivity();return;}
      if(a.phase==='result'){cw_completeActivity();return;}
      return;
    }
    if(a.type==='versequiz'){
      if(a.answered){s.done['vq_'+a.vq.ref]=true;cw_completeActivity();}
      return;
    }
    var elapsed=Date.now()-a.t0;
    if(elapsed>=a.dur||a.skip){cw_completeActivity();}
    else{a.skip=true;cw_renderActivity();}
    return;
  }
  if(s.nearNpc){
    var npc=CW_NPCS.find(function(x){return x.id===s.nearNpc;});
    if(npc&&npc.talk){
      var idx=(s.talkIdx[npc.id]||0)%npc.talk.length;
      var t=npc.talk[idx];s.talkIdx[npc.id]=(idx+1);
      s.dialog={speaker:npc.name,emoji:npc.emoji,text:t.text,xp:t.xp||0};
    }
    return;
  }
  if(s.nearZone){
    var zone=CW_ZONES.find(function(x){return x.id===s.nearZone;});
    if(!zone) return;
    if(zone.type==='exit'){if(s.onExit)s.onExit();return;}
    if(s.done[zone.id]&&zone.type!=='worship'){
      s.dialog={speaker:"",emoji:"💭",text:"You've already done this today. Come back next Sunday!",xp:0};return;
    }
    if(zone.type==='pew'){
      s.activity={type:'pew',verse:CW_VERSES[Math.floor(Math.random()*CW_VERSES.length)],t0:Date.now(),dur:10000,xp:25,skip:false,zoneId:zone.id};
    } else if(zone.type==='prayer'){
      s.activity={type:'prayer',prompt:CW_PRAYERS[Math.floor(Math.random()*CW_PRAYERS.length)],t0:Date.now(),dur:15000,xp:40,skip:false,zoneId:zone.id};
    } else if(zone.type==='worship'){
      var pat=CW_BEATS[Math.floor(Math.random()*CW_BEATS.length)];
      s.activity={type:'worship',phase:'intro',pattern:pat,idx:0,score:0,combo:0,xp:50,zoneId:zone.id};
    } else if(zone.type==='offering'){
      s.activity={type:'offering',t0:Date.now(),dur:0,xp:30,skip:true,zoneId:zone.id};
    } else if(zone.type==='versequiz'){
      var pool=CW_VERSE_QUIZ.filter(function(v){return!s.done['vq_'+v.ref];});
      if(!pool.length){pool=CW_VERSE_QUIZ;}
      var vq=pool[Math.floor(Math.random()*pool.length)];
      var ch=vq.choices.slice().sort(function(){return Math.random()-.5;});
      s.activity={type:'versequiz',vq:vq,choices:ch,selected:null,answered:false,correct:false,xp:vq.xp,zoneId:zone.id};
    }
    cw_renderActivity();
  }
}

function cw_handleKey(key){var _wb=CWS.activity&&CWS.activity.score;
  var a=CWS.activity;if(!a||a.type!=='worship'||a.phase!=='play') return;
  var arrow=CW_ARROWS[key];if(!arrow) return;
  if(arrow===a.pattern[a.idx]){a.score++;a.combo++;}else{a.combo=0;}
  if(SFX){if(a.score>(_wb||0))SFX.worshipHit();else SFX.worshipMiss();}
  a.idx++;
  if(a.idx>=a.pattern.length){
    var pct=a.score/a.pattern.length;
    a.xp=Math.floor(50*(0.5+pct*.5));
    if(pct>=.75&&G.pd.powerups.length<6) G.pd.powerups.push({id:'worship',name:'Worship Boost',emoji:'🎵',effect:'heal'});
    a.phase='result';
  }
  cw_renderActivity();
}

function cw_selectAnswer(idx){SFX&&SFX.resume&&SFX.resume();
  var a=CWS.activity;if(!a||a.type!=='versequiz'||a.answered) return;
  a.selected=idx;a.correct=(a.choices[idx]===a.vq.blank);a.answered=true;
  if(a.correct){G.pd.xp=(G.pd.xp||0)+a.xp;}else{G.pd.xp=(G.pd.xp||0)+Math.floor(a.xp/4);}
  persistPlayer();
  if(SFX){if(a.correct)SFX.correct();else SFX.wrong();}
  cw_renderActivity();
}

function cw_completeActivity(){var _ca=CWS.activity;
  if(_ca&&SFX){if(_ca.type==='offering')SFX.offer();if(_ca.type==='prayer')SFX.pray();if(_ca.type==='pew')SFX.correct();}

function cw_init(canvas,onExit){
  CWS.canvas=canvas;CWS.ctx=canvas.getContext('2d');CWS.onExit=onExit;CWS.active=true;
  CWS.px=14;CWS.py=20;CWS.pDir='down';CWS.pAnim=0;
  CWS.dialog=null;CWS.activity=null;CWS.keys={};CWS.moveTimer=0;
  CWS.nearZone=null;CWS.nearNpc=null;CWS.npcTimers={};CWS._lastActivityRender=0;
  CWS._kd=function(e){
    CWS.keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
    if(e.key==='a'||e.key==='A'||e.key==='Enter'||e.key===' ')cw_interact();
    if(e.key==='Escape'){if(onExit)onExit();}
    cw_handleKey(e.key);
  };
  CWS._ku=function(e){delete CWS.keys[e.key];};
  document.addEventListener('keydown',CWS._kd);
  document.addEventListener('keyup',CWS._ku);
  if(CWS.rafId)cancelAnimationFrame(CWS.rafId);
  CWS.rafId=requestAnimationFrame(cw_loop);
}

function cw_destroy(){
  CWS.active=false;
  if(CWS.rafId){cancelAnimationFrame(CWS.rafId);CWS.rafId=null;}
  if(CWS._kd)document.removeEventListener('keydown',CWS._kd);
  if(CWS._ku)document.removeEventListener('keyup',CWS._ku);
  cw_hideActivityOverlay();
  CWS.canvas=null;CWS.ctx=null;
}
