function makeSprite(id,scale,sk=0,hr=1,ot=0,flip=false,glow=null,anim=null){
  const c=document.createElement("canvas");
  c.width=SZ*scale;c.height=SZ*scale;
  c.style.imageRendering="pixelated";c.style.display="block";
  if(glow)c.style.filter=`drop-shadow(0 0 6px ${glow}) drop-shadow(0 0 16px ${glow}88)`;
  if(anim)c.style.animation=anim;
  const fn=DRAW_FN[id];
  if(fn){
    const ctx=c.getContext("2d");
    ctx.save();ctx.scale(scale,scale);
    if(flip){ctx.translate(SZ,0);ctx.scale(-1,1);}
    fn(ctx,sk,hr,ot);
    ctx.restore();
  } else {
    const ctx=c.getContext("2d");ctx.fillStyle="#333";ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle="#fff";ctx.font=`bold ${14*scale}px monospace`;ctx.textAlign="center";
    ctx.fillText((id[0]||"?").toUpperCase(),c.width/2,c.height*.65);
  }
  return c;
}
function attachSprites(){
  document.querySelectorAll("[data-sp]").forEach(el=>{
    const d=el.dataset;el.innerHTML="";
    el.appendChild(makeSprite(d.sp,+d.sc||2,+d.sk||0,+d.hr||1,+d.ot||0,d.fl==="1",d.gw||null,d.an||null));
  });
}

// ─── GPS CHECK-IN ────────────────────────────────────────────
function doCheckIn(){
  if(!navigator.geolocation){toast("GPS not available on this device","err");return;}
  G.checkInState="finding";render();
  navigator.geolocation.getCurrentPosition(pos=>{
    const dist=Math.round(getDistanceMeters(pos.coords.latitude,pos.coords.longitude,CHURCH.lat,CHURCH.lng));
    G.distAway=dist;
    if(dist<=CHURCH.radiusMeters){
      const xp=rand(40,80);G.pd.xp+=xp;G.pd.checkIns=(G.pd.checkIns||0)+1;
      const pu=Math.random()>.5?PUPS[rand(0,PUPS.length-1)]:null;
      if(pu&&G.pd.powerups.length<6)G.pd.powerups.push(pu);
      if(G.pd.checkIns>=5&&!G.unlocked.includes("esther")){G.unlocked.push("esther");toast("🎉 UNLOCKED: Esther (Uncommon)!");}
      else toast(`⛪ Checked in! +${xp} XP${pu?" + "+pu.emoji:""}  `);
      G.checkInState="ok";checkUnlocks();
    } else {G.checkInState="far";}
    render();setTimeout(()=>{G.checkInState="idle";render();},4000);
  },err=>{G.checkInState=err.code===1?"denied":"error";render();setTimeout(()=>{G.checkInState="idle";render();},4000);},{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

        <div style="display:flex;gap:3px;align-items:center">${bs.sword?`<span style="font-size:7px;background:#FFD70022;color:#FFD700;padding:1px 3px;border-radius:3px">⚔️2X</span>`:""} ${bs.defUp?`<span style="font-size:7px;background:#7EB8F722;color:#7EB8F7;padding:1px 3px;border-radius:3px">🛡️</span>`:""}<span style="font-size:9px;color:#555;font-family:monospace">HP ${bs.pHp}/${gmhp()}</span></div>
      </div>
      <div style="height:8px;background:#111;border-radius:4px;overflow:hidden;border:1px solid #222"><div style="width:${Math.max(0,bs.pHp/gmhp()*100)}%;height:100%;background:linear-gradient(90deg,${mc.color},${mc.color}88);transition:width .35s;border-radius:4px"></div></div>
    </div>
    <div style="background:#050505;border:1px solid #111;border-radius:8px;padding:7px 10px;margin:7px 0;min-height:50px;font-family:monospace">${G.log.map((l,i)=>`<div style="font-size:9px;color:${i===0?"#ccc":"#3a3a3a"};margin-bottom:1px">${i===0?"▶ ":"  "}${l}</div>`).join("")}</div>
    ${dead?`<div style="text-align:center;padding:10px 0"><div style="font-size:38px;animation:${won?"victBounce .5s ease infinite":"blink 1s ease infinite"}">${won?"🏆":"💀"}</div><div style="color:${won?"#4ade80":"#ef4444"};font-family:monospace;letter-spacing:3px;font-size:14px;text-shadow:0 0 12px ${won?"#4ade80":"#ef4444"}">${won?(isMission&&G.missionStage<(G.activeMission?.stages.length||1)-1?"STAGE CLEAR!":"VICTORY!"):"DEFEATED..."}</div></div>`:""}
    ${bs.active&&bs.turn==="player"?`<div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:5px"><button onclick="pAtk('basic')" style="background:linear-gradient(135deg,#1a2a1a,#0d1a0d);border:1px solid #4ade80;color:#4ade80;padding:11px 6px;border-radius:10px;font-size:11px;font-weight:bold;font-family:monospace" onmousedown="this.style.transform='scale(.95)'" onmouseup="this.style.transform='scale(1)'">⚔️ ATTACK</button><button onclick="pAtk('ability')" style="background:linear-gradient(135deg,${mc.bg},#111);border:2px solid ${mc.color};color:${mc.color};padding:11px 6px;border-radius:10px;font-size:10px;font-weight:bold;font-family:monospace;box-shadow:0 0 6px ${mc.color}44" onmousedown="this.style.transform='scale(.95)'" onmouseup="this.style.transform='scale(1)'">✨ ABILITY</button></div>${G.pd.powerups.length>0?`<div style="display:flex;gap:5px;margin-bottom:5px;flex-wrap:wrap">${G.pd.powerups.map((pu,i)=>`<button onclick="usePu(${i})" style="background:#111;border:1px solid #C4A35A55;color:#C4A35A;padding:7px 10px;border-radius:7px;font-size:13px" title="${pu.name}">${pu.emoji}</button>`).join("")}</div>`:""}<button onclick="flee()" style="width:100%;background:transparent;border:1px solid #1a1a1a;color:#333;padding:7px;border-radius:7px;font-size:9px;font-family:monospace">🏃 FLEE</button></div>`:""} 
    ${bs.active&&bs.turn==="enemy"?`<div style="text-align:center;padding:11px;color:#FF6B6B;font-family:monospace;font-size:10px;animation:blink .55s ease infinite">▶ ${e.name.toUpperCase()} IS ATTACKING...</div>`:""}
  </div></div>`;}

// ─── BATTLE LOGIC ─────────────────────────────────────────────
function beginMission(id){const m=MISSIONS.find(x=>x.id===id);if(!m)return;G.activeMission=m;G.missionStage=0;startMissionStage(m,0);}
function startMissionStage(m,idx,carryHp=null){const st=m.stages[idx];G.bs={e:{...st.enemy,hp:st.enemy.hp},pHp:carryHp||gmhp(),turn:"player",active:true,burn:false,defUp:false,sword:false,special:st.special||null,survLeft:st.survRounds||0,plagueCounter:0,angelCounter:0,isBoss:st.isBoss||false};G.survRound=0;G.log=[`📖 ${st.title}`,st.story];G.battleType="mission";go("battle");}
function startArena(){const e=ARENA_ENEMIES[rand(0,ARENA_ENEMIES.length-1)];G.battleType="arena";G.activeMission=null;G.bs={e:{...e,hp:e.hp},pHp:gmhp(),turn:"player",active:true,burn:false,defUp:false,sword:false,special:null};G.log=[`⚔️ ${gch().name} faces ${e.name}!`];go("battle");}
function pAtk(type){const bs=G.bs;if(!bs||bs.turn!=="player")return;let b={...bs,e:{...bs.e}};const mc=gch();const crit=Math.random()<.15;let dmg=0,msg="";if(type==="basic"){let d=mc.str*2+rand(3,10)+glv()*2;if(b.sword){d*=2;b.sword=false;msg="⚔️ HOLY SWORD! ";}if(crit)d=Math.floor(d*1.8);dmg=Math.max(1,d-Math.floor(b.e.def*.4));msg+=crit?`💥 CRIT! ${dmg} dmg!`:`${mc.name} hits for ${dmg}!`;}else{doBanner(mc.abilityName,mc.color);doFlash(mc.color+"55",500);let d=rand(...mc.abilityDmg)+glv()*3;if(crit)d=Math.floor(d*1.8);dmg=Math.max(1,d-Math.floor(b.e.def*.2));msg=crit?`💥 CRIT ${mc.abilityName}! ${dmg}!`:`✨ ${mc.abilityName}! ${dmg}!`;}if(b.special==="plague"){b.plagueCounter=(b.plagueCounter||0)+1;if(b.plagueCounter%2===0){dmg+=8;msg+=" ⚠️+8!";doFlash("#88008855",250);}}b.e.hp=Math.max(0,b.e.hp-dmg);animHit("eHit",dmg,crit,b.e.color||"#FF4444");animEl("eSpr","spShake .35s ease");animEl("pSpr",type==="basic"?"lungL .4s ease":"none");addLog(msg);if(b.burn){b.e.hp=Math.max(0,b.e.hp-5);addLog("🔥 Burn ticks 5!");}if(b.special==="survival"){G.survRound++;b.survLeft=b.survLeft-1;addLog(`🌊 Red Sea: ${b.survLeft} rounds...`);if(b.survLeft<=0){addLog("🌊 THE SEA PARTS!");b.e.hp=0;doFlash("#4488CC88",600);}}if(b.e.hp<=0){handleVic(b);return;}b.turn="enemy";G.bs=b;go("battle");setTimeout(eAtk,950);}
function usePu(i){const bs=G.bs;if(!bs)return;const pu=G.pd.powerups[i];if(!pu)return;let b={...bs};G.pd.powerups.splice(i,1);if(pu.effect==="heal"){b.pHp=Math.min(gmhp(),b.pHp+30);addLog("✨ +30 HP!");doFlash("#4ade8044",250);}if(pu.effect==="defense"){b.defUp=true;addLog("🛡️ Armor of God!");}if(pu.effect==="sword"){b.sword=true;addLog("⚔️ Sword ready!");}if(pu.effect==="burn"){b.burn=true;addLog("🔥 Holy Fire!");}G.bs=b;go("battle");}
function eAtk(){const bs=G.bs;if(!bs)return;let nb={...bs,e:{...bs.e}};const crit=Math.random()<.1;let dmg=Math.max(1,Math.floor((nb.e.atk+rand(0,8))*(nb.defUp?.5:1)));if(nb.special==="giant"){nb.plagueCounter=(nb.plagueCounter||0)+1;if(nb.plagueCounter%3===0){dmg*=2;addLog("👹 GOLIATH RAGES! 2x dmg!");doFlash("#FF000055",400);}}if(nb.special==="angel"){nb.angelCounter=(nb.angelCounter||0)+1;if(nb.angelCounter%3===0){addLog("😇 Angel blocks the attack!");doFlash("#FFD70033",300);nb.turn="player";nb.defUp=false;G.bs=nb;go("battle");return;}}if(crit)dmg=Math.floor(dmg*1.6);nb.pHp=Math.max(0,nb.pHp-dmg);addLog(crit?`💥 ${nb.e.name} CRIT! ${dmg}!`:`${nb.e.name} hits for ${dmg}!`);animHit("pHit",dmg,crit,"#FF6B6B");animEl("pSpr","spShake .35s ease");animEl("eSpr","lungR .4s ease");doFlash("#FF000033",220);if(nb.pHp<=0){addLog(`💀 ${gch().name} has fallen...`);G.pd.losses++;if(G.battleType==="pvp"){G.pd.pvpLosses++;G.pvpWon=false;nb.active=false;G.bs=nb;go("battle");setTimeout(()=>go("pvp_result"),2000);}else{nb.active=false;G.bs=nb;go("battle");setTimeout(()=>go("game"),2200);}return;}nb.turn="player";nb.defUp=false;G.bs=nb;go("battle");}
function handleVic(b){const xp=G.battleType==="pvp"?rand(80,150):G.battleType==="mission"?(G.activeMission?.stages[G.missionStage]?.xp||100):rand(60,120);addLog(G.battleType==="mission"?`✅ Stage clear! +${xp} XP`:`🏆 Defeated! +${xp} XP`);G.pd.xp+=xp;G.pd.wins++;if(G.battleType==="pvp"){G.pd.pvpWins++;G.pvpWon=true;}b.active=false;G.bs=b;doFlash("#FFD70066",500);checkUnlocks();if(G.battleType==="pvp"){go("battle");setTimeout(()=>go("pvp_result"),2000);}else if(G.battleType==="mission"){go("battle");setTimeout(()=>{const m=G.activeMission;const ni=G.missionStage+1;if(ni>=m.stages.length){G.completedMissions.push(m.id);G.pd.xp+=m.xpReward;G.pd.powerups.push({...m.reward});if(m.unlockCharId&&!G.unlocked.includes(m.unlockCharId))G.unlocked.push(m.unlockCharId);checkUnlocks();go("mission_complete");}else{G.missionStage=ni;startMissionStage(m,ni,Math.min(b.pHp+20,gmhp()));}},2000);}else{go("battle");setTimeout(()=>go("game"),2000);}}
function flee(){G.pd.losses++;if(G.battleType==="pvp"){G.pd.pvpLosses++;G.pvpWon=false;setTimeout(()=>go("pvp_result"),200);}else setTimeout(()=>go("game"),200);}
function animHit(elId,val,crit,col){const el=document.getElementById(elId);if(!el)return;el.textContent=(crit?"💥":"")+val;el.style.color=crit?"#FFD700":col;el.style.display="block";el.style.animation="hitFloat .9s ease-out forwards";setTimeout(()=>{if(el){el.style.display="none";el.style.animation="";}},900);}
function animEl(elId,anim){const el=document.getElementById(elId);if(!el)return;el.style.animation="none";void el.offsetWidth;el.style.animation=anim;}
function checkUnlocks(){const w=G.pd.wins;const pW=G.pd.pvpWins;const lv=glv();if(w>=1&&!G.unlocked.includes("ruth")){G.unlocked.push("ruth");toast("🎉 UNLOCKED: Ruth (Uncommon)!");}if(w>=10&&!G.unlocked.includes("deborah")){G.unlocked.push("deborah");toast("🎉 UNLOCKED: Deborah (Rare)!");}if(w>=15&&!G.unlocked.includes("joshua")){G.unlocked.push("joshua");toast("🎉 UNLOCKED: Joshua (Rare)!");}if(pW>=5&&!G.unlocked.includes("elijah")){G.unlocked.push("elijah");toast("🔥 UNLOCKED: Elijah (Epic)!");}if(G.completedMissions.length>=3&&!G.unlocked.includes("samson")){G.unlocked.push("samson");toast("💪 UNLOCKED: Samson (Epic)!");}if(G.completedMissions.includes("moses_m")&&!G.unlocked.includes("daniel")){G.unlocked.push("daniel");toast("🦁 UNLOCKED: Daniel (Epic)!");}if(G.completedMissions.includes("david_m")&&!G.unlocked.includes("david")){G.unlocked.push("david");toast("👑 UNLOCKED: David (Rare)!");}if(lv>=10&&!G.unlocked.includes("solomon")){G.unlocked.push("solomon");toast("👑 UNLOCKED: Solomon (Legendary)!");}if(G.completedMissions.length>=5&&!G.unlocked.includes("moses")){G.unlocked.push("moses");toast("⚡ UNLOCKED: Moses (Legendary)!");}}

// Boot
G.wardTab="skin";G.tab="home";render();
</script>
