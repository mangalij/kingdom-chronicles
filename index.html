// ── Init canvas & controls ────────────────────────────
function brawl_initCanvas(){
  var canvas=document.getElementById('brawlCanvas');
  if(!canvas) return;
  BRAWL.canvas=canvas;
  function resize(){var r=canvas.getBoundingClientRect();canvas.width=Math.max(Math.floor(r.width),1);canvas.height=Math.max(Math.floor(r.height),1);}
  resize();
  BRAWL._resizeHandler=resize;
  window.addEventListener('resize',resize);
  document.addEventListener('fullscreenchange',resize);
  document.addEventListener('webkitfullscreenchange',resize);
  BRAWL.ctx=canvas.getContext('2d');
  // Joysticks use Pointer Events API for reliable multi-touch
  brawl_setupPointerJoy('brawlMoveJoy','brawlMoveKnob','move');
  brawl_setupPointerJoy('brawlAimJoy','brawlAimKnob','aim');
  // Keyboard
  BRAWL._kd=function(e){
    BRAWL._keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
    if(e.key===' ')brawl_useAbility();
  };
  BRAWL._ku=function(e){delete BRAWL._keys[e.key];};
  document.addEventListener('keydown',BRAWL._kd);
  document.addEventListener('keyup',BRAWL._ku);
  // Mouse click to shoot (desktop)
  BRAWL._mouseHandler=function(e){
    if(!BRAWL.active||!BRAWL.canvas) return;
    var rect=BRAWL.canvas.getBoundingClientRect();
    var mx=e.clientX-rect.left,my=e.clientY-rect.top;
    // Use same scale as brawl_render camera
    var cw=BRAWL.canvas.width,ch2=BRAWL.canvas.height;
    var minDim=Math.min(cw,ch2);
    var scale=minDim/280;
    if(scale<0.8)scale=0.8;if(scale>2.2)scale=2.2;
    // Convert screen pixels to canvas pixels (rect may differ from canvas size)
    var sx=mx*(cw/rect.width),sy=my*(ch2/rect.height);
    var ax=(sx/scale)+BRAWL.camX,ay=(sy/scale)+BRAWL.camY;
    var dx=ax-BRAWL.px,dy=ay-BRAWL.py;
    var d=Math.sqrt(dx*dx+dy*dy)||1;
    BRAWL.aimJoyX=dx/d;BRAWL.aimJoyY=dy/d;
    brawl_shoot();
  };
  canvas.addEventListener('click',BRAWL._mouseHandler);
  // Start loop
  BRAWL._lastTime=performance.now();
  if(BRAWL.rafId)cancelAnimationFrame(BRAWL.rafId);
  BRAWL.rafId=requestAnimationFrame(brawl_loop);
}

function brawl_setupPointerJoy(areaId,knobId,type){
  var area=document.getElementById(areaId);
  var knob=document.getElementById(knobId);
  if(!area||!knob) return;
  var maxR=40,activePid=null,cx=0,cy=0;

  function update(px,py){
    var dx=px-cx,dy=py-cy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
    knob.style.transform='translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';
    var nx=dist>0?dx/maxR:0,ny=dist>0?dy/maxR:0;
    if(type==='move'){
      BRAWL.moveJoyX=Math.abs(nx)>0.1?nx:0;
      BRAWL.moveJoyY=Math.abs(ny)>0.1?ny:0;
    } else {
      BRAWL.aimJoyX=Math.abs(nx)>0.1?nx:0;
      BRAWL.aimJoyY=Math.abs(ny)>0.1?ny:0;
      BRAWL.aimActive=(Math.abs(nx)>0.1||Math.abs(ny)>0.1);
    }
  }
  function reset(){
    knob.style.transform='translate(-50%,-50%)';
    activePid=null;
    if(type==='move'){BRAWL.moveJoyX=0;BRAWL.moveJoyY=0;}
    else{
      if(BRAWL.aimActive) brawl_shoot();
      BRAWL.aimJoyX=0;BRAWL.aimJoyY=0;BRAWL.aimActive=false;
    }
  }

  function onDown(e){
    e.preventDefault();e.stopPropagation();
    if(activePid!==null) return;
    activePid=e.pointerId;
    area.setPointerCapture(e.pointerId);
    // Floating origin: joystick center = where you first touch
    cx=e.clientX;cy=e.clientY;
    // Don't update yet — no drag means no aim/move
    knob.style.transform='translate(-50%,-50%)';
    if(type==='move'){BRAWL.moveJoyX=0;BRAWL.moveJoyY=0;}
    else{BRAWL.aimJoyX=0;BRAWL.aimJoyY=0;BRAWL.aimActive=false;}
  }
  function onMove(e){
    if(e.pointerId!==activePid) return;
    e.preventDefault();
    update(e.clientX,e.clientY);
  }
  function onUp(e){
    if(e.pointerId!==activePid) return;
    reset();
  }

  area.addEventListener('pointerdown',onDown);
  area.addEventListener('pointermove',onMove);
  area.addEventListener('pointerup',onUp);
  area.addEventListener('pointercancel',onUp);
  area.addEventListener('lostpointercapture',function(e){if(e.pointerId===activePid)reset();});
  area.addEventListener('contextmenu',function(e){e.preventDefault();});

  BRAWL._joyCleanup.push(function(){
    area.removeEventListener('pointerdown',onDown);
    area.removeEventListener('pointermove',onMove);
    area.removeEventListener('pointerup',onUp);
    area.removeEventListener('pointercancel',onUp);
  });
}

// ── Spawn wave enemies ────────────────────────────────
function brawl_spawnWave(){
  var B=BRAWL;
  if(!B.campaign||B.wave>=B.campaign.waves.length){B.state='victory';return;}
  var army=BRAWL_ARMIES[B.campaign.id];
  var waveData=B.campaign.waves[B.wave];
  B.enemies=[];
  waveData.types.forEach(function(tg){
    var def=army[tg.role];
    if(!def) return;
    for(var i=0;i<tg.count;i++){
      var side=Math.floor(Math.random()*3);
      var ex,ey;
      if(side===0){ex=30+Math.random()*(B.arenaW-60);ey=-20-Math.random()*60;}
      else if(side===1){ex=-20-Math.random()*40;ey=30+Math.random()*B.arenaH*0.6;}
      else{ex=B.arenaW+20+Math.random()*40;ey=30+Math.random()*B.arenaH*0.6;}
      var wScale=1+B.wave*0.15;
      if(B.coopMode) wScale*=1.4; // Tougher enemies in co-op
      var isRanged=!!def.shootCd;
      B.enemies.push({
        x:ex,y:ey,hp:Math.round(def.hp*wScale),maxHp:Math.round(def.hp*wScale),
        atk:Math.round(def.atk*wScale),speed:def.speed*(0.9+Math.random()*0.2),radius:def.radius,
        color:def.color,armor:def.armor||def.color,helmet:def.helmet||null,
        weapon:def.weapon||'sword',type:tg.role,name:def.name,
        shootCd:def.shootCd||0,shootRange:def.shootRange||0,
        meleeRange:isRanged?0:18,
        _shootTimer:Math.floor(Math.random()*60),_meleeCd:0,
        isBoss:false,flash:0,_anim:Math.random()*100
      });
    }
  });
  if(waveData.hasBoss&&army.boss){
    var bd=army.boss;
    var wScale2=1+B.wave*0.1;
    if(B.coopMode) wScale2*=1.4; // Tougher boss in co-op
    B.enemies.push({
      x:B.arenaW/2,y:-50,hp:Math.round(bd.hp*wScale2),maxHp:Math.round(bd.hp*wScale2),
      atk:Math.round(bd.atk*wScale2),speed:bd.speed,radius:bd.radius,
      color:bd.color,armor:bd.armor||bd.color,helmet:bd.helmet||null,
      weapon:bd.weapon||'sword',type:'boss',name:bd.name,emoji:bd.emoji,
      shootCd:75,shootRange:300,meleeRange:30,
      _shootTimer:0,_meleeCd:0,
      isBoss:true,flash:0,_anim:0,
      _bossPhase:0,_bossTimer:0,phases:bd.phases||[]
    });
  }
  B.enemiesAlive=B.enemies.length;
  var wl=document.getElementById('brawlWaveLabel');
  if(wl) wl.textContent='Wave '+(B.wave+1)+'/'+B.campaign.waves.length;
}

// ── Game loop ─────────────────────────────────────────
function brawl_loop(ts){
  var B=BRAWL;
  if(!B.active){B.rafId=null;return;}
  B.dt=Math.min((ts-B._lastTime)/1000,0.05);
  B._lastTime=ts;B._frameCount++;
  if(B.state==='playing'||B.state==='boss') brawl_update(B.dt);
  // Wave clear countdown runs outside brawl_update so it isn't skipped
  if(B.state==='wave_clear'){
    B.waveTimer-=B.dt*60;
    if(B.waveTimer<=0){
      var healPct=0.2;
      // Star Power: healBoost (+20% becomes +40%)
      var _st=brawl_getCharStats();
      if(_st.starPower&&_st.starPower.effect==='healBoost') healPct=0.4;
      B.pHp=Math.min(B.pMaxHp,B.pHp+Math.round(B.pMaxHp*healPct));
      B.state='playing';brawl_spawnWave();
    }
  }
  // Co-op sync runs in brawl_loop (not brawl_update) so it works in ALL states
  if(B.coopMode&&B.active){
    B._coopSyncTimer=(B._coopSyncTimer||0)+1;
    if(B._coopSyncTimer>=3){
      B._coopSyncTimer=0;
      brawl_coopSyncSelf();
      if(B.coopRole==='host') brawl_coopSyncEnemies();
    }
  }
  brawl_render();
  brawl_updateHUD();
  B.rafId=requestAnimationFrame(brawl_loop);
}

function brawl_collideObstacle(x,y,r){
  for(var i=0;i<BRAWL.obstacles.length;i++){
    var o=BRAWL.obstacles[i];
    if(o.type==='bush') continue;
    var dx=x-o.x,dy=y-o.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<r+o.radius) return o;
  }
  return null;
}

function brawl_update(dt){
  var B=BRAWL,spd=dt*60;

  // Player move
  var ix=B.moveJoyX,iy=B.moveJoyY;
  if(B._keys['ArrowLeft']||B._keys['a']||B._keys['A'])  ix=-1;
  if(B._keys['ArrowRight']||B._keys['d']||B._keys['D']) ix=1;
  if(B._keys['ArrowUp']||B._keys['w']||B._keys['W'])    iy=-1;
  if(B._keys['ArrowDown']||B._keys['s']||B._keys['S'])   iy=1;
  var imag=Math.sqrt(ix*ix+iy*iy);
  if(imag>1){ix/=imag;iy/=imag;}
  var nx=B.px+ix*B.pSpeed*spd;
  var ny=B.py+iy*B.pSpeed*spd;
  nx=Math.max(B.pRadius,Math.min(B.arenaW-B.pRadius,nx));
  ny=Math.max(B.pRadius,Math.min(B.arenaH-B.pRadius,ny));
  if(!brawl_collideObstacle(nx,ny,B.pRadius)){B.px=nx;B.py=ny;}
  else{if(!brawl_collideObstacle(nx,B.py,B.pRadius))B.px=nx;
       else if(!brawl_collideObstacle(B.px,ny,B.pRadius))B.py=ny;}
  if(imag>0.1) B.pDir=Math.atan2(iy,ix);
  if(B.pInvuln>0) B.pInvuln-=spd;
  if(B.pAbilityCd>0) B.pAbilityCd-=dt;

  // Continuous fire while aiming
  if(B.aimActive){
    if(B._shootCdTimer<=0){brawl_shoot();B._shootCdTimer=brawl_getCharStats().shootCd/60;}
  }
  // Keyboard aim (IJKL keys)
  if(!B.aimActive){
    var kax=0,kay=0;
    if(B._keys['j']||B._keys['J'])kax=-1;if(B._keys['l']||B._keys['L'])kax=1;
    if(B._keys['i']||B._keys['I'])kay=-1;if(B._keys['k']||B._keys['K'])kay=1;
    if(kax||kay){B.aimJoyX=kax;B.aimJoyY=kay;
      if(B._shootCdTimer<=0){brawl_shoot();B._shootCdTimer=brawl_getCharStats().shootCd/60;}}
  }
  if(B._shootCdTimer>0)B._shootCdTimer-=dt;

  // Enemies
  var alive=0;
  for(var ei=0;ei<B.enemies.length;ei++){
    var e=B.enemies[ei];
    if(e.hp<=0) continue;
    alive++;e._anim+=spd;
    if(e.flash>0) e.flash-=spd;
    var dx=B.px-e.x,dy=B.py-e.y,dist=Math.sqrt(dx*dx+dy*dy)||1;

    // Guest: skip movement AI + boss phases (host is authoritative)
    var _isGuest=B.coopMode&&B.coopRole==='guest';
    if(!_isGuest){
    // Boss phase management
    if(e.isBoss&&e.phases&&e.phases.length){
      var hpPct=e.hp/e.maxHp;
      for(var pi3=e.phases.length-1;pi3>=0;pi3--){
        if(hpPct<=e.phases[pi3].at&&e._bossPhase<pi3+1){
          e._bossPhase=pi3+1;e.atk=Math.round(e.atk*e.phases[pi3].atk);
          e.speed*=e.phases[pi3].speed;break;
        }
      }
    }

    // Movement AI
    var desD=e.shootRange>0?Math.min(e.shootRange*0.65,180):18;
    if(dist>desD+15){
      var mnx=e.x+dx/dist*e.speed*spd,mny=e.y+dy/dist*e.speed*spd;
      if(!brawl_collideObstacle(mnx,mny,e.radius)){e.x=mnx;e.y=mny;}
      else{e.x+=dx/dist*e.speed*spd*0.3;e.y+=dy/dist*e.speed*spd*0.3;}
    } else if(dist<desD*0.4&&e.shootRange>0){
      e.x-=dx/dist*e.speed*0.4*spd;e.y-=dy/dist*e.speed*0.4*spd;
    }
    e.x=Math.max(e.radius,Math.min(B.arenaW-e.radius,e.x));
    e.y=Math.max(e.radius,Math.min(B.arenaH-e.radius,e.y));
    } // end !_isGuest

    // Ranged attack
    if(e.shootCd>0&&e.shootRange>0&&dist<e.shootRange){
      e._shootTimer++;
      if(e._shootTimer>=e.shootCd){
        e._shootTimer=0;
        B.bullets.push({x:e.x,y:e.y,vx:dx/dist*4,vy:dy/dist*4,dmg:e.atk,radius:4,color:e.color,owner:'enemy',life:110});
      }
    }
    // Melee attack
    if(e.meleeRange>0&&dist<e.meleeRange+B.pRadius){
      e._meleeCd++;
      if(e._meleeCd>=40){e._meleeCd=0;
        if(B.pInvuln<=0){B.pHp-=e.atk;B.pInvuln=15;B.camShake=6;
          brawl_dmgNum(B.px,B.py-B.pRadius,e.atk,'#ef4444',false);
          SFX&&SFX.hit&&SFX.hit();brawl_particles(B.px,B.py,5,'#ef4444');
          if(B.pHp<=0){if(brawl_tryRevive()){} else {B.pHp=0;B.state='defeat';return;}}}
      }
    }
    // Boss burst attack
    if(e.isBoss){
      e._bossTimer=(e._bossTimer||0)+1;
      if(e._bossTimer>=150){
        e._bossTimer=0;
        for(var ri=0;ri<10;ri++){
          var a=ri*Math.PI*2/10;
          B.bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2,
            dmg:Math.round(e.atk*0.6),radius:5,color:'#FFD700',owner:'enemy',life:80});
        }
        B.camShake=10;SFX&&SFX.boss&&SFX.boss();
      }
    }
  }

  // Bullets
  for(var bi=B.bullets.length-1;bi>=0;bi--){
    var b=B.bullets[bi];
    b.x+=b.vx*spd;b.y+=b.vy*spd;b.life-=spd;
    var obs=brawl_collideObstacle(b.x,b.y,b.radius);
    if(b.life<=0||b.x<-30||b.x>B.arenaW+30||b.y<-30||b.y>B.arenaH+30||obs){
      if(obs) brawl_particles(b.x,b.y,2,'#888');
      B.bullets.splice(bi,1);continue;
    }
    if(b.owner==='ally'){
      // Cosmetic ally bullet — no collision, just visual
    } else if(b.owner==='player'){
      for(var ej=0;ej<B.enemies.length;ej++){
        var en=B.enemies[ej];if(en.hp<=0)continue;
        if(Math.sqrt((b.x-en.x)*(b.x-en.x)+(b.y-en.y)*(b.y-en.y))<en.radius+b.radius){
          var bdmg=b.dmg;
          // Star Power: bossHunter (+40% dmg to bosses)
          var _bst=brawl_getCharStats();
          if(en.isBoss&&_bst.starPower&&_bst.starPower.effect==='bossHunter') bdmg=Math.round(bdmg*1.4);
          en.hp-=bdmg;en.flash=8;B.pSuperCharge=Math.min(100,B.pSuperCharge+5);
          brawl_dmgNum(en.x,en.y-en.radius,bdmg,en.isBoss?'#FFD700':'#fff',en.isBoss);
          brawl_particles(b.x,b.y,3,en.color);SFX&&SFX.whit&&SFX.whit();
          if(en.hp<=0){brawl_onKill(en);brawl_particles(en.x,en.y,15,en.color);}
          // Guest: send hit to host so host applies damage too
          if(B.coopMode&&B.coopRole==='guest'&&B._coopRoomRef){
            B._coopRoomRef.child('guest_hits').push({idx:ej,dmg:bdmg});
          }
          // Host: notify guest of hit for visual feedback
          if(B.coopMode&&B.coopRole==='host'&&B._coopRoomRef){
            B._coopRoomRef.child('host_hits').push({idx:ej,dmg:bdmg});
          }
          B.bullets.splice(bi,1);break;
        }
      }
    } else {
      if(Math.sqrt((b.x-B.px)*(b.x-B.px)+(b.y-B.py)*(b.y-B.py))<B.pRadius+b.radius&&B.pInvuln<=0){
        B.pHp-=b.dmg;B.pInvuln=15;B.camShake=5;
        brawl_dmgNum(B.px,B.py-B.pRadius,b.dmg,'#ef4444',false);
        brawl_particles(B.px,B.py,4,'#ef4444');SFX&&SFX.hit&&SFX.hit();
        B.bullets.splice(bi,1);
        if(B.pHp<=0){if(brawl_tryRevive()){} else {B.pHp=0;B.state='defeat';return;}}
      }
    }
  }

  // Particles
  for(var pi2=B.particles.length-1;pi2>=0;pi2--){
    var p=B.particles[pi2];p.x+=p.vx*spd;p.y+=p.vy*spd;p.life-=spd;
    if(p.life<=0) B.particles.splice(pi2,1);
  }
  // Pickups
  for(var pk=B.pickups.length-1;pk>=0;pk--){
    var pu=B.pickups[pk];pu.life-=spd;
    if(pu.life<=0){B.pickups.splice(pk,1);continue;}
    if(Math.sqrt((B.px-pu.x)*(B.px-pu.x)+(B.py-pu.y)*(B.py-pu.y))<B.pRadius+12){
      if(pu.type==='heal'){B.pHp=Math.min(B.pMaxHp,B.pHp+Math.round(B.pMaxHp*0.25));SFX&&SFX.heal&&SFX.heal();}
      if(pu.type==='super'){B.pSuperCharge=100;SFX&&SFX.unlock&&SFX.unlock();}
      B.pickups.splice(pk,1);
    }
  }

  if(B.camShake>0){B.camShake*=0.85;if(B.camShake<0.5)B.camShake=0;}

  // Wave progression (host only in co-op — guest receives via listener)
  if(alive===0&&B.enemies.length>0&&!(B.coopMode&&B.coopRole==='guest')){
    B.wave++;B.score+=100*B.wave;B.xpEarned+=30+B.wave*15;B.coinsEarned+=5+B.wave*3;
    if(B.wave>=B.campaign.waves.length){B.state='victory';SFX&&SFX.victory&&SFX.victory();}
    else{B.waveTimer=90;B.state='wave_clear';}
    if(B.coopMode&&B.coopRole==='host') brawl_coopSyncWave();
  }
}

function brawl_shoot(){
  var B=BRAWL;if(B.state!=='playing'&&B.state!=='boss')return;
  var ax=B.aimJoyX,ay=B.aimJoyY;
  var am=Math.sqrt(ax*ax+ay*ay);
  if(am<0.1){ax=Math.cos(B.pDir);ay=Math.sin(B.pDir);}else{ax/=am;ay/=am;}
  var st=brawl_getCharStats();
  var col=gch().color;
  // Star Power: spreadShot — fire 3 bullets in a spread
  if(st.starPower&&st.starPower.effect==='spreadShot'){
    for(var si=-1;si<=1;si++){
      var ang=Math.atan2(ay,ax)+si*0.18;
      var sax=Math.cos(ang),say=Math.sin(ang);
      B.bullets.push({x:B.px+sax*B.pRadius,y:B.py+say*B.pRadius,vx:sax*7.5,vy:say*7.5,
        dmg:Math.round(st.dmg*0.7),radius:4,color:col,owner:'player',life:50});
    }
  } else {
    B.bullets.push({x:B.px+ax*B.pRadius,y:B.py+ay*B.pRadius,vx:ax*7.5,vy:ay*7.5,
      dmg:st.dmg,radius:5,color:col,owner:'player',life:55});
  }
  SFX&&SFX.click&&SFX.click();
}

function brawl_useAbility(){
  var B=BRAWL;if(B.state!=='playing'&&B.state!=='boss')return;
  if(B.pAbilityCd>0)return;
  var st=brawl_getCharStats(),c=gch();
  B.pAbilityCd=B.pAbilityMaxCd;
  var range=130,dmg=st.abilDmg;
  for(var i=0;i<B.enemies.length;i++){
    var e2=B.enemies[i];if(e2.hp<=0)continue;
    var edist=Math.sqrt((B.px-e2.x)*(B.px-e2.x)+(B.py-e2.y)*(B.py-e2.y));
    if(edist<range+e2.radius){
      e2.hp-=dmg;e2.flash=12;brawl_particles(e2.x,e2.y,6,c.color);
      // Guest: send ability hit to host
      if(B.coopMode&&B.coopRole==='guest'&&B._coopRoomRef){
        B._coopRoomRef.child('guest_hits').push({idx:i,dmg:dmg});
      }
      // Star Power: knockback
      if(st.starPower&&st.starPower.effect==='knockback'&&edist>0){
        var kx=(e2.x-B.px)/edist*60,ky=(e2.y-B.py)/edist*60;
        e2.x=Math.max(e2.radius,Math.min(B.arenaW-e2.radius,e2.x+kx));
        e2.y=Math.max(e2.radius,Math.min(B.arenaH-e2.radius,e2.y+ky));
      }
      if(e2.hp<=0){brawl_onKill(e2);brawl_particles(e2.x,e2.y,15,e2.color);}
    }
  }
  // Star Power: abilHeal (heal 15% HP) or fullHeal (heal to full)
  if(st.starPower&&st.starPower.effect==='abilHeal'){
    B.pHp=Math.min(B.pMaxHp,B.pHp+Math.round(B.pMaxHp*0.15));
    brawl_particles(B.px,B.py,8,'#4ade80');
  }
  if(st.starPower&&st.starPower.effect==='fullHeal'){
    B.pHp=B.pMaxHp;
    brawl_particles(B.px,B.py,12,'#FFD700');
  }
  B.particles.push({x:B.px,y:B.py,vx:0,vy:0,color:c.color,life:20,radius:range,type:'ring'});
  B.camShake=12;SFX&&SFX.ability&&SFX.ability();
}

function brawl_onKill(e){
  var st=brawl_getCharStats();
  BRAWL.enemiesKilled++;BRAWL.score+=e.isBoss?500:50;
  BRAWL.xpEarned+=e.isBoss?50:8;BRAWL.coinsEarned+=e.isBoss?15:2;
  // Star Power: coinBoost (+25% coins)
  if(st.starPower&&st.starPower.effect==='coinBoost'){
    BRAWL.coinsEarned+=e.isBoss?4:1;
  }
  // Star Power: bossHunter is applied in bullet damage check
  var healChance=e.isBoss?0.9:0.15;
  // Star Power: healDrop (50% more heal pickups)
  if(st.starPower&&st.starPower.effect==='healDrop') healChance=e.isBoss?0.95:0.22;
  if(Math.random()<healChance){
    BRAWL.pickups.push({x:e.x,y:e.y,type:Math.random()<0.7?'heal':'super',life:420});
  }
}

function brawl_particles(x,y,n,col){
  for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    BRAWL.particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color:col,life:15+Math.random()*15,radius:2+Math.random()*3,type:'dot'});}
}

// Star Power: Revive (once per battle)
function brawl_tryRevive(){
  var B=BRAWL;
  if(B._reviveUsed) return false;
  var st=brawl_getCharStats();
  if(st.starPower&&st.starPower.effect==='revive'){
    B._reviveUsed=true;
    B.pHp=Math.round(B.pMaxHp*0.3);
    B.pInvuln=60;
    B.camShake=15;
    brawl_particles(B.px,B.py,20,'#FFD700');
    SFX&&SFX.unlock&&SFX.unlock();
    return true;
  }
  return false;
}

// ── Render ────────────────────────────────────────────
function brawl_render(){
  var B=BRAWL,ctx=B.ctx,cv=B.canvas;
  if(!ctx||!cv)return;var vw=cv.width,vh=cv.height;if(!vw||!vh)return;

  // Zoom: show ~280 game units across the smallest screen dimension
  // This keeps characters large and readable on phone screens
  var minDim=Math.min(vw,vh);
  var scale=minDim/280;
  if(scale<0.8)scale=0.8;if(scale>2.2)scale=2.2;
  var camW=vw/scale,camH=vh/scale;
  B.camX=B.px-camW/2;B.camY=B.py-camH/2;
  B.camX=Math.max(0,Math.min(B.arenaW-camW,B.camX));
  B.camY=Math.max(0,Math.min(B.arenaH-camH,B.camY));
  var shX=B.camShake?(Math.random()-.5)*B.camShake*2:0;
  var shY=B.camShake?(Math.random()-.5)*B.camShake*2:0;

  ctx.save();ctx.clearRect(0,0,vw,vh);
  ctx.fillStyle='#1a1008';ctx.fillRect(0,0,vw,vh);
  ctx.translate(shX*scale,shY*scale);ctx.scale(scale,scale);ctx.translate(-B.camX,-B.camY);

  // Arena floor — campaign-themed
  var campId=B.campaign?B.campaign.id:'philistine';
  var floorCol1,floorCol2,floorDetail;
  if(campId==='philistine'){floorCol1='#2d1e0f';floorCol2='#352414';floorDetail='#3f2e18';}
  else if(campId==='egyptian'){floorCol1='#3a2a10';floorCol2='#4a3a1a';floorDetail='#554420';}
  else if(campId==='babylonian'){floorCol1='#1a1528';floorCol2='#241e35';floorDetail='#2d2740';}
  else{floorCol1='#2a1515';floorCol2='#351f1f';floorDetail='#3f2828';}
  ctx.fillStyle=floorCol1;ctx.fillRect(0,0,B.arenaW,B.arenaH);
  // Sand/stone patches
  ctx.fillStyle=floorCol2;
  for(var si=0;si<16;si++){
    var ssx=60+(si*57)%B.arenaW,ssy=40+(si*97+Math.sin(si*1.7)*180)%B.arenaH;
    ctx.beginPath();ctx.ellipse(ssx,ssy,30+si%4*12,18+si%3*8,si*0.6,0,Math.PI*2);ctx.fill();
  }
  // Texture dots (pebbles/cracks)
  ctx.fillStyle=floorDetail+'55';
  for(var ti=0;ti<40;ti++){
    var tx2=(ti*127+53)%B.arenaW,ty2=(ti*89+37)%B.arenaH;
    ctx.beginPath();ctx.arc(tx2,ty2,1+ti%3,0,Math.PI*2);ctx.fill();
  }
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.015)';ctx.lineWidth=1;
  for(var gx=0;gx<B.arenaW;gx+=50){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,B.arenaH);ctx.stroke();}
  for(var gy=0;gy<B.arenaH;gy+=50){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(B.arenaW,gy);ctx.stroke();}
  // Decorative props
  if(campId==='egyptian'){
    // Columns along edges
    ctx.fillStyle='#DDaa44'+'33';ctx.strokeStyle='#DDaa44'+'55';ctx.lineWidth=1;
    for(var ci2=0;ci2<4;ci2++){var cpx2=80+ci2*250,cpy=40;
      ctx.beginPath();ctx.rect(cpx2-6,cpy-15,12,30);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.rect(cpx2-6,B.arenaH-55,12,30);ctx.fill();ctx.stroke();}
  } else if(campId==='babylonian'){
    // Rune circles
    ctx.strokeStyle='#CC00FF22';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(B.arenaW/2,B.arenaH/2,120,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(B.arenaW/2,B.arenaH/2,160,0,Math.PI*2);ctx.stroke();
  } else if(campId==='roman'){
    // Tile pattern
    ctx.strokeStyle='rgba(200,100,100,0.04)';ctx.lineWidth=1;
    for(var rxi=0;rxi<B.arenaW;rxi+=40){for(var ryi=0;ryi<B.arenaH;ryi+=40){
      ctx.strokeRect(rxi,ryi,40,40);}}
  }
  // Border
  var campAccent=B.campaign?BRAWL_ARMIES[B.campaign.id].accent:'#FF6B35';
  ctx.strokeStyle=campAccent+'66';ctx.lineWidth=6;ctx.strokeRect(2,2,B.arenaW-4,B.arenaH-4);

  // Obstacles (improved detail)
  for(var oi=0;oi<B.obstacles.length;oi++){
    var ob=B.obstacles[oi];
    if(ob.type==='rock'){
      ctx.fillStyle='#3a3a3a';ctx.beginPath();ctx.arc(ob.x,ob.y,ob.radius,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4a4a4a';ctx.beginPath();ctx.arc(ob.x-ob.radius*0.15,ob.y-ob.radius*0.15,ob.radius*0.75,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#55555533';ctx.beginPath();ctx.arc(ob.x-ob.radius*0.3,ob.y-ob.radius*0.25,ob.radius*0.4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(ob.x,ob.y,ob.radius,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='#2a2a2a88';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(ob.x-ob.radius*0.3,ob.y-ob.radius*0.1);
      ctx.lineTo(ob.x+ob.radius*0.4,ob.y+ob.radius*0.2);ctx.stroke();
    } else {
      ctx.fillStyle='#12381288';ctx.beginPath();ctx.arc(ob.x,ob.y+2,ob.radius+2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1a4a1a';ctx.beginPath();ctx.arc(ob.x,ob.y,ob.radius,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2a6a2a';ctx.beginPath();ctx.arc(ob.x+4,ob.y-4,ob.radius*0.65,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#3a8a3a';ctx.beginPath();ctx.arc(ob.x-3,ob.y-2,ob.radius*0.4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2a5a2a';ctx.beginPath();ctx.arc(ob.x+ob.radius*0.4,ob.y+ob.radius*0.3,ob.radius*0.35,0,Math.PI*2);ctx.fill();
    }
  }

  // Pickups
  for(var pki=0;pki<B.pickups.length;pki++){
    var pu2=B.pickups[pki];
    var pp=0.6+0.4*Math.sin(B._frameCount*0.08+pki);
    ctx.globalAlpha=pp;
    ctx.fillStyle=pu2.type==='heal'?'#4ade80':'#CC00FF';
    ctx.shadowColor=pu2.type==='heal'?'#4ade80':'#CC00FF';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(pu2.x,pu2.y,9,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText(pu2.type==='heal'?'\u2665':'\u2605',pu2.x,pu2.y+4);
    ctx.globalAlpha=1;
  }

  // Enemies (sorted by y for depth)
  var sortedE=B.enemies.filter(function(e){return e.hp>0;}).sort(function(a,b){return a.y-b.y;});
  for(var sei=0;sei<sortedE.length;sei++){
    var se=sortedE[sei];

function brawl_endClick(){
  var B=BRAWL;

  B._endClickBound=false;
  if(B._endClickHandler&&B.canvas){try{B.canvas.removeEventListener('pointerdown',B._endClickHandler);}catch(e){}B._endClickHandler=null;}
  var _cid=gch().id;
  if(B.state==='victory'){
    G.pd.xp+=B.xpEarned;G.pd.coins=(G.pd.coins||0)+B.coinsEarned;
    G.pd.brawlWins=(G.pd.brawlWins||0)+1;
    brawl_awardPoints(_cid,15+B.wave*5);  // Power Points reward
    checkUnlocks();persistPlayer();
    toast('\uD83C\uDFC6 Victory! +'+B.xpEarned+' XP +'+B.coinsEarned+' \uD83E\uDE99 +'+(15+B.wave*5)+' Power Pts');
  } else {
    var p=Math.floor(B.xpEarned*0.5);

  }
  brawl_cleanup();brawl_exitFullscreen();go('game');
}

function brawl_updateHUD(){
  var B=BRAWL;
  var hf=document.getElementById('brawlHpFill');
  if(hf) hf.style.width=Math.max(0,B.pHp/B.pMaxHp*100)+'%';
  var ht=document.getElementById('brawlHpText');
  if(ht) ht.textContent=B.pHp+'/'+B.pMaxHp;
  var sc=document.getElementById('brawlScore');
  if(sc) sc.textContent='\u2B50 '+B.score;
  var ki=document.getElementById('brawlKills');
  if(ki) ki.textContent='\uD83D\uDCA0 '+B.enemiesKilled;
  var ab=document.getElementById('brawlAbilityBtn');
  var al=document.getElementById('brawlAbilityLbl');
  if(ab){var rdy=B.pAbilityCd<=0;ab.style.opacity=rdy?1:0.4;ab.style.borderColor=rdy?'#CC00FF':'#333';}
  if(al){al.textContent=B.pAbilityCd>0?Math.ceil(B.pAbilityCd)+'s':brawl_getCharStats().abilityName;}
}

function brawl_cleanup(){
  var B=BRAWL;B.active=false;
  if(B.rafId){cancelAnimationFrame(B.rafId);B.rafId=null;}
  if(B._kd)document.removeEventListener('keydown',B._kd);
  if(B._ku)document.removeEventListener('keyup',B._ku);
  if(B._resizeHandler){
    window.removeEventListener('resize',B._resizeHandler);
    document.removeEventListener('fullscreenchange',B._resizeHandler);
    document.removeEventListener('webkitfullscreenchange',B._resizeHandler);
  }
  if(B._joyCleanup){B._joyCleanup.forEach(function(fn){fn();});B._joyCleanup=[];}
  if(B._mouseHandler&&B.canvas){B.canvas.removeEventListener('click',B._mouseHandler);}
  if(B.coopMode) brawl_coopCleanup();
  B._endClickBound=false;B.canvas=null;B.ctx=null;
}

function brawl_quit(){
  if(BRAWL.state==='playing'||BRAWL.state==='boss'||BRAWL.state==='wave_clear'){
    if(!confirm('Leave the battle? Progress will be lost.'))return;}
  brawl_cleanup();brawl_exitFullscreen();go('game');
}

// ── BIBLICAL BACKGROUND SCENERY ────────────────────────
// Scenery items placed once per stage, drawn each frame with animations
var TD_BG_THEMES={
  desert:['palm','tomb','camel','well','tent','obelisk','cactus','donkey','jar'],
  sea:['boat','wave','gull','lighthouse','fish_jump','dock','anchor'],
  city:['house','chariot','tower','market','gate','column','amphora'],
  dark:['tomb','skull_rock','dead_tree','raven','torch','pillar','cave']
};

function td_pickTheme(stageKey){
  if(stageKey.indexOf('moses')>=0) return Math.random()>0.3?'desert':'sea';
  if(stageKey.indexOf('jonah')>=0) return 'sea';
  if(stageKey.indexOf('daniel')>=0) return 'dark';
  if(stageKey.indexOf('david')>=0) return 'desert';
  if(stageKey.indexOf('elijah')>=0) return 'desert';
  if(stageKey.indexOf('samson')>=0) return 'city';
  return 'desert';
}

function td_genBgItems(W,FH,T,stageKey){
  var theme=td_pickTheme(stageKey);
  var pool=TD_BG_THEMES[theme]||TD_BG_THEMES.desert;
  var items=[];
  // Place 8-14 items scattered around the field, avoiding the path center
  var count=8+Math.floor(Math.random()*7);
  for(var i=0;i<count;i++){
    var type=pool[Math.floor(Math.random()*pool.length)];
    var x=20+Math.random()*(W-40);
    var y=T+20+Math.random()*(FH-40);
    var sc=0.5+Math.random()*0.6;
    var phase=Math.random()*Math.PI*2;
    var spd=0.5+Math.random()*1.5;
    // Moving items get a travel range
    var moving=(type==='camel'||type==='donkey'||type==='chariot'||type==='gull'||type==='raven'||type==='fish_jump');
    items.push({type:type,x:x,y:y,sc:sc,phase:phase,spd:spd,moving:moving,
      ox:x, // origin x for moving items
      dir:Math.random()>0.5?1:-1,
      frame:0
    });
  }
  // Always add Sea of Galilee water for sea theme
  if(theme==='sea'){
    items.push({type:'galilee',x:W*0.12,y:T+FH*0.15,sc:1,phase:0,spd:1,moving:false,ox:0,dir:1,frame:0});
  }
  return items;
}

function td_drawBgItems(ctx,W,FH,T,items,t){
  if(!items)return;
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var x=it.x,y=it.y,s=it.sc;
    // Animate moving items
    if(it.moving){
      it.x=it.ox+Math.sin(t*it.spd+it.phase)*40*it.dir;
      x=it.x;
    }
    it.frame++;
    ctx.save();ctx.translate(x,y);ctx.scale(s,s);
    ctx.globalAlpha=0.55; // subtle background layer

    switch(it.type){
      // ── PALM TREE ──
      case 'palm':
        ctx.fillStyle='#5C3A10';ctx.fillRect(-3,0,6,-30);
        ctx.fillStyle='#3A5C10';
        for(var f=0;f<5;f++){
          var fa=f*Math.PI*2/5+Math.sin(t*1.5+it.phase)*0.1;
          ctx.beginPath();ctx.moveTo(0,-30);
          ctx.quadraticCurveTo(Math.cos(fa)*25,-35+Math.sin(fa)*5,Math.cos(fa)*30,-20+Math.sin(fa)*8);
          ctx.lineWidth=3;ctx.strokeStyle='#3A6C10';ctx.stroke();
        }
        // Coconuts
        ctx.fillStyle='#8B6914';ctx.beginPath();ctx.arc(2,-28,2.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(-3,-27,2,0,Math.PI*2);ctx.fill();
        break;

      // ── TOMB / CAVE ──
      case 'tomb': case 'cave':
        ctx.fillStyle='#4A3A2A';
        ctx.beginPath();ctx.moveTo(-18,5);ctx.lineTo(-15,-18);ctx.lineTo(15,-18);ctx.lineTo(18,5);ctx.closePath();ctx.fill();
        ctx.fillStyle='#1A0A00';ctx.beginPath();ctx.arc(0,-4,7,0,Math.PI*2);ctx.fill();
        // Rolling stone
        var stoneOff=Math.sin(t*0.5+it.phase)*3;
        ctx.fillStyle='#6A5A4A';ctx.beginPath();ctx.arc(12+stoneOff,-4,6,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(11+stoneOff,-6,2,0,Math.PI*2);ctx.fill();
        break;

      // ── CAMEL (animated walking) ──
      case 'camel':
        var legAnim=Math.sin(t*4+it.phase)*3;
        ctx.fillStyle='#C4A060';
        // Body
        ctx.beginPath();ctx.ellipse(0,-8,14,7,0,0,Math.PI*2);ctx.fill();
        // Hump
        ctx.beginPath();ctx.ellipse(-2,-16,5,5,0,0,Math.PI*2);ctx.fill();
        // Head
        ctx.fillStyle='#B89050';ctx.beginPath();ctx.ellipse(16,-14,5,4,0.3,0,Math.PI*2);ctx.fill();
        // Neck
        ctx.fillStyle='#C4A060';ctx.fillRect(10,-14,8,5);
        // Legs (animated)
        ctx.fillStyle='#A08040';
        ctx.fillRect(-8,0+legAnim,3,10);ctx.fillRect(-2,0-legAnim,3,10);
        ctx.fillRect(5,0+legAnim,3,10);ctx.fillRect(10,0-legAnim,3,10);
        // Eye
        ctx.fillStyle='#000';ctx.beginPath();ctx.arc(18,-15,1.2,0,Math.PI*2);ctx.fill();
        break;

      // ── DONKEY (animated ear twitch + walking) ──
      case 'donkey':
        var dLeg=Math.sin(t*3.5+it.phase)*2.5;
        ctx.fillStyle='#8A8080';
        ctx.beginPath();ctx.ellipse(0,-5,10,6,0,0,Math.PI*2);ctx.fill();
        // Head
        ctx.fillStyle='#7A7070';
        ctx.beginPath();ctx.ellipse(12,-10,5,4,0.2,0,Math.PI*2);ctx.fill();
        // Ears (animated twitch)
        var earTwitch=Math.sin(t*6+it.phase)*0.2;
        ctx.fillStyle='#9A9090';
        ctx.save();ctx.translate(10,-14);ctx.rotate(-0.4+earTwitch);ctx.fillRect(-1,-6,3,7);ctx.restore();
        ctx.save();ctx.translate(14,-14);ctx.rotate(0.4-earTwitch);ctx.fillRect(-1,-6,3,7);ctx.restore();
        // Legs
        ctx.fillStyle='#6A6060';
        ctx.fillRect(-6,2+dLeg,2.5,8);ctx.fillRect(-2,2-dLeg,2.5,8);
        ctx.fillRect(4,2+dLeg,2.5,8);ctx.fillRect(8,2-dLeg,2.5,8);
        // Eye
        ctx.fillStyle='#000';ctx.beginPath();ctx.arc(14,-11,1,0,Math.PI*2);ctx.fill();
        // Tail
        ctx.strokeStyle='#6A6060';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(-10,-4);ctx.quadraticCurveTo(-16,-8+Math.sin(t*4)*3,-14,-1);ctx.stroke();
        break;

      // ── CHARIOT (animated wheels) ──
      case 'chariot':
        // Body
        ctx.fillStyle='#8B6914';
        ctx.beginPath();ctx.moveTo(-15,0);ctx.lineTo(-12,-12);ctx.lineTo(12,-12);ctx.lineTo(15,0);ctx.closePath();ctx.fill();
        ctx.fillStyle='#6B4914';ctx.fillRect(-12,-12,24,3);
        // Wheels (rotating)
        var wheelRot=t*3+it.phase;
        for(var wi=-1;wi<=1;wi+=2){
          ctx.save();ctx.translate(wi*10,2);ctx.rotate(wheelRot);
          ctx.strokeStyle='#5C3A10';ctx.lineWidth=2;
          ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.stroke();
          for(var sp=0;sp<4;sp++){
            var sa=sp*Math.PI/2;
            ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(sa)*5,Math.sin(sa)*5);ctx.stroke();
          }
          ctx.restore();
        }
        // Flagpole
        ctx.strokeStyle='#5C3A10';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(0,-24);ctx.stroke();
        ctx.fillStyle='#CC2222';
        ctx.beginPath();ctx.moveTo(0,-24);ctx.lineTo(8,-21+Math.sin(t*3)*2);ctx.lineTo(0,-18);ctx.fill();
        break;

      // ── WELL ──
      case 'well':
        ctx.fillStyle='#6A5A4A';ctx.beginPath();ctx.ellipse(0,0,10,6,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#3A2A10';ctx.beginPath();ctx.ellipse(0,0,7,4,0,0,Math.PI*2);ctx.fill();
        // Water shimmer
        ctx.fillStyle='rgba(80,150,220,'+(0.3+0.2*Math.sin(t*3+it.phase))+')';
        ctx.beginPath();ctx.ellipse(0,0,5,3,0,0,Math.PI*2);ctx.fill();
        // Posts & roof
        ctx.fillStyle='#5C3A10';ctx.fillRect(-8,-2,2,-14);ctx.fillRect(6,-2,2,-14);
        ctx.fillStyle='#8B6914';ctx.fillRect(-10,-16,20,3);
        // Bucket (sways)
        var bucketY=-8+Math.sin(t*1.5+it.phase)*3;
        ctx.strokeStyle='#888';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(0,bucketY);ctx.stroke();
        ctx.fillStyle='#888';ctx.fillRect(-2,bucketY,4,3);
        break;

      // ── TENT ──
      case 'tent':
        ctx.fillStyle='#C4A080';
        ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(-16,5);ctx.lineTo(16,5);ctx.closePath();ctx.fill();
        ctx.fillStyle='#A08060';ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(16,5);ctx.lineTo(10,5);ctx.lineTo(0,-16);ctx.closePath();ctx.fill();
        // Door flap (sways in wind)
        var flap=Math.sin(t*2+it.phase)*2;
        ctx.fillStyle='#8A6A50';ctx.beginPath();ctx.moveTo(-2,5);ctx.lineTo(-2+flap,-5);ctx.lineTo(4+flap,-5);ctx.lineTo(4,5);ctx.closePath();ctx.fill();
        break;

      // ── HOUSE (mud brick) ──
      case 'house':
        ctx.fillStyle='#A08060';ctx.fillRect(-12,-15,24,20);
        ctx.fillStyle='#806040';ctx.fillRect(-12,-15,24,3);
        // Roof
        ctx.fillStyle='#6A4A2A';
        ctx.beginPath();ctx.moveTo(-14,-15);ctx.lineTo(0,-25);ctx.lineTo(14,-15);ctx.closePath();ctx.fill();
        // Door
        ctx.fillStyle='#3A2A10';ctx.fillRect(-3,-2,6,7);
        // Windows (flicker light)
        var lit=Math.sin(t*2+it.phase)>0?'rgba(255,200,80,0.6)':'rgba(255,180,60,0.4)';
        ctx.fillStyle=lit;ctx.fillRect(-9,-10,4,4);ctx.fillRect(5,-10,4,4);
        break;

      // ── OBELISK ──
      case 'obelisk':
        ctx.fillStyle='#C4A870';
        ctx.beginPath();ctx.moveTo(-5,5);ctx.lineTo(-3,-28);ctx.lineTo(3,-28);ctx.lineTo(5,5);ctx.closePath();ctx.fill();
        ctx.fillStyle='#A08850';ctx.fillRect(-3,-28,6,3);
        // Hieroglyphics
        ctx.fillStyle='rgba(0,0,0,0.2)';
        for(var hi=0;hi<4;hi++){ctx.fillRect(-2,-5-hi*6,4,3);}
        // Top cap glow
        ctx.fillStyle='rgba(255,215,0,'+(0.2+0.15*Math.sin(t*2+it.phase))+')';
        ctx.beginPath();ctx.moveTo(0,-32);ctx.lineTo(-4,-28);ctx.lineTo(4,-28);ctx.closePath();ctx.fill();
        break;

      // ── CACTUS ──
      case 'cactus':
        ctx.fillStyle='#2A6A2A';ctx.fillRect(-3,0,6,-20);
        // Arms
        ctx.fillRect(-3,-14,-(4+Math.sin(t+it.phase)),3);ctx.fillRect(-7-Math.sin(t+it.phase),-14,3,-8);
        ctx.fillRect(3,-10,5+Math.sin(t+it.phase+1),3);ctx.fillRect(8+Math.sin(t+it.phase+1),-10,3,-7);
        break;

      // ── JAR / AMPHORA ──
      case 'jar': case 'amphora':
        ctx.fillStyle='#B87040';
        ctx.beginPath();ctx.ellipse(0,-3,5,7,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#A06030';ctx.fillRect(-3,-10,6,3);
        // Handles
        ctx.strokeStyle='#A06030';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(-6,-5,3,Math.PI*0.5,Math.PI*1.5);ctx.stroke();
        ctx.beginPath();ctx.arc(6,-5,3,-Math.PI*0.5,Math.PI*0.5);ctx.stroke();
        break;

      // ── BOAT (rocks on water) ──
      case 'boat':
        var rockY=Math.sin(t*1.8+it.phase)*3;
        ctx.save();ctx.translate(0,rockY);
        ctx.fillStyle='#6B4914';
        ctx.beginPath();ctx.moveTo(-14,3);ctx.quadraticCurveTo(0,-5,14,3);ctx.lineTo(12,7);ctx.lineTo(-12,7);ctx.closePath();ctx.fill();
        // Mast & sail
        ctx.strokeStyle='#5C3A10';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-22);ctx.stroke();
        ctx.fillStyle='rgba(230,220,200,'+(0.7+0.1*Math.sin(t*2))+')';
        ctx.beginPath();ctx.moveTo(0,-20);ctx.quadraticCurveTo(10+Math.sin(t*1.5)*3,-12,0,-4);ctx.fill();
        ctx.restore();
        break;

      // ── WAVE (animated water) ──
      case 'wave':
        ctx.strokeStyle='rgba(80,160,220,0.4)';ctx.lineWidth=2;
        ctx.beginPath();
        for(var wx=0;wx<40;wx+=3){ctx.lineTo(-20+wx,-3+Math.sin(t*3+wx*0.3+it.phase)*4);}
        ctx.stroke();
        ctx.strokeStyle='rgba(60,140,200,0.3)';
        ctx.beginPath();
        for(var wx2=0;wx2<40;wx2+=3){ctx.lineTo(-20+wx2,3+Math.sin(t*2.5+wx2*0.25+it.phase+1)*3);}
        ctx.stroke();
        break;

      // ── GULL (animated flying) ──
      case 'gull':
        var wingFlap=Math.sin(t*6+it.phase)*0.4;
        ctx.strokeStyle='rgba(220,220,220,0.7)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(-8,Math.sin(t*6+it.phase)*4);ctx.quadraticCurveTo(-3,-5-wingFlap*8,0,0);
        ctx.quadraticCurveTo(3,-5-wingFlap*8,8,Math.sin(t*6+it.phase+1)*4);ctx.stroke();
        break;

      // ── LIGHTHOUSE ──
      case 'lighthouse':
        ctx.fillStyle='#DDD';ctx.fillRect(-4,0,8,-30);
        ctx.fillStyle='#CC3333';ctx.fillRect(-4,-10,8,5);ctx.fillRect(-4,-25,8,5);
        // Light beam (rotating)
        var lAngle=t*2+it.phase;
        ctx.save();ctx.translate(0,-30);ctx.rotate(lAngle);
        ctx.fillStyle='rgba(255,255,150,'+(0.15+0.1*Math.sin(t*4))+')';
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-8,-50);ctx.lineTo(8,-50);ctx.closePath();ctx.fill();
        ctx.restore();
        // Lamp
        ctx.fillStyle='rgba(255,255,100,0.6)';ctx.beginPath();ctx.arc(0,-32,3,0,Math.PI*2);ctx.fill();
        break;

      // ── FISH JUMP (animated) ──
      case 'fish_jump':
        var jumpH=Math.abs(Math.sin(t*2.5+it.phase))*15;
        if(jumpH>3){ // only visible when jumping
          ctx.fillStyle='rgba(120,180,220,0.6)';
          ctx.save();ctx.translate(0,-jumpH);ctx.rotate(Math.sin(t*2.5+it.phase)*0.5);
          ctx.beginPath();ctx.ellipse(0,0,6,3,0,0,Math.PI*2);ctx.fill();
          // Tail
          ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(-10,-3);ctx.lineTo(-10,3);ctx.closePath();ctx.fill();
          ctx.restore();
          // Splash ripple
          ctx.strokeStyle='rgba(150,200,255,0.3)';ctx.lineWidth=1;
          ctx.beginPath();ctx.ellipse(0,0,4+jumpH*0.5,2,0,0,Math.PI*2);ctx.stroke();
        }
        break;

      // ── DOCK ──
      case 'dock':
        ctx.fillStyle='#6B4914';
        ctx.fillRect(-15,0,30,4);
        for(var dp=-12;dp<=12;dp+=8){ctx.fillRect(dp,0,3,8);}
        // Rope
        ctx.strokeStyle='#AAA';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(-12,-1);
        for(var rp=-12;rp<=12;rp+=4){ctx.lineTo(rp,-3+Math.sin(t+rp*0.4)*1.5);}
        ctx.stroke();
        break;

      // ── ANCHOR ──
      case 'anchor':
        ctx.strokeStyle='#666';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(0,5);ctx.stroke();
        ctx.beginPath();ctx.arc(0,5,6,0,Math.PI);ctx.stroke();
        ctx.beginPath();ctx.moveTo(-5,-10);ctx.lineTo(5,-10);ctx.stroke();
        ctx.fillStyle='#666';ctx.beginPath();ctx.arc(0,-12,2,0,Math.PI*2);ctx.fill();
        break;

      // ── TOWER (guard tower) ──
      case 'tower':
        ctx.fillStyle='#A08060';ctx.fillRect(-6,0,12,-28);
        ctx.fillStyle='#806040';ctx.fillRect(-8,-28,16,4);
        // Battlements
        for(var b=-7;b<=5;b+=4){ctx.fillRect(b,-32,3,4);}
        // Torch glow
        ctx.fillStyle='rgba(255,150,50,'+(0.3+0.2*Math.sin(t*4+it.phase))+')';
        ctx.beginPath();ctx.arc(0,-26,4,0,Math.PI*2);ctx.fill();
        break;

      // ── MARKET STALL ──
      case 'market':
        ctx.fillStyle='#C4A080';ctx.fillRect(-12,0,24,-3);
        ctx.fillStyle='#AA3333';
        ctx.beginPath();ctx.moveTo(-14,-3);ctx.lineTo(0,-14);ctx.lineTo(14,-3);ctx.closePath();ctx.fill();
        // Goods
        ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(-5,-1,2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#CC6633';ctx.beginPath();ctx.arc(0,-1,2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#6A3A2A';ctx.beginPath();ctx.arc(5,-1,2,0,Math.PI*2);ctx.fill();
        break;

      // ── GATE (city gate) ──
      case 'gate':
        ctx.fillStyle='#806040';
        ctx.fillRect(-14,5,5,-25);ctx.fillRect(9,5,5,-25);
        ctx.fillRect(-14,-20,28,4);
        // Arch
        ctx.fillStyle='#3A2A10';
        ctx.beginPath();ctx.arc(0,-5,8,Math.PI,0);ctx.lineTo(8,5);ctx.lineTo(-8,5);ctx.closePath();ctx.fill();
        break;

      // ── COLUMN (broken pillar) ──
      case 'column': case 'pillar':
        ctx.fillStyle='#C0B8A0';ctx.fillRect(-4,5,8,-22);
        ctx.fillStyle='#A0A090';ctx.fillRect(-5,-17,10,3);ctx.fillRect(-5,2,10,3);
        // Cracks
        ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(-2,-8);ctx.lineTo(1,-3);ctx.lineTo(-1,0);ctx.stroke();
        break;

      // ── SKULL ROCK ──
      case 'skull_rock':
        ctx.fillStyle='#4A3A30';
        ctx.beginPath();ctx.ellipse(0,-4,12,10,0,0,Math.PI*2);ctx.fill();
        // Eye sockets
        ctx.fillStyle='#1A0A00';
        ctx.beginPath();ctx.ellipse(-4,-6,3,3.5,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(4,-6,3,3.5,0,0,Math.PI*2);ctx.fill();
        // Nose
        ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(-1.5,0);ctx.lineTo(1.5,0);ctx.closePath();ctx.fill();
        // Torch in socket (animated flame)
        var flameFlicker=Math.sin(t*8+it.phase)*2;
        ctx.fillStyle='rgba(255,120,30,0.5)';ctx.beginPath();ctx.arc(10,-10+flameFlicker,4+Math.sin(t*6)*1.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,200,50,0.4)';ctx.beginPath();ctx.arc(10,-12+flameFlicker,2.5,0,Math.PI*2);ctx.fill();
        break;

      // ── DEAD TREE ──
      case 'dead_tree':
        ctx.strokeStyle='#3A2A1A';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(0,5);ctx.lineTo(0,-15);ctx.stroke();
        ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(0,-10);ctx.quadraticCurveTo(-10,-16,-15,-12);ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,-13);ctx.quadraticCurveTo(8,-18,14,-14);ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,-8);ctx.quadraticCurveTo(-7,-10,-10,-6);ctx.stroke();
        break;

      // ── RAVEN (animated flapping) ──
      case 'raven':
        var rWing=Math.sin(t*7+it.phase)*0.5;
        ctx.fillStyle='rgba(30,20,30,0.7)';
        ctx.beginPath();ctx.ellipse(0,0,4,3,0,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(30,20,30,0.6)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(-4,0);ctx.quadraticCurveTo(-8,-6-rWing*8,-12,-2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(4,0);ctx.quadraticCurveTo(8,-6-rWing*8,12,-2);ctx.stroke();
        // Beak
        ctx.fillStyle='#AA6600';ctx.beginPath();ctx.moveTo(4,-1);ctx.lineTo(7,-1.5);ctx.lineTo(4,0.5);ctx.closePath();ctx.fill();
        break;

      // ── TORCH (wall torch) ──
      case 'torch':
        ctx.fillStyle='#5C3A10';ctx.fillRect(-1.5,0,3,-12);
        var fl=Math.sin(t*7+it.phase);
        ctx.fillStyle='rgba(255,130,30,'+(0.5+0.2*fl)+')';
        ctx.beginPath();ctx.arc(0,-14+fl,4+fl*1.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,220,80,'+(0.4+0.2*fl)+')';
        ctx.beginPath();ctx.arc(0,-16+fl*0.5,2.5,0,Math.PI*2);ctx.fill();
        // Light radius
        ctx.fillStyle='rgba(255,150,50,'+(0.04+0.02*fl)+')';
        ctx.beginPath();ctx.arc(0,-12,20,0,Math.PI*2);ctx.fill();
        break;

      // ── SEA OF GALILEE (large water body) ──
      case 'galilee':
        ctx.globalAlpha=0.3;
        var gw=80,gh=35;
        // Water body
        var wg=ctx.createRadialGradient(gw/2,0,0,gw/2,0,gw*0.6);
        wg.addColorStop(0,'rgba(40,100,180,0.5)');wg.addColorStop(1,'rgba(20,60,120,0)');
        ctx.fillStyle=wg;
        ctx.beginPath();ctx.ellipse(gw/2,0,gw/2,gh/2,0,0,Math.PI*2);ctx.fill();
        // Animated ripples
        ctx.strokeStyle='rgba(120,180,255,0.3)';ctx.lineWidth=1;
        for(var rr=0;rr<3;rr++){
          var rrad=10+rr*12+Math.sin(t*1.5+rr)*4;
          ctx.globalAlpha=0.15-rr*0.04;
          ctx.beginPath();ctx.ellipse(gw/2,0,rrad,rrad*0.4,0,0,Math.PI*2);ctx.stroke();
        }
        ctx.globalAlpha=0.55;
        break;
    }
    ctx.globalAlpha=1;
    ctx.restore();
  }
}

function td_uid(){return ++TDS._uid;}
function td_irand(a,b){return Math.floor(a+Math.random()*(b-a+1));}

// ── Build pixel path from proportional points ─────────
function td_buildPath(){
  var fw=TDS.W, fh=TDS.FIELD_H, fy=TDS.TOPBAR;
  TDS.path=TD_PATH_PTS.map(function(p){return{x:p[0]*fw,y:fy+p[1]*fh};});
}

// ── Path position helper ───────────────────────────────
// Returns {x,y} at distance d along path, and segment index
function td_pathAt(d){
  var pts=TDS.path;
  for(var i=0;i<pts.length-1;i++){
    var dx=pts[i+1].x-pts[i].x, dy=pts[i+1].y-pts[i].y;
    var segLen=Math.sqrt(dx*dx+dy*dy);
    if(d<=segLen){
      var t=d/segLen;
      return{x:pts[i].x+dx*t,y:pts[i].y+dy*t,seg:i,done:false};
    }
    d-=segLen;
  }
  return{x:pts[pts.length-1].x,y:pts[pts.length-1].y,seg:pts.length-1,done:true};
}

// ── Total path length ──────────────────────────────────
function td_pathLen(){
  var pts=TDS.path,len=0;
  for(var i=0;i<pts.length-1;i++){
    var dx=pts[i+1].x-pts[i].x,dy=pts[i+1].y-pts[i].y;
    len+=Math.sqrt(dx*dx+dy*dy);
  }
  return len;
}

// ── Spawn an enemy ─────────────────────────────────────
function td_spawnEnemy(def){
  var st=TD_ESTYLES[def.t]||{color:'#FF0000',r:14,shape:'r',emoji:'⚔️'};var stSpr=st.t||def.t;
  var slowMult=TDS.stage&&TDS.stage.slow?0.65:1.0;
  var spd=def.spd*slowMult;
  TDS.enemies.push({
    id:td_uid(), t:def.t, sprId:stSpr,
    hp:def.hp, maxHp:def.hp,
    atk:def.atk,
    spd:spd, baseSpd:spd,
    dist:0,         // distance along path
    x:TDS.path[0].x, y:TDS.path[0].y,
    r:st.r, color:st.color, shape:st.shape, emoji:st.emoji,
    boss:def.boss||false,
    rage:def.rage||0, rageMult:def.rageMult||1.5, raging:false,
    shieldHp:def.shieldHp||0,
    angelBlock:def.angelBlock||0, angelHits:0,
    plagueBonus:def.plagueBonus||0,
    burnTimer:0, burning:false,
    hitFlash:0,
    slowTimer:0,    // ice/slow effect
    atkTimer:0,
  });
}

// ── Spawn wave ─────────────────────────────────────────
function td_startWave(){
  if(!TDS.active||TDS.won||TDS.lost) return;
  var stage=TDS.stage;
  if(!stage||TDS.waveIdx>=stage.waves.length){TDS.allWavesDone=true;return;}
  var groups=stage.waves[TDS.waveIdx];
  TDS.spawnQueue=[];
  var delay=0;
  groups.forEach(function(g){
    for(var i=0;i<g.count;i++){
      TDS.spawnQueue.push(Object.assign({},g,{delay:delay}));
      delay+=stage.slow?1.1:0.7;
    }
  });
  TDS.waveIdx++;
  TDS.waveActive=true;
  TDS.spawnTimer=0;
  TDS._nextWaveCountdown=0;
}

// ── Place a unit ───────────────────────────────────────
function td_placeUnit(defId,wx,wy){
  var def=TD_UNITS.find(function(u){return u.id===defId;});
  if(!def||TDS.mana<def.cost) return false;
  // Don't place on path
  for(var i=0;i<TDS.path.length-1;i++){
    var px=TDS.path[i].x,py=TDS.path[i].y;
    var nx=TDS.path[i+1].x,ny=TDS.path[i+1].y;
    // distance from point to segment
    var dx=nx-px,dy=ny-py,len2=dx*dx+dy*dy;
    if(len2===0) continue;
    var t=Math.max(0,Math.min(1,((wx-px)*dx+(wy-py)*dy)/len2));
    var cx2=px+t*dx,cy2=py+t*dy;
    if(Math.sqrt((wx-cx2)**2+(wy-cy2)**2)<30) return false;
  }
  // Don't stack on existing unit
  for(var j=0;j<TDS.units.length;j++){
    if(Math.sqrt((TDS.units[j].x-wx)**2+(TDS.units[j].y-wy)**2)<30) return false;
  }
  TDS.mana-=def.cost;
  var slowMult=TDS.stage&&TDS.stage.slow?0.75:1.0;
  TDS.units.push({
    id:td_uid(), defId:defId,
    x:wx, y:wy,
    hp:def.hp, maxHp:def.hp,
    atk:def.atk, range:def.range,
    rate:def.rate*slowMult,
    aoe:def.aoe||false, burn:def.burn||false,
    knockback:def.knockback||false,
    nuke:def.nuke||false, heal:def.heal||0,
    shield:def.shield||false, aura:def.aura||false,
    critChance:def.critChance||0, divine:def.divine||false,
    color:def.color, emoji:def.emoji,
    atkCd:0, healCd:0,
    shieldActive:def.shield||false,
    hitFlash:0, animTick:0,
    tier:0, totalCost:def.cost,
  });
  td_particles(wx,wy,def.color,10,80);
  SFX&&SFX.click&&SFX.click();
  return true;
}

// ── Particles ──────────────────────────────────────────
function td_particles(x,y,color,n,spd){
  // Cap total particles for performance
  var maxP=80;
  if(TDS.particles.length>=maxP) return;
  n=Math.min(n,maxP-TDS.particles.length);
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2;
    var s=(0.4+Math.random()*0.6)*spd;
    TDS.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:0.4+Math.random()*0.25,maxLife:0.65,color,size:2+Math.random()*3});
  }
}

// ── Hit an enemy ───────────────────────────────────────
function td_hit(e,dmg,burn,knockback){
  if(!e||e.hp<=0) return;
  // Angel block
  if(e.angelBlock>0){
    e.angelHits++;
    if(e.angelHits%e.angelBlock===0){
      td_particles(e.x,e.y,'#FFD700',8,70);
      return;
    }
  }
  // Boss shield
  if(e.shieldHp>0){
    e.shieldHp=Math.max(0,e.shieldHp-dmg);
    td_particles(e.x,e.y,'#CC00FF',5,50);
    e.hitFlash=0.1;
    return;
  }
  e.hp-=dmg;
  e.hitFlash=0.12;
  if(burn&&!e.burning){e.burning=true;e.burnTimer=0;}
  if(knockback){
    // Push back along path (increase dist backwards — decrease dist)
    e.dist=Math.max(0,e.dist-40);
    var pos=td_pathAt(e.dist);
    e.x=pos.x;e.y=pos.y;
    td_particles(e.x,e.y,'#FF6B35',6,70);
  }
}

// ── Main update ────────────────────────────────────────
function td_update(dt){
  if(!TDS.active||!TDS.stage) return;

  // Result countdown must run even when won/lost
  if(TDS.showResult){
    TDS.resultTimer-=dt;
    if(TDS.resultTimer<=0){
      TDS.showResult=false;
      if(TDS.won&&TDS.onWin) TDS.onWin();
      else if(TDS.lost&&TDS.onLose) TDS.onLose();
    }
    return;
  }
  if(TDS.won||TDS.lost) return;

  TDS.mana=Math.min(TDS.maxMana,TDS.mana+TDS.manaRegen*dt);

  // Spawn queue
  if(TDS.waveActive){
    TDS.spawnTimer+=dt;
    while(TDS.spawnQueue.length>0&&TDS.spawnTimer>=TDS.spawnQueue[0].delay){
      td_spawnEnemy(TDS.spawnQueue.shift());
    }
    if(TDS.spawnQueue.length===0) TDS.waveActive=false;
  }

  // Between-wave countdown
  if(!TDS.waveActive&&TDS.enemies.length===0&&!TDS.allWavesDone){
    if(TDS.waveIdx<TDS.stage.waves.length){
      if(TDS._nextWaveCountdown<=0){
        TDS._nextWaveCountdown=2.0;
      }
      TDS._nextWaveCountdown-=dt;
      if(TDS._nextWaveCountdown<=0) td_startWave();
    } else {
      TDS.allWavesDone=true;
    }
  }

  // Win
  if(TDS.allWavesDone&&TDS.enemies.length===0&&!TDS.won){
    TDS.won=true;TDS.showResult=true;TDS.resultTimer=2.2;
    SFX&&SFX.victory&&SFX.victory();
    return;
  }

  // Particles
  for(var pi=TDS.particles.length-1;pi>=0;pi--){
    var p=TDS.particles[pi];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=100*dt;p.life-=dt;
    if(p.life<=0) TDS.particles.splice(pi,1);
  }

  // Projectiles — move toward current enemy position (homing)
  for(var ri=TDS.projectiles.length-1;ri>=0;ri--){
    var proj=TDS.projectiles[ri];
    var en=TDS.enemies.find(function(e){return e.id===proj.eid;});
    if(!en||en.hp<=0){
      TDS.projectiles.splice(ri,1);
      continue;
    }
    // Update target position (homing)
    proj.tx=en.x;proj.ty=en.y;
    var dx=proj.tx-proj.x,dy=proj.ty-proj.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    var spd=260*dt;
    if(d<=spd+en.r){
      // Hit
      td_hit(en,proj.dmg,proj.burn||false,proj.knockback||false);
      td_particles(en.x,en.y,proj.color,4,40);
      TDS.projectiles.splice(ri,1);
    } else {
      proj.x+=dx/d*spd;proj.y+=dy/d*spd;
    }
  }

  // Enemies — move along path
  var pathTotal=TDS._pathLen||(TDS._pathLen=td_pathLen());
  for(var ei=TDS.enemies.length-1;ei>=0;ei--){
    var e=TDS.enemies[ei];
    if(e.hp<=0){
      td_particles(e.x,e.y,e.color,8,80);
      TDS.enemies.splice(ei,1);
      continue;
    }

    // Flash
    if(e.hitFlash>0) e.hitFlash=Math.max(0,e.hitFlash-dt);

    // Burn DoT
    if(e.burning){
      e.burnTimer+=dt;
      if(e.burnTimer>=0.8){
        e.burnTimer=0;
        e.hp-=10+(e.plagueBonus||0);
        td_particles(e.x,e.y,'#FF4500',3,40);
        if(e.hp<=0){td_particles(e.x,e.y,e.color,8,80);TDS.enemies.splice(ei,1);continue;}
      }
    }

    // Rage
    if(e.rage>0&&!e.raging&&e.hp/e.maxHp<e.rage){
      e.raging=true;
      e.spd=e.baseSpd*(e.rageMult||1.5);
      td_particles(e.x,e.y,'#FF0000',10,100);
      SFX&&SFX.boss&&SFX.bossAppear&&SFX.bossAppear();
    }

    // Move along path
    var moveSpd=e.spd*(e.slowTimer>0?0.4:1.0);
    if(e.slowTimer>0) e.slowTimer=Math.max(0,e.slowTimer-dt);
    e.dist+=moveSpd*dt;
    var pos=td_pathAt(e.dist);
    e.x=pos.x;e.y=pos.y;

    // Reached end
    if(pos.done||e.dist>=pathTotal){
      TDS.baseHp=Math.max(0,TDS.baseHp-Math.ceil(e.maxHp*0.12+3));
      td_particles(TDS.path[TDS.path.length-1].x,TDS.path[TDS.path.length-1].y,'#FF0000',10,80);
      SFX&&SFX.hit&&SFX.hit();
      TDS.enemies.splice(ei,1);
      if(TDS.baseHp<=0){
        TDS.lost=true;TDS.showResult=true;TDS.resultTimer=2.2;
        SFX&&SFX.defeat&&SFX.defeat();
      }
    }
  }

  // Cache aura units once per frame to avoid nested loop every attack
  TDS._auraUnits=TDS.units.filter(function(u){return u.aura&&u.hp>0;});

  // Units
  for(var ui=TDS.units.length-1;ui>=0;ui--){
    var u=TDS.units[ui];
    if(u.hp<=0){td_particles(u.x,u.y,'#fff',6,60);if(TDS.inspectedUnit&&TDS.inspectedUnit.id===u.id){TDS.inspectedUnit=null;td_refreshInspectPanel();}TDS.units.splice(ui,1);continue;}
    if(u.hitFlash>0) u.hitFlash=Math.max(0,u.hitFlash-dt);
    u.animTick+=dt;
    u.atkCd=Math.max(0,u.atkCd-dt);

    // Heal pulse (Ruth)
    if(u.heal>0){
      u.healCd=Math.max(0,(u.healCd||0)-dt);
      if(u.healCd<=0){
        u.healCd=2.2;
        TDS.units.forEach(function(ally){
          if(ally.id!==u.id&&Math.sqrt((ally.x-u.x)**2+(ally.y-u.y)**2)<u.range+20){
            ally.hp=Math.min(ally.maxHp,ally.hp+u.heal);
            td_particles(ally.x,ally.y,'#4ade80',4,35);
          }
        });
      }
    }

    if(u.atkCd>0) continue;

    // Find closest enemy in range
    var bestEnemy=null,bestDist=u.range;
    TDS.enemies.forEach(function(e){
      var d=Math.sqrt((e.x-u.x)**2+(e.y-u.y)**2);
      if(d<bestDist){bestDist=d;bestEnemy=e;}
    });
    if(!bestEnemy) continue;

    // Aura multiplier (use cached aura positions, updated per unit scan)
    var auraMult=1.0;
    if(TDS._auraUnits){
      for(var ai=0;ai<TDS._auraUnits.length;ai++){
        var au=TDS._auraUnits[ai];
        if(au.id!==u.id&&(au.x-u.x)**2+(au.y-u.y)**2<(au.range+20)**2)
          auraMult=1.25;
      }
    }

    var dmg=Math.floor(u.atk*auraMult);
    var crit=Math.random()<(u.critChance||0);
    if(crit) dmg=Math.floor(dmg*2.0);

    u.atkCd=1.0/u.rate;
    u.hitFlash=0.1;

    // Jesus divine ability — heal all + smite all
    if(u.divine){
      TDS.units.forEach(function(ally){
        if(ally.id!==u.id&&ally.hp<ally.maxHp){
          ally.hp=Math.min(ally.maxHp,ally.hp+30);
          td_particles(ally.x,ally.y,'#FFD700',3,40);
        }
      });
      TDS.enemies.forEach(function(e){
        TDS.projectiles.push({id:td_uid(),x:u.x,y:u.y,tx:e.x,ty:e.y,eid:e.id,dmg:dmg,color:'#FFFFFF',burn:false,knockback:false});
      });
      td_particles(u.x,u.y,'#FFD700',10,120);
      SFX&&SFX.ability&&SFX.ability();
    } else if(u.nuke){
      // Moses: hit ALL enemies on screen
      TDS.enemies.forEach(function(e){
        TDS.projectiles.push({id:td_uid(),x:u.x,y:u.y,tx:e.x,ty:e.y,eid:e.id,dmg:dmg,color:'#FFD700',burn:false,knockback:false});
      });
      td_particles(u.x,u.y,'#FFD700',8,100);
      SFX&&SFX.ability&&SFX.ability();
    } else if(u.aoe){
      // Deborah: hit all enemies in range
      var hit=false;
      var rangeSq=u.range*u.range;
      TDS.enemies.forEach(function(e){
        if((e.x-u.x)**2+(e.y-u.y)**2<rangeSq){
          TDS.projectiles.push({id:td_uid(),x:u.x,y:u.y,tx:e.x,ty:e.y,eid:e.id,dmg:dmg,color:u.color,burn:u.burn,knockback:u.knockback});
          hit=true;
        }
      });
      if(hit) td_particles(u.x,u.y,u.color,4,50);
    } else {
      // Single target
      TDS.projectiles.push({id:td_uid(),x:u.x,y:u.y,tx:bestEnemy.x,ty:bestEnemy.y,eid:bestEnemy.id,dmg:dmg,color:crit?'#FFD700':u.color,burn:u.burn,knockback:u.knockback});
    }
    if(crit) SFX&&SFX.crit&&SFX.crit();
  }

}

// ── Renderer ───────────────────────────────────────────
function td_render(){
  var c=TDS.canvas,ctx=TDS.ctx;
  if(!c||!ctx||!c.width||!c.height) return;
  var W=c.width,H=c.height,T=TDS.TOPBAR,FH=TDS.FIELD_H;
  if(!FH||FH<=0) return;
  var stage=TDS.stage;if(!stage) return;

  // ── Background ──────────────────────────────────────
  var bg=ctx.createLinearGradient(0,T,0,T+FH);
  bg.addColorStop(0,stage.sky||'#0a0808');
  bg.addColorStop(1,stage.bg||'#050505');
  ctx.fillStyle=bg;ctx.fillRect(0,T,W,FH);

  // ── Biblical scenery ────────────────────────────────
  td_drawBgItems(ctx,W,FH,T,TDS.bgItems,Date.now()/1000);

  // ── Path ────────────────────────────────────────────
  if(TDS.path.length>1){
    // Shadow
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=28;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(TDS.path[0].x,TDS.path[0].y);
    TDS.path.forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.stroke();
    // Path surface gradient
    var pg=ctx.createLinearGradient(0,T,0,T+FH);
    pg.addColorStop(0,'#8B6914');pg.addColorStop(1,'#5C3A10');
    ctx.strokeStyle=pg;ctx.lineWidth=22;
    ctx.beginPath();ctx.moveTo(TDS.path[0].x,TDS.path[0].y);
    TDS.path.forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.stroke();
    // Path edge highlight
    ctx.strokeStyle='rgba(255,220,120,0.15)';ctx.lineWidth=20;
    ctx.beginPath();ctx.moveTo(TDS.path[0].x,TDS.path[0].y);
    TDS.path.forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.stroke();
    // Path dots
    TDS.path.forEach(function(p,i){
      if(i===0||i===TDS.path.length-1){
        ctx.fillStyle=i===0?'rgba(255,100,100,0.3)':'rgba(100,255,100,0.3)';
        ctx.beginPath();ctx.arc(p.x,p.y,12,0,Math.PI*2);ctx.fill();
      }
    });
    // Start/end labels
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText('START',TDS.path[0].x,TDS.path[0].y-16);
    ctx.fillText('END',TDS.path[TDS.path.length-1].x,TDS.path[TDS.path.length-1].y-16);
  }

  // ── Grid dots (placement guide) ──────────────────────
  ctx.fillStyle='rgba(255,255,255,0.04)';
  var gSpc=38;
  for(var gx=gSpc;gx<W;gx+=gSpc) for(var gy=T+gSpc;gy<T+FH;gy+=gSpc){
    ctx.beginPath();ctx.arc(gx,gy,2,0,Math.PI*2);ctx.fill();
  }

  // ── Units ────────────────────────────────────────────
  TDS.units.forEach(function(u){
    var flash=u.hitFlash>0;
    var isInspected=TDS.inspectedUnit&&TDS.inspectedUnit.id===u.id;
    var r=22+u.tier*2; // bigger per tier
    var pulse=1+0.06*Math.sin(u.animTick*4);
    ctx.save();ctx.translate(u.x,u.y);
    // Inspected unit highlight ring
    if(isInspected){
      ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.globalAlpha=0.6+0.3*Math.sin(Date.now()/200);
      ctx.beginPath();ctx.arc(0,0,r+8,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
      // Range ring (brighter when inspected)
      ctx.strokeStyle=u.color+'55';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.arc(0,0,u.range,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
    } else {
      // Range ring (faint)
      ctx.strokeStyle=u.color+'22';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(0,0,u.range,0,Math.PI*2);ctx.stroke();
    }
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(0,r*0.55,r*0.7,r*0.2,0,0,Math.PI*2);ctx.fill();
    // Body circle background
    var ug=ctx.createRadialGradient(-r*0.2,-r*0.3,0,0,0,r*pulse);
    ug.addColorStop(0,flash?'#ffffff':u.color+'44');
    ug.addColorStop(1,u.color+'11');
    ctx.fillStyle=ug;
    ctx.beginPath();ctx.arc(0,0,r*pulse,0,Math.PI*2);ctx.fill();
    // Border ring
    ctx.strokeStyle=flash?'#fff':u.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,r*pulse,0,Math.PI*2);ctx.stroke();
    // Draw sprite via offscreen canvas clipped to circle
    var sprId=u.defId||'shepherd';
    var sprFn=DRAW_FN[sprId];
    if(sprFn){
      var offKey='_oc_'+sprId;
      if(!TDS[offKey]){
        var oc=document.createElement('canvas');oc.width=32;oc.height=32;
        sprFn(oc.getContext('2d'),0,1,0);
        TDS[offKey]=oc;
      }
      ctx.save();
      ctx.beginPath();ctx.arc(0,0,r*0.92,0,Math.PI*2);ctx.clip();
      var sc=r*1.84/32;
      ctx.drawImage(TDS[offKey],-16*sc,-13*sc,32*sc,32*sc);
      ctx.restore();
    } else {
      ctx.font=(r*1.0)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(u.emoji,0,1);
    }
    // Shield glow
    if(u.shieldActive){
      ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.globalAlpha=0.5+0.4*Math.sin(Date.now()/180);
      ctx.beginPath();ctx.arc(0,0,r+6,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }
    ctx.restore();
    // HP bar
    var hpPct=u.hp/u.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(u.x-r,u.y+r+3,r*2,5);
    ctx.fillStyle=hpPct>0.5?'#4ade80':hpPct>0.25?'#FFD700':'#ef4444';
    ctx.fillRect(u.x-r,u.y+r+3,r*2*hpPct,5);
    // Tier stars
    if(u.tier>0){
      ctx.fillStyle='#FFD700';ctx.font='bold 10px monospace';ctx.textAlign='center';
      var stars='';for(var _si=0;_si<u.tier;_si++) stars+='★';
      ctx.fillText(stars,u.x,u.y-r-4);
    }
  });

  // ── Enemies ──────────────────────────────────────────
  TDS.enemies.forEach(function(e){
    var flash=e.hitFlash>0;
    var r=e.r;
    ctx.save();ctx.translate(e.x,e.y);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();ctx.ellipse(0,r*0.6,r*0.65,r*0.18,0,0,Math.PI*2);ctx.fill();
    // Body gradient
    var eg=ctx.createRadialGradient(-r*0.25,-r*0.25,0,0,0,r);
    eg.addColorStop(0,flash?'#ffffff':e.color+'FF');
    eg.addColorStop(1,flash?e.color:e.color+'66');
    ctx.fillStyle=eg;
    if(e.shape==='d'){
      ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,0);ctx.lineTo(0,r);ctx.lineTo(-r,0);ctx.closePath();ctx.fill();
    } else if(e.shape==='t'){
      ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,r*0.8);ctx.lineTo(-r,r*0.8);ctx.closePath();ctx.fill();
    } else {
      ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    }
    // Border
    ctx.strokeStyle=e.boss?(e.raging?'#FF0000':e.color):(e.raging?'#FF4400':e.color);
    ctx.lineWidth=e.boss?3:1.5;
    if(e.shape==='d'){ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,0);ctx.lineTo(0,r);ctx.lineTo(-r,0);ctx.closePath();ctx.stroke();}
    else if(e.shape==='t'){ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,r*0.8);ctx.lineTo(-r,r*0.8);ctx.closePath();ctx.stroke();}
    else{ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();}
    // Draw enemy character face/sprite
    ctx.save();
    ctx.beginPath();
    if(e.shape==='d'){ctx.moveTo(0,-r*0.9);ctx.lineTo(r*0.9,0);ctx.lineTo(0,r*0.9);ctx.lineTo(-r*0.9,0);ctx.closePath();}
    else if(e.shape==='t'){ctx.moveTo(0,-r*0.9);ctx.lineTo(r*0.85,r*0.75);ctx.lineTo(-r*0.85,r*0.75);ctx.closePath();}
    else{ctx.arc(0,0,r*0.9,0,Math.PI*2);}
    ctx.clip();
    var eKey=e.sprId||e.t;
    var eFn=DRAW_FN[eKey]||null;
    if(eFn){
      var offKeyE='_oc_'+eKey;
      if(!TDS[offKeyE]){
        var oe=document.createElement('canvas');oe.width=32;oe.height=32;
        eFn(oe.getContext('2d'),0,1,0);
        TDS[offKeyE]=oe;
      }
      var esc=r*1.9/32;
      ctx.drawImage(TDS[offKeyE],-16*esc,-13*esc,32*esc,32*esc);
    } else {
      ctx.font=(r*1.0)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(e.emoji,0,1);
    }
    ctx.restore();
    // Effects
    if(e.burning){ctx.font='13px serif';ctx.textBaseline='alphabetic';ctx.fillText('🔥',r*0.7,-r*0.5);}
    if(e.raging){
      ctx.strokeStyle='#FF0000';ctx.lineWidth=2;ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()/100);
      ctx.beginPath();ctx.arc(0,0,r+5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }
    // Shield bar
    if(e.shieldHp>0&&e.maxShield){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-r,-r-10,r*2,5);
      ctx.fillStyle='#CC00FF';ctx.fillRect(-r,-r-10,r*2*(e.shieldHp/e.maxShield),5);
    }
    ctx.restore();
    // HP bar
    var hpPct=Math.max(0,e.hp/e.maxHp);
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(e.x-r,e.y-r-10,r*2,5);
    ctx.fillStyle=hpPct>0.5?'#4ade80':hpPct>0.25?'#FFD700':'#ef4444';
    ctx.fillRect(e.x-r,e.y-r-10,r*2*hpPct,5);
    if(e.boss){
      ctx.fillStyle='#FFD700';ctx.font='bold 11px monospace';ctx.textAlign='center';
      ctx.fillText('👑 '+e.t.toUpperCase(),e.x,e.y-r-14);
    }
  });

  // ── Projectiles ───────────────────────────────────────
  TDS.projectiles.forEach(function(proj){
    ctx.save();
    ctx.shadowColor=proj.color;ctx.shadowBlur=8;
    ctx.fillStyle=proj.color;
    ctx.beginPath();ctx.arc(proj.x,proj.y,3.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  });

  // ── Particles ─────────────────────────────────────────
  TDS.particles.forEach(function(p){
    var a=p.life/p.maxLife;
    ctx.globalAlpha=a*0.9;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // ── Top HUD ───────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,T);
  // Left: base HP
  var bhpPct=TDS.baseHp/TDS.maxBaseHp;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(4,8,90,14);
  ctx.fillStyle=bhpPct>0.5?'#4ade80':bhpPct>0.25?'#FFD700':'#ef4444';
  ctx.fillRect(4,8,90*bhpPct,14);
  ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='left';
  ctx.fillText('⛪ '+TDS.baseHp+'/'+TDS.maxBaseHp,8,19);
  // Center: mana
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-50,8,100,14);
  ctx.fillStyle='#3388FF';ctx.fillRect(W/2-50,8,100*(TDS.mana/TDS.maxMana),14);
  ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText('✨ '+Math.floor(TDS.mana),W/2,19);
  // Right: wave
  var wt=TDS.stage.waves.length;var wc=Math.min(TDS.waveIdx,wt);
  ctx.fillStyle='#aaa';ctx.font='bold 13px monospace';ctx.textAlign='right';
  ctx.fillText('Wave '+wc+'/'+wt,W-6,19);
  // Stage name
  ctx.fillStyle=stage.accent||'#C4A35A';ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText(stage.title||'',W/2,T-6);

  // ── Between-wave countdown ────────────────────────────
  if(!TDS.waveActive&&TDS.enemies.length===0&&!TDS.allWavesDone&&TDS._nextWaveCountdown>0){
    var t=Math.ceil(TDS._nextWaveCountdown);
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(W/2-80,FH/2+T-22,160,40);
    ctx.strokeStyle='#4ade80';ctx.lineWidth=1.5;ctx.strokeRect(W/2-80,FH/2+T-22,160,40);
    ctx.fillStyle='#4ade80';ctx.font='bold 16px Georgia';ctx.textAlign='center';
    ctx.fillText('⚔️ Wave Cleared!',W/2,FH/2+T-2);
    ctx.fillStyle='#aaa';ctx.font='13px monospace';
    ctx.fillText('Next wave in '+t+'s',W/2,FH/2+T+14);
  }

  // ── Special message ───────────────────────────────────
  if(stage.special&&TDS.waveIdx===0&&!TDS.waveActive&&TDS.enemies.length===0){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(10,FH/2+T-18,W-20,32);
    ctx.strokeStyle=stage.accent||'#FFD700';ctx.lineWidth=1;ctx.strokeRect(10,FH/2+T-18,W-20,32);
    ctx.fillStyle=stage.accent||'#FFD700';ctx.font='bold 14px Georgia';ctx.textAlign='center';
    ctx.fillText(stage.special,W/2,FH/2+T+4);
  }

  // ── Selected unit / inspect indicator ──────────────────
  if(TDS.selectedUnit){
    var udef=TD_UNITS.find(function(u){return u.id===TDS.selectedUnit;});
    if(udef){
      ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(W/2-90,FH+T-30,180,24);
      ctx.fillStyle=udef.color;ctx.font='bold 14px Georgia';ctx.textAlign='center';
      ctx.fillText(udef.emoji+' Tap field to place '+udef.name,W/2,FH+T-14);
    }
  } else if(TDS.inspectedUnit){
    var iu=TDS.inspectedUnit;
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(W/2-100,FH+T-30,200,24);
    ctx.fillStyle='#FFD700';ctx.font='bold 14px Georgia';ctx.textAlign='center';
    var upgData=TD_UPGRADES[iu.defId];
    var tName=upgData?upgData.tiers[iu.tier].name:iu.defId;
    ctx.fillText(iu.emoji+' '+tName+' (Tier '+(iu.tier+1)+'/3)',W/2,FH+T-14);
  }

  // ── Speed indicator on HUD ────────────────────────────
  if(TDS.gameSpeed>1){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(W-50,T+4,46,18);
    ctx.fillStyle='#FFD700';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText(TDS.gameSpeed+'x ▶▶',W-27,T+16);
  }

  // ── Win / Lose overlay ────────────────────────────────
  if(TDS.showResult){
    ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    if(TDS.won){
      ctx.fillStyle='#4ade80';ctx.font='bold 32px Georgia';ctx.fillText('⚔️ Stage Clear!',W/2,H/2-16);
      ctx.fillStyle='#FFD700';ctx.font='bold 19px monospace';
      ctx.fillText('+'+(TDS.missionRef?TDS.missionRef.stages[TDS.stageIdx].xp:100)+' XP',W/2,H/2+18);
    } else {
      ctx.fillStyle='#ef4444';ctx.font='bold 32px Georgia';ctx.fillText('💀 Defeated',W/2,H/2-16);
      ctx.fillStyle='#888';ctx.font='17px Georgia';ctx.fillText('Tap to return',W/2,H/2+18);
    }
  }
}

// ── Game loop ──────────────────────────────────────────
function td_loop(ts){
  if(!TDS.active){TDS.rafId=null;return;}
  var dt=Math.min((ts-(TDS.lastTime||ts))/1000,0.05);
  TDS.lastTime=ts;
  var spd=TDS.gameSpeed||1;
  for(var si=0;si<spd;si++) td_update(dt);
  td_render();
  TDS._trayTick=(TDS._trayTick||0)+1;
  if(TDS._trayTick%8===0) td_refreshTray();
  TDS.rafId=requestAnimationFrame(td_loop);
}

// ── Layout ────────────────────────────────────────────
function td_calcLayout(){
  var c=TDS.canvas;
  if(!c||!c.width||!c.height) return;
  TDS.W=c.width;TDS.H=c.height;
  TDS.TOPBAR=44;
  TDS.FIELD_H=Math.max(c.height-TDS.TOPBAR-108,80);
  td_buildPath();
  TDS._pathLen=td_pathLen();
  // Generate background scenery items (once per layout)
  TDS.bgItems=td_genBgItems(TDS.W,TDS.FIELD_H,TDS.TOPBAR,TDS.stageKey);
}

// ── Init ──────────────────────────────────────────────
function td_init(canvas,missionRef,stageIdx,onWin,onLose){
  TDS.canvas=canvas;TDS.ctx=canvas.getContext('2d');TDS.active=true;
  TDS.missionRef=missionRef;TDS.stageIdx=stageIdx;
  TDS.stageKey=missionRef.id+'_'+stageIdx;
  TDS.stage=TD_STAGE_WAVES[TDS.stageKey];
  if(!TDS.stage){onWin&&onWin();return;}
  // Store maxShield on enemies that have it (for display)
  TDS.stage.waves.forEach(function(wv){wv.forEach(function(g){if(g.shieldHp)g.maxShield=g.shieldHp;});});
  TDS.baseHp=20;TDS.maxBaseHp=20;
  TDS.mana=120;TDS.maxMana=250;TDS.manaRegen=22;
  TDS.units=[];TDS.enemies=[];TDS.projectiles=[];TDS.particles=[];
  TDS.waveIdx=0;TDS.spawnQueue=[];TDS.spawnTimer=0;
  TDS.waveActive=false;TDS.allWavesDone=false;
  TDS.won=false;TDS.lost=false;TDS.showResult=false;TDS.resultTimer=0;
  TDS.selectedUnit=null;TDS._uid=0;TDS._trayTick=0;
  TDS._nextWaveCountdown=0;
  TDS.gameSpeed=1;TDS.inspectedUnit=null;
  TDS.onWin=onWin;TDS.onLose=onLose;
  TDS.lastTime=performance.now();
  td_calcLayout();
  // First wave starts after 3s
  TDS._nextWaveCountdown=3.0;
  if(TDS.rafId) cancelAnimationFrame(TDS.rafId);
  TDS.rafId=requestAnimationFrame(td_loop);
}

// ── Destroy ───────────────────────────────────────────
function td_destroy(){
  TDS.active=false;
  if(TDS.rafId){cancelAnimationFrame(TDS.rafId);TDS.rafId=null;}
  if(TDS._resizeHandler){window.removeEventListener('resize',TDS._resizeHandler);TDS._resizeHandler=null;}
  TDS.canvas=null;TDS.ctx=null;
  TDS.units=[];TDS.enemies=[];TDS.projectiles=[];TDS.particles=[];
  var el=document.getElementById('tdScreen');if(el)el.remove();
}

// ── SPEED CONTROLS ──────────────────────────────────────

// ── SELL TOWER ──────────────────────────────────────────
function td_sellUnit(){
  var u=TDS.inspectedUnit;if(!u)return;
  var refund=Math.floor(u.totalCost*0.6);
  TDS.mana=Math.min(TDS.maxMana,TDS.mana+refund);
  // Remove unit
  TDS.units=TDS.units.filter(function(v){return v.id!==u.id;});
  td_particles(u.x,u.y,'#3388FF',8,60);
  TDS.inspectedUnit=null;
  SFX&&SFX.click&&SFX.click();
  td_refreshTray();
  td_refreshInspectPanel();
}

// ── UPGRADE TOWER ───────────────────────────────────────
function td_upgradeUnit(){
  var u=TDS.inspectedUnit;if(!u)return;
  var upgrades=TD_UPGRADES[u.defId];if(!upgrades)return;
  var nextTier=u.tier+1;
  if(nextTier>=upgrades.tiers.length)return; // already max
  var tierData=upgrades.tiers[nextTier];
  if(TDS.mana<tierData.cost)return; // can't afford
  TDS.mana-=tierData.cost;
  u.totalCost+=tierData.cost;
  u.tier=nextTier;
  // Apply tier multipliers to BASE stats
  var def=TD_UNITS.find(function(d){return d.id===u.defId;});
  if(!def)return;
  var slowMult=TDS.stage&&TDS.stage.slow?0.75:1.0;
  u.atk=Math.floor(def.atk*tierData.atkMul);
  u.maxHp=Math.floor(def.hp*tierData.hpMul);
  u.hp=Math.min(u.hp+Math.floor(def.hp*(tierData.hpMul-1)*0.5),u.maxHp); // heal some on upgrade
  u.range=Math.floor(def.range*tierData.rangeMul);
  u.rate=def.rate*tierData.rateMul*slowMult;
  // Upgrade special abilities at tier 2
  if(nextTier===2){
    if(u.defId==='david')u.critChance=0.5;
    if(u.defId==='ruth')u.heal=20;
    if(u.defId==='samson')u.aoe=true;
    if(u.defId==='elijah')u.aoe=true;
  }
  if(nextTier>=1&&u.defId==='david')u.critChance=Math.max(u.critChance||0,0.4);
  if(nextTier>=1&&u.defId==='ruth')u.heal=Math.max(u.heal||0,16);
  td_particles(u.x,u.y,'#FFD700',12,100);
  SFX&&SFX.unlock&&SFX.unlock();
  td_refreshTray();
  td_refreshInspectPanel();
}

// ── INSPECT PANEL (upgrade/sell UI) ─────────────────────
function td_refreshInspectPanel(){
  var panel=document.getElementById('tdInspectPanel');
  if(!panel){return;}
  var u=TDS.inspectedUnit;
  if(!u){panel.style.display='none';return;}
  var def=TD_UNITS.find(function(d){return d.id===u.defId;});

  var isMax=!upgrades||u.tier>=upgrades.tiers.length-1;
  var nextTier=isMax?null:upgrades.tiers[u.tier+1];
  var refund=Math.floor(u.totalCost*0.6);
  var canAfford=nextTier&&TDS.mana>=nextTier.cost;

  var tierStars='';for(var ti=0;ti<3;ti++) tierStars+=(ti<=u.tier?'★':'☆');

  panel.style.display='flex';

    <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">

        <div style="font-weight:bold;color:${def.color};font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tierName} <span style="color:#FFD700;font-size:12px">${tierStars}</span></div>

      </div>
