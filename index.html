    :`<div style="font-size:12px;color:#FFD700;font-weight:bold;padding:4px 8px">MAX ★</div>`}
    <button onclick="td_sellUnit()" style="background:#1a0000;border:1px solid #ef444466;color:#ef4444;padding:6px 10px;border-radius:8px;font-size:13px;font-weight:bold;white-space:nowrap;font-family:monospace;touch-action:manipulation">💰 Sell<br>+✨${refund}</button>
    <button onclick="TDS.inspectedUnit=null;td_refreshInspectPanel()" style="background:none;border:1px solid #333;color:#555;padding:4px 6px;border-radius:6px;font-size:14px;touch-action:manipulation">✕</button>`;
}

function td_handleCanvasTap(e){
  e.preventDefault();
  if(TDS.won||TDS.lost){
    if(TDS.lost){td_destroy();go('game');}
    return;
  }
  var c=document.getElementById('tdCanvas');if(!c) return;
  var rect=c.getBoundingClientRect();
  var touch=e.touches?e.touches[0]:e;
  var wx=(touch.clientX-rect.left)*(c.width/rect.width);
  var wy=(touch.clientY-rect.top)*(c.height/rect.height);
  if(wy<TDS.TOPBAR){return;}

  // Check if tapping an existing placed unit (for inspect/upgrade/sell)
  for(var ui=0;ui<TDS.units.length;ui++){
    var uu=TDS.units[ui];
    if(Math.sqrt((uu.x-wx)**2+(uu.y-wy)**2)<28){
      TDS.inspectedUnit=uu;
      TDS.selectedUnit=null;
      td_refreshTray();
      td_refreshInspectPanel();
      return;
    }
  }

  // If tapping empty space, deselect inspection
  if(TDS.inspectedUnit&&!TDS.selectedUnit){
    TDS.inspectedUnit=null;
    td_refreshInspectPanel();
    return;
  }

  if(!TDS.selectedUnit) return;
  if(td_placeUnit(TDS.selectedUnit,wx,wy)){
    td_refreshTray();
  } else {
    td_particles(wx,wy,'#ef4444',5,40);
  }
}

function td_retreat(){
  if(!confirm('Retreat from this stage?')) return;
  td_destroy();G.pd.losses++;persistPlayer();
  go('game');toast('Retreated from mission','ok');
}

// ══════════════════════════════════════════════════════
// STORY MODE ENGINE — Branching narrative missions
// ══════════════════════════════════════════════════════

var STORY_STATE = {mission:null, sceneId:null, totalXp:0, history:[], animPhase:'idle', _animId:null, typeIdx:0, typeTimer:null, typeDone:false};

function beginStoryMission(m){
  STORY_STATE={mission:m,sceneId:'start',totalXp:0,history:[],animPhase:'enter',_animId:null,typeIdx:0,typeTimer:null,typeDone:false};
  G.activeMission=m;G.battleType='story';
  go('story');
}

function story_choose(choiceIdx){
  var st=STORY_STATE,m=st.mission;if(!m)return;
  var scene=m.scenes[st.sceneId];if(!scene||!scene.choices)return;
  var choice=scene.choices[choiceIdx];if(!choice)return;
  SFX&&SFX.click&&SFX.click();
  st.totalXp+=(choice.xp||0);
  st.history.push({sceneId:st.sceneId,choice:choiceIdx});
  if(choice.correct){doFlash('#4ade8033',300);}
  st.sceneId=choice.next;
  st.animPhase='enter';
  st.typeIdx=0;st.typeDone=false;if(st.typeTimer){clearTimeout(st.typeTimer);st.typeTimer=null;}
  var nextScene=m.scenes[st.sceneId];
  if(nextScene&&nextScene.ending){
    st.totalXp+=(nextScene.xpBonus||0);
    G.pd.xp+=st.totalXp+m.xpReward;
    if(!G.completedMissions.includes(m.id)){
      G.completedMissions.push(m.id);
      G.pd.powerups.push({...m.reward});
      if(m.unlockCharId&&!G.unlocked.includes(m.unlockCharId))G.unlocked.push(m.unlockCharId);
    }
    checkUnlocks();persistPlayer();
  }
  render();
}

function story_drawScene(canvas){
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var st=STORY_STATE,m=st.mission;if(!m)return;
  var scene=m.scenes[st.sceneId];if(!scene)return;
  var bg=scene.bg||'sky';
  var t=Date.now()/1000;

  // Sky gradient base
  var grad;
  if(bg==='sky'||bg==='garden'||bg==='garden_glow'||bg==='desert'||bg==='road'||bg==='angel'){
    grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#1a0533');grad.addColorStop(0.4,'#2d1b69');grad.addColorStop(1,'#0a0a0a');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Stars

    for(var i=0;i<40;i++){var rx=(i*73.7+t*60*(i%3+1))%W;var ry=(i*47.3+t*200*(i%2+1))%H;ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-2,ry+8);ctx.stroke();}
  }
  if(bg==='rainbow'||bg==='garden_glow'){
    grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#1a0533');grad.addColorStop(0.3,'#1a2055');grad.addColorStop(1,'#0a1a0a');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Rainbow arc
    var colors=['#FF000044','#FF880044','#FFFF0044','#00FF0044','#0088FF44','#8800FF44'];
    for(var i=0;i<colors.length;i++){
      ctx.strokeStyle=colors[i];ctx.lineWidth=4;ctx.beginPath();ctx.arc(W/2,H*0.7,W*0.35-i*5,Math.PI,0);ctx.stroke();
    }
  }
  if(bg==='build'||bg==='tower'||bg==='city'){
    grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#1a1500');grad.addColorStop(1,'#0a0a00');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  }
  if(bg==='ark'){
    grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#1a1500');grad.addColorStop(1,'#0d0800');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Ark shape
    ctx.fillStyle='#3d2b1f';ctx.beginPath();ctx.moveTo(W*0.15,H*0.65);ctx.quadraticCurveTo(W*0.5,H*0.55,W*0.85,H*0.65);ctx.lineTo(W*0.8,H*0.85);ctx.lineTo(W*0.2,H*0.85);ctx.closePath();ctx.fill();
    ctx.fillStyle='#5a3d2b';ctx.fillRect(W*0.35,H*0.45,W*0.3,H*0.2);
    ctx.fillStyle='#4a2d1b';ctx.fillRect(W*0.45,H*0.38,W*0.1,H*0.07);
  }
  if(bg==='dark_garden'){
    grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0a0015');grad.addColorStop(1,'#050005');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  }

  // Scene-specific decorations
  if(bg==='garden'||bg==='garden_glow'){
    // Trees
    for(var i=0;i<5;i++){
      var tx=W*0.1+i*W*0.2;var ty=H*0.55;
      ctx.fillStyle='#2d1a0a';ctx.fillRect(tx-3,ty,6,H-ty);
      var pulse=bg==='garden_glow'?0.15*Math.sin(t*2+i):0;
      ctx.fillStyle='rgba(34,'+(120+Math.floor(pulse*80))+',34,0.8)';
      ctx.beginPath();ctx.arc(tx,ty-5,18+4*Math.sin(t+i),0,Math.PI*2);ctx.fill();
    }
    // Flowers
    for(var i=0;i<8;i++){var fx=(i*89+33)%W;ctx.fillStyle=['#FF6B6B','#FFD700','#FF69B4','#44AAFF'][i%4];ctx.beginPath();ctx.arc(fx,H*0.85+Math.sin(t*1.5+i)*3,3,0,Math.PI*2);ctx.fill();}
    // Ground
    ctx.fillStyle='#1a3a0a';ctx.fillRect(0,H*0.88,W,H*0.12);
  }
  if(bg==='sea'||bg==='storm'){
    // Waves
    ctx.strokeStyle=bg==='storm'?'rgba(100,150,200,0.4)':'rgba(60,120,180,0.3)';ctx.lineWidth=2;
    for(var w=0;w<3;w++){ctx.beginPath();for(var x=0;x<W;x+=4){ctx.lineTo(x,H*0.6+w*20+Math.sin(t*2+x*0.02+w)*10);}ctx.stroke();}
    if(bg==='storm'){
      // Lightning flash
      if(Math.sin(t*7)>0.95){ctx.fillStyle='rgba(255,255,200,0.15)';ctx.fillRect(0,0,W,H);}
    }
  }
  if(bg==='underwater'){
    // Bubbles
    for(var i=0;i<15;i++){var bx=(i*57.3+t*15)%W;var by=H-(t*20+i*43)%H;ctx.strokeStyle='rgba(100,200,255,0.25)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(bx,by,2+i%3,0,Math.PI*2);ctx.stroke();}
  }
  if(bg==='city'){
    // Buildings
    for(var i=0;i<7;i++){var bx=i*W/7;var bh=H*0.3+Math.sin(i*1.5)*H*0.15;ctx.fillStyle='#1a1500';ctx.fillRect(bx+4,H-bh,W/7-8,bh);
      for(var wy=0;wy<bh-10;wy+=12){for(var wx=6;wx<W/7-14;wx+=10){ctx.fillStyle=Math.random()>0.6?'#FFD70033':'#00000000';ctx.fillRect(bx+wx,H-bh+wy+2,6,8);}}
    }

  if(bg==='desert'||bg==='road'){
    ctx.fillStyle='#2a1f0a';ctx.fillRect(0,H*0.8,W,H*0.2);
    // Sand dunes
    ctx.fillStyle='#3a2f1a';ctx.beginPath();ctx.moveTo(0,H*0.82);
    for(var x=0;x<W;x+=30){ctx.quadraticCurveTo(x+15,H*0.78+Math.sin(x*0.03)*8,x+30,H*0.82);}
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();
    if(bg==='road'){ctx.fillStyle='#4a3d2a';ctx.fillRect(W*0.3,H*0.82,W*0.4,H*0.18);}

  if(bg==='tower'){

    var tw=W*0.25;var th=H*0.7;ctx.fillStyle='#3a2d1a';ctx.fillRect(W/2-tw/2,H-th,tw,th);

  }
  if(bg==='angel'){
    // Glowing angel silhouette
    var ax=W*0.5,ay=H*0.35;var glow=0.3+0.15*Math.sin(t*3);
    ctx.fillStyle='rgba(255,215,0,'+glow+')';ctx.beginPath();ctx.arc(ax,ay,40+10*Math.sin(t*2),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.arc(ax,ay-5,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.moveTo(ax,ay+5);ctx.lineTo(ax-22,ay+30);ctx.lineTo(ax+22,ay+30);ctx.closePath();ctx.fill();
    // Wings

    ctx.beginPath();ctx.moveTo(ax-8,ay+5);ctx.quadraticCurveTo(ax-45,ay-15,ax-35,ay+25);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax+8,ay+5);ctx.quadraticCurveTo(ax+45,ay-15,ax+35,ay+25);ctx.stroke();
  }

  // Floating emoji (scene icon) — small, top-left badge
  var emj=scene.emoji||'📖';
  ctx.font='20px serif';ctx.textAlign='left';
  ctx.fillText(emj,8,24);

  // ── Animated character on canvas ──
  story_drawCharacter(ctx,W,H,t,scene,m);

  // Animated particles based on mood
  var accent=m.accent||'#FFD700';
  for(var i=0;i<8;i++){
    var px=(i*97.3+t*20)%W;var py=(i*61.7+t*10)%H*0.5+H*0.1;
    var alpha=0.1+0.1*Math.sin(t*3+i);
    ctx.fillStyle=accent.slice(0,7)+Math.floor(alpha*255).toString(16).padStart(2,'0');
    ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
  }
}

// ── STORY CHARACTER RENDERER (canvas-based animated figures) ──
var _STORY_CHARS={
  'noah_s':{skin:'#E8B88A',hair:'#5A3A1A',outfit:'#8B6914',name:'Noah'},
  'eden_s':{skin:'#FDDBB4',hair:'#5A3A1A',outfit:'#33AA55',name:'Adam'},
  'jonah_s':{skin:'#C68642',hair:'#2A1A08',outfit:'#4488CC',name:'Jonah'},
  'babel_s':{skin:'#FDDBB4',hair:'#3A2A1A',outfit:'#FFAA33',name:'Nimrod'},
  'balaam_s':{skin:'#E8B88A',hair:'#2A1A08',outfit:'#CC88FF',name:'Balaam'}
};
function story_drawCharacter(ctx,W,H,t,scene,mission){
  var charDef=_STORY_CHARS[mission.id]||{skin:'#FDDBB4',hair:'#2A1A08',outfit:mission.accent||'#C4A35A'};
  var cx=W*0.5,cy=H*0.62;
  var sc=2.2;
  var bob=Math.sin(t*2)*3;
  var breathe=Math.sin(t*3)*1.5;

  ctx.save();
  ctx.translate(cx,cy+bob);

  // Shadow
  var shG=ctx.createRadialGradient(0,28*sc,0,0,28*sc,18*sc);
  shG.addColorStop(0,'rgba(0,0,0,0.35)');shG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shG;
  ctx.beginPath();ctx.ellipse(0,28*sc,16*sc,5*sc,0,0,Math.PI*2);ctx.fill();

  // Legs
  var legW=4*sc,legH=10*sc;
  var walkAnim=Math.sin(t*4)*2*sc;
  ctx.fillStyle=_stDarken(charDef.outfit,30);
  ctx.fillRect(-6*sc,12*sc+walkAnim,legW,legH-walkAnim);
  ctx.fillRect(2*sc,12*sc-walkAnim,legW,legH+walkAnim);
  ctx.fillStyle=charDef.outfit;
  ctx.fillRect(-6*sc,12*sc+walkAnim,legW-1,legH-walkAnim-2);
  ctx.fillRect(2*sc,12*sc-walkAnim,legW-1,legH+walkAnim-2);
  // Shoes
  ctx.fillStyle='#3A2A1A';
  ctx.fillRect(-7*sc,21*sc-walkAnim,legW+2,2*sc);
  ctx.fillRect(1*sc,21*sc+walkAnim,legW+2,2*sc);

  // Body
  var bw=16*sc,bh=14*sc+breathe;
  ctx.fillStyle=_stDarken(charDef.outfit,30);
  ctx.fillRect(-bw/2+bw-2*sc,-4*sc,2*sc,bh);
  ctx.fillRect(-bw/2,-4*sc+bh-2*sc,bw,2*sc);
  var bg=ctx.createLinearGradient(-bw/2,-4*sc,bw/2,bh);
  bg.addColorStop(0,charDef.outfit);bg.addColorStop(1,_stDarken(charDef.outfit,30));
  ctx.fillStyle=bg;ctx.fillRect(-bw/2,-4*sc,bw-2*sc,bh-2*sc);
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(-bw/2+2,-4*sc+2,bw*0.4,bh*0.3);

  // Arms (animated swing)
  var armSwing=Math.sin(t*3)*0.14;
  var aw=4*sc,ah=11*sc;
  ctx.save();ctx.translate(-bw/2-aw,-3*sc);ctx.rotate(-armSwing);
  ctx.fillStyle=_stDarken(charDef.outfit,30);ctx.fillRect(0,0,aw,ah);
  ctx.fillStyle=charDef.outfit;ctx.fillRect(0,0,aw-1,ah-2);
  ctx.fillStyle=charDef.skin;ctx.fillRect(1,ah-3*sc,aw-2,3*sc);
  ctx.restore();
  ctx.save();ctx.translate(bw/2,-3*sc);ctx.rotate(armSwing);
  ctx.fillStyle=_stDarken(charDef.outfit,30);ctx.fillRect(0,0,aw,ah);
  ctx.fillStyle=charDef.outfit;ctx.fillRect(0,0,aw-1,ah-2);
  ctx.fillStyle=charDef.skin;ctx.fillRect(1,ah-3*sc,aw-2,3*sc);
  ctx.restore();

  // Head
  var hw=12*sc,hh=12*sc;
  ctx.fillStyle=_stDarken(charDef.skin,25);
  ctx.fillRect(-hw/2+hw-2*sc,-18*sc,2*sc,hh);
  ctx.fillRect(-hw/2,-18*sc+hh-2*sc,hw,2*sc);
  var hg=ctx.createRadialGradient(-hw*0.15,-18*sc+hh*0.3,0,0,-18*sc+hh/2,hw*0.7);
  hg.addColorStop(0,charDef.skin);hg.addColorStop(1,_stDarken(charDef.skin,25));
  ctx.fillStyle=hg;
  ctx.beginPath();ctx.roundRect(-hw/2,-18*sc,hw-2,hh-2,3);ctx.fill();
  // Hair
  ctx.fillStyle=charDef.hair;
  ctx.beginPath();ctx.roundRect(-hw/2-1,-20*sc,hw+1,hh*0.35,3);ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';
  ctx.fillRect(-hw*0.28,-15*sc,hw*0.2,hw*0.2);
  ctx.fillRect(hw*0.08,-15*sc,hw*0.2,hw*0.2);
  ctx.fillStyle='#1a0a00';
  var blink=Math.sin(t*5)>0.97?0.05:0.14;
  ctx.fillRect(-hw*0.23,-14.5*sc,hw*blink,hw*blink);
  ctx.fillRect(hw*0.13,-14.5*sc,hw*blink,hw*blink);
  // Mouth
  ctx.fillStyle=_stDarken(charDef.skin,30);
  ctx.fillRect(-hw*0.12,-11.5*sc,hw*0.24,1.5);

  // Glow ring
  ctx.globalAlpha=0.25+0.1*Math.sin(t*2);
  ctx.strokeStyle=mission.accent||'#FFD700';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(0,28*sc,14*sc,4*sc,0,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=1;

  ctx.restore();
}
function _stDarken(hex,amt){
  if(!hex||hex.length<7)return '#555';
  var r=Math.max(0,parseInt(hex.slice(1,3),16)-amt);
  var g=Math.max(0,parseInt(hex.slice(3,5),16)-amt);
  var b=Math.max(0,parseInt(hex.slice(5,7),16)-amt);
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}

function story_startAnim(){
  if(STORY_STATE._animId){cancelAnimationFrame(STORY_STATE._animId);STORY_STATE._animId=null;}
  var canvas=document.getElementById('storyCanvas');
  if(!canvas)return;
  function loop(){
    if(G.screen!=='story'){STORY_STATE._animId=null;return;}
    var c=document.getElementById('storyCanvas');
    if(!c){STORY_STATE._animId=null;return;}
    story_drawScene(c);
    STORY_STATE._animId=requestAnimationFrame(loop);
  }
  loop();
  // Start typewriter for current scene
  story_beginType();
}

function story_beginType(){
  var st=STORY_STATE;if(!st.mission)return;
  var scene=st.mission.scenes[st.sceneId];if(!scene||scene.ending)return;
  st.typeIdx=0;st.typeDone=false;
  if(st.typeTimer){clearTimeout(st.typeTimer);st.typeTimer=null;}
  var el=document.getElementById('storyTextBox');
  if(!el)return;
  var fullText=scene.text;
  var choicesBox=document.getElementById('storyChoicesBox');
  if(choicesBox){choicesBox.style.opacity='0';choicesBox.style.pointerEvents='none';}
  function typeStep(){
    if(G.screen!=='story'||st.sceneId!==scene._myId){return;}
    if(st.typeIdx>=fullText.length){
      st.typeDone=true;
      el.innerHTML=fullText;
      if(choicesBox){choicesBox.style.opacity='1';choicesBox.style.pointerEvents='auto';}
      return;
    }
    st.typeIdx++;
    el.innerHTML=fullText.slice(0,st.typeIdx)+'<span style="opacity:.35">|</span>';
    // Pause longer on sentence-ending punctuation for readability
    var ch=fullText[st.typeIdx-1];
    var delay=(ch==='.'||ch==='!'||ch==='?')?280:(ch===','||ch===';'||ch===':'||ch==='—')?160:70;
    st.typeTimer=setTimeout(typeStep,delay);
  }
  // Tag the scene so we can detect scene changes
  scene._myId=st.sceneId;
  typeStep();
}

function story_skipType(){
  var st=STORY_STATE;if(!st.mission)return;
  if(st.typeDone)return;
  if(st.typeTimer){clearTimeout(st.typeTimer);st.typeTimer=null;}
  st.typeDone=true;
  var scene=st.mission.scenes[st.sceneId];if(!scene)return;
  var el=document.getElementById('storyTextBox');
  if(el)el.innerHTML=scene.text;
  var choicesBox=document.getElementById('storyChoicesBox');
  if(choicesBox){choicesBox.style.opacity='1';choicesBox.style.pointerEvents='auto';}
}

    pathDots+=`<div style="width:10px;height:10px;border-radius:50%;background:${accent};display:inline-block;margin:0 2px;opacity:0.6"></div>`;
  }
  pathDots+=`<div style="width:10px;height:10px;border-radius:50%;background:${accent};display:inline-block;margin:0 2px;animation:blink .8s ease infinite"></div>`;

  return`<div style="min-height:100vh;background:radial-gradient(ellipse at center,${m.bgCol},#000);font-family:Georgia,serif;display:flex;flex-direction:column;align-items:center;padding:14px">
    <div style="width:100%;max-width:380px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <button onclick="go('game');toast('Story abandoned')" style="background:none;border:1px solid #333;color:#555;padding:4px 10px;border-radius:6px;font-size:14px;cursor:pointer">← Quit</button>

        <div id="storyTextBox" style="font-size:16px;color:#ddd;line-height:1.6;margin-bottom:14px;text-align:center;min-height:60px" onpointerdown="story_skipType()"></div>
        <div id="storyChoicesBox" style="margin-bottom:10px;opacity:0;transition:opacity .4s;pointer-events:none">${choicesHtml}</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:2px;margin-top:6px">${pathDots}</div>
      </div>
    </div>
  </div>`;
}

var TD_CUTSCENES={

var _cutsceneState={active:false,lines:[],lineIdx:0,charIdx:0,done:false,_rafId:null,_lastTick:0,mission:null,stageIdx:0,data:null};

function playCutscene(mission,stageIdx,onDone){
  var key=mission.id+'_'+stageIdx;
  var data=TD_CUTSCENES[key];
  if(!data){onDone();return;}
  _cutsceneState={active:true,lines:data.lines,lineIdx:0,charIdx:0,done:false,_rafId:null,_lastTick:0,mission:mission,stageIdx:stageIdx,data:data,onDone:onDone};
  var accent=data.accent||mission.accent||'#FFD700';
  document.getElementById('app').innerHTML=`<div id="cutsceneWrap" style="min-height:100vh;background:radial-gradient(ellipse at center,${mission.bgCol||'#0a0a0a'},#000);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;font-family:Georgia,serif;text-align:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent" onpointerdown="cutscene_tap()">
    <canvas id="cutsceneCanvas" width="380" height="180" style="width:100%;max-width:380px;border-radius:12px;margin-bottom:14px;border:1px solid ${accent}33"></canvas>
    <div style="font-size:36px;margin-bottom:6px;animation:storyEmojiBob 1.5s ease-in-out infinite">${data.emoji}</div>
    <div style="font-size:15px;color:${accent};letter-spacing:2px;margin-bottom:4px;font-family:monospace">${mission.title.toUpperCase()}</div>
    <div style="font-size:18px;font-weight:bold;color:#fff;margin-bottom:14px">${data.title}</div>
    <div id="cutsceneText" style="background:rgba(255,255,255,0.05);border:1px solid ${accent}22;border-radius:12px;padding:16px 20px;max-width:320px;min-height:80px;margin-bottom:14px">
      <div id="cutsceneLine" style="font-size:16px;color:#ddd;line-height:1.6"></div>
    </div>
    <div id="cutsceneProg" style="display:flex;gap:4px;margin-bottom:12px"></div>
    <div id="cutsceneBtn" style="opacity:0;transition:opacity .3s">
      <button onpointerdown="event.stopPropagation();cutscene_continue()" style="background:linear-gradient(135deg,${accent},${accent}88);border:none;color:#000;padding:12px 32px;border-radius:10px;font-size:17px;font-weight:bold;cursor:pointer">Continue ▶</button>
    </div>
    <div style="font-size:13px;color:#444;margin-top:8px">Tap anywhere to speed up</div>
  </div>`;
  cutscene_startAnim();
  cutscene_typeNext();
}

function cutscene_tap(){
  var s=_cutsceneState;if(!s.active)return;
  if(s.charIdx<s.lines[s.lineIdx].length){
    // Skip to end of current line
    s.charIdx=s.lines[s.lineIdx].length;
    var el=document.getElementById('cutsceneLine');
    if(el)el.innerHTML=s.lines[s.lineIdx];
  } else if(s.lineIdx<s.lines.length-1){
    // Next line
    s.lineIdx++;s.charIdx=0;
    cutscene_typeNext();
  }
}

function cutscene_typeNext(){
  var s=_cutsceneState;if(!s.active)return;
  var line=s.lines[s.lineIdx];
  var el=document.getElementById('cutsceneLine');
  if(!el)return;
  // Update progress dots
  var progEl=document.getElementById('cutsceneProg');
  if(progEl){
    var dots='';for(var i=0;i<s.lines.length;i++){
      dots+='<div style="width:8px;height:8px;border-radius:50%;background:'+(i<s.lineIdx?'#4ade80':i===s.lineIdx?(s.data.accent||'#FFD700'):'#333')+';transition:background .3s"></div>';
    }
    progEl.innerHTML=dots;
  }
  s.charIdx=0;
  function typeChar(){
    if(!_cutsceneState.active)return;
    if(s.charIdx>=line.length){
      // Line done
      if(s.lineIdx>=s.lines.length-1){
        // All lines done — show continue
        s.done=true;
        var btn=document.getElementById('cutsceneBtn');
        if(btn)btn.style.opacity='1';
      } else {
        // Auto-advance after delay
        setTimeout(function(){
          if(!_cutsceneState.active)return;
          if(s.charIdx>=line.length&&s.lineIdx<s.lines.length-1){
            s.lineIdx++;cutscene_typeNext();
          }
        },2800);
      }
      return;
    }
    s.charIdx++;
    el.innerHTML=line.slice(0,s.charIdx)+'<span style="opacity:.3">|</span>';
    var ch=line[s.charIdx-1];
    var cDelay=(ch==='.'||ch==='!'||ch==='?')?240:(ch===','||ch===';'||ch===':'||ch==='—')?140:55;
    setTimeout(typeChar,cDelay);
  }
  typeChar();
}

function cutscene_continue(){
  var s=_cutsceneState;
  s.active=false;
  if(s._rafId){cancelAnimationFrame(s._rafId);s._rafId=null;}
  if(s.onDone)s.onDone();
}

function cutscene_startAnim(){
  var s=_cutsceneState;
  if(s._rafId){cancelAnimationFrame(s._rafId);s._rafId=null;}
  function loop(){
    if(!_cutsceneState.active){return;}
    var c=document.getElementById('cutsceneCanvas');
    if(!c){return;}
    cutscene_drawCanvas(c);
    _cutsceneState._rafId=requestAnimationFrame(loop);
  }
  loop();
}

function cutscene_drawCanvas(canvas){
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  var s=_cutsceneState;var data=s.data;if(!data)return;
  var t=Date.now()/1000;
  var bg=data.bg||'desert';
  var accent=data.accent||'#FFD700';

  // Background
  var grad=ctx.createLinearGradient(0,0,0,H);
  if(bg==='sea'||bg==='storm'){
    grad.addColorStop(0,'#0a1628');grad.addColorStop(1,'#051020');
  } else if(bg==='angel'){
    grad.addColorStop(0,'#1a0533');grad.addColorStop(0.5,'#0d0020');grad.addColorStop(1,'#0a0a0a');
  } else if(bg==='city'){
    grad.addColorStop(0,'#1a1500');grad.addColorStop(1,'#0a0a00');
  } else {
    grad.addColorStop(0,'#1a0d00');grad.addColorStop(0.6,'#0d0800');grad.addColorStop(1,'#0a0a0a');
  }
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Stars
  for(var i=0;i<20;i++){var sx=(i*137.5+83)%W,sy=(i*89.3+17)%(H*0.5);var br=0.2+0.2*Math.sin(t*2+i);ctx.fillStyle='rgba(255,255,255,'+br+')';ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();}

  // Scene-specific elements
  if(bg==='desert'){
    // Sand and dunes
    ctx.fillStyle='#2a1f0a';ctx.fillRect(0,H*0.75,W,H*0.25);
    ctx.fillStyle='#3a2f1a';ctx.beginPath();ctx.moveTo(0,H*0.78);
    for(var x=0;x<W;x+=25){ctx.quadraticCurveTo(x+12,H*0.72+Math.sin(x*0.04+t*0.5)*6,x+25,H*0.78);}
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();
    // Pyramids silhouette
    ctx.fillStyle='#1a1500';ctx.beginPath();ctx.moveTo(W*0.6,H*0.75);ctx.lineTo(W*0.7,H*0.45);ctx.lineTo(W*0.8,H*0.75);ctx.fill();
    ctx.beginPath();ctx.moveTo(W*0.75,H*0.75);ctx.lineTo(W*0.82,H*0.55);ctx.lineTo(W*0.89,H*0.75);ctx.fill();
  }
  if(bg==='sea'){
    // Waves
    for(var w=0;w<4;w++){ctx.strokeStyle='rgba(60,120,180,'+(0.2+w*0.05)+')';ctx.lineWidth=2;ctx.beginPath();
      for(var x=0;x<W;x+=4){ctx.lineTo(x,H*0.5+w*18+Math.sin(t*2+x*0.015+w)*12);}ctx.stroke();}
    // Moon
    ctx.fillStyle='rgba(255,255,200,0.15)';ctx.beginPath();ctx.arc(W*0.8,H*0.18,20,0,Math.PI*2);ctx.fill();
  }
  if(bg==='angel'){
    // Glowing angel
    var ax=W*0.5,ay=H*0.35;var glow=0.2+0.15*Math.sin(t*3);
    ctx.fillStyle='rgba(255,215,0,'+glow+')';ctx.beginPath();ctx.arc(ax,ay,35+8*Math.sin(t*2),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(ax,ay-3,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.moveTo(ax,ay+4);ctx.lineTo(ax-18,ay+24);ctx.lineTo(ax+18,ay+24);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,215,0,0.25)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ax-6,ay+3);ctx.quadraticCurveTo(ax-35,ay-10,ax-28,ay+20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax+6,ay+3);ctx.quadraticCurveTo(ax+35,ay-10,ax+28,ay+20);ctx.stroke();
  }
  if(bg==='city'){
    for(var i=0;i<7;i++){var bx=i*W/7;var bh=H*0.25+Math.sin(i*1.5)*H*0.12;ctx.fillStyle='#1a1500';ctx.fillRect(bx+3,H-bh,W/7-6,bh);
      for(var wy=0;wy<bh-8;wy+=10){for(var wx=5;wx<W/7-10;wx+=8){ctx.fillStyle=Math.random()>0.6?'#FFD70022':'#00000000';ctx.fillRect(bx+wx,H-bh+wy+2,5,6);}}
    }
  }

  // Floating accent particles
  for(var i=0;i<10;i++){
    var px=(i*97+t*15)%W;var py=(i*61+t*8)%(H*0.6)+H*0.1;
    var alpha=0.08+0.08*Math.sin(t*2.5+i);
    ctx.fillStyle=accent.slice(0,7)+Math.floor(alpha*255).toString(16).padStart(2,'0');
    ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fill();
  }

  // ── Draw animated character figures ──
  var _CS_CHARS={
    moses:{skin:'#FDDBB4',hair:'#DDDDDD',outfit:'#F5F0E8',staff:true},
    david:{skin:'#FDDBB4',hair:'#5C3317',outfit:'#1E3A8A',sling:true},
    elijah:{skin:'#FDDBB4',hair:'#5C3317',outfit:'#8B4513',cloak:true},
    daniel:{skin:'#FDDBB4',hair:'#5C3317',outfit:'#1a1a6a'},
    samson:{skin:'#FDDBB4',hair:'#5C3317',outfit:'#CD7F32',big:true}
  };
  var _CS_EXTRAS={
    moses:[{skin:'#C68642',hair:'#1a1a1a',outfit:'#8B6914',off:-0.28},{skin:'#E8B88A',hair:'#5C3317',outfit:'#7B5B3A',off:-0.15},{skin:'#FDDBB4',hair:'#1a1a1a',outfit:'#5C3317',off:0.22},{skin:'#C68642',hair:'#3A2A1A',outfit:'#6B4226',off:0.32}],
    david:[{skin:'#E8B88A',hair:'#3A2A1A',outfit:'#333',off:0.28,enemy:true}],
    elijah:[],
    daniel:[{skin:'#E8B88A',hair:'#FFD700',outfit:'#333',off:-0.25,lion:true},{skin:'#8B6914',hair:'#8B6914',outfit:'#8B6914',off:0.25,lion:true}],
    samson:[{skin:'#C68642',hair:'#1a1a1a',outfit:'#555',off:-0.25,enemy:true},{skin:'#E8B88A',hair:'#3A2A1A',outfit:'#444',off:0.3,enemy:true}]
  };
  var missionId=s.mission?s.mission.id:'';
  var heroChar=_CS_CHARS[missionId];
  if(heroChar){
    var extras=_CS_EXTRAS[missionId]||[];
    // Draw extras (behind hero)
    for(var ei=0;ei<extras.length;ei++){
      var ex=extras[ei];
      _cutscene_drawFigure(ctx,W,H,t,W*(0.5+ex.off),ex.skin,ex.hair,ex.outfit,1.0,ex.lion,ex.enemy,ei);
    }
    // Draw hero (center, larger)
    _cutscene_drawFigure(ctx,W,H,t,W*0.5,heroChar.skin,heroChar.hair,heroChar.outfit,1.4,false,false,99,heroChar.staff,heroChar.sling);
  }
}

// Animated pixel-art figure for cutscene canvas
function _cutscene_drawFigure(ctx,W,H,t,cx,skin,hair,outfit,sc,isLion,isEnemy,idx,hasStaff,hasSling){
  sc=sc||1.0;
  var bob=Math.sin(t*2+idx*1.3)*2*sc;
  var breathe=Math.sin(t*3+idx)*1*sc;
  var baseY=H*0.78+bob;
  var dk=_stDarken;

  ctx.save();
  ctx.translate(cx,baseY);

  if(isLion){
    // Draw a lion figure
    var ls=sc*0.9;
    ctx.fillStyle='#C4852F';ctx.fillRect(-8*ls,-2*ls,16*ls,8*ls);// body
    ctx.fillStyle='#A06020';ctx.fillRect(-10*ls,-7*ls,8*ls,8*ls);// head
    ctx.fillStyle='#8B6914';// mane
    ctx.beginPath();ctx.arc(-6*ls,-5*ls,6*ls,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#C4852F';ctx.fillRect(-9*ls,-6*ls,5*ls,5*ls);// face
    ctx.fillStyle='#1a0a00';ctx.fillRect(-8*ls,-5*ls,1.5*ls,1.5*ls);// eye
    ctx.fillStyle='#C4852F';// legs
    ctx.fillRect(-6*ls,5*ls,3*ls,6*ls);ctx.fillRect(2*ls,5*ls,3*ls,6*ls);
    // Tail
    ctx.strokeStyle='#A06020';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(8*ls,0);ctx.quadraticCurveTo(14*ls,-8*ls+Math.sin(t*4+idx)*3,12*ls,-12*ls);ctx.stroke();
    ctx.restore();
    return;
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,12*sc,8*sc,2.5*sc,0,0,Math.PI*2);ctx.fill();

  // Legs
  var walk=Math.sin(t*3.5+idx*2)*1.5*sc;
  ctx.fillStyle=dk(outfit,30);
  ctx.fillRect(-3.5*sc,5*sc+walk,2.5*sc,6*sc);ctx.fillRect(1*sc,5*sc-walk,2.5*sc,6*sc);
  ctx.fillStyle='#3A2A1A';// shoes
  ctx.fillRect(-4*sc,10.5*sc+walk,3*sc,1.5*sc);ctx.fillRect(0.5*sc,10.5*sc-walk,3*sc,1.5*sc);

  // Body
  var bw=10*sc,bh=9*sc+breathe;
  ctx.fillStyle=outfit;ctx.fillRect(-bw/2,-3*sc,bw,bh);
  ctx.fillStyle=dk(outfit,25);ctx.fillRect(-bw/2+bw-1.5*sc,-3*sc,1.5*sc,bh);
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(-bw/2+1,-3*sc+1,bw*0.35,bh*0.25);

  // Arms
  var armS=Math.sin(t*2.5+idx)*0.12;
  ctx.save();ctx.translate(-bw/2-2*sc,-2*sc);ctx.rotate(-armS);
  ctx.fillStyle=outfit;ctx.fillRect(0,0,2.5*sc,7*sc);
  ctx.fillStyle=skin;ctx.fillRect(0.5,5.5*sc,1.5*sc,2*sc);
  ctx.restore();
  ctx.save();ctx.translate(bw/2,-2*sc);ctx.rotate(armS);
  ctx.fillStyle=outfit;ctx.fillRect(0,0,2.5*sc,7*sc);
  ctx.fillStyle=skin;ctx.fillRect(0.5,5.5*sc,1.5*sc,2*sc);
  ctx.restore();

  // Head
  var hw=7*sc,hh=7*sc;
  ctx.fillStyle=skin;ctx.fillRect(-hw/2,-11*sc,hw,hh);
  ctx.fillStyle=dk(skin,20);ctx.fillRect(-hw/2+hw-1*sc,-11*sc,1*sc,hh);
  // Hair
  ctx.fillStyle=hair;ctx.fillRect(-hw/2-0.5,-12.5*sc,hw+1,hh*0.32);
  // Eyes
  ctx.fillStyle='#fff';
  ctx.fillRect(-hw*0.28,-9*sc,hw*0.18,hw*0.18);
  ctx.fillRect(hw*0.1,-9*sc,hw*0.18,hw*0.18);
  ctx.fillStyle=isEnemy?'#aa0000':'#1a0a00';
  var blink=Math.sin(t*5+idx*3)>0.97?0.04:0.12;
  ctx.fillRect(-hw*0.22,-8.7*sc,hw*blink,hw*blink);
  ctx.fillRect(hw*0.14,-8.7*sc,hw*blink,hw*blink);
  // Mouth
  ctx.fillStyle=dk(skin,30);ctx.fillRect(-hw*0.1,-7*sc,hw*0.2,1);

  // Enemy marker — darker silhouette tint + red headband
  if(isEnemy){
    ctx.fillStyle='#880000';ctx.fillRect(-hw/2-1,-10.5*sc,hw+2,1.5*sc);
  }

  // Staff (Moses)
  if(hasStaff){
    ctx.fillStyle='#8B6914';ctx.fillRect(bw/2+2*sc,-14*sc,2*sc,24*sc);
    ctx.fillStyle='#FFD700';ctx.fillRect(bw/2+1.5*sc,-15*sc,3*sc,2*sc);
  }
  // Sling (David)
  if(hasSling){
    ctx.strokeStyle='#8B6914';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bw/2+2*sc,-1*sc);
    ctx.quadraticCurveTo(bw/2+8*sc,-6*sc+Math.sin(t*5)*2*sc,bw/2+5*sc,-10*sc);ctx.stroke();
    ctx.fillStyle='#666';ctx.beginPath();ctx.arc(bw/2+5*sc,-10*sc,1.5*sc,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();
}

// RED SEA TAP MINIGAME — rapid tap to part the waters
// ══════════════════════════════════════════════════════

var _rsState={active:false,power:50,taps:0,elapsed:0,duration:15000,people:0,totalPeople:100,won:false,_rafId:null,_start:0,drainRate:4,mission:null,stageIdx:0,onWin:null,onLose:null};

function beginRedSea(mission,stageIdx,onWin,onLose){
  _rsState={active:true,power:50,taps:0,elapsed:0,duration:15000,people:0,totalPeople:100,won:false,_rafId:null,_start:Date.now(),drainRate:4,mission:mission,stageIdx:stageIdx,onWin:onWin,onLose:onLose};
  G.screen='redsea';
  redsea_render();
  redsea_loop();
  // Keyboard support
  window._rsKeyHandler=function(e){if(_rsState.active&&(e.code==='Space'||e.key===' ')){e.preventDefault();redsea_tap();}};
  window.addEventListener('keydown',window._rsKeyHandler);
}

function redsea_tap(){
  if(!_rsState.active)return;
  _rsState.power=Math.min(100,_rsState.power+6);
  _rsState.taps++;
  SFX&&SFX.click&&SFX.click();
}

function redsea_loop(){
  if(!_rsState.active)return;
  var s=_rsState;
  var now=Date.now();
  var dt=(now-s._start)/1000;// seconds
  s.elapsed=now-s._start;

  // Drain power over time (gets harder as time goes on)
  var drain=s.drainRate+(s.elapsed/s.duration)*4;
  s.power=Math.max(0,s.power-drain/60);

  // People cross when power > 30
  if(s.power>30){
    var crossRate=0.8+(s.power-30)/70*1.2;// faster crossing when power higher
    s.people=Math.min(s.totalPeople,s.people+crossRate/60*3);
  }

  // Check win
  if(s.people>=s.totalPeople){
    s.active=false;s.won=true;
    if(window._rsKeyHandler){window.removeEventListener('keydown',window._rsKeyHandler);window._rsKeyHandler=null;}
    redsea_renderVictory();
    return;
  }
  // Check lose (power hits 0 while people still crossing)
  if(s.power<=0&&s.people<s.totalPeople){
    s.active=false;s.won=false;
    if(window._rsKeyHandler){window.removeEventListener('keydown',window._rsKeyHandler);window._rsKeyHandler=null;}
    redsea_renderDefeat();
    return;
  }
  // Time up
  if(s.elapsed>=s.duration){
    s.active=false;
    s.won=s.people>=s.totalPeople*0.7;// 70% is a partial win
    if(window._rsKeyHandler){window.removeEventListener('keydown',window._rsKeyHandler);window._rsKeyHandler=null;}
    if(s.won)redsea_renderVictory();else redsea_renderDefeat();
    return;
  }

  redsea_renderGame();
  s._rafId=requestAnimationFrame(redsea_loop);
}

function redsea_render(){
  var s=_rsState;var m=s.mission;var accent=m?m.accent:'#FFD700';
  document.getElementById('app').innerHTML=`<div style="min-height:100vh;background:radial-gradient(ellipse at center,#000d1a,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;font-family:Georgia,serif;text-align:center">
    <div style="font-size:48px;margin-bottom:8px;animation:victBounce .6s ease infinite">🪄</div>
    <div style="font-size:15px;color:${accent};letter-spacing:2px;margin-bottom:4px;font-family:monospace">LET MY PEOPLE GO</div>
    <div style="font-size:20px;font-weight:bold;color:#fff;margin-bottom:12px">PART THE RED SEA!</div>
    <div style="background:rgba(255,255,255,0.05);border:1px solid #4488CC44;border-radius:12px;padding:16px 20px;max-width:320px;margin-bottom:16px">
      <div style="font-size:16px;color:#ccc;line-height:1.6">Moses raises his staff above the waters! <b>TAP as fast as you can</b> to hold the sea apart while God's people cross!</div>
    </div>
    <div style="font-size:14px;color:#666;margin-bottom:14px">⌨️ Keyboard: SPACEBAR · 🖱️ Mouse/Touch: TAP the screen!</div>
    <button onpointerdown="redsea_startPlay()" style="background:linear-gradient(135deg,#4488CC,#2266AA);border:none;color:#fff;padding:14px 40px;border-radius:12px;font-size:20px;font-weight:bold;cursor:pointer">🌊 Part the Waters!</button>
  </div>`;
}

function redsea_startPlay(){
  _rsState._start=Date.now();_rsState.elapsed=0;_rsState.power=50;_rsState.taps=0;_rsState.people=0;
  redsea_loop();
}

function redsea_renderGame(){
  var s=_rsState;
  var pwr=Math.floor(s.power);
  var ppl=Math.floor(s.people);
  var pct=Math.floor(s.people/s.totalPeople*100);
  var timeLeft=Math.max(0,Math.ceil((s.duration-s.elapsed)/1000));
  var gapWidth=Math.floor(20+s.power*0.6);// gap between water walls in %
  var waterColor=s.power>50?'#1a5599':'#0d3366';
  var dangerPulse=s.power<25?'animation:blink .4s ease infinite;':'';

  document.getElementById('app').innerHTML=`<div onpointerdown="redsea_tap()" style="min-height:100vh;background:#000811;font-family:Georgia,serif;user-select:none;-webkit-tap-highlight-color:transparent;cursor:pointer;overflow:hidden;position:relative">
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none">
      <canvas id="rsCanvas" width="400" height="600" style="width:100%;height:100%"></canvas>
    </div>
    <div style="position:relative;z-index:2;padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:14px;color:#4488CC;font-family:monospace">🌊 RED SEA</div>
        <div style="font-size:14px;color:#aaa;font-family:monospace">⏱️ ${timeLeft}s</div>
      </div>
      <div style="margin-bottom:6px">
        <div style="font-size:12px;color:#888;margin-bottom:2px;${dangerPulse}">STAFF POWER ${pwr<25?'⚠️ LOW!':''}</div>
        <div style="height:12px;background:#111;border-radius:6px;overflow:hidden;border:1px solid #4488CC33">
          <div style="width:${pwr}%;height:100%;background:linear-gradient(90deg,${s.power<25?'#FF4444':'#4488CC'},${s.power<25?'#FF6666':'#66BBFF'});transition:width .05s;border-radius:6px"></div>
        </div>
      </div>
      <div style="margin-bottom:8px">
        <div style="font-size:12px;color:#888;margin-bottom:2px">PEOPLE CROSSED: ${ppl}/${s.totalPeople}</div>
        <div style="height:10px;background:#111;border-radius:5px;overflow:hidden;border:1px solid #4ade8033">
          <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#4ade80,#22cc66);transition:width .1s;border-radius:5px"></div>
        </div>
      </div>
      <div style="text-align:center;margin-top:20px">
        <div style="font-size:60px;margin-bottom:6px;${s.power>70?'animation:victBounce .4s ease infinite;':''}">🪄</div>
        <div style="font-size:15px;color:#FFD700;font-weight:bold;margin-bottom:4px">TAP! TAP! TAP!</div>
        <div style="font-size:13px;color:#555">Taps: ${s.taps}</div>
      </div>
    </div>
  </div>`;
  // Draw the sea canvas
  redsea_drawCanvas();
}

function redsea_drawCanvas(){
  var c=document.getElementById('rsCanvas');if(!c)return;
  var ctx=c.getContext('2d');
  var W=c.width,H=c.height;
  var s=_rsState;
  var t=Date.now()/1000;
  var gapPct=s.power/100;// 0 to 1

  // Background ocean
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#001133');grad.addColorStop(1,'#000811');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Left water wall
  var leftEdge=W*0.5*(1-gapPct);
  var rightEdge=W-leftEdge;

  // Water walls with wave animation
  for(var wall=0;wall<2;wall++){
    var wx=wall===0?0:rightEdge;
    var ww=wall===0?leftEdge:W-rightEdge;
    if(ww<2)continue;
    grad=ctx.createLinearGradient(wx,0,wx+ww,0);
    if(wall===0){grad.addColorStop(0,'#0a2d5a');grad.addColorStop(1,'#1a5599');}
    else{grad.addColorStop(0,'#1a5599');grad.addColorStop(1,'#0a2d5a');}
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(wx,0);
    for(var y=0;y<H;y+=6){
      var wave=Math.sin(t*3+y*0.02)*8*(1-gapPct*0.5);
      var edge=wall===0?leftEdge+wave:rightEdge+wave;
      ctx.lineTo(edge,y);
    }
    ctx.lineTo(wall===0?wx:W,H);
    ctx.lineTo(wx,H);
    ctx.closePath();ctx.fill();

    // Foam on inner edge
    ctx.strokeStyle='rgba(200,230,255,0.3)';ctx.lineWidth=2;
    ctx.beginPath();
    for(var y=0;y<H;y+=4){
      var wave=Math.sin(t*3+y*0.02)*8*(1-gapPct*0.5);
      var edge=wall===0?leftEdge+wave:rightEdge+wave;
      ctx.lineTo(edge,y);
    }
    ctx.stroke();
  }

  // Sea floor (dry path)
  if(gapPct>0.05){
    ctx.fillStyle='#3a2d1a';
    ctx.fillRect(leftEdge,H*0.75,rightEdge-leftEdge,H*0.25);
    // Sand texture
    for(var i=0;i<20;i++){
      var sx=leftEdge+(rightEdge-leftEdge)*((i*73.7)%100)/100;
      var sy=H*0.78+((i*41.3)%50);
      ctx.fillStyle='rgba(60,50,30,0.5)';
      ctx.fillRect(sx,sy,3,2);
    }
  }

  // People crossing (little dots moving through the gap)
  var crossedPct=s.people/s.totalPeople;
  var numVisible=Math.min(30,Math.floor(s.people/2));
  for(var i=0;i<numVisible;i++){
    var px=leftEdge+(rightEdge-leftEdge)*(0.2+0.6*((i*37.7+t*20)%100)/100);
    var py=H*0.6+((i*23.3)%80)+Math.sin(t*2+i)*3;
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
    // Head
    ctx.fillStyle='#cc9966';ctx.beginPath();ctx.arc(px,py-4,2,0,Math.PI*2);ctx.fill();
  }

  // Moses at the front
  if(gapPct>0.1){
    var mx=W/2,my=H*0.55;
    // Staff glow
    var glowR=10+s.power*0.2;
    ctx.fillStyle='rgba(255,215,0,'+(0.1+gapPct*0.2)+')';ctx.beginPath();ctx.arc(mx,my-15,glowR,0,Math.PI*2);ctx.fill();
    // Body
    ctx.fillStyle='#c4a35a';ctx.fillRect(mx-3,my-5,6,14);
    // Head
    ctx.fillStyle='#cc9966';ctx.beginPath();ctx.arc(mx,my-8,4,0,Math.PI*2);ctx.fill();
    // Staff
    ctx.strokeStyle='#8B4513';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(mx+4,my+8);ctx.lineTo(mx+4,my-20);ctx.stroke();
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(mx+4,my-20,3,0,Math.PI*2);ctx.fill();
  }

  // Danger overlay when power low
  if(s.power<25){
    ctx.fillStyle='rgba(255,0,0,'+(0.05+0.05*Math.sin(t*8))+')';
    ctx.fillRect(0,0,W,H);
  }
}

  if(_rsState._rafId){cancelAnimationFrame(_rsState._rafId);_rsState._rafId=null;}
  if(won&&_rsState.onWin)_rsState.onWin();
  else if(!won&&_rsState.onLose)_rsState.onLose();
}


// ── Entry point — replaces startMissionStage ──────────
function beginMissionTD(mission, stageIdx){
  G.activeMission=mission;G.missionStage=stageIdx;G.battleType='mission';
  var stage=mission.stages[stageIdx];
  // Check for special stage types
  if(stage.stageType==='redsea'){
    var accent=mission.accent||'#FFD700';
    document.getElementById('app').innerHTML=`<div style="min-height:100vh;background:radial-gradient(ellipse at center,#000d1a,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:Georgia,serif;text-align:center">
      <div style="font-size:48px;margin-bottom:10px;animation:victBounce .6s ease infinite">🌊</div>
      <div style="font-size:17px;color:${accent};letter-spacing:2px;margin-bottom:4px;font-family:monospace">${mission.title.toUpperCase()}</div>
      <div style="font-size:18px;font-weight:bold;color:#fff;margin-bottom:12px">${stage.title}</div>
      <div style="font-size:15px;color:#4488CC;font-weight:bold;letter-spacing:1px;margin-bottom:10px">🌊 SPECIAL STAGE: TAP CHALLENGE!</div>
      <div style="background:rgba(255,255,255,0.05);border:1px solid #4488CC44;border-radius:12px;padding:16px 20px;max-width:300px;margin-bottom:16px">
        <div style="font-style:italic;color:#ccc;font-size:16px;line-height:1.6">"${stage.story}"</div>
      </div>
      <div style="display:flex;gap:10px;max-width:300px;width:100%">
        <button onclick="go('game')" style="flex:1;background:transparent;border:1px solid #333;color:#555;padding:12px;border-radius:10px;font-size:17px">← Back</button>
        <button onclick="td_launchRedSea()" style="flex:2;background:linear-gradient(135deg,#4488CC,#2266AA);border:none;color:#fff;padding:12px;border-radius:10px;font-size:18px;font-weight:bold">🌊 Begin!</button>
      </div>
    </div>`;
    window._tdLaunchParams={mission,stageIdx};
    return;
  }
  // Show briefing overlay first, then launch TD
  var stageData=TD_STAGE_WAVES[mission.id+'_'+stageIdx];
  var accent=mission.accent||'#C4A35A';
  var isBoss=stageData&&stageData.bossStage;
  document.getElementById('app').innerHTML=`<div style="min-height:100vh;background:radial-gradient(ellipse at center,${mission.bgCol||'#0a0a0a'},#000);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:Georgia,serif;text-align:center">
    <div style="font-size:${isBoss?52:40}px;margin-bottom:10px">${mission.heroEmoji}</div>
    <div style="font-size:17px;color:${accent};letter-spacing:2px;margin-bottom:4px;font-family:monospace">${mission.title.toUpperCase()}</div>
    <div style="font-size:17px;font-weight:bold;color:#fff;margin-bottom:12px">${stage.title}</div>
    ${isBoss?'<div style="font-size:17px;color:#ef4444;font-weight:bold;letter-spacing:1px;margin-bottom:10px">👑 BOSS STAGE</div>':''}
    <div style="background:rgba(255,255,255,0.05);border:1px solid ${accent}44;border-radius:12px;padding:16px 20px;max-width:300px;margin-bottom:16px">
      <div style="font-style:italic;color:#ccc;font-size:16px;line-height:1.6">"${stage.story}"</div>
    </div>
    ${stageData&&stageData.specialMsg?`<div style="font-size:17px;color:${accent};background:rgba(0,0,0,0.4);border:1px solid ${accent}44;border-radius:8px;padding:8px 14px;margin-bottom:14px">${stageData.specialMsg}</div>`:''}
    <div style="font-size:17px;color:#555;margin-bottom:20px">⚔️ Tower Defense — defend your base across ${stageData?stageData.waves.length:3} waves</div>
    <div style="display:flex;gap:10px;max-width:300px;width:100%">
      <button onclick="go('game')" style="flex:1;background:transparent;border:1px solid #333;color:#555;padding:12px;border-radius:10px;font-size:17px">← Back</button>
      <button onclick="td_launch()" style="flex:2;background:linear-gradient(135deg,${accent},${accent}88);border:none;color:#000;padding:12px;border-radius:10px;font-size:18px;font-weight:bold">⚔️ Begin!</button>
    </div>
  </div>`;
  // Store launch params for td_launch()
  window._tdLaunchParams={mission,stageIdx};
}
function td_launchRedSea(){
  var p=window._tdLaunchParams;if(!p)return;
  var mission=p.mission,stageIdx=p.stageIdx;
  beginRedSea(mission,stageIdx,
    function(){ // WIN
      var xp=mission.stages[stageIdx].xp||100;
      G.pd.xp+=xp;G.pd.wins++;persistPlayer();checkUnlocks();
      var nextIdx=stageIdx+1;
      if(nextIdx>=mission.stages.length){
        G.completedMissions.push(mission.id);G.pd.xp+=mission.xpReward;G.pd.powerups.push({...mission.reward});
        if(mission.unlockCharId&&!G.unlocked.includes(mission.unlockCharId))G.unlocked.push(mission.unlockCharId);
        checkUnlocks();persistPlayer();go('mission_complete');
      } else {
        playCutscene(mission,stageIdx,function(){beginMissionTD(mission,nextIdx);});
      }
    },
    function(){ // LOSE
      G.pd.losses++;persistPlayer();
      beginMissionTD(mission,stageIdx);// retry
    }
  );
}
function td_launch(){
  var p=window._tdLaunchParams;if(!p)return;
  var mission=p.mission,stageIdx=p.stageIdx;
  G.screen='td';
  document.getElementById('app').innerHTML=rTowerDefense();
  var canvas=document.getElementById('tdCanvas');
  if(!canvas){go('game');return;}

  function resize(){
    if(!canvas||!canvas.isConnected){
      window.removeEventListener('resize',resize);
      return;
    }
    var r=canvas.getBoundingClientRect();
    var w=Math.max(Math.floor(r.width),320);
    var h=Math.max(Math.floor(r.height),200);
    if(canvas.width!==w||canvas.height!==h){
      canvas.width=w;
      canvas.height=h;
    }
    if(TDS.canvas===canvas) td_calcLayout();
  }
  resize();
  window.addEventListener('resize',resize);
  // Store cleanup ref so td_destroy can remove the listener
  TDS._resizeHandler=resize;

  canvas.addEventListener('touchstart',td_handleCanvasTap,{passive:false});
  canvas.addEventListener('click',td_handleCanvasTap);

  td_init(canvas,mission,stageIdx,
    function(){ // WIN
      td_destroy();
      var xp=mission.stages[stageIdx].xp||100;
      G.pd.xp+=xp;G.pd.wins++;persistPlayer();checkUnlocks();
      var nextIdx=stageIdx+1;
      if(nextIdx>=mission.stages.length){
        // Play final cutscene then mission complete
        playCutscene(mission,stageIdx,function(){
          if(!G.completedMissions.includes(mission.id)){
            G.completedMissions.push(mission.id);
            G.pd.xp+=mission.xpReward;
            G.pd.powerups.push({...mission.reward});
            if(mission.unlockCharId&&!G.unlocked.includes(mission.unlockCharId)) G.unlocked.push(mission.unlockCharId);
            checkUnlocks();persistPlayer();
          }
          go('mission_complete');
        });
      } else {
        // Play cutscene then advance to next stage
        playCutscene(mission,stageIdx,function(){beginMissionTD(mission,nextIdx);});
      }
    },
    function(){ // LOSE
      td_destroy();G.pd.losses++;persistPlayer();
      go('game');toast('⚔️ Defeated! Try again.','ok');
    }
  );
}


// ═══════════════════════════════════════════════════════
// MULTIPLAYER SYSTEM — Firebase RTDB
// Presence: /kc/church/presence/{uid}
// Chat:     /kc/church/chat (last 60 messages)
// 
// The admin pastes their Firebase config in Admin Panel.
// Until configured, the church works in offline mode.
// ═══════════════════════════════════════════════════════

var MP = (function(){
  var db = null;          // Firebase database instance
  var myRef = null;       // my presence ref
  var presenceRef = null; // /kc/church/presence
  var chatRef = null;     // /kc/church/chat
  var connected = false;
  var enabled = false;
  var listeners = [];     // firebase listener unsubscribe fns
  var onPresenceUpdate = null; // callback(peers)
  var onChatMessage = null;    // callback(msg)
  var myUid = null;
  var heartbeatTimer = null;
  var PRESENCE_TTL = 15000; // 15s stale cutoff

  // ── Load Firebase SDK dynamically ─────────────────────
  function loadSDK(cb){
    if(window.firebase&&window.firebase.database){cb();return;}
    var base='https://www.gstatic.com/firebasejs/9.22.2/';
    var s=document.createElement('script');
    s.src=base+'firebase-app-compat.js';
    s.onload=function(){
      var s2=document.createElement('script');
      s2.src=base+'firebase-auth-compat.js';
      s2.onload=function(){
        var s3=document.createElement('script');
        s3.src=base+'firebase-database-compat.js';
        s3.onload=cb;
        document.head.appendChild(s3);
      };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  }

  // ── Connect with config ────────────────────────────────
  function connect(cfg, uid, username, charId, cos, presenceCb, chatCb){
    if(!cfg||!cfg.databaseURL||!cfg.apiKey){return;}
    myUid=uid;
    onPresenceUpdate=presenceCb;
    onChatMessage=chatCb;
    loadSDK(function(){
      try{
        // Init or reuse app
        var app;
        try{ app=firebase.app('kc'); }
        catch(e){ app=firebase.initializeApp(cfg,'kc'); }
        db=firebase.database(app);
        presenceRef=db.ref('kc/church/presence');
        chatRef=db.ref('kc/church/chat');
        myRef=db.ref('kc/church/presence/'+uid);

        // Set presence with onDisconnect cleanup
        var presenceData={
          uid,username,charId,cos,
          x:14,y:20,
          t:Date.now(),
          online:true
        };
        myRef.onDisconnect().remove();
        myRef.set(presenceData);

        // Listen for presence changes
        var pListener=presenceRef.on('value',function(snap){
          var now=Date.now();
          var peers=[];
          snap.forEach(function(child){
            var d=child.val();
            if(d&&d.uid!==uid&&(now-d.t)<PRESENCE_TTL){
              peers.push(d);
            }
          });
          if(onPresenceUpdate) onPresenceUpdate(peers);
        });
        listeners.push(function(){presenceRef.off('value',pListener);});

        // Listen for new chat messages (last 60)
        var cQuery=chatRef.limitToLast(60);
        var cListener=cQuery.on('child_added',function(snap){
          var msg=snap.val();
          if(msg&&onChatMessage) onChatMessage(msg);
        });
        listeners.push(function(){cQuery.off('child_added',cListener);});

        // Heartbeat — update timestamp every 10s to stay alive
        heartbeatTimer=setInterval(function(){
          if(myRef) myRef.update({t:Date.now()});
        },10000);

        connected=true;enabled=true;
        console.log('[KC] Multiplayer connected');
      }catch(e){
        console.warn('[KC] Multiplayer connect failed:',e);
      }
    });
  }

  // ── Update my position ─────────────────────────────────
  function updatePos(x,y,dir){
    if(!myRef||!connected) return;
    myRef.update({x,y,dir,t:Date.now()});
  }

  // ── Send chat message ──────────────────────────────────
  function sendChat(username,text,charId,cos){
    if(!chatRef||!connected||!text.trim()) return;
    chatRef.push({
      uid:myUid,
      username,text:text.trim().slice(0,120),
      charId,cos,
      t:Date.now()
    });
    // Keep only last 80 messages by cleaning old ones
    chatRef.once('value',function(snap){
      var msgs=[];snap.forEach(function(c){msgs.push({key:c.key,t:c.val().t});});
      if(msgs.length>80){
        msgs.sort(function(a,b){return a.t-b.t;});
        msgs.slice(0,msgs.length-60).forEach(function(m){
          chatRef.child(m.key).remove();
        });
      }
    });
  }

  // ── Disconnect ─────────────────────────────────────────
  function disconnect(){
    if(heartbeatTimer){clearInterval(heartbeatTimer);heartbeatTimer=null;}
    listeners.forEach(function(fn){try{fn();}catch(e){}});
    listeners=[];
    if(myRef){myRef.remove().catch(function(){});}
    myRef=null;presenceRef=null;chatRef=null;db=null;
    connected=false;
  }

  return{
    connect,disconnect,updatePos,sendChat,
    isConnected:function(){return connected;},
    isEnabled:function(){return enabled;},
    getDb:function(){return db;},
    getUid:function(){return myUid;},
  };
})();

var PVP_LIVE={
  challengeRef:null,   // Firebase ref for my incoming challenges
  battleRef:null,      // Firebase ref for active battle room
  listeners:[],        // Unsubscribe fns
  state:'idle',        // idle|sent|received|battle|result

function pvp_cleanup(){
  PVP_LIVE.listeners.forEach(function(fn){try{fn();}catch(e){}});
  PVP_LIVE.listeners=[];
  if(PVP_LIVE.sentTimeout){clearTimeout(PVP_LIVE.sentTimeout);PVP_LIVE.sentTimeout=null;}
  if(PVP_LIVE.battleRef){PVP_LIVE.battleRef=null;}
  if(PVP_LIVE.challengeRef){PVP_LIVE.challengeRef=null;}
  PVP_LIVE.state='idle';PVP_LIVE.challengeFrom=null;PVP_LIVE.challengeTo=null;
  PVP_LIVE.roomId=null;PVP_LIVE.role=null;PVP_LIVE.active=false;PVP_LIVE.resultShown=false;

}

// ── Start listening for incoming challenges ───────────
function pvp_startListening(){
  var db=MP.getDb();var uid=MP.getUid();
  if(!db||!uid){
    // Firebase not ready yet — retry every 2s up to 15 tries
    PVP_LIVE._listenRetries=(PVP_LIVE._listenRetries||0)+1;
    if(PVP_LIVE._listenRetries<15){setTimeout(pvp_startListening,2000);}
    return;
  }
  PVP_LIVE._listenRetries=0;
  PVP_LIVE.challengeRef=db.ref('kc/pvp/challenges/'+uid);
  // Clean up any stale challenges on connect
  PVP_LIVE.challengeRef.onDisconnect().remove();
  var listener=PVP_LIVE.challengeRef.on('value',function(snap){
    var data=snap.val();
    if(!data||PVP_LIVE.state==='battle') return;
    // Only respond to fresh challenges (within 30s)
    if(Date.now()-data.t>30000){PVP_LIVE.challengeRef.remove();return;}
    if(data.type==='challenge'&&data.fromUid!==uid){
      PVP_LIVE.challengeFrom=data;
      PVP_LIVE.state='received';
      pvp_showOverlay();
      SFX&&SFX.click&&SFX.click();
    }
    if(data.type==='accepted'&&PVP_LIVE.state==='sent'){
      // Our challenge was accepted — start battle as host
      if(PVP_LIVE.sentTimeout){clearTimeout(PVP_LIVE.sentTimeout);PVP_LIVE.sentTimeout=null;}
      PVP_LIVE.state='battle';
      if(PVP_LIVE._challengeMode==='brawl_coop'){
        brawl_startCoop('host',data.roomId,PVP_LIVE.challengeTo);
      } else {
        pvp_startBattle('host',data.roomId,PVP_LIVE.challengeTo);
      }
    }
    if(data.type==='declined'&&PVP_LIVE.state==='sent'){
      PVP_LIVE.state='idle';
      if(PVP_LIVE.sentTimeout){clearTimeout(PVP_LIVE.sentTimeout);PVP_LIVE.sentTimeout=null;}
      toast('😔 Challenge declined','err');
      pvp_hideOverlay();
      PVP_LIVE.challengeRef.remove();
    }
  });
  PVP_LIVE.listeners.push(function(){PVP_LIVE.challengeRef.off('value',listener);});
  console.log('[KC] PvP challenge listener active for uid:',uid);
}

function pvp_stopListening(){
  pvp_cleanup();
}

// ── Send a challenge to a peer ────────────────────────
function pvp_sendChallenge(peer,mode){
  var db=MP.getDb();var uid=MP.getUid();
  if(!db||!uid||PVP_LIVE.state!=='idle') return;
  mode=mode||'pvp';
  PVP_LIVE.state='sent';
  PVP_LIVE.challengeTo=peer;
  PVP_LIVE._challengeMode=mode;
  // Write challenge to THEIR node
  var theirRef=db.ref('kc/pvp/challenges/'+peer.uid);
  theirRef.set({
    type:'challenge',fromUid:uid,mode:mode,
    username:G.username,charId:G.charId,cos:G.cos,lv:glv(),
    t:Date.now()
  });
  pvp_showOverlay();
  // Auto-cancel after 30s
  PVP_LIVE.sentTimeout=setTimeout(function(){
    if(PVP_LIVE.state==='sent'){
      PVP_LIVE.state='idle';
      toast('⏰ Challenge timed out');
      pvp_hideOverlay();
      theirRef.remove();
      if(PVP_LIVE.challengeRef)PVP_LIVE.challengeRef.remove();
    }
  },30000);
}

// ── Accept / Decline incoming challenge ───────────────
function pvp_acceptChallenge(){
  var db=MP.getDb();var uid=MP.getUid();
  if(!db||!uid||!PVP_LIVE.challengeFrom) return;
  var from=PVP_LIVE.challengeFrom;
  var roomId=uid+'_'+from.fromUid+'_'+Date.now();
  PVP_LIVE.roomId=roomId;
  // Notify challenger we accepted (write to THEIR node)
  var theirRef=db.ref('kc/pvp/challenges/'+from.fromUid);
  theirRef.set({
    type:'accepted',roomId:roomId,
    username:G.username,charId:G.charId,cos:G.cos,lv:glv(),
    t:Date.now()
  });
  // Clean our challenge node
  if(PVP_LIVE.challengeRef)PVP_LIVE.challengeRef.remove();
  // Start battle as guest — route based on mode
  PVP_LIVE.state='battle';
  var peerData={uid:from.fromUid,username:from.username,charId:from.charId,cos:from.cos,lv:from.lv||1};
  if(from.mode==='brawl_coop'){
    brawl_startCoop('guest',roomId,peerData);
  } else {
    pvp_startBattle('guest',roomId,peerData);
  }
}

function pvp_declineChallenge(){
  var db=MP.getDb();var uid=MP.getUid();

// ── Start the live PvP battle ─────────────────────────
function pvp_startBattle(role,roomId,oppPeer){
  var db=MP.getDb();var uid=MP.getUid();
  if(!db||!uid) return;
  PVP_LIVE.role=role;
  PVP_LIVE.roomId=roomId;
  PVP_LIVE.active=true;
  PVP_LIVE.resultShown=false;
  PVP_LIVE.burn=false;PVP_LIVE.defUp=false;PVP_LIVE.sword=false;
  PVP_LIVE.abilityUsesLeft=getAbilityMax();
  PVP_LIVE.log=[];

  var mc=gch();
  PVP_LIVE.myMaxHp=gmhp();
  PVP_LIVE.myHp=PVP_LIVE.myMaxHp;

  var oppChar=ALL_CHARS.find(function(c){return c.id===oppPeer.charId;})||ALL_CHARS[0];
  var oppLv=oppPeer.lv||1;
  PVP_LIVE.oppMaxHp=(oppChar.hp||100)+oppChar.str*2+oppLv*8;
  PVP_LIVE.oppHp=PVP_LIVE.oppMaxHp;
  PVP_LIVE.oppData={username:oppPeer.username,charId:oppPeer.charId,cos:oppPeer.cos||{sk:0,hr:1,ot:0},lv:oppLv,char:oppChar};

  // Host goes first
  PVP_LIVE.turn=(role==='host')?'me':'opp';

  // Write initial state to Firebase battle room
  var roomRef=db.ref('kc/pvp/battles/'+roomId);
  PVP_LIVE.battleRef=roomRef;
  roomRef.onDisconnect().update({disconnected:uid,t:Date.now()});

  var myState={uid:uid,username:G.username,charId:G.charId,cos:G.cos,lv:glv(),hp:PVP_LIVE.myHp,maxHp:PVP_LIVE.myMaxHp};
  if(role==='host'){
    roomRef.child('host').set(myState);
    roomRef.child('turn').set('host');
    roomRef.child('status').set('active');
  }else{
    roomRef.child('guest').set(myState);
  }

  // Listen for opponent actions
  var actRef=roomRef.child('actions');
  var actListener=actRef.on('child_added',function(snap){
    var act=snap.val();
    if(!act||act.by===uid) return;
    // Opponent made a move
    pvp_handleOppAction(act);
  });
  PVP_LIVE.listeners.push(function(){actRef.off('child_added',actListener);});

  // Listen for disconnection
  var statusListener=roomRef.child('disconnected').on('value',function(snap){
    var val=snap.val();
    if(val&&val!==uid&&PVP_LIVE.active){
      pvp_addLog('⚡ Opponent disconnected!');
      pvp_endBattle(true);// win by forfeit
    }
  });
  PVP_LIVE.listeners.push(function(){roomRef.child('disconnected').off('value',statusListener);});

  pvp_addLog('⚔️ LIVE PvP: @'+G.username+' vs @'+oppPeer.username+'!');
  pvp_addLog(PVP_LIVE.turn==='me'?'Your turn!':'Waiting for opponent...');

  // Leave church world and show battle
  pvp_hideOverlay();
  if(G.screen==='church') cw_destroy();
  G.screen='pvp_live';
  pvp_renderBattle();
}

// ── Player attacks in live PvP ────────────────────────
function pvp_attack(type){
  if(!PVP_LIVE.active||PVP_LIVE.turn!=='me') return;
  SFX&&SFX.resume&&SFX.resume();
  var db=MP.getDb();var uid=MP.getUid();
  if(!db||!uid) return;

  var mc=gch();
  var crit=Math.random()<0.15;
  var dmg=0,msg='';

  if(type==='basic'){
    var d=mc.str*2+rand(3,10)+glv()*2;
    if(PVP_LIVE.sword){d*=2;PVP_LIVE.sword=false;msg='⚔️ HOLY SWORD! ';}
    if(crit) d=Math.floor(d*1.8);
    dmg=Math.max(1,d-Math.floor(2));
    msg+=crit?'💥 CRIT! '+dmg+' dmg!':mc.name+' hits for '+dmg+'!';
  }else{
    if(PVP_LIVE.abilityUsesLeft<=0){pvp_addLog('⚠️ No ability uses left!');pvp_renderBattle();return;}
    PVP_LIVE.abilityUsesLeft--;
    var d=rand(mc.abilityDmg[0],mc.abilityDmg[1])+glv()*3;
    if(crit) d=Math.floor(d*1.8);
    dmg=Math.max(1,d-1);
    msg=crit?'💥 CRIT '+mc.abilityName+'! '+dmg+'!':'✨ '+mc.abilityName+'! '+dmg+' ('+PVP_LIVE.abilityUsesLeft+' left)';
    doBanner(mc.abilityName,mc.color);
  }

  PVP_LIVE.oppHp=Math.max(0,PVP_LIVE.oppHp-dmg);
  pvp_addLog(msg);

  // Send action to Firebase
  var actRef=PVP_LIVE.battleRef.child('actions');
  actRef.push({by:uid,type:type,dmg:dmg,crit:crit,msg:msg,t:Date.now()});

  // Update HP in room
  var myRole=PVP_LIVE.role;
  var oppRole=myRole==='host'?'guest':'host';
  PVP_LIVE.battleRef.child(oppRole+'/hp').set(PVP_LIVE.oppHp);

  if(PVP_LIVE.oppHp<=0){
    pvp_addLog('🏆 '+PVP_LIVE.oppData.username+' has fallen!');
    PVP_LIVE.battleRef.child('status').set('done');
    PVP_LIVE.battleRef.child('winner').set(uid);
    pvp_endBattle(true);
    return;
  }

  // Pass turn
  PVP_LIVE.turn='opp';
  PVP_LIVE.battleRef.child('turn').set(oppRole);
  pvp_addLog('Waiting for @'+PVP_LIVE.oppData.username+'...');
  pvp_renderBattle();
}

function pvp_usePowerup(i){
  if(!PVP_LIVE.active||PVP_LIVE.turn!=='me') return;
  var pu=G.pd.powerups[i];if(!pu) return;
  G.pd.powerups.splice(i,1);persistPlayer();
  if(pu.effect==='heal'){PVP_LIVE.myHp=Math.min(PVP_LIVE.myMaxHp,PVP_LIVE.myHp+30);pvp_addLog('✨ +30 HP!');}
  if(pu.effect==='defense'){PVP_LIVE.defUp=true;pvp_addLog('🛡️ Armor of God!');}
  if(pu.effect==='sword'){PVP_LIVE.sword=true;pvp_addLog('⚔️ Sword ready!');}
  if(pu.effect==='burn'){PVP_LIVE.burn=true;pvp_addLog('🔥 Holy Fire!');}
  // Power-ups don't end turn
  pvp_renderBattle();
}

// ── Handle opponent action ────────────────────────────
function pvp_handleOppAction(act){
  if(!PVP_LIVE.active) return;
  var defMul=PVP_LIVE.defUp?0.5:1;
  var dmg=Math.max(1,Math.floor((act.dmg||10)*defMul));
  PVP_LIVE.myHp=Math.max(0,PVP_LIVE.myHp-dmg);
  PVP_LIVE.defUp=false;

  var oppName=PVP_LIVE.oppData?PVP_LIVE.oppData.username:'Opponent';
  if(act.crit){
    pvp_addLog('💥 @'+oppName+' CRIT! '+dmg+' dmg!');
  }else{
    pvp_addLog('⚔️ @'+oppName+' hits for '+dmg+'!');
  }
  doFlash('#FF000033',220);

  if(PVP_LIVE.myHp<=0){
    pvp_addLog('💀 You have fallen...');
    pvp_endBattle(false);
    return;
  }

  PVP_LIVE.turn='me';
  pvp_addLog('Your turn!');
  pvp_renderBattle();
}

// ── End battle ─────────────────────────────────────────
function pvp_endBattle(won){
  PVP_LIVE.active=false;
  var xp=won?rand(80,150):rand(10,30);
  G.pd.xp+=xp;
  if(won){G.pd.pvpWins++;G.pd.wins++;}
  else{G.pd.pvpLosses++;G.pd.losses++;}
  checkUnlocks();persistPlayer();
  SFX&&(won?SFX.victory&&SFX.victory():SFX.defeat&&SFX.defeat());
  if(won){doFlash('#FFD70066',500);pvp_addLog('🏆 VICTORY! +'+xp+' XP');}
  else{pvp_addLog('💀 Defeated... +'+xp+' XP');}
  PVP_LIVE.state='result';
  PVP_LIVE.resultXp=xp;
  PVP_LIVE.resultWon=won;
  pvp_renderBattle();
  // Cleanup Firebase refs after 5s
  setTimeout(function(){
    if(PVP_LIVE.battleRef){
      try{PVP_LIVE.battleRef.remove();}catch(e){}
    }
    pvp_cleanup();
  },8000);
}

function pvp_addLog(msg){PVP_LIVE.log=[msg].concat(PVP_LIVE.log).slice(0,8);}

function pvp_flee(){
  if(!PVP_LIVE.active) return;
  var db=MP.getDb();var uid=MP.getUid();
  pvp_addLog('🏃 You fled the battle!');
  if(PVP_LIVE.battleRef){
    PVP_LIVE.battleRef.child('disconnected').set(uid);
  }
  pvp_endBattle(false);
}

  if(el) el.style.display='none';
}

function pvp_cancelChallenge(){
  var db=MP.getDb();
  if(PVP_LIVE.challengeTo&&db){
    db.ref('kc/pvp/challenges/'+PVP_LIVE.challengeTo.uid).remove();
  }
  if(PVP_LIVE.sentTimeout){clearTimeout(PVP_LIVE.sentTimeout);PVP_LIVE.sentTimeout=null;}
  PVP_LIVE.state='idle';PVP_LIVE.challengeTo=null;
  pvp_hideOverlay();
}

function cwm_connect(){
  var cfg=CFG.firebaseCfg;
  if(!cfg||!cfg.apiKey) return; // offline mode
  var uid=G.pd.playerId||(G.pd.playerId=Math.random().toString(36).slice(2,10));
  persistPlayer();
  MP.connect(
    cfg, uid, G.username, G.charId, G.cos,
    function(peers){ // presence update
      CWM.peers=peers;
    },
    function(msg){ // chat message
      // Avoid duplicates
      if(CWM.chatLog.find(function(m){return m.t===msg.t&&m.uid===msg.uid;})) return;
      CWM.chatLog.push(msg);
      if(CWM.chatLog.length>60) CWM.chatLog.shift();
      if(!CWM.chatOpen&&msg.uid!==G.pd.playerId) CWM.unread++;
      // Show brief toast for chat messages from others
      if(msg.uid!==G.pd.playerId){
        var preview=msg.username+': '+msg.text.slice(0,35)+(msg.text.length>35?'…':'');
        // Draw as canvas overlay toast — handled in cw_loop via CWM.lastMsg
        CWM.lastMsg={text:preview,timer:3.5};
      }
    }
  );
  // Start listening for live PvP challenges
  setTimeout(pvp_startListening,500);
}

function cwm_disconnect(){
  pvp_stopListening();
  MP.disconnect();
  CWM.peers=[];
  CWM.chatLog=[];
  CWM.chatOpen=false;
  CWM.unread=0;
}

// Called every frame from cw_loop to sync position
function cwm_syncPos(){
  if(!MP.isConnected()) return;
  MP.updatePos(CWS.px,CWS.py,CWS.pDir);
}

// ── Chat UI (HTML overlay) ─────────────────────────────
function cwm_toggleChat(){
  CWM.chatOpen=!CWM.chatOpen;
  CWM.unread=0;
  var el=document.getElementById('cwChat');
  if(el) el.style.display=CWM.chatOpen?'flex':'none';
  if(CWM.chatOpen){
    var inp=document.getElementById('cwChatInput');
    if(inp) inp.focus();
    cwm_renderChatLog();
    // scroll to bottom
    var log=document.getElementById('cwChatLog');
    if(log) log.scrollTop=log.scrollHeight;
  }
  // Update badge
  var badge=document.getElementById('cwChatBadge');
  if(badge) badge.style.display=CWM.unread>0?'flex':'none';
  if(badge) badge.textContent=CWM.unread;
}

function cwm_renderChatLog(){
  var log=document.getElementById('cwChatLog');
  if(!log) return;
  log.innerHTML=CWM.chatLog.map(function(msg){
    var isMine=msg.uid===G.pd.playerId;
    var ch=ALL_CHARS.find(function(c){return c.id===msg.charId;})||ALL_CHARS[0];
    var r=RARITY[ch.rarity]||RARITY.common;
    return`<div style="display:flex;gap:7px;align-items:flex-start;margin-bottom:8px;${isMine?'flex-direction:row-reverse':''}">
      <div style="width:28px;height:28px;border-radius:50%;background:${r.bg};border:1px solid ${r.color};flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px">${ch.name.slice(0,1)}</div>
      <div style="max-width:70%;${isMine?'align-items:flex-end':''}display:flex;flex-direction:column;gap:2px">
        <span style="font-size:17px;color:${isMine?'#C4A35A':'#888'}">${isMine?'You':('@'+msg.username)}</span>
        <div style="background:${isMine?'#1a1000':'#1a1a2a'};border:1px solid ${isMine?'#C4A35A33':'#333'};border-radius:${isMine?'10px 2px 10px 10px':'2px 10px 10px 10px'};padding:7px 10px;font-size:17px;color:#E8E0D0;line-height:1.4">${escHtml(msg.text)}</div>
      </div>
    </div>`;
  }).join('');
  log.scrollTop=log.scrollHeight;
}

function cwm_sendChat(){
  var inp=document.getElementById('cwChatInput');
  if(!inp||!inp.value.trim()) return;
  var text=inp.value.trim();
  inp.value='';
  MP.sendChat(G.username,text,G.charId,G.cos);
  // Optimistic local add
  CWM.chatLog.push({uid:G.pd.playerId,username:G.username,text,charId:G.charId,cos:G.cos,t:Date.now()});
  if(CWM.chatLog.length>60) CWM.chatLog.shift();
  cwm_renderChatLog();
}

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Draw remote players in church world ───────────────
function cwm_drawPeers(ctx,ts,camX,camY,vw,vh){
  if(!MP.isConnected()) return;
  CWM.peers.forEach(function(peer){
    var wx=peer.x*ts-camX, wy=peer.y*ts-camY;
    if(wx<-ts||wy<-ts||wx>vw+ts||wy>vh+ts) return;
    var ch=ALL_CHARS.find(function(c){return c.id===peer.charId;})||ALL_CHARS[0];
    var r=RARITY[ch.rarity]||RARITY.common;
    var cos=peer.cos||{sk:0,hr:1,ot:0};
    cw_drawChar(ctx,wx,wy,ts,cos.sk,cos.ot,peer.dir||'down',0,'@'+peer.username,false);
    // Online indicator dot
    ctx.fillStyle='#4ade80';
    ctx.beginPath();ctx.arc(wx+ts-4,wy+4,3,0,Math.PI*2);ctx.fill();
    // Challenge indicator when near peer
    if(CWS.nearPeer===peer.uid){
      ctx.save();
      ctx.fillStyle='rgba(126,184,247,0.15)';
      ctx.beginPath();ctx.arc(wx+ts/2,wy+ts/2,ts*0.55,0,Math.PI*2);ctx.fill();
      ctx.font='bold 18px serif';ctx.textAlign='center';
      ctx.shadowColor='#7EB8F7';ctx.shadowBlur=6;
      ctx.fillStyle='#fff';ctx.fillText('⚔️',wx+ts*0.75,wy-8);
      ctx.restore();
    }
  });
  // Draw recent chat bubble
  if(CWM.lastMsg&&CWM.lastMsg.timer>0){
    CWM.lastMsg.timer-=0.016;
    var a=Math.min(1,CWM.lastMsg.timer/0.5);
    ctx.save();ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,0.85)';
    ctx.font='bold 14px Georgia';
    var tw=ctx.measureText(CWM.lastMsg.text).width+20;
    ctx.beginPath();ctx.roundRect((vw-tw)/2,vw>400?70:56,tw,24,6);ctx.fill();
    ctx.strokeStyle='#C4A35A';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#E8DCC0';ctx.textAlign='center';
    ctx.fillText(CWM.lastMsg.text,vw/2,vw>400?86:72);
    ctx.restore();
  }
}

  return CWM.peers.length;
}
