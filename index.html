function td_uid(){return ++TDS._uid;}
function td_irand(a,b){return Math.floor(a+Math.random()*(b-a+1));}

// ── Build pixel path from proportional points ─────────
function td_buildPath(){
  var fw=TDS.W, fh=TDS.FIELD_H, fy=TDS.TOPBAR;
  TDS.path=TD_PATH_PTS.map(function(p){return{x:p[0]*fw,y:fy+p[1]*fh};});
}

// ── Path position helper ───────────────────────────────
// Returns {x,y} at distance d along path, and segment index
function td_pathAt(d){
  var pts=TDS.path;
  for(var i=0;i<pts.length-1;i++){
    var dx=pts[i+1].x-pts[i].x, dy=pts[i+1].y-pts[i].y;
    var segLen=Math.sqrt(dx*dx+dy*dy);
    if(d<=segLen){
      var t=d/segLen;
      return{x:pts[i].x+dx*t,y:pts[i].y+dy*t,seg:i,done:false};
    }
    d-=segLen;
  }
  return{x:pts[pts.length-1].x,y:pts[pts.length-1].y,seg:pts.length-1,done:true};
}

// ── Total path length ──────────────────────────────────
function td_pathLen(){
  var pts=TDS.path,len=0;
  for(var i=0;i<pts.length-1;i++){
    var dx=pts[i+1].x-pts[i].x,dy=pts[i+1].y-pts[i].y;
    len+=Math.sqrt(dx*dx+dy*dy);
  }
  return len;
}

// ── Spawn an enemy ─────────────────────────────────────
function td_spawnEnemy(def){
  var st=TD_ESTYLES[def.t]||{color:'#FF0000',r:14,shape:'r',emoji:'⚔️'};var stSpr=st.t||def.t;
  var slowMult=TDS.stage&&TDS.stage.slow?0.65:1.0;
  var spd=def.spd*slowMult;
  TDS.enemies.push({
    id:td_uid(), t:def.t, sprId:stSpr,
    hp:def.hp, maxHp:def.hp,
    atk:def.atk,
    spd:spd, baseSpd:spd,
    dist:0,         // distance along path
    x:TDS.path[0].x, y:TDS.path[0].y,
    r:st.r, color:st.color, shape:st.shape, emoji:st.emoji,
    boss:def.boss||false,
    rage:def.rage||0, rageMult:def.rageMult||1.5, raging:false,
    shieldHp:def.shieldHp||0,
    angelBlock:def.angelBlock||0, angelHits:0,
    plagueBonus:def.plagueBonus||0,
    burnTimer:0, burning:false,
    hitFlash:0,
    slowTimer:0,    // ice/slow effect
    atkTimer:0,
  });
}

// ── Spawn wave ─────────────────────────────────────────
function td_startWave(){
  if(!TDS.active||TDS.won||TDS.lost) return;
  var stage=TDS.stage;
  if(!stage||TDS.waveIdx>=stage.waves.length){TDS.allWavesDone=true;return;}
  var groups=stage.waves[TDS.waveIdx];
  TDS.spawnQueue=[];
  var delay=0;
  groups.forEach(function(g){
    for(var i=0;i<g.count;i++){
      TDS.spawnQueue.push(Object.assign({},g,{delay:delay}));
      delay+=stage.slow?1.1:0.7;
    }
  });
  TDS.waveIdx++;
  TDS.waveActive=true;
  TDS.spawnTimer=0;
  TDS._nextWaveCountdown=0;
}

// ── Place a unit ───────────────────────────────────────
function td_placeUnit(defId,wx,wy){
  var def=TD_UNITS.find(function(u){return u.id===defId;});
  if(!def||TDS.mana<def.cost) return false;
  // Don't place on path
  for(var i=0;i<TDS.path.length-1;i++){
    var px=TDS.path[i].x,py=TDS.path[i].y;
    var nx=TDS.path[i+1].x,ny=TDS.path[i+1].y;
    // distance from point to segment
    var dx=nx-px,dy=ny-py,len2=dx*dx+dy*dy;
    if(len2===0) continue;
    var t=Math.max(0,Math.min(1,((wx-px)*dx+(wy-py)*dy)/len2));
    var cx2=px+t*dx,cy2=py+t*dy;
    if(Math.sqrt((wx-cx2)**2+(wy-cy2)**2)<30) return false;
  }
  // Don't stack on existing unit
  for(var j=0;j<TDS.units.length;j++){
    if(Math.sqrt((TDS.units[j].x-wx)**2+(TDS.units[j].y-wy)**2)<30) return false;
  }
  TDS.mana-=def.cost;
  var slowMult=TDS.stage&&TDS.stage.slow?0.75:1.0;
  TDS.units.push({
    id:td_uid(), defId:defId,
    x:wx, y:wy,
    hp:def.hp, maxHp:def.hp,
    atk:def.atk, range:def.range,
    rate:def.rate*slowMult,
    aoe:def.aoe||false, burn:def.burn||false,
    knockback:def.knockback||false,
    nuke:def.nuke||false, heal:def.heal||0,
    shield:def.shield||false, aura:def.aura||false,
    critChance:def.critChance||0,
    color:def.color, emoji:def.emoji,
    atkCd:0, healCd:0,
    shieldActive:def.shield||false,
    hitFlash:0, animTick:0,
  });
  td_particles(wx,wy,def.color,10,80);
  SFX&&SFX.click&&SFX.click();
  return true;
}

// ── Particles ──────────────────────────────────────────
function td_particles(x,y,color,n,spd){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2;
    var s=(0.4+Math.random()*0.6)*spd;
    TDS.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:0.5+Math.random()*0.3,maxLife:0.8,color,size:2+Math.random()*3});
  }
}

// ── Hit an enemy ───────────────────────────────────────
function td_hit(e,dmg,burn,knockback){
  if(!e||e.hp<=0) return;
  // Angel block
  if(e.angelBlock>0){
    e.angelHits++;
    if(e.angelHits%e.angelBlock===0){
      td_particles(e.x,e.y,'#FFD700',8,70);
      return;
    }
  }
  // Boss shield
  if(e.shieldHp>0){
    e.shieldHp=Math.max(0,e.shieldHp-dmg);
    td_particles(e.x,e.y,'#CC00FF',5,50);
    e.hitFlash=0.1;
    return;
  }
  e.hp-=dmg;
  e.hitFlash=0.12;
  if(burn&&!e.burning){e.burning=true;e.burnTimer=0;}
  if(knockback){
    // Push back along path (increase dist backwards — decrease dist)
    e.dist=Math.max(0,e.dist-40);
    var pos=td_pathAt(e.dist);
    e.x=pos.x;e.y=pos.y;
    td_particles(e.x,e.y,'#FF6B35',6,70);
  }
}

// ── Main update ────────────────────────────────────────
function td_update(dt){
  if(!TDS.active||TDS.won||TDS.lost||!TDS.stage) return;

  TDS.mana=Math.min(TDS.maxMana,TDS.mana+TDS.manaRegen*dt);

  // Spawn queue
  if(TDS.waveActive){
    TDS.spawnTimer+=dt;
    while(TDS.spawnQueue.length>0&&TDS.spawnTimer>=TDS.spawnQueue[0].delay){
      td_spawnEnemy(TDS.spawnQueue.shift());
    }
    if(TDS.spawnQueue.length===0) TDS.waveActive=false;
  }

  // Between-wave countdown
  if(!TDS.waveActive&&TDS.enemies.length===0&&!TDS.allWavesDone){
    if(TDS.waveIdx<TDS.stage.waves.length){
      if(TDS._nextWaveCountdown<=0){
        TDS._nextWaveCountdown=2.0;
      }
      TDS._nextWaveCountdown-=dt;
      if(TDS._nextWaveCountdown<=0) td_startWave();
    } else {
      TDS.allWavesDone=true;
    }
  }

  // Win
  if(TDS.allWavesDone&&TDS.enemies.length===0&&!TDS.won){
    TDS.won=true;TDS.showResult=true;TDS.resultTimer=2.8;
    SFX&&SFX.victory&&SFX.victory();
    return;
  }

  // Particles
  for(var pi=TDS.particles.length-1;pi>=0;pi--){
    var p=TDS.particles[pi];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=100*dt;p.life-=dt;
    if(p.life<=0) TDS.particles.splice(pi,1);
  }

  // Projectiles — move toward current enemy position (homing)
  for(var ri=TDS.projectiles.length-1;ri>=0;ri--){
    var proj=TDS.projectiles[ri];
    var en=TDS.enemies.find(function(e){return e.id===proj.eid;});
    if(!en||en.hp<=0){
      TDS.projectiles.splice(ri,1);
      continue;
    }
    // Update target position (homing)
    proj.tx=en.x;proj.ty=en.y;
    var dx=proj.tx-proj.x,dy=proj.ty-proj.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    var spd=260*dt;
    if(d<=spd+en.r){
      // Hit
      td_hit(en,proj.dmg,proj.burn||false,proj.knockback||false);
      td_particles(en.x,en.y,proj.color,4,40);
      TDS.projectiles.splice(ri,1);
    } else {
      proj.x+=dx/d*spd;proj.y+=dy/d*spd;
    }
  }

  // Enemies — move along path
  var pathTotal=td_pathLen();
  for(var ei=TDS.enemies.length-1;ei>=0;ei--){
    var e=TDS.enemies[ei];
    if(e.hp<=0){
      td_particles(e.x,e.y,e.color,14,100);
      TDS.enemies.splice(ei,1);
      continue;
    }

    // Flash
    if(e.hitFlash>0) e.hitFlash=Math.max(0,e.hitFlash-dt);

    // Burn DoT
    if(e.burning){
      e.burnTimer+=dt;
      if(e.burnTimer>=0.8){
        e.burnTimer=0;
        e.hp-=10+(e.plagueBonus||0);
        td_particles(e.x,e.y,'#FF4500',3,40);
        if(e.hp<=0){td_particles(e.x,e.y,e.color,14,100);TDS.enemies.splice(ei,1);continue;}
      }
    }

    // Rage
    if(e.rage>0&&!e.raging&&e.hp/e.maxHp<e.rage){
      e.raging=true;
      e.spd=e.baseSpd*(e.rageMult||1.5);
      td_particles(e.x,e.y,'#FF0000',20,130);
      SFX&&SFX.boss&&SFX.bossAppear&&SFX.bossAppear();
    }

    // Move along path
    var moveSpd=e.spd*(e.slowTimer>0?0.4:1.0);
    if(e.slowTimer>0) e.slowTimer=Math.max(0,e.slowTimer-dt);
    e.dist+=moveSpd*dt;
    var pos=td_pathAt(e.dist);
    e.x=pos.x;e.y=pos.y;

    // Reached end
    if(pos.done||e.dist>=pathTotal){
      TDS.baseHp=Math.max(0,TDS.baseHp-Math.ceil(e.maxHp*0.12+3));
      td_particles(TDS.path[TDS.path.length-1].x,TDS.path[TDS.path.length-1].y,'#FF0000',10,80);
      SFX&&SFX.hit&&SFX.hit();
      TDS.enemies.splice(ei,1);
      if(TDS.baseHp<=0){
        TDS.lost=true;TDS.showResult=true;TDS.resultTimer=2.8;
        SFX&&SFX.defeat&&SFX.defeat();
      }
    }
  }

  // Units
  for(var ui=TDS.units.length-1;ui>=0;ui--){
    var u=TDS.units[ui];
    if(u.hp<=0){td_particles(u.x,u.y,'#fff',10,80);TDS.units.splice(ui,1);continue;}
    if(u.hitFlash>0) u.hitFlash=Math.max(0,u.hitFlash-dt);
    u.animTick+=dt;
    u.atkCd=Math.max(0,u.atkCd-dt);

    // Heal pulse (Ruth)
    if(u.heal>0){
      u.healCd=Math.max(0,(u.healCd||0)-dt);
      if(u.healCd<=0){
        u.healCd=2.2;
        TDS.units.forEach(function(ally){
          if(ally.id!==u.id&&Math.sqrt((ally.x-u.x)**2+(ally.y-u.y)**2)<u.range+20){
            ally.hp=Math.min(ally.maxHp,ally.hp+u.heal);
            td_particles(ally.x,ally.y,'#4ade80',4,35);
          }
        });
      }
    }

    if(u.atkCd>0) continue;

    // Find closest enemy in range
    var bestEnemy=null,bestDist=u.range;
    TDS.enemies.forEach(function(e){
      var d=Math.sqrt((e.x-u.x)**2+(e.y-u.y)**2);
      if(d<bestDist){bestDist=d;bestEnemy=e;}
    });
    if(!bestEnemy) continue;

    // Aura multiplier
    var auraMult=1.0;
    TDS.units.forEach(function(ally){
      if(ally.id!==u.id&&ally.aura&&Math.sqrt((ally.x-u.x)**2+(ally.y-u.y)**2)<ally.range+20)
        auraMult=Math.max(auraMult,1.25);
    });

    var dmg=Math.floor(u.atk*auraMult);
    var crit=Math.random()<(u.critChance||0);
    if(crit) dmg=Math.floor(dmg*2.0);

    u.atkCd=1.0/u.rate;
    u.hitFlash=0.1;

    // Jesus divine ability — heal all + smite all
    if(u.divine){
      TDS.units.forEach(function(ally){
        if(ally.id!==u.id&&ally.hp<ally.maxHp){
          ally.hp=Math.min(ally.maxHp,ally.hp+30);
          td_particles(ally.x,ally.y,'#FFD700',5,50);
        }
      });
      TDS.enemies.forEach(function(e){
        TDS.projectiles.push({id:td_uid(),x:u.x,y:u.y,tx:e.x,ty:e.y,eid:e.id,dmg:dmg,color:'#FFFFFF',burn:false,knockback:false});
      });
      td_particles(u.x,u.y,'#FFD700',25,160);
      td_particles(u.x,u.y,'#FFFFFF',15,120);
      SFX&&SFX.ability&&SFX.ability();
    } else if(u.nuke){
      // Moses: hit ALL enemies on screen
      TDS.enemies.forEach(function(e){
        TDS.projectiles.push({id:td_uid(),x:u.x,y:u.y,tx:e.x,ty:e.y,eid:e.id,dmg:dmg,color:'#FFD700',burn:false,knockback:false});
      });
      td_particles(u.x,u.y,'#FFD700',20,150);
      SFX&&SFX.ability&&SFX.ability();
    } else if(u.aoe){
      // Deborah: hit all enemies in range
      var hit=false;
      TDS.enemies.forEach(function(e){
        if(Math.sqrt((e.x-u.x)**2+(e.y-u.y)**2)<u.range){
          TDS.projectiles.push({id:td_uid(),x:u.x,y:u.y,tx:e.x,ty:e.y,eid:e.id,dmg:dmg,color:u.color,burn:u.burn,knockback:u.knockback});
          hit=true;
        }
      });
      if(hit) td_particles(u.x,u.y,u.color,6,70);
    } else {
      // Single target
      TDS.projectiles.push({id:td_uid(),x:u.x,y:u.y,tx:bestEnemy.x,ty:bestEnemy.y,eid:bestEnemy.id,dmg:dmg,color:crit?'#FFD700':u.color,burn:u.burn,knockback:u.knockback});
    }
    if(crit) SFX&&SFX.crit&&SFX.crit();
  }

  // Result countdown
  if(TDS.showResult){
    TDS.resultTimer-=dt;
    if(TDS.resultTimer<=0){
      TDS.showResult=false;
      if(TDS.won&&TDS.onWin) TDS.onWin();
      else if(TDS.lost&&TDS.onLose) TDS.onLose();
    }
  }
}

// ── Renderer ───────────────────────────────────────────
function td_render(){
  var c=TDS.canvas,ctx=TDS.ctx;
  if(!c||!ctx||!c.width||!c.height) return;
  var W=c.width,H=c.height,T=TDS.TOPBAR,FH=TDS.FIELD_H;
  if(!FH||FH<=0) return;
  var stage=TDS.stage;if(!stage) return;

  // ── Background ──────────────────────────────────────
  var bg=ctx.createLinearGradient(0,T,0,T+FH);
  bg.addColorStop(0,stage.sky||'#0a0808');
  bg.addColorStop(1,stage.bg||'#050505');
  ctx.fillStyle=bg;ctx.fillRect(0,T,W,FH);

  // ── Path ────────────────────────────────────────────
  if(TDS.path.length>1){
    // Shadow
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=28;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(TDS.path[0].x,TDS.path[0].y);
    TDS.path.forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.stroke();
    // Path surface gradient
    var pg=ctx.createLinearGradient(0,T,0,T+FH);
    pg.addColorStop(0,'#8B6914');pg.addColorStop(1,'#5C3A10');
    ctx.strokeStyle=pg;ctx.lineWidth=22;
    ctx.beginPath();ctx.moveTo(TDS.path[0].x,TDS.path[0].y);
    TDS.path.forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.stroke();
    // Path edge highlight
    ctx.strokeStyle='rgba(255,220,120,0.15)';ctx.lineWidth=20;
    ctx.beginPath();ctx.moveTo(TDS.path[0].x,TDS.path[0].y);
    TDS.path.forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.stroke();
    // Path dots
    TDS.path.forEach(function(p,i){
      if(i===0||i===TDS.path.length-1){
        ctx.fillStyle=i===0?'rgba(255,100,100,0.3)':'rgba(100,255,100,0.3)';
        ctx.beginPath();ctx.arc(p.x,p.y,12,0,Math.PI*2);ctx.fill();
      }
    });
    // Start/end labels
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText('START',TDS.path[0].x,TDS.path[0].y-16);
    ctx.fillText('END',TDS.path[TDS.path.length-1].x,TDS.path[TDS.path.length-1].y-16);
  }

  // ── Grid dots (placement guide) ──────────────────────
  ctx.fillStyle='rgba(255,255,255,0.04)';
  var gSpc=38;
  for(var gx=gSpc;gx<W;gx+=gSpc) for(var gy=T+gSpc;gy<T+FH;gy+=gSpc){
    ctx.beginPath();ctx.arc(gx,gy,2,0,Math.PI*2);ctx.fill();
  }

  // ── Units ────────────────────────────────────────────
  TDS.units.forEach(function(u){
    var flash=u.hitFlash>0;
    var r=22;
    var pulse=1+0.06*Math.sin(u.animTick*4);
    ctx.save();ctx.translate(u.x,u.y);
    // Range ring (faint)
    ctx.strokeStyle=u.color+'22';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,u.range,0,Math.PI*2);ctx.stroke();
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(0,r*0.55,r*0.7,r*0.2,0,0,Math.PI*2);ctx.fill();
    // Body circle background
    var ug=ctx.createRadialGradient(-r*0.2,-r*0.3,0,0,0,r*pulse);
    ug.addColorStop(0,flash?'#ffffff':u.color+'44');
    ug.addColorStop(1,u.color+'11');
    ctx.fillStyle=ug;
    ctx.beginPath();ctx.arc(0,0,r*pulse,0,Math.PI*2);ctx.fill();
    // Border ring
    ctx.strokeStyle=flash?'#fff':u.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,r*pulse,0,Math.PI*2);ctx.stroke();
    // Draw sprite via offscreen canvas clipped to circle
    var sprId=u.defId||'shepherd';
    var sprFn=DRAW_FN[sprId];
    if(sprFn){
      var offKey='_oc_'+sprId;
      if(!TDS[offKey]){
        var oc=document.createElement('canvas');oc.width=32;oc.height=32;
        sprFn(oc.getContext('2d'),0,1,0);
        TDS[offKey]=oc;
      }
      ctx.save();
      ctx.beginPath();ctx.arc(0,0,r*0.92,0,Math.PI*2);ctx.clip();
      var sc=r*1.84/32;
      ctx.drawImage(TDS[offKey],-16*sc,-13*sc,32*sc,32*sc);
      ctx.restore();
    } else {
      ctx.font=(r*1.0)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(u.emoji,0,1);
    }
    // Shield glow
    if(u.shieldActive){
      ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.globalAlpha=0.5+0.4*Math.sin(Date.now()/180);
      ctx.beginPath();ctx.arc(0,0,r+6,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }
    ctx.restore();
    // HP bar
    var hpPct=u.hp/u.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(u.x-r,u.y+r+3,r*2,5);
    ctx.fillStyle=hpPct>0.5?'#4ade80':hpPct>0.25?'#FFD700':'#ef4444';
    ctx.fillRect(u.x-r,u.y+r+3,r*2*hpPct,5);
  });

  // ── Enemies ──────────────────────────────────────────
  TDS.enemies.forEach(function(e){
    var flash=e.hitFlash>0;
    var r=e.r;
    ctx.save();ctx.translate(e.x,e.y);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();ctx.ellipse(0,r*0.6,r*0.65,r*0.18,0,0,Math.PI*2);ctx.fill();
    // Body gradient
    var eg=ctx.createRadialGradient(-r*0.25,-r*0.25,0,0,0,r);
    eg.addColorStop(0,flash?'#ffffff':e.color+'FF');
    eg.addColorStop(1,flash?e.color:e.color+'66');
    ctx.fillStyle=eg;
    if(e.shape==='d'){
      ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,0);ctx.lineTo(0,r);ctx.lineTo(-r,0);ctx.closePath();ctx.fill();
    } else if(e.shape==='t'){
      ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,r*0.8);ctx.lineTo(-r,r*0.8);ctx.closePath();ctx.fill();
    } else {
      ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    }
    // Border
    ctx.strokeStyle=e.boss?(e.raging?'#FF0000':e.color):(e.raging?'#FF4400':e.color);
    ctx.lineWidth=e.boss?3:1.5;
    if(e.shape==='d'){ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,0);ctx.lineTo(0,r);ctx.lineTo(-r,0);ctx.closePath();ctx.stroke();}
    else if(e.shape==='t'){ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r,r*0.8);ctx.lineTo(-r,r*0.8);ctx.closePath();ctx.stroke();}
    else{ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();}
    // Draw enemy character face/sprite
    ctx.save();
    ctx.beginPath();
    if(e.shape==='d'){ctx.moveTo(0,-r*0.9);ctx.lineTo(r*0.9,0);ctx.lineTo(0,r*0.9);ctx.lineTo(-r*0.9,0);ctx.closePath();}
    else if(e.shape==='t'){ctx.moveTo(0,-r*0.9);ctx.lineTo(r*0.85,r*0.75);ctx.lineTo(-r*0.85,r*0.75);ctx.closePath();}
    else{ctx.arc(0,0,r*0.9,0,Math.PI*2);}
    ctx.clip();
    var eKey=e.sprId||e.t;
    var eFn=DRAW_FN[eKey]||null;
    if(eFn){
      var offKeyE='_oc_'+eKey;
      if(!TDS[offKeyE]){
        var oe=document.createElement('canvas');oe.width=32;oe.height=32;
        eFn(oe.getContext('2d'),0,1,0);
        TDS[offKeyE]=oe;
      }
      var esc=r*1.9/32;
      ctx.drawImage(TDS[offKeyE],-16*esc,-13*esc,32*esc,32*esc);
    } else {
      ctx.font=(r*1.0)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(e.emoji,0,1);
    }
    ctx.restore();
    // Effects
    if(e.burning){ctx.font='10px serif';ctx.textBaseline='alphabetic';ctx.fillText('🔥',r*0.7,-r*0.5);}
    if(e.raging){
      ctx.strokeStyle='#FF0000';ctx.lineWidth=2;ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()/100);
      ctx.beginPath();ctx.arc(0,0,r+5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }
    // Shield bar
    if(e.shieldHp>0&&e.maxShield){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-r,-r-10,r*2,5);
      ctx.fillStyle='#CC00FF';ctx.fillRect(-r,-r-10,r*2*(e.shieldHp/e.maxShield),5);
    }
    ctx.restore();
    // HP bar
    var hpPct=Math.max(0,e.hp/e.maxHp);
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(e.x-r,e.y-r-10,r*2,5);
    ctx.fillStyle=hpPct>0.5?'#4ade80':hpPct>0.25?'#FFD700':'#ef4444';
    ctx.fillRect(e.x-r,e.y-r-10,r*2*hpPct,5);
    if(e.boss){
      ctx.fillStyle='#FFD700';ctx.font='bold 8px monospace';ctx.textAlign='center';
      ctx.fillText('👑 '+e.t.toUpperCase(),e.x,e.y-r-14);
    }
  });

  // ── Projectiles ───────────────────────────────────────
  TDS.projectiles.forEach(function(proj){
    ctx.save();
    ctx.shadowColor=proj.color;ctx.shadowBlur=8;
    ctx.fillStyle=proj.color;
    ctx.beginPath();ctx.arc(proj.x,proj.y,3.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  });

  // ── Particles ─────────────────────────────────────────
  TDS.particles.forEach(function(p){
    var a=p.life/p.maxLife;
    ctx.globalAlpha=a*0.9;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // ── Top HUD ───────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,T);
  // Left: base HP
  var bhpPct=TDS.baseHp/TDS.maxBaseHp;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(4,8,90,14);
  ctx.fillStyle=bhpPct>0.5?'#4ade80':bhpPct>0.25?'#FFD700':'#ef4444';
  ctx.fillRect(4,8,90*bhpPct,14);
  ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='left';
  ctx.fillText('⛪ '+TDS.baseHp+'/'+TDS.maxBaseHp,8,19);
  // Center: mana
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-50,8,100,14);
  ctx.fillStyle='#3388FF';ctx.fillRect(W/2-50,8,100*(TDS.mana/TDS.maxMana),14);
  ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';
  ctx.fillText('✨ '+Math.floor(TDS.mana),W/2,19);
  // Right: wave
  var wt=TDS.stage.waves.length;var wc=Math.min(TDS.waveIdx,wt);
  ctx.fillStyle='#aaa';ctx.font='bold 10px monospace';ctx.textAlign='right';
  ctx.fillText('Wave '+wc+'/'+wt,W-6,19);
  // Stage name
  ctx.fillStyle=stage.accent||'#C4A35A';ctx.font='bold 10px monospace';ctx.textAlign='center';
  ctx.fillText(stage.title||'',W/2,T-6);

  // ── Between-wave countdown ────────────────────────────
  if(!TDS.waveActive&&TDS.enemies.length===0&&!TDS.allWavesDone&&TDS._nextWaveCountdown>0){
    var t=Math.ceil(TDS._nextWaveCountdown);
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(W/2-80,FH/2+T-22,160,40);
    ctx.strokeStyle='#4ade80';ctx.lineWidth=1.5;ctx.strokeRect(W/2-80,FH/2+T-22,160,40);
    ctx.fillStyle='#4ade80';ctx.font='bold 13px Georgia';ctx.textAlign='center';
    ctx.fillText('⚔️ Wave Cleared!',W/2,FH/2+T-2);
    ctx.fillStyle='#aaa';ctx.font='10px monospace';
    ctx.fillText('Next wave in '+t+'s',W/2,FH/2+T+14);
  }

  // ── Special message ───────────────────────────────────
  if(stage.special&&TDS.waveIdx===0&&!TDS.waveActive&&TDS.enemies.length===0){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(10,FH/2+T-18,W-20,32);
    ctx.strokeStyle=stage.accent||'#FFD700';ctx.lineWidth=1;ctx.strokeRect(10,FH/2+T-18,W-20,32);
    ctx.fillStyle=stage.accent||'#FFD700';ctx.font='bold 11px Georgia';ctx.textAlign='center';
    ctx.fillText(stage.special,W/2,FH/2+T+4);
  }

  // ── Selected unit indicator ───────────────────────────
  if(TDS.selectedUnit){
    var udef=TD_UNITS.find(function(u){return u.id===TDS.selectedUnit;});
    if(udef){
      ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(W/2-90,FH+T-30,180,24);
      ctx.fillStyle=udef.color;ctx.font='bold 11px Georgia';ctx.textAlign='center';
      ctx.fillText(udef.emoji+' Tap field to place '+udef.name,W/2,FH+T-14);
    }
  }

  // ── Win / Lose overlay ────────────────────────────────
  if(TDS.showResult){
    ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    if(TDS.won){
      ctx.fillStyle='#4ade80';ctx.font='bold 32px Georgia';ctx.fillText('⚔️ Stage Clear!',W/2,H/2-16);
      ctx.fillStyle='#FFD700';ctx.font='bold 16px monospace';
      ctx.fillText('+'+(TDS.missionRef?TDS.missionRef.stages[TDS.stageIdx].xp:100)+' XP',W/2,H/2+18);
    } else {
      ctx.fillStyle='#ef4444';ctx.font='bold 32px Georgia';ctx.fillText('💀 Defeated',W/2,H/2-16);
      ctx.fillStyle='#888';ctx.font='14px Georgia';ctx.fillText('Tap to return',W/2,H/2+18);
    }
  }
}

// ── Game loop ──────────────────────────────────────────
function td_loop(ts){
  if(!TDS.active){TDS.rafId=null;return;}
  var dt=Math.min((ts-(TDS.lastTime||ts))/1000,0.05);
  TDS.lastTime=ts;
  td_update(dt);
  td_render();
  TDS._trayTick=(TDS._trayTick||0)+1;
  if(TDS._trayTick%8===0) td_refreshTray();
  TDS.rafId=requestAnimationFrame(td_loop);
}

// ── Layout ────────────────────────────────────────────
function td_calcLayout(){
  var c=TDS.canvas;
  if(!c||!c.width||!c.height) return;
  TDS.W=c.width;TDS.H=c.height;
  TDS.TOPBAR=44;
  TDS.FIELD_H=Math.max(c.height-TDS.TOPBAR-108,80);
  td_buildPath();
}

// ── Init ──────────────────────────────────────────────
function td_init(canvas,missionRef,stageIdx,onWin,onLose){
  TDS.canvas=canvas;TDS.ctx=canvas.getContext('2d');TDS.active=true;
  TDS.missionRef=missionRef;TDS.stageIdx=stageIdx;
  TDS.stageKey=missionRef.id+'_'+stageIdx;
  TDS.stage=TD_STAGE_WAVES[TDS.stageKey];
  if(!TDS.stage){onWin&&onWin();return;}
  // Store maxShield on enemies that have it (for display)
  TDS.stage.waves.forEach(function(wv){wv.forEach(function(g){if(g.shieldHp)g.maxShield=g.shieldHp;});});
  TDS.baseHp=20;TDS.maxBaseHp=20;
  TDS.mana=120;TDS.maxMana=250;TDS.manaRegen=22;
  TDS.units=[];TDS.enemies=[];TDS.projectiles=[];TDS.particles=[];
  TDS.waveIdx=0;TDS.spawnQueue=[];TDS.spawnTimer=0;
  TDS.waveActive=false;TDS.allWavesDone=false;
  TDS.won=false;TDS.lost=false;TDS.showResult=false;TDS.resultTimer=0;
  TDS.selectedUnit=null;TDS._uid=0;TDS._trayTick=0;
  TDS._nextWaveCountdown=0;
  TDS.onWin=onWin;TDS.onLose=onLose;
  TDS.lastTime=performance.now();
  td_calcLayout();
  // First wave starts after 3s
  TDS._nextWaveCountdown=3.0;
  if(TDS.rafId) cancelAnimationFrame(TDS.rafId);
  TDS.rafId=requestAnimationFrame(td_loop);
}

// ── Destroy ───────────────────────────────────────────
function td_destroy(){
  TDS.active=false;
  if(TDS.rafId){cancelAnimationFrame(TDS.rafId);TDS.rafId=null;}
  if(TDS._resizeHandler){window.removeEventListener('resize',TDS._resizeHandler);TDS._resizeHandler=null;}
  TDS.canvas=null;TDS.ctx=null;
  TDS.units=[];TDS.enemies=[];TDS.projectiles=[];TDS.particles=[];
  var el=document.getElementById('tdScreen');if(el)el.remove();
}

// ── Unit tray HTML ────────────────────────────────────
function td_getAvailableUnits(){
  return TD_UNITS.filter(function(u){return G.unlocked.includes(u.unlockId);});
}

function td_refreshTray(){
  td_getAvailableUnits().forEach(function(u){
    var btn=document.getElementById('tdu_'+u.id);
    if(!btn) return;
    var canAfford=TDS.mana>=u.cost;
    var sel=TDS.selectedUnit===u.id;
    btn.style.opacity=canAfford?1:0.35;
    btn.style.borderColor=sel?u.color:(canAfford?'#333':'#1a1a1a');
    btn.style.background=sel?u.color+'44':(canAfford?'#111':'#0a0a0a');
    btn.style.transform=sel?'scale(1.08)':'scale(1)';
  });
  var ml=document.getElementById('tdManaLbl');
  if(ml) ml.textContent='✨ '+Math.floor(TDS.mana)+'/'+TDS.maxMana;
  var wl=document.getElementById('tdWaveLbl');
  if(wl&&TDS.stage) wl.textContent='Wave '+Math.min(TDS.waveIdx,TDS.stage.waves.length)+'/'+TDS.stage.waves.length;
}

function rTowerDefense(){
  var avail=td_getAvailableUnits();
  return`<div id="tdScreen" style="position:fixed;inset:0;background:#000;display:flex;flex-direction:column;z-index:100;overflow:hidden">
  <canvas id="tdCanvas" style="flex:1;display:block;touch-action:none;min-height:0;cursor:crosshair"></canvas>
  <div style="background:#0a0a0a;border-top:2px solid #1a1a1a;padding:5px 8px 6px;flex-shrink:0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span id="tdManaLbl" style="font-size:10px;color:#3388FF;font-weight:bold;font-family:monospace">✨ 120/250</span>
      <span style="font-size:9px;color:#555">Select unit → tap field to place</span>
      <span id="tdWaveLbl" style="font-size:10px;color:#888;font-family:monospace">Wave 0/3</span>
    </div>
    <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px">
      ${avail.map(function(u){
        return`<button id="tdu_${u.id}" onclick="td_selectUnit('${u.id}')"
          title="${u.name}: ${u.desc} · Cost: ✨${u.cost}"
          style="background:#111;border:2px solid #333;border-radius:10px;padding:6px 8px;
          display:flex;flex-direction:column;align-items:center;gap:2px;min-width:56px;
          flex-shrink:0;touch-action:manipulation;transition:all 0.12s">
          <span style="font-size:20px;line-height:1">${u.emoji}</span>
          <span style="font-size:8px;color:${u.color};font-weight:bold;white-space:nowrap">${u.name}</span>
          <span style="font-size:9px;color:#3388FF;font-family:monospace">✨${u.cost}</span>
        </button>`;
      }).join('')}
      <button onclick="td_retreat()"
        style="background:#1a0000;border:1px solid #ef444444;color:#ef4444;border-radius:10px;
        padding:6px 10px;font-size:11px;min-width:50px;flex-shrink:0;touch-action:manipulation">
        🏃<br><span style="font-size:8px">Retreat</span>
      </button>

</div>`;
}

function td_selectUnit(id){
  TDS.selectedUnit=TDS.selectedUnit===id?null:id;
  td_refreshTray();
}

function td_handleCanvasTap(e){
  e.preventDefault();
  if(TDS.won||TDS.lost){
    if(TDS.lost){td_destroy();go('game');}
    return;
  }
  if(!TDS.selectedUnit) return;
  var c=document.getElementById('tdCanvas');if(!c) return;
  var rect=c.getBoundingClientRect();
  var touch=e.touches?e.touches[0]:e;
  var wx=(touch.clientX-rect.left)*(c.width/rect.width);
  var wy=(touch.clientY-rect.top)*(c.height/rect.height);
  if(wy<TDS.TOPBAR){return;}
  if(td_placeUnit(TDS.selectedUnit,wx,wy)){
    TDS.selectedUnit=null;
    td_refreshTray();
  } else {
    // Flash feedback — can't place here
    td_particles(wx,wy,'#ef4444',5,40);
  }
}

function td_retreat(){
  if(!confirm('Retreat from this stage?')) return;
  td_destroy();G.pd.losses++;persistPlayer();
  go('game');toast('Retreated from mission','ok');
}


// ── Entry point — replaces startMissionStage ──────────
function beginMissionTD(mission, stageIdx){
  G.activeMission=mission;G.missionStage=stageIdx;G.battleType='mission';
  // Show briefing overlay first, then launch TD
  var stage=mission.stages[stageIdx];
  var stageData=TD_STAGE_WAVES[mission.id+'_'+stageIdx];
  var accent=mission.accent||'#C4A35A';
  var isBoss=stageData&&stageData.bossStage;
  document.getElementById('app').innerHTML=`<div style="min-height:100vh;background:radial-gradient(ellipse at center,${mission.bgCol||'#0a0a0a'},#000);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:Georgia,serif;text-align:center">
    <div style="font-size:${isBoss?52:40}px;margin-bottom:10px">${mission.heroEmoji}</div>
    <div style="font-size:11px;color:${accent};letter-spacing:2px;margin-bottom:4px;font-family:monospace">${mission.title.toUpperCase()}</div>
    <div style="font-size:15px;font-weight:bold;color:#fff;margin-bottom:12px">${stage.title}</div>
    ${isBoss?'<div style="font-size:11px;color:#ef4444;font-weight:bold;letter-spacing:1px;margin-bottom:10px">👑 BOSS STAGE</div>':''}
    <div style="background:rgba(255,255,255,0.05);border:1px solid ${accent}44;border-radius:12px;padding:16px 20px;max-width:300px;margin-bottom:16px">
      <div style="font-style:italic;color:#ccc;font-size:13px;line-height:1.6">"${stage.story}"</div>
    </div>
    ${stageData&&stageData.specialMsg?`<div style="font-size:11px;color:${accent};background:rgba(0,0,0,0.4);border:1px solid ${accent}44;border-radius:8px;padding:8px 14px;margin-bottom:14px">${stageData.specialMsg}</div>`:''}
    <div style="font-size:11px;color:#555;margin-bottom:20px">⚔️ Tower Defense — defend your base across ${stageData?stageData.waves.length:3} waves</div>
    <div style="display:flex;gap:10px;max-width:300px;width:100%">
      <button onclick="go('game')" style="flex:1;background:transparent;border:1px solid #333;color:#555;padding:12px;border-radius:10px;font-size:12px">← Back</button>
      <button onclick="td_launch()" style="flex:2;background:linear-gradient(135deg,${accent},${accent}88);border:none;color:#000;padding:12px;border-radius:10px;font-size:14px;font-weight:bold">⚔️ Begin!</button>
    </div>
  </div>`;
  // Store launch params for td_launch()
  window._tdLaunchParams={mission,stageIdx};
}
function td_launch(){
  var p=window._tdLaunchParams;if(!p)return;
  var mission=p.mission,stageIdx=p.stageIdx;
  G.screen='td';
  document.getElementById('app').innerHTML=rTowerDefense();
  var canvas=document.getElementById('tdCanvas');
  if(!canvas){go('game');return;}

  function resize(){
    if(!canvas||!canvas.isConnected){
      window.removeEventListener('resize',resize);
      return;
    }
    var r=canvas.getBoundingClientRect();
    var w=Math.max(Math.floor(r.width),320);
    var h=Math.max(Math.floor(r.height),200);
    if(canvas.width!==w||canvas.height!==h){
      canvas.width=w;
      canvas.height=h;
    }
    if(TDS.canvas===canvas) td_calcLayout();
  }
  resize();
  window.addEventListener('resize',resize);
  // Store cleanup ref so td_destroy can remove the listener
  TDS._resizeHandler=resize;

  canvas.addEventListener('touchstart',td_handleCanvasTap,{passive:false});
  canvas.addEventListener('click',td_handleCanvasTap);

  td_init(canvas,mission,stageIdx,
    function(){ // WIN
      td_destroy();
      var xp=mission.stages[stageIdx].xp||100;
      G.pd.xp+=xp;G.pd.wins++;persistPlayer();checkUnlocks();
      var nextIdx=stageIdx+1;
      if(nextIdx>=mission.stages.length){
        G.completedMissions.push(mission.id);
        G.pd.xp+=mission.xpReward;
        G.pd.powerups.push({...mission.reward});
        if(mission.unlockCharId&&!G.unlocked.includes(mission.unlockCharId)) G.unlocked.push(mission.unlockCharId);
        checkUnlocks();persistPlayer();
        go('mission_complete');
      } else {
        beginMissionTD(mission,nextIdx);
      }
    },
    function(){ // LOSE
      td_destroy();G.pd.losses++;persistPlayer();
      go('game');toast('⚔️ Defeated! Try again.','ok');
    }
  );
}


// ═══════════════════════════════════════════════════════
// MULTIPLAYER SYSTEM — Firebase RTDB
// Presence: /kc/church/presence/{uid}
// Chat:     /kc/church/chat (last 60 messages)
// 
// The admin pastes their Firebase config in Admin Panel.
// Until configured, the church works in offline mode.
// ═══════════════════════════════════════════════════════

var MP = (function(){
  var db = null;          // Firebase database instance
  var myRef = null;       // my presence ref
  var presenceRef = null; // /kc/church/presence
  var chatRef = null;     // /kc/church/chat
  var connected = false;
  var enabled = false;
  var listeners = [];     // firebase listener unsubscribe fns
  var onPresenceUpdate = null; // callback(peers)
  var onChatMessage = null;    // callback(msg)
  var myUid = null;
  var heartbeatTimer = null;
  var PRESENCE_TTL = 15000; // 15s stale cutoff

  // ── Load Firebase SDK dynamically ─────────────────────
  function loadSDK(cb){
    if(window.firebase&&window.firebase.database){cb();return;}
    var s=document.createElement('script');
    s.src='https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js';
    s.onload=function(){
      var s2=document.createElement('script');
      s2.src='https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js';
      s2.onload=cb;
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  }

  // ── Connect with config ────────────────────────────────
  function connect(cfg, uid, username, charId, cos, presenceCb, chatCb){
    if(!cfg||!cfg.databaseURL||!cfg.apiKey){return;}
    myUid=uid;
    onPresenceUpdate=presenceCb;
    onChatMessage=chatCb;
    loadSDK(function(){
      try{
        // Init or reuse app
        var app;
        try{ app=firebase.app('kc'); }
        catch(e){ app=firebase.initializeApp(cfg,'kc'); }
        db=firebase.database(app);
        presenceRef=db.ref('kc/church/presence');
        chatRef=db.ref('kc/church/chat');
        myRef=db.ref('kc/church/presence/'+uid);

        // Set presence with onDisconnect cleanup
        var presenceData={
          uid,username,charId,cos,
          x:14,y:20,
          t:Date.now(),
          online:true
        };
        myRef.onDisconnect().remove();
        myRef.set(presenceData);

        // Listen for presence changes
        var pListener=presenceRef.on('value',function(snap){
          var now=Date.now();
          var peers=[];
          snap.forEach(function(child){
            var d=child.val();
            if(d&&d.uid!==uid&&(now-d.t)<PRESENCE_TTL){
              peers.push(d);
            }
          });
          if(onPresenceUpdate) onPresenceUpdate(peers);
        });
        listeners.push(function(){presenceRef.off('value',pListener);});

        // Listen for new chat messages (last 60)
        var cQuery=chatRef.limitToLast(60);
        var cListener=cQuery.on('child_added',function(snap){
          var msg=snap.val();
          if(msg&&onChatMessage) onChatMessage(msg);
        });
        listeners.push(function(){cQuery.off('child_added',cListener);});

        // Heartbeat — update timestamp every 10s to stay alive
        heartbeatTimer=setInterval(function(){
          if(myRef) myRef.update({t:Date.now()});
        },10000);

        connected=true;enabled=true;
        console.log('[KC] Multiplayer connected');
      }catch(e){
        console.warn('[KC] Multiplayer connect failed:',e);
      }
    });
  }

  // ── Update my position ─────────────────────────────────
  function updatePos(x,y,dir){
    if(!myRef||!connected) return;
    myRef.update({x,y,dir,t:Date.now()});
  }

  // ── Send chat message ──────────────────────────────────
  function sendChat(username,text,charId,cos){
    if(!chatRef||!connected||!text.trim()) return;
    chatRef.push({
      uid:myUid,
      username,text:text.trim().slice(0,120),
      charId,cos,
      t:Date.now()
    });
    // Keep only last 80 messages by cleaning old ones
    chatRef.once('value',function(snap){
      var msgs=[];snap.forEach(function(c){msgs.push({key:c.key,t:c.val().t});});
      if(msgs.length>80){
        msgs.sort(function(a,b){return a.t-b.t;});
        msgs.slice(0,msgs.length-60).forEach(function(m){
          chatRef.child(m.key).remove();
        });
      }
    });
  }

  // ── Disconnect ─────────────────────────────────────────
  function disconnect(){
    if(heartbeatTimer){clearInterval(heartbeatTimer);heartbeatTimer=null;}
    listeners.forEach(function(fn){try{fn();}catch(e){}});
    listeners=[];
    if(myRef){myRef.remove().catch(function(){});}
    myRef=null;presenceRef=null;chatRef=null;db=null;
    connected=false;
  }

  return{
    connect,disconnect,updatePos,sendChat,
    isConnected:function(){return connected;},
    isEnabled:function(){return enabled;},
  };
})();

// ── Church World Multiplayer Integration ───────────────
var CWM = {
  peers: [],        // [{uid, username, charId, cos, x, y, dir}]
  chatLog: [],      // [{uid, username, text, t}]
  chatOpen: false,
  chatInput: '',
  unread: 0,
};

function cwm_connect(){
  var cfg=CFG.firebaseCfg;
  if(!cfg||!cfg.apiKey) return; // offline mode
  var uid=G.pd.playerId||(G.pd.playerId=Math.random().toString(36).slice(2,10));
  persistPlayer();
  MP.connect(
    cfg, uid, G.username, G.charId, G.cos,
    function(peers){ // presence update
      CWM.peers=peers;
    },
    function(msg){ // chat message
      // Avoid duplicates
      if(CWM.chatLog.find(function(m){return m.t===msg.t&&m.uid===msg.uid;})) return;
      CWM.chatLog.push(msg);
      if(CWM.chatLog.length>60) CWM.chatLog.shift();
      if(!CWM.chatOpen&&msg.uid!==G.pd.playerId) CWM.unread++;
      // Show brief toast for chat messages from others
      if(msg.uid!==G.pd.playerId){
        var preview=msg.username+': '+msg.text.slice(0,35)+(msg.text.length>35?'…':'');
        // Draw as canvas overlay toast — handled in cw_loop via CWM.lastMsg
        CWM.lastMsg={text:preview,timer:3.5};
      }
    }
  );
}

function cwm_disconnect(){
  MP.disconnect();
  CWM.peers=[];
  CWM.chatLog=[];
  CWM.chatOpen=false;
  CWM.unread=0;
}

// Called every frame from cw_loop to sync position
function cwm_syncPos(){
  if(!MP.isConnected()) return;
  MP.updatePos(CWS.px,CWS.py,CWS.pDir);
}

// ── Chat UI (HTML overlay) ─────────────────────────────
function cwm_toggleChat(){
  CWM.chatOpen=!CWM.chatOpen;
  CWM.unread=0;
  var el=document.getElementById('cwChat');
  if(el) el.style.display=CWM.chatOpen?'flex':'none';
  if(CWM.chatOpen){
    var inp=document.getElementById('cwChatInput');
    if(inp) inp.focus();
    cwm_renderChatLog();
    // scroll to bottom
    var log=document.getElementById('cwChatLog');
    if(log) log.scrollTop=log.scrollHeight;
  }
  // Update badge
  var badge=document.getElementById('cwChatBadge');
  if(badge) badge.style.display=CWM.unread>0?'flex':'none';
  if(badge) badge.textContent=CWM.unread;
}

function cwm_renderChatLog(){
  var log=document.getElementById('cwChatLog');
  if(!log) return;
  log.innerHTML=CWM.chatLog.map(function(msg){
    var isMine=msg.uid===G.pd.playerId;
    var ch=ALL_CHARS.find(function(c){return c.id===msg.charId;})||ALL_CHARS[0];
    var r=RARITY[ch.rarity]||RARITY.common;
    return`<div style="display:flex;gap:7px;align-items:flex-start;margin-bottom:8px;${isMine?'flex-direction:row-reverse':''}">
      <div style="width:28px;height:28px;border-radius:50%;background:${r.bg};border:1px solid ${r.color};flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:10px">${ch.name.slice(0,1)}</div>
      <div style="max-width:70%;${isMine?'align-items:flex-end':''}display:flex;flex-direction:column;gap:2px">
        <span style="font-size:9px;color:${isMine?'#C4A35A':'#888'}">${isMine?'You':('@'+msg.username)}</span>
        <div style="background:${isMine?'#1a1000':'#1a1a2a'};border:1px solid ${isMine?'#C4A35A33':'#333'};border-radius:${isMine?'10px 2px 10px 10px':'2px 10px 10px 10px'};padding:7px 10px;font-size:12px;color:#E8E0D0;line-height:1.4">${escHtml(msg.text)}</div>
      </div>
    </div>`;
  }).join('');
  log.scrollTop=log.scrollHeight;
}

function cwm_sendChat(){
  var inp=document.getElementById('cwChatInput');
  if(!inp||!inp.value.trim()) return;
  var text=inp.value.trim();
  inp.value='';
  MP.sendChat(G.username,text,G.charId,G.cos);
  // Optimistic local add
  CWM.chatLog.push({uid:G.pd.playerId,username:G.username,text,charId:G.charId,cos:G.cos,t:Date.now()});
  if(CWM.chatLog.length>60) CWM.chatLog.shift();
  cwm_renderChatLog();
}

function escHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Draw remote players in church world ───────────────
function cwm_drawPeers(ctx,ts,camX,camY,vw,vh){
  if(!MP.isConnected()) return;
  CWM.peers.forEach(function(peer){
    var wx=peer.x*ts-camX, wy=peer.y*ts-camY;
    if(wx<-ts||wy<-ts||wx>vw+ts||wy>vh+ts) return;
    var ch=ALL_CHARS.find(function(c){return c.id===peer.charId;})||ALL_CHARS[0];
    var r=RARITY[ch.rarity]||RARITY.common;
    var cos=peer.cos||{sk:0,hr:1,ot:0};
    cw_drawChar(ctx,wx,wy,ts,cos.sk,cos.ot,peer.dir||'down',0,'@'+peer.username,false);
    // Online indicator dot
    ctx.fillStyle='#4ade80';
    ctx.beginPath();ctx.arc(wx+ts-4,wy+4,3,0,Math.PI*2);ctx.fill();
  });
  // Draw recent chat bubble
  if(CWM.lastMsg&&CWM.lastMsg.timer>0){
    CWM.lastMsg.timer-=0.016;
    var a=Math.min(1,CWM.lastMsg.timer/0.5);
    ctx.save();ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,0.85)';
    ctx.font='bold 11px Georgia';
    var tw=ctx.measureText(CWM.lastMsg.text).width+20;
    ctx.beginPath();ctx.roundRect((vw-tw)/2,vw>400?70:56,tw,24,6);ctx.fill();
    ctx.strokeStyle='#C4A35A';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#E8DCC0';ctx.textAlign='center';
    ctx.fillText(CWM.lastMsg.text,vw/2,vw>400?86:72);
    ctx.restore();
  }
}

// ── Peer count badge ──────────────────────────────────
function cwm_peerCount(){
  return CWM.peers.length;
}

G.tab="home"; G.wardTab="skin"; render();
